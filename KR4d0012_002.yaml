body:
  text: 武夷新集卷二宋楊億撰詩二七十首戲贈潁州萬夀尉吳待問待問豫之故人值雨留憩數日宦途南北最情親嵗晏相逢潁水濱舊日青襟同學校暫時黃綬困埃塵樽中滿酌香醪美門外髙懸綵棒新雞黍留歡已慵發可堪經雨折紗巾題顯道人壁住萬夀縣精舍二十年矣心似寒灰不復然尋常談論即彌天門臨潁水多年住法自曹溪幾世傳儒士誰同翻貝葉都人長見施金錢翰林詩版分明在曾與吾家有舊緣故侍讀尚書有贈先師詩著之于版史館阮比部知衢州因歸建陽别墅二首比部兄昭濟隱居不仕再入蓬丘席未暖飄飄又建隼旟行交朋莫惜河梁别鄉曲初期晝錦榮竹箭波聲隨一棹斧柯山色對雙旌子牟江海心應在頻上髙樓望帝京少小鄉關振大名武夷山翠落門庭郎君近折仙人桂伯氏髙分處士星城郭遼東應改易芝蘭謝圃自分馨吳民正待隨車雨莫苦淹留醉醁醽集賢宿直寄中書李梁二舍人耿耿銀釭照直廬西風黃葉滿庭除愁心不忍聞賓雁病眼猶能拾蠧魚欹枕微吟空展轉繞廊間步自躊躇銅龍漏滴傳鈎盾玉兔光芒射綺疏薄宦久淹滄海郡故交多入紫垣居洛陽已在拜塵後宣室那逢膝席初投閣寂寥深自愧抱關憔悴擬何如寧思西掖五花判且補河東三篋書桑梓任拋萬里外蓬萊試住十年餘釋之不調嵇康懶終待休官學灌蔬翰林王學士奉使兩川萬里征西頻告捷九重喻蜀正裁書忽聞召對浴堂殿元是親乘使者車井邑凋殘經亂後軍城鼓舞拜恩初銅梁迢遞驅騶騎玉署深嚴鎖直廬星厯更須占李郃雪園應恨欠相如歸來便在三台席轉與交親禮數踈董給事知洪州豫章南國一都會夕拜東臺最上流捧詔暫辭青鎖闥携家便泛木蘭舟褰帷聽訟民謡洽解榻延賓主禮優只恐徵黃在朝暮西山靈藥未容求梁舍人奉使巴中藥署深嚴才草詔劍關迢遞忽乘軺霜天歷歷巴猿苦山路駸駸莋馬驕梁苑寒風吹别袂瞿塘春水送歸橈紫垣遣使非常例應有星文動九霄次韻和族弟日華寄編修諸學士之什鎖闈漫喜塵通籍蓬巷無人肯顧廬天祿解嘲才答客集仙置使又修書非煙繚繞縈珠網流水潺湲逗石渠漢石渠署因渠得名何必銀臺號三昧此中更好味真如次韻和光祿黃少卿學士感恩書事十六韻江夏門風盛東吳族望髙才雄吐白鳳志大釣靈鼇昔日參珠履嘗任淮海王記室多年泛碧桃陳琳巧書檄謝客占風騷曲宴飛三雅沈機佐六韜玳筵頻岸幘楯鼻幾揮毫託乘同歸闕臨軒别賜袍未離王儉幕獨得吕虔刀粉署因􅏡歷朱門更鬱陶淮南荒桂苑騎省泣霜毛已上並敘少卿昔在淮海府中及感舊之意去國踰千里為郎歷幾曹和鉛兼祕府懸磬寓神臯室靜秋生白庭間雨長蒿禁林俄召試卿寺果垂褒道在心無悶恩深首重搔依前領圖史紬繹肯辭勞次韻和史館盛學士朝退書懷之什金壺待傳點瑶􅀈初辨色闢仗開天閽垂旒操斗極百辟瞻堯眉九州蒙禹力朝政無闕遺諌官慙曠職次韻和盛博士寄贈李四寺丞因以述懷錢郎滿腹貯精神坐上詩成壓倒人相識只從拋竹馬愚初至上都遊歷門館才十餘嵗留歡長是鱠金鱗西園宴喜期清夜曲水追隨約暮春不到門墻欲旬浹巳應懸榻滿埃塵次韻和盛博士寄贈虞部李郎中之什門墻日以峻德望暗然彰弟草西垣詔身為南省郎塤箎歡並奏龍虎儼成行宴客牛心炙朝天雞舌香曲池春漲水碧瓦曉飛霜此景知何事留賓泛羽觴次韻和守邦道人寄編修諸學士之什修書何幸佐鉛黃日接羣英道自光署近承明叨謁帝賦成平樂謬為郎孟堅巳分酬賓戲嚴助還思佩郡章共憶東林社中客滿池蓮葉吐清香大名府大安閣主道者上幸魏郡親至其寺面賜紫釋子修行與衆殊銅臺連接起精廬羣公共結二林社萬乘曾回六尺輿衣惹天香親御座閣成雲構倚晴虛浮生自恨猶貪祿未得同翻貝葉書次韻和盛博士寄許州任從事之什射䇿曽攀郤桂枝從軍猶賦仲宣詩陳琳草檄應非久貢禹彈冠素有期任與盛君有推挽之約梁苑勝遊思霰雪潯陽舊隱廢茅茨任寄居星灣多歷年所初筵樽斚不須戀正好公車自薦時次韻和盛博士雪霽之什六花新霽白皚皚爽氣颼颼拂靣來梁苑酒濃寒力減謝池風細凍紋開天邊幾陳聞歸鴈江外千家見早梅此際何人能訪戴剡溪清景好銜杯次韻和太僕錢少卿寄贈編修主人宋承旨李舍人之什春官宗伯魯諸生翰苑綸闈占大名一代典謨資潤色滿朝文物仰懸衡分班月殿趨金馬侍宴天池見石鯨即日雲屏應隔坐鄭𢎞任太尉舉第五倫為司空每見曲躬自卑詔置雲母屏風分隔焉不須東觀待書成宋殿丞廣南東路轉運天子憂南越公卿薦陸生九年須富國萬里便揚旌封部諸蠻接官曹六尚榮交州何日到鼓吹定相迎次韻和中書李舍人勉元氏道宗奉宗兄弟之什二難文彩少人過落筆尋常只患多兔苑暫遊衝霰雪龍門曾上困風波一囊負米猶為客百步穿楊待決科更得詞臣贈詩句機雲入洛擬如何送僧之棣州謁王工部雪晴河水正流澌風卷驚蓬滿眼飛客路飄飄携一錫禪房寂寂掩雙扉曹溪衣鉢何年得廬阜香燈幾日歸賢守相逢膜拜後都人爭勸施珠璣次韻和錢少卿早春對景有懷諸學士草樹欣欣暖律回謝家池沼凍紋開晴天獨向髙臺望春色先從上苑來且待郢人歌白雪莫聽羌笛怨殘梅乞逢休沐便須去引滿何曾訴玉杯閣門廖舍人知袁州舍人故連州刺史凝之子凝與弟融皆擅詩名於江表駸駸五馬動征塵太守風流世絶倫身事漢庭為小相家傳楚國是騷人煙波莫歎重湖逺桑梓仍將别墅鄰麥穗微黃稻苗緑朱轓入境便行春次韻和李舍人拜命書懷寄館殿舊僚之什拜命入星垣偏承聖主恩黃扉陪漢相彩筆代堯言佩玉天顔近籝金世望喧下僚今隔品雲路仰髙軒上元夜會慎大詹西齋分題得歌字帝里風光上元節烏衣舊巷喜經過樽中酒渌寧辭醉梁上塵飛只欠歌坐聽禁城傳玉漏起看河漢轉金波主人愛客春宵永彩筆題詩奈樂何次韻和主人喜諸客見過之什金鴨噴香繞燭臺輕雲散盡月光來三千賓客連宵醉十二城門徹曉開何幸紫微容託乘更煩紅袖與傳杯明朝猶自放朝謁心喜當關不見催坐中朱博士言今荆南張諌議典襄陽日嘗留意一妓公頗畏內終不得近及移郡荆渚泣别郵亭乃為歌詞流布巴郢豫感其事𢋫而成詩駸駸五馬江陵去寂寂雙娥漢水頭一曲歌終眉黛斂十分酒盡淚珠流陽春郢客傳新唱暮雨髙堂夢昔遊瓊樹無人敢親近章臺京兆不勝愁次韻和慎詹事述上元宵會之歡寄諸同舍之什休沐欣逢上元節華堂髙宴且盤桓峩冠屢舞人多醉刻燭狂吟夜向闌月上珠簾侵坐白霜飛碧瓦透衣寒銅壺漏徹東方曙歸騎紛紛未盡歡次韻和李舍人立秋祠太一宫宿齋書事之什太一祠宫肅齋居薦至誠巳將茅縮酒應用麵為牲梁武祭宗廟用笋脯麵牲月映金天朗風來玉宇清玄談知理勝蔬食覺身輕仙馭排雲下空歌繞殿聲仍聞得丹訣簮紱頓忘情同諸公寄閬州隆靈山王處士玄晏先生早著書聖朝未降軟輪車滿頭霜雪機心息三徑蓬蒿俗客踈千首好詩傳輦轂一枝仙桂耀門閭其子近年登進士科漢庭得意真知已應為清宵誦子虛今樞密學士陳公山人之執友也送僧之大名府謁長城侍郎上人能琴善詩東吳舊寺寄巖隈駐錫神州久未回琴曲誰知流水意詩篇自占碧雲才廬峰巳結白蓮社鄴下暫尋銅雀臺仙殿主人偏好事春風鈴閣且徘徊次韻和李寺丞寄石同院之作子雲常在草玄臺不覺春風滿眼來聞道後車長載酒無因曲水共流杯石渠盡日藝籖擁金谷何時綺席開珍重主人偏愛客乞逢休沐便追陪賀太僕錢少卿直祕閣幾年宿衛向周廬頻貢文章白玉除才換月卿歸少列又來天祿校中書東吳世胄王孫貴北第門闌太僕居春草題詩欺謝客上林奏賦慕相如石渠講論應重席翠輦巡遊且奉車禁籞風光暮春月彯纓看是綴嚴徐次韻和盛博士喜梅大丞授户部判官新來乘傳抵秦川會府須才果峻遷應見流錢從地上特聞聚米向君前聲華南國推髙士名姓丹臺綴列仙每話官曹苦拘束歸家長是夕陽天次韻和李舍人憶北園尋春之作謝公别墅枕城闉蕭灑都無紫陌塵五色絲綸貪草詔一園桃李阻尋春早朝禁漏猶傳點下直殘陽巳滿身除是禁煙容洗沐直須偷暇賞芳辰次韻和閣長李舍人喜薛梁二舍人及豫同時拜命之什西垣清切本無倫虛薄將何綴侍臣承露盤髙雲際曉棲雞樹緑省中春言成綸綍終非稱室藹芝蘭幸得親從此煙霄連步武宸遊長奉屬車塵次韻和承旨侍郎宿齋太一宫之什北斗城南太一祠羽人多著九霞衣竹宫肅穆珠旒拜華表飄颻鶴馭歸繞殿步虛幢影密登壇酌獻珮聲微質明禮畢還臺去廄馬翩翩速似飛十九哥赴舒州太湖簿仍得假歸鄉兩舉進士不第得學究出身初官佐邑少嗟咨且喜鄉關得告歸松菊門前三徑在煙波江上片帆飛枌榆舊社雖堪戀星火嚴程不可違莫為棲鸞尚卑屑悔將錦襖換蓑衣唐蔡京自進士應學究科當時有此語酬謝光丞四丈見慶新命之什武夷歸路苦迢遙延閣官曹正寂寥彩鳳銜書俄錫命黃金刻印便懸腰紫微署近時當制建禮門深日趂朝咫尺天顔曾賜對熒煌台座得為僚鬼神清問憂前席松柏深情見後凋一曲陽春特相寄慙將木李報瓊瑶信道人歸西京道人後唐相國之孫來獻其祖所著五書不報寢丘遺業廢多年衣祴空藏命説篇北闕上書陳祖德上林結社會時賢風塵不肯留京邑龍象重歸啓梵筵聞有道安雖未識定應談論巳彌天邵奉禮歸鄉奉禮新定人應制曾親白玉除桐君溪畔是幽居末登王子洛賓嵗巳讀黃香東觀書萬里歸寧承漢詔三牲供膳奉潘輿水衡得俸誠堪喜莫便揮金學二疏史館盛學士以詩相賀因而答之前年出守縉雲城曾枉驪歌慰逺行今日代言青鎖闥又披郢唱見深情側聆九奏都忘味連得雙金自滿籝紅藥階前試吟嚼胸中鄙吝一時平衢州阮比部學士得假歸鄉見過陋止留題詩什因以謝之千騎駸駸赴郡初曾迂旌斾訪吾廬天邊誰識郎官宿門外空回長者車勸酒樽罍應引滿題詩屋壁是親書鄉人聞有神仙客逺近爭來看隼旟致仕朱侍郎歸江陵侍郎自內署休致二年分直浴堂門簮筆垂紳奉至尊日過八甎批漢詔宴開三殿挹堯樽忽聞抗表干君父切要懸車示子孫碧落改官旌舊德黃金加賜見深恩羣公祖道爭飛蓋故吏沾襟亦戀軒定是遼東嘆城郭肯同彭澤慮田園捧觴莫訴前為夀上馬猶能左屬鞬臨别延英對數刻已應惇史記嘉言朱侍郎致仕南歸上特錫宴於玉津園仍詔兩制三館並預其會以伸祖送輒賦詩美之征輪軋軋出皇都行路咨嗟賢丈夫天子特令供祖帳國門聊且駐驪駒舊僚送别傾三省御醴分甘倒百壺下詔巳聞推異禮乞言猶自渴嘉謨上特詔荆南官吏嵗時存問如有章奏附驛以聞馮公不是沉郎署賀老緣何歸鑑湖明主恩深若為捨夢魂應繞博山爐元道宗弟兄東遊王謝江東推世胄機雲洛下振才名忽思油幕從知去便挈幐囊冒暑行髙第自須求甲乙嘉招未用赴弓旌待看萬里摶羊角即是三秋聽鹿鳴朝彥賦詩爭送别藩侯置驛定相迎不知誰啖牛心炙又見清談一座傾殿院卞侍御赴淮南轉運卞近自淮右副運歸闕為計司判官莎庭治行推尤異梁苑聲華占上流早是都人避驄馬近陪計相運牙籌東南轉粟承新命淮海揚旌到舊遊騎置非時陳密啓壺漿幾處望行舟黃金刻印大如斗白簡飛霜凛若秋嵗滿功成來會課多應便拜富人侯省中當直即事書懷兼簡閣長李舍人李公北門之望稍濃兩掖深沉大帝居紫微西省掌泥書天閽啓鑰趨朝後侍史焚香起草初五吏援毫才患少萬錢分膳食無餘鳳池荀令連賓閣騎省潘郎對直廬煙氣霏霏生屋瓦雷聲隱隱度宫車滄波滿壁浮蘭橑修竹當軒蔭綺疏南墻有董羽畫水舍人李程為之贊北軒有竹數百竿性懶無堪過叔夜思遲多病似相如繚垣直北銀臺路拭目看君侍玉除中伏日省中當直火雲烘爀臨中伏青鎖深嚴直右曹吏散階庭時縱步詩成几案獨揮毫相烏影轉風微起仙掌隂斜日漸髙何處賜冰和郢酒誰人割炙動鸞刀紫泥封詔防稽緩寒水浮瓜散鬱陶丞相憂邊稀出沐延英三刻豈知勞七夕東西燕子伯勞飛新月如鈎玉露垂河鼓天孫信靈匹鵲橋星渚有佳期穿針乞巧佇立久織素成章報答遲定與黃姑享偕老晉宫休插奈花枝胡祕丞知潯州蘭臺進秩通閨籍熊軾臨民奉詔條風俗重尋南越志鄉關猶隔浙江潮懸知坐嘯謳謡洽更想行春意氣饒逺宦逢秋少悲吒潘郎玄鬢恐先凋次韻和盛太博寄贈閣長宿齋太一宫之什漢武親祈泰一壇國朝特祭領祠官羽旗搖曳晨曦上素瑟淒清夜漏寒駕鶴浮丘應暫下偷桃方朔合留殘齋居數宿遍蔬食定憶中厨政事餐次韻和集賢李博士中元日見寄鳳池容出沐蝸舍喜端居罷草芝泥詔間看紫素書曲肱銷永晝行樂繞前除鬢換二毛近林凋一葉初香街連甲第席户望朝車暫别同心友還嗟會靣踈次韻奉和知府溫尚書送致政朱侍郎十六韻拜章納祿便歸休祕殿親辭十二旒閣筆罷批丹鳯尾拂衣初下六鰲頭非緣荆渚依劉表定欲箕山訪許由北闕子牟終眷戀南朝安石本風流明庭顧遇違三接别墅生涯治一丘身健寧煩䇿鳩杖心間無復夢刀州素風有子堪傳遺禪論將誰共對酬白璧賜多應尚在黃金散盡不須留人欽雅譽芝蘭馥帝憶嘉言水石投祖帳特令開上苑歸帆那肯待髙秋侍郎辭日上令待秋涼即路堅請便行幾程郵驛經濃暑千里山川見舊遊已是拋官玉堂署尚思陪宴井幹樓時裁奏牘猶規諌旋寫丹經自校讎鄉里髙門表隂德國朝惇史紀嘉猷枌榆舊業須重葺香火前緣莫廢修嵗計將何資伏臘龍陽千樹木奴洲鄭漙赴汀州判官家近祝融峰登科遇至公悲秋雙鬢改佐幕十年中食蘗心常苦占蓍命未通甌閩路雖逺荆楚俗多同投刃應餘地當樽莫暫空援毫如草檄又是愈頭風次韻和宗人安期見賀恩命之什分班曉入翔鸞闕直閣旁連浴鳳池彩筆間批五色詔好風時動萬年枝勒移鍾阜慙歸晚稱疾文園恨思遲何事吾宗心倍喜春塘夢徹寄新詩早秋楚客悲秋至庭柯一葉凋鶴天驚曉露蘭畹怯涼飈團扇流塵暗單衣爽氣饒江東菰米熟歸夢隔寒潮義門胡生南歸南國烏衣族東京伯始孫一枝須折桂六闕舊旌門歸思鱸魚膾離筵竹葉樽秋風正搖落楚客莫銷魂首座升大師赴西京知教門事髙論彌天四海聞久為龍象主空門雪峰傳法稱開士麟殿談經奉至尊香滿賜衣歸洛社苔封文室寄梁園梵書貝葉應携去齋罷與誰相對翻度支梁諌議請病告以詩寄之梁深於內典經旬不謁未央宫宴坐將誰笑語同蜀郡相如非避事淨名居士欲談空門前賓客窺行馬篋裏方書拾蠧蟲西省舊僚踈會面頓驚鄙吝滿胸中諸公於石氏東齋宴鄭工部分韻得愁秋浮并序古者會友以文賦詩言志良辰美景胥遇幾稀銜杯潄醪其樂無量矧石氏二君克承堂構孝謹不衰滎陽鄭公傑出士林名聲籍甚以久要之契伸一獻之娛而我閣老昌武與二三大夫退食自公方駕而至乘秋髙會卜夜縱談抵掌盱衡樽罍方洽峩冠側辨星漢未斜將何以窮綺席之宴嬉盡金壺之漏刻盍賦一時之事各陳二雅之言物無遁形咸抽祕思朝多君子庶為美談云耳楚客登臨處離懷重隱憂二毛初入鬢一葉早驚秋旅鴈他鄉思悲笳絶塞愁憑何遣羈緒菊蘂滿杯浮次韻和慎大詹中秋待月寄西掖三舍人之什涼飈送殘暑秋色望中新天逈迷星斗宵寒待月輪境同牛渚上詩寄鳳池人僚友東牀客冰清合許親同舍薛公即其愛壻也合預兹夕之會成都鳳道人遊終南山謁种徵君何年出蜀訪南宗深鎖間房翠蘚重振錫忽聞遊地肺題門兼得謁人龍行吟一路髙秋月投宿斜陽逺寺鍾到日彌天清論罷遍尋紫閣與圭峰何大博知晉州平明東省發魚書便擁彤襜出上都别酒金英泛籬菊去程黃葉墮關榆叔孫舊禮妨綿蕝亷范新歌待袴襦滿腹經綸殊未展歸來看踐赤墀塗孫寺丞知考城縣府尹溫尚書即孫之座主又薦舉賢良方正早得東堂桂一枝凌雲詞賦漢皇知從軍久在紅蓮幕對䇿曾臨白玉墀霰雪陪遊應不晚絃歌為政莫嫌卑春官宗伯大京兆喜見門生趨府時次韻和閣長修書畢退朝下直寄諸學士之什名園甲第接康衢國典新成下直初庭竹碧鮮吟不足盤飱方丈食無餘爐中九轉神仙藥案上百函親故書仍説顔回今飲酒閣長近日痛飲秋來寧遣宴遊踈威道人歸鄉聞法靈山真佛子馳名南國本詩流二林曾有香燈約一鉢因為輦轂遊塵土化衣慵駐錫江湖收潦憶歸舟何年應制登麟殿犀柄談空對冕旒弟稱歸鄉吾家文雅占關西五十年來桂兩枝自故侍讀尚書十五翁周顯德中登第至永十六兄才兩人突辨後生還可畏籝金素業未應衰江湖去為思鱸鱠霧雨還歸養豹姿摩厲詞鋒莫中輟驚人專聽一鳴時史館髙司諌紳知華州諌署才聞滿嵗遷分符便見入秦川援毫厭賦梁園雪緩轡間看華嶽蓮竹簡汗青妨約史縑囊封皂且論邊三峰洞穴多靈藥莫便拋官去學仙武夷新集卷二
