body:
  text: 武夷新集卷十宋楊億撰墓志二三首宋故推忠協謀佐理功臣光祿大夫尚書右僕射兼門下侍郎同中書門下平章事監修國史上柱國隴西郡開國公食邑三千八百户食實封一千二百户贈太尉中書令諡曰文靖李公墓志銘景德元年秋七月乙酉大丞相僕射隴西公早朝至待漏舍不俟鑰出而歸疾故也粵翌日車駕幸其第親至卧內存撫甚厚賜白金三百斤既還宫以不起聞上又臨哭出涕初公之疾也中人太醫絡繹旁午于道殆公之薨也千乘萬騎一日再幸其居國殞宗臣帝失元輔都城為之罷市工女以之寢機同體既虧實太上之深戚斯文將喪顧天下而誰宗嗚呼哀哉真古之遺愛也公諱沆字太初其先趙郡人廣武君之後也䇿書所載世德茂焉泰陵令纍贈侍中豐追封虢國太夫人滕氏曽祖父母也洺州團練判官纍贈中書令㴞追封魯國太夫人苗氏王父母也侍御史纍贈尚書令炳追封陳國太夫人周氏考妣也公韻宇宏廓襟靈冲粹特資異禀卓然不羣甫及成童性靡好弄逮于就傳言必有章七嵗能屬文十嵗通五經大義服膺素業既冠而大成比肩諸生命鄉而髙薦時春官氏方虛甲科以待屬丁先府君之憂自大梁而抵羣舒幾二千里見星泣血哀感道塗食鬻倚廬毁深欒棘先府君厯佐使府及剖郡符狥公滅私輕財好施以經遺子市義于人暨啓手之辰無兼金之蓄公承清白之訓持窘絶之家有原憲貧病之憂茂張仲孝友之德太平興國五年舉進士得髙第解褐將作監丞通判潭州郊祀遷太子右贊善大夫八年歸朝為著作郎當是時也天子方端委穆清詳求茂異崇建冊府養育人材公之蒞長沙也椒蘭之德在人金玉之音盈耳輶軒密啓外臺陟狀稔熟于上聽喧塞于公議中謝日太宗命中貴人送丞相府試文一通以本官直史館賜五品服雍熙中今工部尚書王公化基任左拾遺上封公車大言自薦太宗謂執政曰李沆宋湜皆佳士也可並試之明日並命為右補闕知制誥公之位在二公之次上特令公首冠焉又賜錢百萬天子知公貧多權錢富家出倍稱之息又别賜三十萬俾償之端拱初遷職方員外郎掌誥如故來年受詔與今學士承㫖禮部尚書宋公白同知貢舉是時天子始命復舊制委有司貢部翕然有得人之譽未幾召入翰林充學士賜金紫又奉詔與今丞相上谷公同掌選部澄汰流品旌别淑慝清通簡要時譽歸之公之在內署也或乙夜觀書之餘備前席受釐之問風規醖藉占對􅈺雅弼違獻可上多沃心稱善舉能言皆有味天子知其才可以緝熙帝載察其德可以鎮厚風俗乃有意于大用也淳化二年拜給事中參知政事是時天子方循名實以考百揆謹吏事而責三公公勵翼一心將明庶政水潦僅止閭閻息愁歎之聲名器有倫搢紳絶僥幸之路彌縫闕職汔至小康俄罷政事以本官奉朝請雖坐䇿免時望彌重未幾丁太夫人憂柴毁過禮先是公疏戚同居功緦百口昆弟致美家人忘貧賦祿雖優量入都盡及罷樞務復罹哀疚居喪盡禮送終竭力殆于食貧曽不屑慮優詔起復辭不得請俄以本官知升州因奉璽書請對便坐天子留而不遣改命知河南府兼留守司事二周變風期月報政才及滿嵗召歸闕廷屬光啓承華克固邦本疇咨羽翼輔導元良即以公為禮部侍郎兼太子賔客特詔賔護之職一用師傅之禮仍屈儲君之重先施下拜之儀公請見頓首辭不獲免皇上踐極拜户部侍郎參知政事未幾以本官平章事監修國史進位中書侍郎屬鳴鏑犯邊翠華薄伐居守之任根本斯繫關中圖籍委鄼侯以無疑東郊保釐非畢公之為比上親握武節躬御六師北涉大河駐蹕全魏勞軍而連營賈勇展義而編氓案堵班馬引去邊塵載清無有南顧之憂克定一戎之業者繄公之力也公亦坐鎮京邑兼容獄市令行禁止不戮一人千門萬户曽無吠犬及鑾輅凱旋謁見行在置酒幄殿奉觴上夀勞問優縟體貌尤異清中除道奉迎至尊同德一心光輔大政來年進位門下侍郎屬有事南郊加尚書右僕射餘如故公踐師長之秩處丞弼之地屬西北二鄙金革未息伐謀制勝實賴前籌調發均輸曽不暇給當寧靡寧于旰食宰府專職于憂邊公夙夜自公憔悴事國任重責大智困神疲休浣在辰稀得出沐腠理徴疹不敢寧居筋力前衰精爽坐竭岑江陵之盡瘁天子先憂張司空之云亡星文告變嗚呼享年五十有八詔輟視朝五日贈太尉中書令上又别次發哀羣臣奉慰追録嗣子逮于周親乃至外姻諸甥常從給使咸被延賞之澤悉膺非次之命又特命昭宣使恩州團練使李公神福監視葬事太常考行諡曰文靖發引之日有司具鹵簿大鴻臚持節護喪即以今年五月庚申歸葬于河南府洛陽縣賢相鄉積潤里從尚書令府君之塋禮也公積階至光祿大夫䇿勳上柱國三進爵為公真食至千二百户功臣之號凡再加焉祿位寵名皆人臣之極也前娶清河張氏永興軍司馬忠輔之女生一子曰翁朝三女長適右諫議大夫薛映次適奉禮向傳正相國河內公之子也次數嵗而夭及公之薨張夫人之所生無復存者今夫人沛國朱氏纍封越國夫人故太常少卿致仕纍贈工部侍郎洞之女嬪于台宰宜其室家作範中闈啓封大國齊眉舉案禮極如賔晝哭帷堂痛深偕老生四子三皆早夭幼曰宗簡大理評事五女長適著作郎直史館王曽執喪過哀遇疾而逝次皆幼公三弟曰贄虞部員外郎知洛陽縣陳力就列負適時之才曰源太子中舍裕蠱亢宗真保家之主曰維户部員外郎直集賢院文行第一見推朝倫克荷世家允為國器公風鑒融朗天性謹厚自結髮為學靡雜塵遊雖燕居慎獨如臨賔祭視童無誑處暗罔欺韋編屢絶不閲非聖之典束帶未既不答嚴君之召先府君常語人曰此兒異日必至公輔知子之明蓋無愧矣及計偕續食發䇿决科引籍周行通直延閣水懷珠而川媚林養棟以材成繇是升右掖以司言入內庭而待詔五代已來文體一變至於雅誥殊未復古公之書命也啓迪前訓潤色鴻業善為辭令長于除書考三代之質文取兩漢之標格使國朝謨訓與元和長慶同風者繄公之故也及參二政柄彌綸事典守正持重不務將迎出蒞瑣闈恪居官次靖恭夙夜曽無澄撓尹正西洛茂宣愷悌之風調護東朝助成明良之德暨再掌鈞軸正位岩廊斟酌治體辨論官材人斯具瞻帝用親倚謀事補闕夜思晝行納誨盡規有犯無隱深識大體務行故事終年公府未嘗案吏退食私第靡有謝賔加以慎默寡言質直無矯百執延見多虛往而實歸兩府論議必守經而據古將順歸美而不喜詭隨夕惕補過而深懲滿假兹所謂皇家之柱石神化之丹青也至如喜怒不形進退可度陟降畫室尺寸靡差吐嘔車茵醉飽必恕賦祿雖厚奉身甚薄萬錢之入周急屢空數畝之居逼下巳甚不問家事不恤人言疇昔交遊淡水之情無改平生恩德一飯之報不忘性絶玩好專聚圖籍孜孜繕寫躬自讎對崇奉內典洞曉真諦每燕居靜慮深念無生旁行四句堆案盈几雅善筆札特臻其妙嘗所著述遺槀頗多季弟維論次編聨成二十卷立言不朽其在兹乎諸弟等以某為相府舍人多厯年所欽奉全德飽聞緒言見徴銘篆之詞以防陵谷之變某早在薦紳之末特䝉國士之知雖年輩相遼位貌非等更僕之論固嘗莫逆于心沈石之文庶幾傳信乎後是為實録諒無愧焉銘曰聖作物覩帝賚元輔如鼎三足猶天八柱翊宣大猷康濟庶務衮職有闕仲山是補顯允相國光弼大君謨明亮采師古經文道類矢直政無絲棼百工時乂九流洞分公德如風孰不靃靡公言如蘭人斯服媚大成典謨學探象繫嗚呼彼蒼胡不憗遺公心如稱重輕誠懸公道猶龍鑽仰彌堅功熙帝載識窮化源哀哉哲人胡不永年它人蹄涔可以揭厲公陂萬頃涵泳無際它人垝垣殆見室家公墻數仭德音孔遐公掌大鈞平章百揆思職憂邊匪躬盡瘁哲人其萎二豎生沴桃茢臨喪禮優賵禭公輔大政髙朗令終易名贈秩褒德顯庸十世猶宥九原啓封鹵簿賜葬都城輟舂馬悲鳴兮車結轍弩矢驅兮班劒列靈輀駕兮祖奠徹銘旌飄兮楚挽咽伊人生之共盡兮唯大名兮不滅邙之麓兮洛之涯泉臺閴兮隴樹微宿草短兮朝露晞蒼烟暝兮夕烏飛苟逝者之可作兮非我公兮曷歸宋故大中大夫行給事中上柱國臨汾郡開國侯食邑一千二百户賜紫金魚袋平陽柴公墓志銘公諱成務字寶臣其先平陽人漢棘蒲侯之後也世亂流寓不常厥居公之逺祖占籍河朔積德有後宗𣲖盛焉五代祖賡因官曹南遂家于濟隂郡大王父綱廬州别駕王父𦙍隱居求志藏器不耀纍贈太子右贊善大夫祖妣劉氏追封彭城縣太君烈考自牧舉進士乙科應聘戎閫晉末之亂奉武行德于河橋蹈危機畫竒䇿尊立漢室底定中原天步既清賞典不及逮周邦之啓始通閨籍踐厯臺省淹徊郎署終兵部員外郎而王父祖妣追榮錫命皆由兵部之故也自公之貴兵部纍贈禮部侍郎妣丁氏追封譙縣太君錫羡流光斯不誣矣公風度夷雅襟靈冲粹始在孩稚逈如老成靡事塵游不雜兒戲橫經就學昻昻有千里之資從賦干名籍籍致同人之譽每投誠執贄前逹為之致恭秉筆屬文傾都以之傳寫春官宗伯常虛甲科以待之而公思值名公伸于知巳乾德中禮部員外郎知制誥王公祜適典貢部公始就鄉舉即以公冠于諸生當時朝野聳得賢之議解褐宿州軍事推官秩滿為曹單觀察從事被所知之舉遷大理寺丞監潭州茶場管榷之利實佐于用度羡餘之績具載于簡書疇其幹蠱之才委以外計之任改太常丞峽路轉運副使賜五品服拜監察御史知果州轉殿中知蘇州滿嵗移充兩浙轉運使改户部員外郎直史館賜服金紫除本曹郎中充三司户部判官選為光祿少卿未幾充髙麗國信使復命領京東轉運入為司封郎中知制誥遷左諫議大夫知河中府今上踐祚拜給事中知梓州歸朝受詔同修永熙實録俄知揚州入判尚書刑部小吏犯法怒而笞之黠胥無賴伏闕自訴適有中㫖薄責其狀公以為天子從官領秋曹六卿之任抶吏被劾禁止朝謁亦何面目復據堂决事耶即上言解職以本官奉朝請未幾腠理生疾勿藥靡徴哲人其萎頽山興歎嗚呼公以景德元年六月某日考終于正寢享年七十有一公寢疾彌留方寸不亂口占遺奏以六嵗孤兒為言上憫之特授太常寺奉禮郎賦以廪祿俾終喪紀即以某年某月某日奉公之靈柩歸葬于開封縣新里鄉汴南里小邉村汴南原舉前二夫人祔焉禮也公始娶趙氏故宗正少卿齊之女後娶張氏今夫人李氏封贊皇縣君故水部員外郎岧之女也宜家之美內助居多德茂亢宗義敦偕老三娶令族晚有兒息年六十有六始得今奉禮焉二女長許適太常寺太祝張太初今户部侍郎雍之愛子也次尚幼二弟曰成象舉進士終祕書省著作佐郎曰成文任三班奉職實公之保任也弟之子曰貞範將作監丞曰貞簡祕書省校書郎皆自公而成立焉公文行首出時名籍甚自濯纓筮仕束帶登朝佐幕從軍頗聞婉婉之畫剸煩治劇蓋有飄飄之刃先朝以卿士惟月時惟古官位實象河行有鳴玉典掌尤重表著竝崇自唐以來目為散地思矯前失以振舊規乃選諸曹正郎有才望者十人並補少列而公首膺兹任羣議允歸至若辰韓之區是為君子之國世修職貢乃心本朝而尺詔頒恩輶軒遣使撫柔殊俗震疊皇靈自非專對之才或致君命之辱而公奉辭于役裔壤咸懷矧內史西臺專掌訓誥代言之選居第一流而公允是僉諧潤色鴻業前朝國書藏在冊府論次大典厥惟難才而公肅奉擬倫裁成信史逮于出典劇郡必樹于風聲入奉內朝式瞻于儀表經笥學海河東之三篋盡通辨囿談叢稷下之千人皆伏多識前訓鑽之彌堅善與人交久而無改雅奉𤣥元之教妙逹養生之㫖深通醫砭之術屢獲蠲痾之效其風規醖藉學術該博亦足為儒林之丈人公朝之舊德矣某昔刊青簡嘗接緒言今志佳城無慙直筆庶幾傳信以永方來銘曰濁河奔流羽蟲日化逝者如斯不舍晝夜新阡鬱起原隰龍鱗死而可贖人百其身嗚呼柴公名髙鄉品給事左曹行將十稔享年從心考終正寢日月之吉龜筮叶從牛眠卜宅馬鬛增封九原宿草千古長松唯令名兮不滅與簡䇿兮無窮宋故推誠翊戴同德功臣山南東道節度管內觀察處置橋道等使特進檢校太尉同中書門下平章事使持節襄州諸軍事行襄州刺史判許州軍州事上柱國隴西郡開國公食邑一萬四百户食實封三千二百户贈中書令諡曰忠武李公墓志銘景德元年冬天驕冦邊羽書狎至列城開壘冀方弗寧爟火幾照於郊畿敵騎將飲於河曲聖皇赫怒乃議親征六師戒嚴百神衛蹕且詔襄陽節度相國李公為駕前東靣都排陳使元戎十乘實先啓行既至而軍聲震且戰而戎渠殪清道迎謁案節前驅及天步底寧鑾輿凱入又詔公以精甲萬騎留鎮澶淵粵二年春正月詔公入覲臨軒延見體貌非常置酒髙㑹宴勞加等適終飲至之禮俄嬰腠理之疾太醫中貴相望於通莊翠華羽葆親至于甲第公力疾迎拜雪涕興言發于至誠感動人主既而中乾遘沴有加無瘳殆於旬時遂至沈劇汔二月癸未以不起聞皇上撫几興嗟臨喪出涕失左右之手奄喪於宗臣聞鼓鼙之聲深思于賢帥搢紳相弔里巷輟舂桃李無言蓋仁愛之所結金石斯刻固風烈之如生嗚呼哀哉真人之傑也巳公諱繼隆字霸圖其先隴西成紀人至於因生命氏之由來世德家風之似續實出𤣥元之後蔚為仙李之宗族望重于山東譜諜藏于冊府非假一二而談也公之逺祖占籍上黨水深土厚代産偉人大王父諱直以髙尚之姿不求人爵以蕃衍之慶大啓孫謀王父諱肇仕後唐為都壕寨使檢校司徒同光中討王都于中山㑹北戎赴援王師失律諸帥奔潰不任其恥獨率麾下力戰而歿烈考諱處耘國初佐命功居第一厯宣徽南北院使樞密副使屬太祖皇帝再造區夏經營四方申命信臣討平亂略偏師一舉盡得荆山之地不煩血刃無犯秋毫版圖入於職方貢賦歸於宰旅大勳既集飛語乃生卒致投杼之疑且有傳車之召屬吏問狀恥于辨明左遷淄州刺史考終于治所焉太祖念翊贊之元功申追命之殊典特贈宣德軍節度使檢校太傅以公之貴纍贈中書令追封豳王妣吳氏封齊國太夫人王父纍贈尚書令祖妣趙氏纍封萊國太夫人皆以公之故也公識度沈粹風規醖藉山庭月角蓋有封侯之相蒼璧黃琮乃是禮天之寶耿介不羣倜儻自任涉獵經史博通大義馳騁騎射冠絶一時初先王昆仲三人友悌尤篤而先王以翹車應聘杖策從軍伸于巳知不遑家食公始在孩稚即養于伯父作坊君殆總角成人出就外傅乃歸膝下以奉所生蓋閨門之中兒無常父者矣先王居宣猷之任公朝行延賞之澤以公補西頭供奉官及侍行淄川為當塗者除其籍屬聖人之降生從母氏而入覲命復其秩留於京師俄丁先王憂見星而行悲感齊俗逺日之卜歸葬洛陽執喪過哀襄事盡禮時公始十有七嵗矣既畢封樹復預朝請而當時用事者或先王有憾之人方徼寵于明庭思樹怨於後嗣公之所厚為公危之公介然自持不以屑慮姑務德報且圖智免繇是靡事生産多恣弋獵持權者謂其非象賢也勿復忌之甫及勝冠之年深逹屈身之略事親以孝睦族以仁沈浮當時脫略細故識者知其逺大也開寶初送戍卒于中山中山帥孟𤣥哲命宴射堂公矢無虛發舉止嫻雅𤣥哲有知人之鑒謂公曰他日非吾所及也時隴蜀初平冦盜猶梗命公為果閬州監軍兼巡檢太夫人以公使于逺邦特鍾慈念擇先王之左右常從及故謹厚者俾輔翊之公曰兒之是行不須此輩必當有立無忝前人太夫人喜聞其言拊背以遣戾止踰月羣盜屏息巨猾就擒齊氓安堵椒蘭之德薰于鄰邦金玉之音聞于京轂受代即路比屋遮號遺愛在人頌聲盈耳公以庭闈在念晨夜兼程驛鞚奔馳劔棧危險蘿蔦䝉密岩谷深峭狹徑雨苔之滑喬林宿鳥之喧絶澗崩崖人馬俱墜比驛吏然燭而至引綆以登兩無所傷深踰百尺議者以公貴盛之未涯孝思之致感也㑹朝廷將舉樓船之師復金陵之地命公率卒三百戍于武岡式遏蠻陬以防外侮先是內地但給刀楯羣冦暴集僅及數千公督士力疾推鋒决死藥鏃貫臂神色自若賊不敢抗稍自引退繇是勇敢之譽聞於闕庭及王師南征命公與石曦領偏師討平宜春郡捷書上聞吳人禠魄太祖始不以衆人遇之也當是時浮梁渡于長江靈旗指于南國內發七校日費千金資糧扉屨順流而下牙檣䥫軸敵境是虞太祖命公與宗人符共董其役公偹豫有素往來無滯編管斗粟不爽於軍需木牛流馬式彰于心計太祖竒其材力形于歎嗟乃命公案視壘垣督責戰具出驅使傳車無停輪入奏戎機膝恆前席甲戌紀厯知江左之道消伏波論兵與漢皇而意合自王師南渡公往復其間常日馳五百里途中遇虎以一矢斃之又嘗械降將一人獻於闕下至項縣疾甚斬首以聞太祖謂其勇而有謀可任大事嘗于江中與吳人水戰伏弩忽發正中其額若神物保護終無所傷奮不顧身忠而能力始太祖以先王之捐館也頗深痛惜特優命數若追悔之無及嘉舊勳而不忘疇公之勤益懷遺烈問及孤幼形於軫惻因謂公曰俟平江東之日奉捷書而來時中使近臣幾十數輩専伺獻功競圖受賞適有機事當奏京師公獨請行上益虛佇且言臺城危􅕚之狀因云在途日忽大風晦暝此城陷之兆詰朝露版至太祖召謂之曰如汝料矣吳將盧綘者嘯聚亡敗衆且萬人盜庫兵拒王命詔公以偏師討之勢窮乞降縛送行在以功遷莊宅副使㑹雩祀西洛命公為御營前後巡檢使太宗踐祚拜六宅使河决近郡奉詔使塞如期訖役水復故道三年輿駕薄伐次于常山命公視師晋陽盡護諸將因受詔與彰德軍節度使李漢瓊當一面之衝施九攻之術飛矢羽集而戰氣益酣左輪朱丹而鼓音不息抶其不勉奮以先登勇常冠軍退必殿後嘗為機石所中勢如疾霆旁觀震驚不挫毛髮俄而并土窮􅕚面縳出降太宗因其兵鋒遂討幽薊命公與郭守文領期門之師當前茅之任與敵鬭于胡瞿河之南大挫其鋭㑹戎人救至我師不利倉卒之際即議班旋車駕宵征諸將皆去唯公敦陳整旅長驅而歸引弓之民紛布左右憚其嚴整不敢邀擊追及行在太宗悅之既還上都罪狀諸帥惟公與汾陽等數人不坐焉俄而獫狁犯邊命公護常山軍與崔翰等大破敵於徐河先是朝廷圖陳形規廟勝盡授紀律遙制便宜主帥遵行貴臣督視公獨陳應變之略不以新書從事違詔之罪誓獨當之果成茂勳天子嘉歎四年遷宫苑使媯州刺史六年護三交戍兵又受詔與潘美出代北破契丹靈丘縣大獲而歸明年護定州軍雍熙二年李繼遷叛于銀夏受詔與田仁朗討之仁朗被讒下獄以公為環州團練使實代其任公以仁朗非罪屢上言救之果獲輕典及西師之罷出為高陽關監軍三年春王師北征諸將受律公𨽻曹彬麾下實為之前鋒鼓行深入屢敗賊衆矢中左股督戰不廢得契丹貴將一人元戎欲奏其事公力止羣議不敢貪功俄而傅潜米信兵敗衆遂大擾為賊所乘獨公全師而歸成列不亂既次易州賊騎倐至公兵素整格鬬退之因受詔知定州兼兵馬鈐轄太宗知公忠勇可貞戎政改武州防禦使充侍衛馬軍都虞候賜號忠果雄勇功臣九月丐奴南侵命公為滄州部署率步騎一萬以赴之敵急擊河間劉廷讓求救于公不俟命而往次君子館敵伏兵發廷讓等先不之覺公力戰敗之殱戮無數㑹暮敵援兵至禆將桑贊等先遁我師遂潰公獨領百騎逹于河間讒人搆之謂其失偹詔徴赴闕送相府簿責之公條對明白即命復位因上軍政數事皆可其奏未幾授武州觀察使檢校太保總兵如故端拱元年春遷洮州保順軍節度使充侍衛馬軍都指揮使出為定州都部署是嵗胸奴八萬騎冦中山公之衆才二萬內謁者傳詔俾堅壁以待之公謂諸將曰閫外之事吾得專之也往年河間為人所誤不即死者正謂今日耳護軍袁繼忠壯其言躍馬從之大破敵于唐河追奔數十里俘馘以萬計是嵗敵冦常山及邢洺諸郡皆城守不出而中山之民芻蕘無廢公又出竒兵薄西山以邀敵敵亦引避太宗賢之召歸謂曰唯爾盡力於我每嵗防秋即詣屯所淳化四年授邠州靜難軍節度使仍總兵柄時李繼遷叛渙河外交通夏臺綏州高文岯舉城效順西鄙騷然命公為河西行營都部署繼遷聞風逃于絶漠保忠就縛送于石州或請誅之公曰當獻於天子以釁鼓耳既而申宥罪之命契明主之心焉至道二年春繼遷劫我輜重于浦洛河二將敗衄命公為靈環十州都部署經略西事秋七月大發車騎十餘萬分五路以討賊遣公自靈州取東關鎮由赤柳苦井路以赴之軍行乏水深以為慮即自槖駝路徑趨烏池聞丁罕慶州之軍與賊接戰倍道赴救解其長圍三路之兵皆後期不至賊黨逺遁遂謀旋師尚以不赴靈州慮違詔㫖遣其弟繼和奉表待罪太宗深加慰勉屬饋糧朔方命公由瀚海路率師護送公請自古原州涉蔚茹河為便衆或非之公確論其事又遣繼和入奏繼和亦博逹有謀極言其利太宗聽之屬漕運之司飛挽未集遂案甲休士持重養勇賊將史癿遇者頗擾內屬率兵擊敗之俘獲萬計士氣益震叛羌悉歸三年果由古原州路入援靈武遂城廢壘是為鎮戎軍控夏人之咽㗋為諸夏之扞蔽守禦之固至今賴焉自靈武之言歸聞永熙之厭代亟陳封奏求覲天庭改授陳州鎮安軍節度使檢校太傅總兵如故五月來朝上以公纍朝舊臣地居元舅周旋二紀勤勞王家將欲增其寵名不敢煩于戎旅詔加同中書門下平章事歸鎮甸服偃息以作藩正位中台雍容而論道俯接天邑蓋䝉福于京師並建戎藩用夾輔于王室屬太宗因山卜宅同軌戒期執圭來朝攀髯號慕俄丁齊國太夫人憂居喪盡哀幾于滅性明詔起復固讓莫從三年以誕聖之辰修上夀之禮郊勞餞飲寵數並優宴見咨詢嘉言罔伏五年郊祀進位檢校太尉六年北戎敗我師於望都公感憤載懷明發不寐上奬其誠節特詔歸朝清宴延登䇿慮幅臆公車請行封章疊委上優寵耆德不欲重煩但璽書垂褒便坐加禮而已俄授公山南東道節度使未幾授詔判許州實由公乃心本朝忍違京輔遙領峴首式綏三楚之人卧理璧田且增九鼎之重遽以明德皇太后大漸詔入省之屬𤣥寢之有期復巾車而肆覲俄而北方之强舉國來冦邉城震駭羽檄交馳兩河之人旦暮延頸以徯六龍之御也公懇求扈從以扞牧圉上亦傾心委賴動靜咨訪公忠誠感發規猷宏逺公家之事知無不為帷幄之籌言皆可復及先驅禦侮受命忘家臨敵誓師人百其勇敵騎奄至不介馬而徑馳我武既揚須破敵而㑹食大殱强冦克振天聲保界洪河申嚴戎政輕裘緩帶奉迎乘輿釃酒椎牛宴犒衛士上天眷命異域請和邊塵載清帝車來復加地進律實居羣后之先繼好息民式開萬世之利詔加開府儀同三司增邑千户未及拜命遘兹沈痾適覩承平奄歸窀穸嗚呼享年五十有六詔廢朝五日贈中書令上特為制服發哀羣臣奉命入內內侍副都知西京作坊副使張公景宗監護葬事又命殿頭髙品石廷福召名德僧就其第作佛事四十九日而罷太常考行諡曰忠武發引之日有司具鼓吹鹵簿大鴻臚持節護喪即以今年十二月庚子歸葬于河南府河南縣偏橋村之先塋舉洪農郡夫人楊氏祔焉禮也公二紀宿衛四換節旄纍階至開府䇿勳上柱國進爵為公真食至三千五百户功臣之號凡三加焉祿位官榮皆人臣之極矣公前娶洪農楊氏即保靜軍節度使贈侍中光美之女也繼室天水閻氏封涼國夫人三子長曰昭吉次曰昭文皆任供奉官先公而逝季曰昭慶今任洛苑副使四女長及笄而亡次適內殿崇班曹玹亦逝矣其二皆幼兩弟仲曰繼恂任洛苑使順州刺史不幸短命前公而歿有子曰昭遜以公之故特授內殿崇班季曰繼和任西頭閣門使平州刺史智略輻湊磊落不羣負文武之才以功名自任公友愛尤異深所推奬嘗謂之曰吾門之不墜者繄爾是賴自罷兵歸鎮因手筆唐李績遺戒授之且曰吾不復預家事矣啓手之日依而行之及公之被病繼和適受任并門力疾封章忍死以待飛馹而至相見甚歡談笑移晷方寸不亂比更衣而就舍即瞑目以歸全其器量也如此長姊適故洛苑副使郭守璘恭惟明德皇太后沙麓啓祥塗山叶慶作合先帝正位內朝光輔大君居尊長樂播德彤管升祔閟宫實公之元妹也次妹適故主客員外郎直集賢院范貽孫從父兄曰繼凝任樞密直學士未及大用而亡曰繼昭終于殿直二兄之子曰昭度內殿崇班曰承信供奉官皆由公之故也公器宇宏廓風鑒融朗敦閲詩禮博通義府跌宕文史多識前言寤寐經綸善談名理為將威重御衆嚴整在貴思降人得其歡心撫下有恩士致其死力習知邊事練逹武經臨難忘軀無厭于金革盡瘁事國竭力于股肱交逰之情嵗寒而勿改行旅之際險易之不爭嘗奉詔書護塞河決日暮涉水讓舟于梁逈公與竇神寶乘單舸而渡溺于中流得大桑樹依之獲免及逈以舟迎夜半至岸比旦視之樹已沒矣其損己先人有如此者公臨事有謀當機無滯岐溝之役適有詔部分諸軍𨽻于列郡公遽令録其詔書後旬餘有亡卒數萬人集于中山不知所嚮公即以詔書諭之各給要劵俾歸所部其深識制變有如此者公為國逺慮獻言盡規先嘗詔廢夏州公以為賊遷根本之地不可棄也又言銀夏南山中宜增置堡戍以扼其衝且保鄣蕃族而斷賊之糧道當時雖不用其䇿而識者韙之至于宿衛鈎陳握兵蘭錡周廬夜直太上有髙枕之安戎壁親巡軍中無兒戲之誚連守兩鎮密邇王畿化行若神明民愛如父母在宛丘日屬水潦暴集舊防壞決吏民奔潰蓋無聊生公獨守危堤精意懇禱衝波稍却一郡獲全率身捍患人受其賜性敦儉約不務華侈勤接士類雅好清言多聚羣書僅餘萬卷退食于公手自刊校喜讀春秋躬親繕寫筆札之麗自成一家博物多能動臻奧賾金絲誤曲周郎之顧乃回駑驥同羣伯樂之鑒殊妙然而感激家世慷慨勳名嘗語弟繼和曰我異日當馬革褁尸正得死所耳慎無厚葬期于速化既以彰盡忠之節亦以見逹命之言在北邊日嘗奉詔廢威虜軍公上言以亭鄣之設不可徹備汔今賴之又纍奉手疏乞固守靈州至於陷沒深以為恨此又城郢之英規禦戎之長算也公勞謙自處兢持尤甚踐台宰之位也而㢲牀好讓慕考父之益恭立方面之勳也而坐樹無言同之側之不伐冠通侯之籍也而卑以自牧靡恃刑馬之盟居外族之親也乃貴而能貧謹守濯龍之戒宜其陟降帝右屏翰王國出藩入輔生榮死哀清廟藏功鄼侯巳居于第一未央盡像霍氏當期乎不名兹所謂皇家之藎臣人倫之全德也巳愛弟等以某嘗學舊史從事斯文見徴篆刻之辭以防陵谷之變牢讓不獲謹為之銘銘曰哲王建官仰鑒懸象紫微端門實列貴相文昌法宫乃有上將唯公踐之令問令望國之大事時惟五兵入董藩衛朕師不驚出總戎律亂略以清唯公尸之七德以貞二矛重弓高牙長㦸雕戈淑旗屏我王國弩矢前驅列鼎而食殊鄰不庭拊劒太息黼黻公衮山𤣥陸離赤舄几几貂冠蟬緌書日三接宴見疇咨啓沃忠藎行無越思中山之師轍亂旗靡抗章請行投袂而起帝嘉舊勳慮其勞止旰食咨嗟璽書褒美控弦之騎飲馬于河鑾輅薄伐戰功居多時龍駐蹕天驕請和宣室飲至朔陲止戈帝居穆清體貌尤異中外式瞻安危注意事君致身憂國盡瘁嗚呼彼蒼胡不憗遺心領襄漢鎮兹璧田河潤九里民戴二天邑廣千乘祿踰萬錢樂只君子胡不永年嵗將暮兮寒風冽天皚皚兮飛密雪繐帳儼兮猶懸靈輀隱兮進轍路悠逺兮野蒼茫歸夜臺兮從先王英魂邈兮騎箕尾忠功藹兮書太常泉扄閴兮宿草荒人生共盡兮吁可傷唯勳名之不滅兮等維嵩之峻極與洛水而靈長武夷新集卷十
