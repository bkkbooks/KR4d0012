body:
  text: 武夷新集巻十三宋楊億撰表狀二二十首賀劒門破賊表臣某言今月二十七日得本道進奏院狀報近有西川駐泊神衛右第三軍第二都虞侯王均等為惡作亂奔衝劒門已據劒門都監裴臻與知州李士衡同共殺敗者蠆毒甚微敢行稱亂鴟張未幾已覩成擒兇醜既殱朝野相慶臣某中謝竊以王者之謹闗梁所以備他盗用鈇鉞所以誅叛臣如王均等身率戎行地親藩衛禄廪優厚賜予便蕃饜飫膏粱被服輕煖出荷干城之寄曽無汗馬之勞乃敢結構異端脅從羣小苟圖不軌輙負大恩挺狼貪羊狠之謀為䑕竊狗偷之計天設之險爰肆憑凌鬼得而誅豈容越軼裴臻等任當要害職在誰何屬蛇豕之興妖乗貔貅之鼓怒遂推鋒而奮擊未旋踵以剪除元惡既就於梟懸餘黨更無於噍類寢皮食肉式快忠義之心犯門斬闗永破姦邪之膽天威所被井絡載寧賞典聿行輿誦斯愜臣忝分憂寄幸覩捷音慶抃之誠實萬常品無任云云謝賜詔書欽恤刑獄表臣某言今月十日本州進奏院遞到勅書一通賜臣欽恤刑獄者臣當時集軍州官吏宣示仍下管内諸縣施行訖天網雖踈尚多於嬰拂夏日可畏用示於哀矜尺一之詔俯臨圜土之人何幸臣某中謝竊以世質民淳唐虞以之畫象政平訟息文景幾於措刑葢由五聴無寃三章不濫上懐欽恤之㫖下萌恥格之心用臻太和式符至治伏以崇文廣武聖明仁孝皇帝陛下憂勞庶政涵育羣生化逺被於不毛仁必沾於行葦隠悼伏念表視民之如傷震曜垂儀示臨下之有赫政經載肅治具畢張矧於流爍之辰獨軫係纍之苦皇華遣使在犴獄之已清紫素裁書復徳音之薦降慮及米鹽之細恩同雨露之濡疾疢者既示醫治貧困者仍加廪給昔周聚毒藥止療於邦畿漢設淖糜不沾於囹圄足以彰皇猷之冠古實以固率土之宅心佇去殺以勝殘永無為而無事臣忝分符竹肅奉絲綸徴慎罰之前言體泣辜之深㫖金科玉律期適於重輕叢棘黄沙敢令於繫滯誓傾勤瘁仰奉欽明臣無任歡呼激切之至進承天節頌表臣某言運偶承平節臨載誕凡叨食於周粟盡願祝於堯年臣某中謝臣本自諸生偶干寸禄受兩朝之顧盼無馮唐不遇之嗟閱四部之圖書有黄香未見之恥雖研精而强力終昧道以迷津然而千載休辰萬邦大慶充庭任土慙非玉帛之云巢閣舞庭豈在飛走之末是敢罄竭庸鄙撰承天節頌一首獻於闕下吉甫作頌愧無清風之稱東方上書或希乙夜之覽臣無任云云代人乞太宗御書表臣某言臣世受國恩名參閨籍竊仰先朝之述作欲期私室以秘藏輒露愚衷上干聖聴臣某中謝臣伏見太宗皇帝御製御書等思窮造化妙絶古今與六籍以攸同非二王之能及固已勒於琬琰掲在蓬萊名山大川深藏於副本石室金匱首冠於羣書皆所以博綜儒𤣥跌宕文史立言不朽乃孔氏春秋之徒懸法授人實唐堯厯象之比汾水之宸遊雖遠羽陵之墜簡多存如臣忝荷箕裘幸塵簪紱犬馬之志敢忘於糜捐龜龍之文徒思於鑽仰輒削章而有請實昧死以無疑伏望尊號皇帝陛下念先臣際㑹之由察賤子勤拳之懇特詔金縢之府許求玉字之書賚及下臣光生寒族威神如在固共畏於軒臺教化所資誓永藏於魯壁祈恩之至伏切愚衷代中書乞罷免表二首臣某等言臣等竊以隂陽燮治之任實繫台司水旱䇿免之文具存載籍苟弼諧之無狀而災沴之或生姑務偷安靡思避位豈但妨於賢路深有負於國恩臣某等中謝恭以宰相之位實代天工四海之所具瞻一人之所注意必在彌綸百度綜覈羣材親附萬民折衝千里外清戎略使金革之不興上奉天時俾風雨之咸若然後彞倫攸叙比屋可封富庶而日用不知端拱而天下自治此輔相之職也自非懐經邦之略負命世之才補公衮以有餘據台槐而無媿若逢時而肆竊但積日以宴安豈惟累三光之明固亦致四夷之哂臣等内訟已久自知甚明苟不露於肺肝亦何靦於靣目如臣沆者本非竒特葢出遭逢先朝擢自禁林俾參機務曽乏訏謨之効備彰尸素之愆皇帝陛下以青宫之舊僚委黄扉之庶政深辜物望莫舉官常臣化基僅及中人曽無遠慮先聖偶加於委用明君未忍於棄捐尚待罪以如初實冐榮之滋甚臣敏中早親片善出自諸生固無經濟之能久玷樞機之任周旋兩府終始九年因循徒換於炎凉禆益莫施於塵露内省三臣之䝉鄙曷當萬乗之倚毗徒夙夜以自强終材力之有限履新居上既所置之非宜綆短汲深故雖勤而無効以至和氣不應庶績未凝烽火犯邊勞翠華而巡狩庸蜀作梗煩羽檄以徴兵繼遷輒肆於陸梁靈武尚艱於飛輓江吳之俗飢饉荐臻老幼流離户口减耗去年近輔淫雨為災今歲中春甘澤未降物増數倍之價國無九年之儲静思其由誠有所自葢臣等任過其量力不逮心上辜當宁之知下負蒼生之望决勝寡術不能束五兵於虎皮出令乖方不能和四時於玉燭延焦勞於宸極負愧恥於心顔況復日奉天慈動承清問凡於纎悉咸以咨詢曽不能畫一嘉謀出一竒計慕前哲沃心之説寛大君旰食之憂匪石之懇空堅挈瓶之智無取尚敢戀萬錢之厚俸玷三事之近司苟度朝昏自固恩寵進退以禮縱未忍於置淵鬼神害盈亦終當於瞰室國章雖緩隂譴是虞況乃多士盈庭異人間出道侔伊吕者非少才比管樂者實繁伏望陛下别選英髦置於輔弼令臣等退居散地用洽至公豈惟快華夷徯望之心固亦表君臣終始之分人惟求舊庶獲於保全鼎既不任免令於傾覆周章自失殞越靡遑干冐宸嚴期於得請第二表臣某等言臣等近者䖍述懇誠共陳章奏葢以燮調之無狀乞行罷免之明文奉詔㫖以丁寧仰天威而殞越尚怔忪而待罪又僶俛以經旬輿頌益喧沴氣彌積膏澤未降漸成愆亢之災宸極至尊深軫焦勞之念上無禆於旰食下有負於具瞻猶尸禄於廟堂亦胡顔於天地臣等中謝竊以堯咨四岳用致時雍漢免三公以答天譴葢以任當輔弼職調隂陽苟愆伏之成災實憂責之攸繫須行邦典以肅朝經如臣等俱是短才謬膺大用在一人注意之地當萬方思治之秋聖徳誕敷無山甫將明之効宸襟虚佇乏傅說啟沃之言致君之譽蔑聞竊位之譏空積雖勤以補拙亦勞而無功斗筲之智空殫塵露之微何取爝火未息豈禆日月之光山木不材終非梁棟之任是致彞倫尚鬱至化未孚獄訟滋彰盗賊多有水旱作沴天災流行江吳薦飢京輔艱食王春已半甘雨未流終風且霾宿麥將瘁尊號皇帝陛下夕惕若厲視人如傷分命使臣並走羣望親詣列真之宇俯施百拜之恭屈萬乗之尊為兆民祈福牲玉靡愛惟馨之徳已聞雲漢彌高離畢之徴未覩豈精誠之不至實𤣥感之有由葢臣等猶執國鈞尚居台席俯慙百辟仰累三光雖君父之心不棄於遺簮墜屨而皇王之器何取乎蟠木朽株至於三臣之能固亦明主所見駑駘十駕終無致遠之功寒暑屢遷合舉黜幽之典若但妨於賢路必自速於靈誅伏望陛下惠以克終矜其不逮别求賢俊置在鈞衡令臣等退處班行得奉朝請如此即上𤣥之意訢合太平之化坐臻豈惟潤礎之祥實見垂衣之理鹽梅入用固便致於和羮琴瑟更張庶免成於膠柱顧惟孱末亦冀保全省分甚明祈恩是切臣等云云代樞密陳諫議讓表臣某言伏奉誥命䝉恩特授守右諫議大夫同知樞密院事餘如故者絲綸之命忽降於九霄宥密之司俾參於萬務撫微躬而戰慄聴輿議以諠譁實出非常深知不稱某中謝竊以諫諍之官首冠七人之列樞機之地日䝉三捷之榮運籌帷幄之中議政巖廊之上葢號股肱之任必求柱石之材如臣者器本庸微識惟䝉鄙為學僅通於章句奮身早自於丘園先朝謬中於甲科初命便塵於史閣佐錢刀於㑹府投刃靡虚掌漕輓於番禺揚旌甚逺歸闕荷金章之賜安邊無銅柱之勲尋復命於紫庭遽叨榮於丹地奉論思於武帳謇諤無聞閱章奏於公車否臧莫辯顧官箴而是媿矧歲律之未周敢期渙汗之恩遽授彌綸之寄參决庶務況國政之所歸叨據上流實人言之可畏顧踐揚之猶淺且位望以甚隆苟徒竊禄以冐居不敢呌閽而瀝懇既負且乘豈致冦以非遥居髙必危亦疾顛而是懼須披肺腑仰凟冕旒伏望尊號皇帝陛下察以至誠寢兹新命職守且仍於舊貫名器免至於假人所希為官擇才聖朝無虚授之寵陳力就列下臣遂知止之心干冐宸嚴期於得請代樞密馮諫議讓表臣某言伏奉制命授臣右諫議大夫同知樞密院事者任峻樞衡秩崇諫署雖荷自天之命彌増跼地之憂循省再三殞越無措中謝竊以中樞之設庶政攸歸地望處於深嚴職任推於宥密朝夕獻替得預於論思軍國機宜並令於參决苟非挺生民之秀負王佐之才嘉言嘉猷可陪於漢幄令聞令望素重於周行即何以膺兊澤於九天賛禁廷之萬務在於授受須允僉諧如臣者檮昧無聞迂踈有素早服膺於文史偶被薦於賢能東堂謬厠於髙科北省尋塵於近列曽乏當官之稱果貽竊禄之譏俄假一麾逺之五嶺萬里空嗟於日遠莫見長安六龍幸屬於天飛得還魏闕郎署驟遷於秩序計司令勾於簿書遽承乏於栢臺得觸邪於蓂砌選愞曷伸於職業因循徒厯於嵗時爰自中司便參近侍奉冕旒於武帳莫効謀猷提銓管於文昌豈分流品敢謂便蕃之澤俾叅密勿之司皁囊秩峻於七人丹地寵延於三接挈瓶之智頓覺於滿盈履薄之心不勝於戰慄實羣言之可畏亦省分以甚明須露至誠仰干𤣥造伏望尊號皇帝陛下矜其散拙察以勤拳特寝新恩且仍舊貫即微臣展四體以率職更誓恪居聖朝懸好爵以縻賢庶無虚授䖍切之至伏待允俞代史館相公讓加門下侍郎表臣某言伏奉制命䝉恩特授門下侍郎依前同中書門下平章事加食邑實封餘如故者久塵鼎鉉已媿於妨賢忽奉璽書更䝉於進秩聞命之際屏息不遑中謝伏念臣識本顓愚器惟庸瑣徒學素王之道罔究微言偶塵造士之科驟縻好爵自先朝而振拔由近列以徊翔草漢詔於西垣代堯言於内署乃至叅萬機之政陪三事之班帷幄坐籌曽無謀於前筯廟堂肉食遂獲謗於素飡退歸封駮之曹出委保釐之務屬承華之肇建俄賓䕶以備員羽翼之勤實慙於商皓鹽梅之用復預於傅巖自再忝於鳯池已五新於蓂厯薦正公台之位顯司調爕之權曽不能少振國經仰禆帝載一人虛佇殊無造膝之言四海具瞻深負為霖之望合歸散地用表至公豈謂特霈殊私曲加異數瑣闥榮遷於秩序樞衡尚示於倚毗别増食菜之封更責濟川之効寵章繁縟輿議諠譁在於微臣豈不知分儻俯仰而祗受必傾覆以自貽晉文之寵趙衰雖云求舊漢皇之賜張武適足愧心須瀝丹衷仰干𤣥造伏望尊號皇帝陛下俯矜懇悃曲賜照臨特寢新恩用全大體豈惟聖朝之行爵出禄絶虛授之譏固亦微臣之責實循名免疾顛之禍干冒宸扆伏待允俞代參政王侍郎讓恩命表臣某言伏奉制命䝉恩特授尚書工部侍郎參知政事餘如故者文昌六官驟遷於品秩黄樞萬務俾預於訏謨受寵若驚循涯自失臣中謝竊以輔弼之任實代天工柬求之時允資人傑況巖廊之上副師尹之具瞻車服以庸下丞相之一等豈宜濫處以累至公如臣者才不逮人學非稽古徒荷鯉庭之訓謬登漢殿之科金閨偶列於姓名蓬島獲窺於圖史尋掌綸於右掖復寓直於北門驟䝉振拔之恩獲預樞機之任參謀帷幄曽無前筯之籌受禄水衡深有素飡之媿方憂非據忽奉殊遷佐隂陽調爕之權亞輔相崇髙之秩斗筲至小殊覺於滿盈鼎鉉不任轉虞於傾覆苟貪榮寵靡敢敷陳豈惟鬼瞰以堪憂實亦人言之可畏伏望尊號皇帝陛下俯矜短拙曲賜保全特詔有司俾停新命既負且乘微臣免至於疾顛唯器與名聖代更無於虚授䖍切之至伏俟允俞謝知制誥表臣某言伏奉制命䝉恩特授臣左司諫知制誥仍靣賜金紫者代言禁掖允謂難才賜服軒墀薦加異數實曵婁之非稱但跼蹐以靡遑臣中謝竊以青瑣之闥地望最崇紫微之垣天文是法設著位於赤墀之下開直廬於黄閤之中草尺一之詔書預五花之判事發為號令用誕告於萬邦裁成典謨必追蹤於三代自非髦俊豈副擬掄如臣者生自遐陬本惟寒士始從童丱偶涉藝文勤雖至於絶編學未能於覩奥先皇帝聞其姓字召赴京師試於鈎盾之中署以芸香之職犬馬之齒尚幼烏鳥之戀頗増獲歸省於庭闈久留連於鄉曲洎還象闕復隷麟臺尋奏伎於公車得閱書於東觀自爾賜太常之科第預仙殿之職名獻頌甘泉特頒命服賦詩栢殿屢揖衢樽屬聖政之惟新荷鴻私而首及擢厠從臣之列預修太史之書慙無直筆之稱莫述先朝之美俄切維桑之念堅求剖竹之行崇文廣武聖明仁孝皇帝陛下推從欲之深仁遂承顔之至懇㑹稽出守既諧晝錦之榮天禄言歸重勵草𤣥之業唯固窮而守道常省分以忘懐一畝之宫頗棲遲而無悶三千之牘誠衒鬻以為慙公府絶造請之儀禁掖非覬覦之地老於削槧是所甘心豈謂皇帝陛下察孤直之無徒念遭逢之有素當慎選之際垂特達之知拔於羣萃之中霈以殊常之澤補衮之闕驟進七人之班演絲成綸便裁五色之詔金印紫綬誠佩服以非宜珠網綺錢顧優游而何幸官箴斯在輿頌是虞至如漢馬卿之才華方令視草唐常衮之詞學纔善除書豈兹短才可以稱職然萬乗之知特異九天之命已行譬諸駑駘亦當鞭䇿其後至於鉛鈍敢不摩厲以須庶罄竭於誠明免廢墜於職業退循散拙彌負憂兢仰荷天慈臣無任云云代參政王諫議陳情表臣某言臣聞昔者成王疑於姬旦徂東山者三年文侯信於樂羊示謗書之一篋葢貝錦萋斐者人臣之共畏珪璋特達者聖哲之攸難苟非明目達聰表微索隠獨觀於昭曠之道靡牽於衆多之辭使浸潤之說不行讒慝之口無狀不然者三月采葛徒積隠憂十人拔楊豈遑安處徒揣循而自慶實引喻以為煩臣某中謝伏念臣出自單平本非茂異由丘園而奮跡偶軒陛以䇿名叨佐幕於近畿但飲氷而從政尋効官於秘府復結綬以登朝方司闗市之征遽辱已知之薦皇帝陛下誤垂採聴逺賜徴還俾釐務於錢刀且推恩於章服俯仰從事唯盡瘁於公家顛沛不違誓服勤於官次曾未周於歲律俄擢掌於王言巳驚物議之喧騰曲荷天慈之全度金紫更光於凡質絲綸莫潤於皇猷纔踰朞月之間忽辱深嚴之召玉堂待詔極儒者之光華丹筆祥刑體明君之欽恤振拔之恩尤異傾輸之節彌殫裁五色之書雖發揮之無取評三尺之法固伏念以惟寅旋使巴庸之邦肅將寛大之詔撫兩川凋瘵之俗宣九重煦嫗之恩導徳澤於黔黎察能否於官吏適為注意之任敢辭奔命之勤纔伏奏於青蒲便超陞於黄閣位殊次補官匪序遷昔荀爽十旬誠非驟進虞卿三見徒是傳聞如臣無二子之器能有一時之際㑹曽未數年之内遽參四輔之班已覺滿盈果招謗議一昨訟端斯起詞語旁連固亦内省於心反求諸已檢生平之履行念身世之遭逢未嘗有出位之思安敢造欺天之罪坦無憂懼顒俟辯明豈期執憲之司反恣舞文之弊捶楚之下鍜錬而成構似是之巧詞結沈埋之寃氣上黷凝旒之聴欲希投抒之疑而陛下深慮矯誣别令訊鞠既從閲實果致平反使覆盆之幽獲被大明之照肺石之側免為無告之人苟非陛下燭物無私法天不宰慮五刑之或濫恐一物之非辜即衆口鑠金復誰分於枉直匹夫懐璧諒何免於悔尤見聖代之至公顧羣生而何幸臣自念秉孤直之操荷非常之知徒勵夙夜匪懈之誠固乏左右為容之助絶無黨援素少交親特出宸衷擢參相府常懐激勵仰戴恩私況處最靈豈有同於土木不能致逺亦願竭於駑駘其如旅翮甚危寒根易動孑孑孤立㷀㷀獨行雖恃明主之恩不顧黨人之議然而禍機莫測讒舌難防儻媒孽之復生恐别白而無路即陛下傷知臣之睿鑒微臣昧量力之格言進退之間儻獲於由禮保全之惠庶遂於克終既無損日月之明亦曲成螻蟻之志伏望陛下俯矜愚懇稍霈深仁俾罷去於台司獲退歸於散地青蠅止棘庶免於中傷金鼎和羮幸無於傾覆曲全大體以庇下臣慺慺之誠實在於此代中書為靈州䧟沒待罪表臣某等言伏自狂胡作梗西鄙繹騷清逺一城去秋䧟失近者又覩奏報竊知靈州不守將吏淪胥百雉金湯曽無固䕶連甍士庶俱沒腥膻葢廊廟之乏謀致兇渠之肆毒動傷嗟於當宁貽媿恥於具臣臣某等中謝竊以鎮撫四夷决勝千里運竒兵於堂上視黠虜於目中使頑獷咸懐疆陲不聳將帥禀指蹤之効君親無旰食之憂此宰輔之任也若冕旒不减於焦勞蜂蠆尚聞於俶擾使蒼生赤子䧟于匪人亦尸禄素餐安用彼相實羣言之可畏諒竊位以何顔伏念臣等皆是常材謬當重任雖揣摩鉛鈍䇿勵疲駑智類挈缾終莫圖於逺大職思補衮但常懼於闕遺自黨項弗寧靈武孤絶皇帝陛下臨朝日􅉴求衣未明憤蛇豕之微妖惜膏腴之舊壤慮朔方之生齒委於餓虎之蹊亟比落以興師殱厥渠魁之首而帷幄曽無於成算塞垣幾至於輿尸去歲救兵逗遛醜類猖熾積石堅壘俄䧟賊鋒今春已來又失靈武北門巨屏遂至於丘墟比屋生民俱淪於塗炭葢臣等毎求咨度曽乏謀猷上負倚毗内懐靦厚況安危注意實在台衡夙夜憂邊誠為職業既彌綸之無狀乃咎責之攸歸苟畏避於簡書且因循於官次退思補過雖慕林父之事君用非其人亦慮匃奴之輕漢須傾丹欵仰黷宸嚴伏望陛下責以官箴俾從吏議特用黜免用洽至公别選英髦使代其任庶賢能之遞進示憲法之無私進退攸宜既俯全於國體和平可召固上洽於天心仰俟刑書臣等無任云云謝表臣等言近以狂冦陸梁朔方覆沒葢廊廟素無於成算致士民俱䧟於匪人至尊深動於憫傷執政實甘於罪戾共陳奏牘方俟刑書承詔㫖以丁寧仰天威而殞越臣某等中謝竊以疆場之事爰守在於四夷帷幄之籌固折衝於千里況處弼諧之任必資經濟之能料敵伐謀動詢於方略憂邊思職克舉於官常然後塞四海之具瞻副一人之虛佇如臣等皆惟庸昧莫荷倚毗徒曠廢於天工豈彌綸於王度自胡雛作梗靈武阽危皇帝陛下憤蜂蠆之微妖惜金湯之堅壘軫堯心於黄屋遣漢將於文昌大興虓虎之師將平狡兎之穴庶肅清於氛祲用申畫於封圻而靈旗未出於塞垣巨屏已淪於冦孽實臣等早無規畫仰負咨詢徴龜玉毁櫝之由抱舟檝濟川之愧既宴安而非據期䇿免之是行豈謂陛下特降泥書曲形天㫖尚令備位未責曠官履薄自思但彌増於怵惕叩閽瀝懇固不敢以再三唯堅盡瘁之心少贖已然之咎代參政王侍郎謝為陳乞不允表臣某言臣近者䖍拜封章乞歸班列忽奉手詔不賜允俞仰睿㫖之丁寧撫微躬而戰慄欲更披於肝膈慮有黷於君親中謝伏念臣孤直寡徒頑踈無取章句之學僅能齒於諸生清白之規固克傳於奕世自䇿名筮仕陳力當官塵右掖之清華踐内廷之嚴秘乃至典樞機之務叅輔弼之司並由旒冕之誤知豈副搢紳之公議小器固難於大受髙位唯恐於疾顛夙夜在公雖俯仰而從事負乗致冦亦跼踳之靡遑今者訟起下民辭連執政憲府職當於推鞫獄情遽至於矯誣既閲實以平反爰舉直而措枉已從明辯式正常刑其如中司長官是臣外舅踐文昌六卿之貴昧圜扉兩造之辭名挂簡書身繫非所實朝倫之共恥在戚屬以何顔是用瀝懇紫庭祈恩丹扆願退歸於散地庶允洽於至公豈謂皇帝陛下推洪覆之深仁示曲成之𤣥造特頒泥檢俯示綸言徴周書之舊章以其罪不相及推漢髙之大度且復待之如初仰承雨露之私内積氷淵之懼瀆尊之罪固不可以再三許國之心但益堅於方寸誓傾臣節上答天慈代王氏為公主出降進財表臣貽慶言臣弟貽貞幸以孱微獲叨選尚單平之族驟集慶於髙門柔近之辰冀承榮於築館欲恭陳於厥篚須仰黷於凝旒臣某中謝竊以詩美王姬聿稱於下嫁易載帝妹亦重於有歸葢風化之所由諒古今之共貫自非閥閲寧得擬倫伏念臣世本文儒家惟寒素寢丘遺業幾至荒蕪扶陽舊封已嗟廢絶固弓裘之莫續亦堂構之將隳臣與弟貽貞每勵自强期於克荷誓不衰於孝謹庶有奉於蒸嘗敢謂尊號皇帝陛下察以顓愚憫其陵替俾聨姻於帝胄永庇族於天光顧孺子之何知實先臣之不朽預長安之戚里幸㑹居多開堂邑之山林榮華斯在今者禮當納幣事等獻芹載循菲薄之愆益負凌兢之懇黷尊彌甚獲戻是宜代開封温尚書求解知府表臣某言臣聞陳力就列先儒有知止之言任重才微前史著疾顛之戒布在方䇿皎若丹青固大帶之攸書實元龜之斯在臣某中謝伏念臣聲猷素寡材略無聞徒以遭逢徧塵清近每憂官謗上負聖知一自掌禮秩宗預文昌之通顯牧民天府總京邑之浩穰唯堅夙夜之誠仰奉澄清之寄幸而輦轂之下桴鼓稀鳴閭井之間版圖増羡大姓偶無於侵小庶獄不至於稱寃葢縁毎奉天顔恭承睿訓俾之彈壓豪右撫字疲羸且形欽恤之仁深示招擕之㫖顧不畏於强禦並特出於主張挺金石之一心但依洪覆厯星霜之三載莫中巧言苟非當宁之曲成諒亦傾輈而坐致又伏念負重致逺誠非泛駕之材錯節盤根終乏投虚之刃米鹽靡密躬親而豈敢告勞鈎距神明精力而漸知不逮非輒圗於避事實恐至於敗官伏望尊號皇帝陛下察以䖍誠解兹重任庶保全於賤質免戕賊於勞生中臺職司願講求於故事未央朝會時瞻望於清光筋骸漸及於衰遲衡泌或希於頥養仰冀始終之惠少矜懇到之私請加尊號第四表文武百僚南郊大禮使具銜臣呂某等與内外馬步諸軍將校僧道耆夀等謹詣東上閤門再拜稽首上言曰臣等一昨體上天之顧諟採萬國之謳歌願増益於鴻名用昭彰於盛徳再三之凟已負於刺芒億兆之誠彌堅於石席遽頒明詔未賜允俞朝野之間啓處無措臣某等中謝臣等伏以字之曰道葢出强名何言者天不聞讓徳佛唯大覺美號有百億之殊君乃至尊徽稱兼三五之盛若夫聖神之冲粹髙厚之儀刑非可管窺寧容臆度出於愛戴成此勤拳是故王者懋建大中載稽古訓握河洛之秘紀所以畏天之明順黎獻之歡心所以從人之欲略鳴謙之小節收輿誦之至公雖屈已以無辭誠當仁而不讓者也恭惟尊號皇帝陛下祗荷丕構茂宣重光法人文之化成體神武之不殺惟睿作聖有感必通居上克明無幽不燭泣辜扇暍示仁愛於羣生㓗粢豐盛展孝思於九廟躬帝皇之能事掩載籍之前聞而復探妙道於域中敷至徳於天下味希夷之㫖允契混成挺髙明之姿雅敦柔克極妙有𤣥元之理彰務滋邁種之勤度越古今充格上下故羣情之懇到述二美之形容願以大猷著於徽號而陛下固形冲挹猶鬱耿光莫髙匪天徒懐跼踳無私者日未賜照臨况郊杞有期方國咸在扢嘉壇而款太一宜昭答於神休奉灌鬯以見祖宗合紹隆於先志苟違遐邇之請曷副人祗之心臣等不勝勤勤懇懇敢固上尊號曰崇文廣武應道章徳聖明仁孝皇帝伏望陛下對越景靈祗膺純嘏特詔執事誕舉彞章以仲冬南至之辰天正上元之節畢禋燔於吉土覃渙汗於中區端拱穆清備物典䇿追九皇而比徳與三神以交歡快華夷徯望之心成宗社無疆之慶臣等幸甚天下幸甚謹四奉表陳請以聞第五表臣某等言臣等稽合人謀形容帝徳願益庬鴻之號仰酬亭育之仁罄華夏之一心奉表章而四上仍降明詔未賜允俞遐邇之情殞越無措臣某等中謝臣等竊窺舊史載考前言夫名者實之賓葢名不可浮於實號者功之表非號何以明其功天地以不宰為先猶述髙明厚載之大徳堯舜以無為而治亦著重華放勲之美稱恭惟尊號皇帝陛下祗荷慶基誕敷駿徳臨下以簡視民如傷舞干羽以示懐柔卑宫室而訓恭儉作事必咨於龜筮乃至大同考言爰及於芻蕘克彰好問體𤣥元之清净法夏后之聲身至孝蒸蒸所以奉先而尊祖小心翼翼所以君國而子民懿鑠溥將淳熈光大是以由中及外不謀而同咸以為陛下總妙道於無方敷明徳於有截思範圍於休美用訢合於神祗蚩蚩之氓諒亦知於帝力巍巍之號固上契於天心而陛下載執撝謙未俞誠請忽邦家之大典忘祖宗之舊章況今祗事紫壇躬謁清廟四夷助祭知中國之有聖人羣后在庭見明堂之坐天子羽儀文物之震耀粢盛秬鬯之吉蠲三靈交歡諸神受記肹嚮昭苓戩榖具膺豈可徽懿之名簡略未稱矧復雷雨渙汗肆𤯝於九垓玉帛駿奔侍祠者萬國咸欲謝生於蒼昊歸美於穆清亦願覩冕旒之當陽觀典䇿之備物而陛下曲矜小節深抑大猷荷上帝之眷懐乃重違其成命為蒸民之司牧反固拒其歡心此臣等所以冐齊斧以上言伏蕭屏而俟報者也是敢不避萬死謹固上尊號曰崇文廣武應道章徳聖明仁孝皇帝伏望俯從衆欲式昭徳音干犯宸嚴必期得請臣等無任瞻天瀝懇激切屏營之至謹五奉表以聞代集賢向相公待罪表臣某言竊以輔弼之司實一人之注意舉措之際乃四海之具瞻苟自輟於悔尤固不遑於啟處臣某中謝伏念臣本非茂異謬竊科名爰遭遇於先朝屢忝塵於華貫西垣掌誥甫及二年南海頒條逺踰萬里偶生還於闕下俄入直於禁中亟膺奨擢之恩俾佐樞機之務但傾駑拙仰奉憂勤累換星霜莫禆塵露崇文廣武聖明仁孝皇帝陛下紹膺丕構褒寵舊臣以先朝簮履之微不之遺棄顧微臣斗筲之量深覺滿盈遽陪四輔以調元獲從六龍而展義殊乏一言而啟沃曷寛萬乗之焦勞尋奉簡書逺巡邊徼恭承宸算遐震天威媿無前筯之籌尚軫宵衣之慮久塵重位方積厚顔去年陛下特出非常俾之爰立中外頗喧於輿誦君親益示於眷懐俯僂循牆靡容固讓負乗致冦果出自貽今者公相之家子孫構訟事連閨壼詞及錢刀葢臣遭逢已來賜予所得輒營别墅有爽素風脫粟拔葵既違於典訓䑕牙雀角遂起於争端致上浼於九重實先甘於三黜況臣位居黄閤俸入甚優日侍紫庭體貌尤異合敦操履以厲搢紳蔑聞市義之名乃有營私之謗横議喧騰於鄉校封章叠委於公車黷冕旒之聴聰罪誠莫贖玷朝廷之名器責亦何迯俯伏私門以俟公憲然望陛下推豁達之大度察方寸之微誠念臣久冐寵榮常傾丹赤固乏代天之業粗堅許國之心特霈鴻私得從輕典即臣摩頂至踵仰銜覆幬之仁雖死猶生終効糜捐之報臣無任云云武夷新集巻十三
