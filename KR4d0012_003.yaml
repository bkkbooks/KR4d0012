body:
  text: 武夷新集巻三宋楊億撰詩三六十九首送張蜕秀才許由流寓因相識嵗厯今移十二辰别墅已荒三徑草城中舊居常所還徃自徙於外邑巳蕪穢矣素衣猶化九衢塵懸瓢顔巷安貧乆泣玉荆山失意頻莫向明時便招隠重來須醉杏園春次韻和翰林師學士贈倫上人新居之什一逕雨苔深新居雅稱心天花飄晝講池草伴春吟施食山禽下題門野客尋此中堪宴坐何必在雙林李殿丞知廣濟軍丞相之弟鈎盾從來司六尚上林尋見惣三官頒條忽去憑熊軾賜對還曾近露盤民瘼乍求應有術天倫少别不成歡陶朱舊邑無多逺魏闕歸心且自寛章頻得解後之陜府謁嚴洪二從事是年閏十二月春闈猶隔閏逆旅苦栖遑忽爾遊分陜飄然出大梁食貧憂桂玉策蹇冐風霜杏苑歸期近棠郊去路長幕中逢舊友嵗晚在他鄉鷄黍且相對休嗟髩髪蒼路學士知河中府一麾新自海濱還又佩魚符入故關千里山河臨劇郡九天鴛鷺别通班樓經徃聖迴清蹕路接邊夷獻白環版籍素多田賦錯干戈初息羽書閒從軍上客彫龍藻佐酒妖姬墮馬鬟更遣府公吟思發中條新霽碧孱顔即席賦得筆送宗人大著通判廣州毫字著作蓬山局職司華衮襃巳能成馬史何况夢江毫金勁鷄揺距霜寒兔墮毛歸來批鳳詔弄翰莫辭勞職方彭貟外惟節知韶州仙經舊得還丹訣郎位髙分列宿光太守雙旌指南越使君千騎冠東方飲冰清白臨遐俗晝錦輝榮過故鄉曾是重華張樂地九韶聞處味應忘宗人大著令問通判廣州蘭臺大著作族𣲖共關西南海分憂寄東門叙解携離城衝臘雪宿館聽晨鷄畫鷁江波逺鳴騶嶺路迷陸梅香巳盡越鳥暖初啼入境風生扇行春栁拂堤殺青前事在飲水古人齊卧理應多暇無忘寄尺題冬夕與諸公宴集賢梅學士西齋分得今夕何夕探得雲字并序古者瀟湘之㑹實重故人西園之遊亦在清夜集賢梅君以神仙之胄處典籍之司佐地官之版圖居多暇日奉穆清之顧問出必詭詞國家以西旅弗庭邊烽尚警欲得城郭之要領申命朝廷之俊賢難哉是行公中其選且有宻㫖未遑戒途雖飭使者之車巳辭㑹府之政杜門終日端居鮮歡遂用解榻開樽集寮寀於三署割鮮繼燭申宴樂於一時揮麈清談峩冠屢舞杯盤狼藉星漢傾頽因念夫飲酒者未嘗不始於治而卒於亂盍各吟詠以止諠譁於是迭出巨題互探難韻搆思如湧弄翰若飛至於斷章曾未移晷藻繡紛錯金石鏗鏘足以知周南變風誠二雅之可繼鄭卿言志豈七子之足多顧予非才獲陪髙㑹形之序引深所厚顔云耳今夕知何夕良交㑹以文燭花寒旋落漏滴逺稀聞酒面輕浮蟻歌喉細遏雲明河光未没候管氣初分玉笛梅花怨金爐蕙草焚唯愁曙光發搔首歎離羣鄭工部陜西隨軍轉運西鄙欃槍未掃除營中慷慨請行初三軍粒食資心計一月星郵待捷書宣室喜聞延賈誼茂陵乆歎滯相如謗言盈篋親曾見反間千金計豈踈遺愛道傍喧竹馬先聲塞外懾穹廬馮唐莫歎淹郎署博望還忻擁使車隴右行收萬里地關中坐致九年儲牙籌羽檄皆吾事才刃飄飄兩有餘黄從事隨軍買符來赴調負羽去從軍五夜聞邊角三時看陣雲樽前還料敵楯上更摛文手筆人多許須銘竇憲勲聞李四光丞頻遊北園因有懐寄漢相沙堤連甲第石家金谷有名園雍容陌上臨卬騎㶑灔齋中北海樽過閏巳驚春色早離城殊少俗塵喧無由一寄南窻傲相望迢迢西掖垣次韻和集賢李學士寒食即事之什九逵初旭滿輜軿寒食東風二月天陌上墊巾誰傲睨江邊解佩自嬋姢新粧幾處登牆見沉醉何人藉草眠豪俠追歡殊未足歸蹄躞蹀夕陽前和集賢李學士千字詩千仭谿何險千倉稻巳收出騎千里馬醉典千金裘千年河誕聖千樹橘封侯千鍾不及亂千錢坐上頭妹婿黄補下第歸鄉家風早占無雙譽君即江夏之後鄉薦曾居第一流崑嶺本期争片玉庖刀誰料失全牛風塵不住梁王苑煙水還依楚客舟應負男兒四方志故園歸去莫淹留黄覺東遊鄉關迢遰數千里塲屋蹉跎二十年三獻猶垂卞和泪幾人先著祖生鞭風塵漫索長安米禾黍全荒負郭田關外賢豪徧投分趙囊迴日滿金錢葉生歸縉雲出門西望長安笑抱璞來求善價沽惟罄囊裝買羣籍不持刺字謁當塗鱸魚漸熟思歸切羊酪初嘗得味無送子東還重銷黯我曾三載守仙都慧初道人歸青州養親兼簡知州李太保宴坐禪林度幾秋忽思歸養指營丘遥知北海孔文舉應重江南湯惠休畏日流金征路逺長松偃盖舊房幽庭闈晨夕供甘外髙論彌天不易酬省中當直書懐呈諸同舍太微西掖鳳池邊阿閣凌空瓦起煙綵筆時批尺一詔直廬深在九重天早朝螭陛爐香近晝寢雞人漏唱傳只恐承明難乆戀長安桂玉苦相煎王寺丞借西第避暑因有寄贈滕公甲第冠神州晝日青煙瓦上浮南榭薫風偏解愠北階萱草更忘憂朝迴門閉人疑病雨過涼生景似秋角枕閒眠支體適不知胡蝶是莊周元道宗下第東遊元氏昆弟子姪五人舉進士舉宗文雅孰能陪須信菰蘆出美才失意不勞悲玉璞投知應得上金臺曉離村店侵殘月晝歇津亭避疾雷東道諸侯多重士融樽處處為君開李四赴歙州分直蓬丘未再期江東去去擁旌麾名通南省郎官籍巻續新安郡政詩好事者編新安前後太守所賦詩為三巻目之曰新安郡政詩見行於世虎觀清風留汗簡鴒原髙韻憶吹篪故人别後頻南望想見森森瓊樹枝予以縉雲進士周啟明長書呈祕閣黄少卿黄頗歎重作詩六韻美之因次韻和酬縉雲江外郡封略古甌中早被唐虞化巳成鄒魯風剖符曾出守解榻值名公失意嗟塲藿緘書附塞鴻擲金才少敵泣玉恨還同後夜蓬山宿知君必薦雄史館陳太丞知夀州忽佩魚符下玉京長安廐吏駕車迎淮王舊地餘風物太史新書見姓名弩矢前驅殊覺貴河梁執别豈勝情小山叢桂圖經古白馬驪駒道路榮鵬海三千湏擊水隼旟四十且專城長淮月色秋宵好應助詩人思轉清錢大夫赴并州太原西北勁兵處地直雲中控定襄六月出師平玁狁九天選將下文昌車魚辟士應難得詩禮臨戎亦未妨緩急羽書須自草平安烽火鎮相望栁營禀畏將軍令毳幕懐來塞下羌清嘯肯饒劉越石長纓終係左賢王關山萬里邊塵靜亭館三冬朔雪狂笛怨梅花新度曲樽傾竹葉淺飛觴禦寒應覺重裘暖料敵懸憂兩髩蒼只待今年凱旋後徵歸論道坐巖廊次韻和表弟張湜秋霽之什輕飈習習起青蘋宿霧全開霽色新髙閣晴曦射踈牖虛堂潤氣徹華茵墊餘巾角曾衝雨晦盡琴徽旋拂塵楚澤潦收湖水白歸舟遥憶洞庭人初秋夜坐明河如練出城隅朱火西流暑氣徂顧兎一輪浮月桂流螢數㸃入煙蕪迢迢宫漏傳銀箭淅淅天風下白榆岸幘微吟自忘寐披衣閒起遶庭梧秋日有懐鄉國長安乆客逢揺落不獨悲秋更憶鄉潘岳二毛行欲變淵明三徑巳應荒書裁尺素鴻難托夢遶重湖蝶自狂遊宦十年歸未得塵纓却悔濯滄浪閤門錢舍人知全州家傳吳越賢王後郡壓瀟湘最上游三殿從來奉宸扆一麾今去典方州蟬吟髙栁隋堤暮水漲平湖楚澤秋入境壺漿填候館上官鐃吹夾華輈山川徧歴騷人地宵旰遐分聖主憂應向桑郊停五馬青春太守本風流次韻和章頻下第書懐之什春闈三上敗垂成白雪新吟思轉清脩竹園中曾獻賦慈恩塔下未題名禹門燒尾他年事楚客悲秋此日情道在不須憂晩逹摶風九萬是前程七夕金壺漏滴正迢迢靈匹相從在此宵月魄嬋姢烏遶樹河流清淺鵲成橋雲輕天上榆花没風細爐中麝炷飄寂寞堪憐觀渡女無眠耿耿望青霄石硯磊磊澗中石成形本一拳墨池遺號古筆陣用功偏筆陣圖以硯水為城池得在燕臺側採從崐岫巔剖非藏趙璧鍊合補媧天偶自他山上來參絳帳前光榮登玉案揮灑助花牋注水蟾蜍滴題詩玳瑁筵如何班定逺發憤便輕捐大理趙寺丞世長知益州華陽縣帝選循良撫逺民由來百里應星辰征車蜀道聞猿苦祖帳西郊落葉頻莫為割鷄輕邑宰應須叱馭効忠臣錦城自古繁華地好與風光作主人詠醉劉伶石五斗康成三百杯欹斜星弁側嵬峩玉山頺人語蜩螗沸天形帟幕開應知是狂藥何不學顔囬筆月兔湘筠巧製全何人大手稱如椽禁中鈴索夜批詔閣上芸香晝草𤣥墨妙三分慙入木華襃一字重編年史官遺直真堪畏千載獨持生殺權孫樵云史官持生殺權於千百年後夜宴華堂髙宴卜良宵賓客當筵半珥貂天轉玉繩星落落風傳銀箭漏迢迢連浮大白須判平醉促駕鳴騶又趂朝月落烏啼人散後衣香數日未能銷張兗下第隨桂陽喬監使之湘中建溪曾共聽猿聲十載文塲未䇿名流落只應孤劍在窮愁已有二毛生荆州暫去依劉表漢殿無由薦馬卿一路騷人舊山水登臨且莫動歸情庭榴得種從西域移根在帝鄉鮮葩猩染血美味蔗為漿入獻殊諸果敷榮後衆芳丹房髙照日緑葉半凋霜釀酒扶南國扶南頓孫國人取石榴汁渟盆中數日成美酒題詩白侍郎白刑部詩云唯有安石榴當軒留寂莫濃隂兼茂實相對度炎涼水部何郎中知鄂州襃博衣冠漢大儒三千奏牘到宸居郎官起草歸華省女史焚香伴直廬出守新恩龜顧印趨朝舊路雉隨車便分符竹從鸞掖應有壺漿待隼旟賜對移時親斧扆隨行兼兩載圖書淮南落木揺鞭裏湓浦分風挂席初郡閣平窺漢陽樹盤飱頻薦武昌魚聚徒南郡傳經盛携妓東山退食餘天闕九重懸夢想江關百戰見坵墟清曹祖徳詩人後時寄新吟一起予可乆道人之歙州兼簡知郡李學士獨携缾錫新安去寒雨西風落葉頻江水淺深清見底山程髙下險摧輪社中香火延開士肘後方書濟俗人鄉樹再尋南國路禪房空鎖帝城塵舊傳心印都忘念自有衣珠豈患貧四衆仰瞻誰見頂千家應供定分身宰官多結空門友外䕶須依守土臣想到臨川逢内史翻經相對一嚬伸内經有師嚬伸三昧大理黄丞宗旦使潁州募民墾田祥刑新佐張廷尉出塞曾隨霍冠軍露版裁書頻倚馬甘泉獻賦舊凌雲幾瞻龍衮堯階側暫駕星軺汝水濆百萬提封周制復三千奏牘漢皇聞依蓮幕府遊從近聚米山川向背分迴日受釐宣室對又應前席動吾君劉太丞仲宣歸華山坐事削除詣闕自陳不報早年通籍蒼龍闕近日移家仙掌峰方朔上書殊未報平津開閣杳難逢騷人章句多懐古陶令田園且養慵近郭離筵黄葉滿舊山歸路白雲重洪崖餌术修丹竈叔夜援琴對酒鍾應待輭輪徵入覲受釐前席始從容表弟章廷評得象知邵武軍歸化縣幾年索米住京師新得東堂桂一枝宰邑絃歌循吏政還鄉鷄黍故人期于公隂徳知終大萬石家風喜不衰毛義動容初捧檄太丘積徳舊刋碑得象大父嘗宰兹邑甚有遺愛甘棠二紀民猶愛苦蘗三年吏不欺此並𫐠先正之徳桑梓經過身晝錦庭闈扶侍鬢垂絲元方惠化傳遒鐸得象兄得一宰乾化今為隣境令伯歡心獻夀巵得象祖母年八十餘扶侍之任邦境中分同魯衛政聲相應似塤篪甞思竹馬遊從日又見風鵬奮擊時執手勉君勤素業歸來更直鳳凰池次韻和李光丞見惠長絛之什貂裘巳敝洛陽塵空有陶家漉酒巾雙闕金章奉朝請小齋紗㡌養天真乆持梵行稱居士猶掌王言作侍臣惠我長絛識君意欲教蓮社伴遺民秋雨有懐李寺丞潤氣先從柱礎知寒霄滴滴助秋悲桐圭遶樹多黄落苔錦縁階更碧滋爽徹衾裯慵就枕涼生殘管欲題詩髙陽舊侣相思否此景誰同把酒巵王廷評臻知廬州舒城縣臻汝隂人潁水生賢自古竒西遊聲價滿京師梁園獻賦天將雪潘縣臨民鬢未絲南浦銷魂分袂處北堂獻夀捧觴時到官卧治成髙趣終日清談吏不欺大理徐寺丞元榆知越州諸暨縣子山詞賦動南朝近佐名卿掌玉條治邑還持麈尾柄攜家便汎木蘭橈謝塘春晝偏多思潘鬢秋風苦未凋種秫公田供酩酊彈琴官舍助逍遥去程千里隨賓鴈宿館三更聽落潮聞道臨安有仙穴莫抛印綬採芝苗次韻和錢崇班見寄之什蘋末風輕不動塵承明朝罷見閒身從容退食收芝檢迢遰驅車訪玉人酒貰十千那惜醉丹封六一已應真春塘麗句偏相寄傳誦朝來滿搢紳次韻和錢崇班再寄之什祖禰勤王國史襃傳家自有吕䖍刀雄豪結客欺燕俠憀慄悲秋笑楚騷奕世勲名金鉞貴出羣風格玉山髙詩中敏手兼無敵射落霜鵰釣得鼇盛京宰單州武成縣父豫任度支郎中弟𤣥任屯田貟外子男印綬諸侯秩鄒魯閭閻太古風苑勝遊抛霰雪琴臺善政繼絲桐征途朔吹貂裘暖祖席清歌蟻酒空令弟嚴君俱應宿時瞻懸象向南宫次韻和并州錢大夫夕次豐州道中見寄漢將從天下彊兵值月殘孤煙戍樓逈宻雪戰袍乾向暮三吹角臨風一據鞍邊城頼經略重取地圖看董温其赴淮南幕工部王尚書知揚州嵗晏梁園宻雪飛出關猶憶弃繻時屬鞬正是從軍樂挿羽那憂草檄遲陪宴初筵揮玉柄從遊别墅騁金羈府公維揚有别墅焉只應偏啖牛心炙自此聲名漢殿知史館凌職方知廣州曾任嶺南轉運番禺出守重漢殿拜恩初華省郎官宿名山太史書剖符從瑣闥持節上軺車左顧金龜印前驅畫隼旟由來百粤地曾督九年儲卉服要荒外棠隂惠愛餘齎裝天子賜封部島夷居羽檄招溪洞壺漿慰里閭國風今巳變民瘼到應除江海思歸否蓬山有直廬十二月四日大雪就賜近臣宴飲即事向夕同雲布海涯豐年呈瑞在京華相如賦就梁王苑穆滿歌傳阿母家農畆三冬偏積潤朝衣六出旋成花天恩錫宴醉歸處幾里香街覆玉沙章琮赴廣州東莞簿抱璞曾三獻悲秋忽二毛十年嗟不調一命尚徒勞互市通蠻貨公田入海濤貪泉雖酌飲未肯染脂膏文慧大師歸蜀南宗傳法了漢殿賜衣新歸路峨眉雪舊房京洛塵天花飄講席海月照吟身誰結香燈社金門貴近臣大師即西樞給事空門之友也王中庸赴河南鞏縣尉春風祖席引香醪白馬驪駒草色袍官舍前臨兩京道居民半雜五陵豪卑飛碌碌猶棲棘餘地飄飄暫鼓刀捧檄初同昔人喜不應搔首歎徒勞比部朱貟外知東明縣比部以親老上言凡再宰是邑即其故里也宰邑承顔帝澤優春郊數舍躍驊騮弦歌平昔有遺愛桑梓依前訪舊遊鄉里歸時榮晝錦庭闈到日潔晨羞陶潜未省荒三逕班嗣何因樂一丘蘭長謝庭傳賦詠花開潘縣占風流薫爐綾被餘香馥省闥沉沉侍史愁咸平六年二月十八日扈從宸遊因成紀事二十二韻步輦下明光鳴鞘出未央屬車多載酒夾道競焚香雲管飄梅吹蜺旌錯鳥章從臣沙苑馬衛士羽林槍玉輅天行健金壺晝漏長光風汎蘭蕙仙霧拂旂常宿雨收林薄晨曦豔屋梁閭閻空里巷旄罕隘康莊託乗奉珍使先驅執㦸郎從橋初轉轂憑軾見垂裳暫駐時龍馭前臨戲馬塲由來講武事所以服遐荒電影流機石鵶羣發大黄是日御講武臺觀放抛石及發連弩千鈞寧覺重七札豈曾妨卒勇如虓虎人觀若堵墻腰鞬晉元帥扈蹕漢諸王聊用誇胡客還聞讋鬼方迴輿百里囿錫宴九霞觴射以騶虞節歌為白雪倡仙山鯨海上御苑斗城旁周鎬歡麀鹿虞韶集鳳凰瑶池春水渌猶誤濯滄浪僕射李相公宅觀花燭時納狀元王曾為婿孫閤相君和鼎貴秦樓愛婿坦牀賢東方千騎還居上南極三星正在天路入桃源花爛漫橋横銀漢水漪漣乘龍擇對真無比月桂宫中第一仙竇詠從淮陽軍故尚書儀之子名題仙籍廣寒宫負羽從軍意氣雄萬石世家標國史孔璋書檄愈頭風狂翻竹箭春波急滿酌榴花别酒空腰佩吳鈎衣楚製栁堤千里躍青驄亷上人歸天台亷公與秘閣黄少卿相善舊住赤城華頂峰桂巖芝崦白雲重彌天曾共習鑿齒入洛因尋陸士龍寒燭伴吟經臘雪雨花開講過晨鐘浮漚一念歸心起本寺房前見偃松次韻和李寺丞見寄之什時宿齋太一寺丞逺致美膳雲章承詔祀髙穹夜聽空歌宿綘宫正怯龜腸終日内忽傳鶴信五城中八珍伊鼎鹽梅味李君相門之後九夏堯厨萐莆風暄暑之辰頗甚馨㓗苦恨齋居方慎獨朶頥大嚼與誰同次韻和右巡李端公見寄之什時立夏宿齋太一宫首夏修時祭齋居貴洗心神光浮漢畤薰吹發虞琴偃樹枝成蓋豐碑字有金秘文窺寳籙榮路厭朝簪捉麈思嘉話烹魚得好音迴瞻栢臺署佳氣九門深大理黄丞宗旦通判潁州曾隨征虜出蕭關又案公田汝水灣南畆萬箱增地利宗旦奉使汝隂募民墾田近千頃西清三刻對天顔一麾通守彤襜貴九棘評刑赤筆閑閭里歡迎舊從事隨車雨氣自應還陳小著從易知邵武軍奏牘金門奉帝俞平明鸞省剖銅符北堂送喜應占鵲南國思歸不為鱸嵗月天涯鄉樹老煙波江上客帆孤㑹稽友婿堪羞死邑令今來負弩驅譯經總持大師致宗之泗上禮㙮早傳心印得衣珠不學聲聞證有餘犀柄屢登三殿講琅函新譯五天書蓮華㙮下焚香去竹箭波間解纜初隨順世縁無所住經行宴坐自如如歐陽使者監和州軍父以老病出為和州團練副使因上言求侍親乃有是命新剖牙璋出䕶軍使車歸養指江濆綵衣楚國老萊子白首長安萬石君虎眼波狂征棹急鱸魚鱠美夀杯醺東南極目無氛䘲不假横戈看陣雲胡小著克順知泉州惠安縣兼過南昌别墅平明束簡下蘭臺海縣鳴琴亦滯才厭説風塵住京洛貪看雪浪架蓬萊楚江歸思鱸魚鱠隨岸離筵竹葉杯通徳舊居旌闕在遼東鶴馭少徘徊武夷新集巻三
