body:
  text: 武夷新集巻十六宋楊億撰表狀五二十首進奉承天節禮物表進奉賀承天節絹一千疋右伏以六龍出震適逢華渚之祥萬國奉琛競奏塗山之㑹祝後天而斯切陳任土以攸同前件絹鮫杼非工繭絲乏麗什一之取葢出於地征旅百之餘願充於庭實表封人之善頌同野老之薦誠干犯宸嚴伏増隕越謹差教練使陳昭簡押領上進論郊禋加勲制書錯誤狀右臣近者䝉恩加勲已奉表稱謝訖臣伏讀制命竊佩訓詞以臣有奉册從祀之勞於以用舎爵䇿勲之典退自循省罔敢遑寧葢以臣出領使符遠違文陛職當奉引既阻屬車之塵位列常叅莫厠大夫之後籍雖連於近署禮不覩於嚴禋猥窺明詔之文實越下臣之分然以恩覃具位慶洽普天或叅表著之餘曽微内外之隔如臣者既官常之未改荷寵澤以無辭至敦奬之所云實競凌而非據葢慮司言之任罔遵書命之方或恐詔㫖稽留苟圖簡易或因除目填委不暇甄明致渙汗之已行類朱紫之無别竊以四禁之設妄誤為尤八柄所施僭濫非可故王者之出令示人不欺有司之守官失職乃死雖小事而必慎恐大體之或虧治本是資政典攸繫臣嘗披載籍幸寘周行括囊不言懼罹出位之罰扣閽有請實懐犯上之憂然乃朝廷之紀綱固非下臣之擬議輙兹披露誠屬僭踰伏乞聖慈覆驗臣所受告身制詞即知臣所陳非謬臣無任云云大駕還京進奉狀進奉賀大駕還京絹五百疋右伏以六驘宵遯萬乘天旋數軍實於明庭獻夷俘於清廟乾坤開泰朝野歡娛鳥獸率舞於兩階玉帛駿奔於萬國臣任當求瘼慶屬回鑾歡呼不及於周行職貢合歸於長府前件絹冰紈非妙繭稅所輸幸因振愷之辰輙効充庭之獻菲薄之至隕越無從臣無任兢惶激切之極謹差子城使朱繼隆押領上進奏舉李翔狀右臣忝分朝寄獲領郡符總官屬以頗多在吏能而畢見合伸論薦敢避僣踰臣竊見前知本州青田縣事李翔元是御前試中進士植性耿介臨事强明不染脂膏自甘藜藿當州龍泉縣山深地險俗薄民頑嵗有逋租獄多滯訟號為難治非止一朝翔權知一考有餘庶事辦集刑清訟息吏不敢欺又權本州判官推官兩㕔公事僅及半年甚彰才幹勤恪匪懈㓗白無私求之輩流不可多得伏望聖慈擢授京官别加任使儻犯贓罪臣甘當連坐之文代樞密陳諫議乞停妻封邑狀右臣伏䝉聖慈特進封臣妻寧陵縣君宋氏京兆郡夫人者不材之質方玷於樞衡非次之恩更霑於閨壼省循之際啟處靡遑然臣竊有懇誠須至披露冀九重之垂聴實萬死之難逃伏念臣堂有慈親年當暮齒擇鄰斷織徒承訓朂之恩扇枕調甘莫効劬勞之報幸遇升平之運獲叅宥密之班况復私門最為殊事庭闈之上俱臨鶴髪之年晨夕之間更遂萊衣之樂如臣榮幸夐絶比倫矧又臣父擢自曹郎便升卿寺臣母召於宫掖得對天顔軒墀之上既頒命婦之服伉儷之際又疏大郡之封恩渥便蕃榮懼交積然而絲綸之寵雖荷於涵濡芒刺之懐未安於反仄葢以臣妻忽膺於異數臣母有礙於常文妻忝夫人之稱母仍縣君之號事舅姑於私室情所不遑奉朝謁於公宫禮或非便於臣之分豈敢自安在經制以詢求固有司之宜執葢以五代俯及皇朝凡預近司少逢具慶遂致敘封之典别無畫一之規婦姑之分既踰臣子之心彌懼伏望尊號皇帝陛下曲迴𤣥造俯察丹誠寢兹加等之封俾遂承顔之懇豈惟微臣事親盡禮在孝道以獲伸實亦聖朝垂世作程著典章而兹始考制䇿畢學士院賜宴謝狀右伏䝉聖慈以臣等考制䇿畢特降中使就學士院賜酒食管領者臨軒䇿試方舉於舊章前席咨詢屢承於睿顧信宿纔終於考校雲天忽被於沾濡特就禁林俾開盛宴輟大庖而供擬為近署之光華挹中衢之樽徒知充量享大官之膳彌媿素飡仰荷天慈臣等無任云云中書謝社日賜御筵狀伏以歲及有秋節當命社潔粢盛而報本式舉禮經錫宴樂以推恩載符易象荷便蕃之睿渥實光寵於近司此葢皇帝陛下道契授時仁彰逮下倉箱流詠克逢棲畝之祥殽核具陳遽有加籩之賜俾為髙㑹以樂佳辰傳舊俗於南京霈鴻私於北闕挹堯樽而知幸倒載寧辭調伊鼎以無功素飡是懼閣下進和聖製社日詩狀右臣等近䝉聖慈賜臣等御製社日七言四韻詩一首令依韻和者九秋方半爰逢命社之辰三象式瞻遽捧横汾之作思極天人之際調均律吕之和仰之彌髙固莫窺於𤣥遠和者益寡徒强扣於虚無臣等俱以短才謬塵禁掖紫泥封詔曽無潤色之能栢殿裁詩幸預唱酬之末雖共呈於濫吹實有黷於皇明其次韻詩謹隨狀上進干冐宸嚴云云代門下李相公承天節設齋奏狀右臣伏以候管飛灰適遇一陽之節祥虹流渚爰逢載誕之辰凡居率土之濱同祝後天之算況臣本惟庸𤨏獲遇承平荷天地之深仁竊公台之顯位但負妨賢之媿曽微補職之勞受恩最深報徳無所幸屬繞樞之慶彌堅傾藿之心奉陶唐之文思誠慙將順獻華封之富夀徒切勤拳竊惟震旦之區素重竺乾之典能植有為之福用成無上之縁臣是敢專就精藍式修浄供命苾蒭之開士誦貝葉之真文作鍾梵於六時設香燈之四事遵金仙之教克崇衆善之因當里社之祥庶祝無疆之夀雖盡傾䖍之懇庶酬覆露之私議靈州事宜狀右臣今月十六日中使至奉御劄子朕常覽古書備詳邊事得其人則舉無遺䇿失其事則謀之不臧朕三復斯文終朝在念未嘗不察言觀行捨短從長希戮力於邦家冀太康於宇縣其如妖氛不息邊塞未寧北狄雖具於隄防西鄙尚多於艱阻靈武是中原巨屏平夏乃近域小蕃久興蛇豕之心常作疆場之患阻絶道路侵犯軍城狂妖轉恣於無厭大郡翻成於孤壘縱之則終成暴亂討之則慮困生靈兩途宜在於咨詢百中須從於籌略卿職當綸綍位列清華披經史之遺文大資智畧觀古今之盛事必藴機謀黠虜用何䇿以翦除靈州以何方而廢置棄之則有何利害存之則有何便宜專聴必當之謀無恡酌中之論分明擘畫密具奏聞用符果决之誠以副蕩滌之望者竊以詢於芻蕘前王之盛徳謀及卿士載籍之格言葢所以竭盡下情詳求中道使舉無失䇿動必有成斯聖皇慎重之至也然而狂夫之言聖人擇焉謀之欲多斷之在獨伏惟皇帝陛下清閒之宴親紆睿覽言可用者行之不疑臣某幸甚幸甚臣嘗讀舊史漢武北築朔方之郡平津侯諫以為罷敝中國以奉無用之地願罷之上使辯士朱買臣等發十䇿以難平津平津不能對臣以為平津侯為漢賢相深明經術習知利害屬武帝以雄侈自任志在開拓買臣等以詞辯獲進並侍左右前史又稱平津每朝㑹議論但開陳其端使人主自擇不肯靣折廷諍由此言之非不能折買臣之舌葢所以將順人君之意耳即朔方之非便有自來矣且其地非禹貢九州之内非周官職方所領在要荒之外固聲教不及元朔中大將軍衞青攘却匃奴取其河南地以列置郡縣今靈州是赫連果地後魏置州葢朔方之故墟即匃奴之舊壤僻介西鄙懸絶諸華數百里之間無有水草烽火不相應亭障不相望當邊境謐寧羌戎即叙道路不壅饟饋無虞猶足以張大國之威聲為中原之扞蔽自契丹作梗邊邑屢驚雜虜為其脅從兇黨因而昌熾待之以爵賞頗驕蹇而不恭討之以甲兵又遁逃而無獲凡有嬴糧之役必興狙擊之謀每至靈武轉輸大須發卒防援離去内地皆無鬭心經涉畏途多有菜色自曹光實白守榮馬紹忠及王榮之敗資糧扉屨所失至多將士丁夫相枕而死以至募商人入糓輸帛償以數倍之價復於積石之孤壤别築清遠之一城邊民繹騷國帑匱乏既不能制黠虜之死命又不能救靈武之急難數年之間兇黨逾盛靈武危堞巋然僅存河外五城繼聞䧟沒但堅壁清野坐食糗糧閉壘枕戈苟度朝夕且使賊遷横行沙漠俶擾壃陲擊列鎮之戍兵侵屬國之蕃部雖有警息無候望而得知縱或憑凌但繕完而自保未嘗出一兵馳一騎敢與虜捔此靈武之存無益明矣平津所言罷敝中國以奉無用之地正為今日也臣以為存之有大害棄之有大利且如國家募人入粟儻以十倍之直發卒轉餉涉兹不毛之地此古人所謂率二十鍾而致一石敺民於死地者也今或棄之即可以歲省戍卒分守内郡一卒之費可給十夫國家無飛芻輓粟之勞士卒免暴露流離之苦必謂廢之即虧失土地傷損威重且如堯舜夏禹聖之盛者也地不過數千里而明徳格天四門穆穆武丁成王商周之明主也然地東不過江黄西不過氐羌南不過蠻荆北不過太原而頌聲並作號為至治及秦漢拓土窮兵遠略雖疆理益廣而干戈日尋府庫之資財屢空生靈之肝腦塗地校功比徳豈可同年而語哉夫蝮蛇螫手壯士斷腕蟻壤不塞將漏山河今靈武之存為害甚於蝮蛇供饋之費為蠧逾於蟻壤無鴻毛之益有泰山之損豈可忽遠大之畧徇悠悠之談昔西漢賈捐之嘗建議棄朱崖當時公卿亦有異論元帝能排衆多之説奮獨見之明下詔廢之人頌其徳元帝之意寧欲自棄其地當其内屬為郡固已置吏而拊循及其稱兵搆亂豈可勞民而征戍故其詔書曰議者以棄朱崖羞威不行夫通於時變即憂萬民萬民之飢餓危孰大焉且宗廟之祭凶年不備况乎避不嫌之辱哉臣以為正與今日靈武之事相類當羌夷寧謐靡有冦孽可以存而勿論及勞師費財無益保鄣固宜廢而不舉何足以傷威重而貽羞辱哉必以失地為言即燕薊八州河湟五郡所失多矣何必此為議者又以西北諸蕃戎馬是産資其控制以通貿易環慶諸州内附蕃落藉其屏翰以免驚騷此又迂濶之甚且戎人為利所誘故牙市於邊闗蕃部之族自强故能庇於種類必來冦以環慶固無隔於藩籬百雉危城千里懸隔自救不暇豈及於他議者又以其土地田沃饒有漢陂之利恐賊遷因而播種益以富强況戎人但以攻剽為能罔知耕稼之事河隴之外棄地甚多延袤百城提封萬井西漢屯田之所疆畔猶存儻事力耕可以積榖何必獨耕靈武乃能足食若靈武於賊有大利即是必争之地當朝夕攻取豈至於今皆為孟浪之談殊非經久之計況又歲有調發動致敓􅔯借冦兵而齎盗糧竭民力而耗國用為患之大無出於斯雖庸人豎子亦知其可棄也然自清逺淪䧟斥候不通孤城之人如釜中之魚躍黠虜之勢若崑山之火炎朝廷必欲棄之須牙璋徴兵靈旗直指約齎深入執殳前驅鼓行賊中傳於城下然後合其將卒遷其人民隳城復隍塞井夷竈乃為棄也臣伏料國家物力尚屈未暇此行雖曰棄之亦空言耳今一城生齒正在焚溺之中咸必死以是憂思自脫而無路若陛下慎選單介間道而行齎持詔書宣布王命令其盡焚廬舎自拔而歸丁壯悉令持兵老幼以之襁負古稱歸師不可遏又曰置之死地而後生之當此之時人百其勇臨難思免其鋒莫當國家又須申命偏師揚言出塞軍聲既振賊勢自分即靈州東遷之民不虞邀擊之患雖有剽刦易為枝梧且國家所惜者士民所急者財用豈可以驍果之旅委於飢虎之蹊府藏之實填於盧山之壑今若棄去靈武退守環慶卒免戍於絶域民思保其室家供饋不出於郊圻恩徳自淪於骨髓民力不竭士氣益揚何敵不摧何戎不克恭惟陛下欲康宇縣慮困生靈求必當之謀思酌中之論臣以靈州之廢置計無出於此望陛下採之而已陛下又憤兹黠虜思欲翦除臣以為不可黷武以窮兵止可伐謀而制勝臣竊料賊遷睢盱邊塞之外倔强沙漠之中脅制諸羌嘯聚不逞無耕農之業無蠶織之工為䑕竊之謀以資衣食聚烏合之衆以擾塞垣致蕃夷之服從用兇威而驅迫非有厚利能誘其人朝廷今廢棄靈州每歲更無饋運絶其覬望何所窺圖此困賊遷之一也平夏之西池鹽斯在先是貿易粟麥用資餱糧今條禁甚嚴法網尤密無敢踰越漸致擕離此困賊遷之二也嚴勅疆吏謹奉國經辯其非常禁其闌出使竹頭木屑不遂其求狗盗雞鳴無施其巧游魂空磧坐抵困窮此困賊遷之三也然須精選銳師分守邊地慎擇名將授之廟謀訓練驍雄隄防侵軼險其走集明其偵候苟鴟張而豕突必烽舉以燧燔併力翦除分路驅逐如秦人之鹿犄角以攻譬常山之蛇首尾相應蕞爾兇醜坐致㓕亡臣竊見太祖朝命姚内斌領慶州董遵誨領環州二人所統之兵纔五六千而已閫外之事一以付之軍市之租不從中覆用能亡卒効命羌夷畏威朝廷無旰食之憂疆場無羽書之警臣欲望陛下於武臣中選有將帥之才知邊鄙之事者三數人分布諸郡各量其所將兵多少付之除廪禄之外賜與一大縣租賦恣其犒設令開幕府辟召髦俊為之僚佐咨以䇿略勇力之士禀其指蹤之用軍旅之政許以便宜而行儻賊遷侵邊郡軍城擾内屬蕃部並脣齒相援腹背夾攻或戰馬正肥戎士思奮即徴發内屬討虜生羌俘獲之餘盡分麾下且戎人利於降附葢迫兇渠儻撓之以勁兵示之以大信懐荒振遠推亡固存出金帛以購酋豪懸爵秩以寵降附明立賞格厚答戰功即賊遷之腹心稍稍奔潰親離衆叛事去運乖煢煢獨夫誰與為伍但塞外一胡人耳安能與大邦為讎哉陛下若欲謀成廟堂功在漏刻臣以為此虜方黠其財猶豐腥膻之羣如臂使指未可以歲月破也直須廢棄靈州退保環慶然後以計困之耳如臣之䇿極得三兩驍將付以一二萬精卒以數縣租賦給其用度令分守邊郡賊遷可以計日成擒朝廷可以髙枕無事矣臣從事儒學豈知軍旅耳剽日久心知其然輙罄謏聞仰祗清問談不稽古詞非據經進思盡忠葢事君之無隠謀或可用豈以人而廢言干冐宸嚴臣無任云云代門下李相公謝冬至日就第賜宴狀右臣今月三十日中使至奉宣進㫖就臣私第賜御筵者太史書雲方及履長之慶大庖推食俄承錫宴之恩仰兊澤之所霑顧衡門之有耀此葢皇帝陛下徳綏率土道契先天南畝秋成俯遂有年之望北胡宵遁將臻下武之期屬四鄙之無虞且一陽之始兆黄鐘中律方臨亞歲之辰玉斚推恩爰霈自天之澤類當衢之堯酒同小㑹於漢儀蝸牛之廬頓増於氣燄鼴鼠之腹徒極於滿盈代僕射吕相公寒食日謝賜御筵狀右臣今月某日中使至奉宣聖㫖就臣私第賜御筵者俯及中春爰逢嘉節司烜禁火聿舉於舊章太原移書式傳於遺俗以令文而休澣方私室以宴安敢期明主之推恩特許近臣而樂飲錫衢樽之九醖分玉食之八珍聳榮觀於里閭浹歡心於簮組羽觴無算徒極於醺酣天威不違彌増於殞越内省庸虚之質曷酬慈惠之仁又謝賜詩狀右臣等今日中使至伏䝉聖慈賜臣等寒食詩者堯厨輟膳方推式宴之恩周雅陳詩忽覩變風之作見横汾之絶唱契在藻之歡心伏惟皇帝陛下感品物之載陽乗穆清之多暇爰紆睿思是發永歌扣寂寞以求音均和六律麗昭回而垂象賁彩三辰皆四始之微言俾萬物而咸覩臣等幸塵台席獲捧宸章莫能側管以窺天徒覺聞韶而忘味仰荷君親之賜曷酬覆載之仁考試貢舉人畢謝賜宴狀右臣等伏䝉聖慈以臣等考試貢舉人畢就學士院賜酒食者諸侯貢士式副於旁求萬乘臨軒載加於慎選幸備掄材之數媿無刈楚之能瞻咫尺之天顔徒増殞越仰躬親於日昃莫奉疇咨漢庭已覩於决科周室允稱於多士但慶文明之盛誠慙品藻之工敢期特就深嚴俯頒宴勞分萐莆之盛饌美極八珍霑玉斚之醇醪醉期千日唯負屬厭之媿曷酬慈惠之仁代宰相謝賜新印三國志狀右臣等伏䝉聖慈賜臣等印本三國志各一部者鼎國三分備存於事跡麟臺四部具列於籖題初成鏤版之功遽荷賜書之寵此葢皇帝陛下先天合徳乙夜留神小大必示於躬親今古咸歸於指掌以為方䇿所紀皆可以勸懲魚魯相傳漸多於譌謬俾盡校讎之妙載加刋刻之工雕鎪纔畢於有司頒賚首沾於近列仰認好文之㫖俯循懵學之姿竊位公台已共慙於尸禄服膺載籍庶或免於面牆曲承覆幬之仁永佩君親之賜臣等無任云云代諸同官陳乞狀右臣等謬塵禁掖獲掌命書莫有補於休明但共慙於尸素所宜循黙豈合祈求顧臣子無隠之誠仰穹昊葢髙之聴退循僭易靡敢遑寧伏念臣等本自諸生濫干寸禄偶䇿名於昭代尋竊吹於清途束帶垂紳獲厠大夫之後簪筆持槖預修太史之書蓬丘一忝於職名蓂厯屢更於嵗序入芝蘭之室頗襲芬馨掌綸綍之言誤膺採擢自草紫泥之詔遂違羣玉之峰官局既殊風流莫接英髦咸集不獲田蘇而與遊緗素實繁皆是黄香之未見深慕多聞之益敢忘强學之心伏望皇帝陛下察以懇誠寛其罪戾念臣等兩朝大典獲奉成書五人同僚獨無兼職許於館殿俾預刋修庶遊翰墨之林更勵鈆黄之業披文金匱諒或至於絶編加俸水衡實有資於懸磬干犯旒扆伏俟允俞次對奏狀右臣位列朝行次當轉對輙傾鄙見上瀆宸聰退省狂愚伏増恐慄臣竊以朝廷之所貴者唯班爵是先君人之所重者唯名器為急是以籩豆之事各有司存樽爼之間不相踰越思不出位君子稱其守官必也正名先王以之經國恭惟國家克遵舊制並建羣司公卿大夫表著咸設臺省監寺曹局畢陳然而徒有其名不舉其職只如尚書㑹府上法文昌治本是資政典攸出條目皆具可舉而行今之存者但吏部銓擬秋曹詳覆自餘租庸筦㩁由别使以總領尺籍伍符非本司而校定職守雖在或事有所分綱領雖存或政非自出丞轄之名空設而無違可糾端揆之任雖重而無務可親周之六官於是廢矣且如寺監素有於掌執臺閣咸著於規程昭然軌儀布在方䇿昔者漢行故事宣帝以之中興魯為長府閔子譏其改作臣以為國家慮命擬之未允故置審官之司憂議讞之或濫故設審刑之署恐命令之或失故建封駁之局臣以為在於紀綱之不舉不在於琴瑟之更張若辯論官材歸於相府即審官之司可廢矣詳評刑辟屬於司冦即審刑之署可去矣出納詔命闗於給事中即封駁之局可罷矣至於尚書二十四司各揚其職寺監臺閣悉復其舊按六典之制度振百司之遺墜在我而已夫豈為難如此則朝廷益尊堂陛益峻典故益舉品流益清端拱而天下治者由兹道也臣又以唐虞之時建官惟百夏商官倍秦漢益繁施及有唐典䇿咸在自三公之極貴九品之至微著於令文皆有員數傳云官不必備唯其人葢闕之斯可矣若乃員外加置任非其才故竈下羊頭形於嘲誚斗量車載播厥風謡國體所先尤須慎重臣竊覩班簿員外郎及二百餘人郎中亦及百數自餘太常國子博士殿中丞中舎洗馬俱不下數百人率預常叅皆著引籍不知職業之所守多由恩澤之序遷臣竊以昔館陶公主為子求郎以為上應列宿以至更直建禮伏奏明光含香握蘭雍容侍從又嘗讀唐朝故事益知省郎之貴三院御史歲滿願遷者多拗項以望省署因而名橋或次補綸闈或便除給諫出刺大郡猶謂左遷今乃百十為羣殆非為官擇人之㫖臣欲乞按唐制應九品已上官並定員數臣又念昔者秦之開郡置守漢以天下為十三部命刺史以領之自後因郡為州以太守為刺史降及唐氏亦嘗變更曽未數年又仍舊貫今國家多命省署之職出為知州又設通判之官以為副貳此權宜之制耳豈可為經久之訓哉臣欲乞諸州並置刺史以户口多少制其俸禄分下中上𦂳望雄之等級品秩之際率如舊章與常叅官比視階資出入更踐省去通判之目但置從事之員建㢘察之府以統臨按輿地之圖而區處昔者興國初詔廢支郡出於一時十國為連周法斯在一道置使唐制可尋至若號令之行風教之出先及於府府以及州州以及縣縣以及鄉里自上而下由近及逺譬如身之使臂臂之使指提綱而衆目張振領而羣毛理由是言之支郡之不可廢也明矣臣欲乞復置支郡𨽻於大府量地里而分割如漕運之統臨名分有倫官業自舉臣又覩唐制内外官俸錢之外有禄米職田又給防閤庶僕親事帳内執衣白直門夫各以官品差定其數歲收其課以資於家本司又有公廨田食本錢以給公用自唐末離亂國用不充百官俸錢並减其半自餘别給一切權停今羣官於半俸之中已是除陌又於半俸三分之内其二分以他物給之鬻於市鄽十纔得其一二曽糊口之不及豈代耕之足云昔西漢張敞蕭望之上言以為倉廪實而知禮節衣食足而知榮辱念吏俸不足者常有憂父母妻子之心雖欲為㢘其勢不能於是宣帝下詔云吏皆勤事而俸禄薄欲其無侵漁百姓難矣遂加吏俸著於䇿書臣竊見今之結髪登朝陳力就列其俸也不能致九人之飽不及周之上農其禄也未嘗有百石之入不及漢之小吏若乃左右僕射百僚之師長位莫崇焉月俸所入不及軍中千夫之帥甚可駭也豈聖朝稽古之意哉臣欲乞今後百官俸禄雜給並循舊制既豐其稍入可責以㢘隅官且限以常員理當减於舊費冗食悉罷周行自清臣又念唐虞之制也凡預品官各設資考課其殿最歸於有司或厯階以升或越次而補國朝多以郊祀覃恩因而稍遷考工之黜陟不行士流之清濁無辨陛下深鑒其弊姑務惟新昨有事於禋燔但徧加於階爵雖矯前失未振舊規臣欲乞依舊内外官各立考限復令考功修舉其職每歲置使校考以表盡公資秩改遷賞罰懲勸一遵典故以振滯淹臣又念昔者成周之制也公侯子男皆列土以建國大夫卿士並受田而無征西漢已來用秦武功之爵唯列侯啓封或踰萬户至闗内侯或有食邑不過數百家自是因循以至唐室但食邑者率為虚設言實封者歲入有差殆及聖朝並無所給至於除拜之際猶名數未移空有食菜之稱真同畫餅之妄臣欲乞依元和中所定實封條貫支給削去虚邑但行實食以寵勲臣臣又念國家每屬嚴禋即覃大慶叙封追贈罔限彛章乃至太醫之微司厯之賤率荷蓼蕭之澤亦䟽石窌之封恩雖出於殊常事不循於經制臣又以勲散之設名品實繁律文以勲散為二官已經刪定故事加散官至五品必以上聞今朝散銀青猶闗命服䕶軍柱國全是虚名臣欲乞自今以後常叅官勲散俱至五品者許封贈官階勲俱至三品者許立㦸每遇慶澤令有司准式施行既禮秩之昭彰固名品之分别臣又以五等之爵施之於今雖有啓封之稱曽無胙土之實苴茅建社固不可以遽行翼子貽孫亦足徴於舊典臣欲乞内外官封至伯子男者許䕃子至公侯者許廕孫别封國公者許嫡子嫡孫一人襲封並令有司考求前制所冀國朝無虚授之寵臣下知延賞之恩臣又以今之加功臣之稱始於唐徳宗幸奉天扈蹕將士並加奉天定難功臣之號因一時之賞典為萬世之通規近代已來將相大臣有加至十餘字者尤非經據不可遵行所宜削除以明憲度者昔講求典禮晉國以清考覈名實漢朝稱治當至化誕敷之際是舊章咸秩之時跂見太平正在今日臣學術素淺文理未明輙述狂言以塞明詔殞越於下啓處不遑干冐天聰臣無任省循戰汗激切屏營之至代宰相賀商州進嘉禾狀右臣等今日中使至中書伏䝉聖慈宣示商州奏據上洛等五縣耆夀户長泉延義等狀稱今年秋夏按稼豐熟異於常年於田中摘得糓十二莖各長一尺五寸至一尺二寸及一莖兩穗三穗者本州差人齎赴闕者以食為天實生民之大本所寳惟榖乃載籍之格言苟非明徳升聞靈心脗合即何以四時大順百物嘉生聿呈棲畝之祥式慰有年之望恭惟皇帝陛下凝神𤣥扈躋俗華胥恤民隠以載周候農祥而靡忒以為春秋所重最在於麥禾富庶之源莫先於稼穡明發不寐對越惟寅下寛大之詔書召和平於時令故得五風十雨蔑聞愆伏之災千倉萬箱允洽豐穰之詠商洛素殊於瘠土閭閻獲覩於秋成仍示羣符用彰𤣥錫東臯效祉既昭報於憂勤南史當官但䖍書於盛美臣等叨居近侍幸覿丕休懽抃之誠倍萬常品代僕射吕相公冬至謝就第賜宴狀右臣今日中使某至奉宣進㫖就臣私第賜御筵者玉帛禋燔已告成於吉土飲食宴樂俄垂象於書雲王人供帳於私門長者逥車於陋巷綺筵載設蓽户生光此葢皇帝陛下屬朝野之歡娛推君親之慈惠奉祠漢畤嘉百執之惟寅書瑞魯臺慶一陽之資始特頒勞酒爰在敝廬殽核具陳金絲迭奏享大庖之饌徒媿屬厭仰當陽之威不踰咫尺感徳共期於醉飽報恩益誓於糜捐閣下謝賜御製南郊詩狀右臣等今日中使至伏䝉聖慈賜臣等南郊禮畢五言六韻詩一首依韻和來者上帝眷懐方陳於燔燎聖人有作爰載於聲詩俯示顓䝉俾祛聾瞶幸覿昭囬之采得聞正始之音不覺味忘幾乎手舞恭惟皇帝陛下恭承正統寅奉舊章卜郊兆以就陽神祗昭格奉玉帛而來祭華夏駿奔爰掃地以貴誠乃備物而報本鑾輿出次雨足灑途冕服升壇天光燭野動必訢合先而不違實三靈之交歡諒百福以申錫而陛下允膺𤣥貺濬發雅言曲示近臣咸令屬和況六君之發詠豈下士以能窺雖効𠖇搜終成濫吹朱絃解愠已覩於變風良玉匿瑕式希於藏拙免陳鄙陋有黷高明臣等無任云云武夷新集巻十六
