body:
  text: 武夷新集卷十二宋楊億撰䇿問十首咸平四年四月試賢良方正科䇿二道奉敕撰朕聞古先哲王疆治天下親附萬民必先務農然乃足食故堯命四嶽謹於授時禹别九州先於平土以地著為本故建步立畝克正經界之規以生齒為限故受田歸田式優筋力之禮繇是穡人狎野品物嘉生悉闢汙萊且無曠土雖有水旱不為凶年然後禮讓興行風俗歸厚勸功樂事靡遷其心既庶而富爰服於教此聖王域民之要道也自周行井田是為王制秦改阡陌乃成霸業漢抑末而敦本衣食滋殖魏屯田而積榖軍國富饒中代已還人散久矣我國家屢下寬大之詔深懲游惰之民關市之征舟車皆算恐其騁於末游天災流行田租盡免慮其去於南畝廣行勸誘之術俾臻仁夀之域而廪庾之積未至陳陳相因流亡之人猶復稍稍而出郡國振業之不暇豪强倍稱而益滋未能小康乃至重困矧又西北冦孽作梗二邊飛挽供須靡有虛日千金之費尚煩於經度九年之儲何致於紅腐今欲復成周之法即表畷素定恐至擾人遵商君之術即貧富不均無以復古用李悝之平糴即頭㑹箕斂出於無名行夷吾之寓令即賦車藉馬適增重擾舉趙過代田之䇿即民服先疇既難變業專夀昌常平之議即市有二價罔或樂輸但賞罰以粟即贖罪失於不經賣官致於虛授若耕戰備冦即隴畝非可使卒塞垣難以安民子大夫明識經邦强學待問多識前訓博極羣書宜考歷代之是非以定當今之用捨强兵富國何者當行嘉謀嘉猷虛懷以佇又問古者鄉老獻賢能之書登于天府樂正論造士之秀揚于王庭或以事以言以才以德先選於州里然服於官常其後下三適之詔聿明賞典乘一封之傳令與計偕或以户口為差或以年齒為限經學章奏用别於文儒力田孝廉益增於科目或但取世胄或專引孤平以王戎之清通猶有門調户選之謗以宣父之仁聖尚聞以貌以言之失自隋設進士唐氏遵行山東士人以不踐為恥朝廷卿相率由此而升笑窮經白首之徒專篆刻雕蟲之巧婉媚綺錯既事於詞華敦朴遜讓罔求於行實流蕩忘返浸染成風故𤣥宗臨朝深歎於薄俗楊綰建議願復於明經雖不果行甚為嘉論然而沿襲已久改易為難儻舉選復行於州閭即人物之評未能折衷科級專求於經術即章句之學非可適時各舉所知乃有比周之黨陳牒自薦寧獲貞退之賢必取乎文質俱全更傷於求備但委乎郡國搜訪亦慮於遺才至如限之以年即顔回子竒豈須强仕計之以口即八龍三虎何必異鄉但取乎文華即組繡鞶帨徒為富艷唯務於學業即腐爛脣齒彌益迂踈國家官倍夏商地廣唐漢吏員萬數皆須得人百里一賢將何充選備陳歷代之略以副仄席之心用期酌中朕將親覽咸平四年八月試賢良方正䇿一道奉敕撰皇帝若曰朕祗若元符為人司牧昧旦丕顯䖍恭寅畏懼德之弗類慮政之未孚蓋念昔者周命百官皆針王闕漢設三道用求直言誕舉舊章思聞讜議兹子大夫逢時奮庸有犯無隱之秋也夫五材並陳去兵未可八政具舉足食是先今國家北扞林胡西禦黨項歲遣介士以防盛秋弛邊備即越軼之是虞窮兵鋒又徴發之為擾堅壁玩冦固役車之未休繼好息民復文告之靡及故蒸庶不得安堵弓矢無由載櫜至如人獲四釜之餘始免艱食國有九年之蓄乃為太平今曠土尚多游手未復勸課之道非不至賦斂之數無所加萬鍾之藏蔑聞於都鄙一榖不熟遂抵於流亡今欲倍算舟車且驅之未盡歸而貿遷斯壅給復租稅又惠之未及富而經費不充復常平之倉即市井之價或有二修平土之法即經界之制未可行自非時和而年豐不免困窮而轉徙又如總領衆職莫急於求賢審官申嚴百刑莫先於明罰飭法今疆宇遼敻吏員衆多必得其材然付以任故文王之德在於能官人東漢之隆本於責吏事今但委有司之考課亦第閥閲之未精只遣使者之察廉又飾厨傳而為患漢武之欲除吏田蚡非可擅權德宗之擇縣令栁渾譏其失體遵荀朂省官之議即員難減者實多體薛宣換縣之規即才適用者殊少雖循名責實之斯切而政平訟息之未臻至若金科玉條竹書丹筆以禁多辟所期無刑其屬三千蓋防於踰矩斷獄四百用冀於勝殘雖然慕陶唐之畫冠且免而無恥體漢初之踈網又姦乃益生必待臯陶作士師法寧可廢豈須定國為廷尉民乃不寃俟論報即久繫是虞但責成即舞文斯衆苟四目之罔及乃一人之向隅或罹非辜足傷和氣子大夫䇿慮幅臆智略輻湊兵者凶器必可使歸馬放牛食為民天必能致家給人足考建官之意當俾百工之允釐稽立辟之由期措五刑而不用並揣厯代之略兼陳方今之宜揚榷而言朕當親覽咸平五年九月試武舉人䇿一道奉㫖撰試武舉人王關皇帝若曰夫五材並用誰能去兵七德孔修於焉右武故軒轅受符於𤣥女所以興涿鹿之征吕望釣璜於磻溪所以著金匱之法歷代之簡編咸偹先民之軌迹具存孫吳著書首標竒正之說衛霍為將但問方略何如然述兵法者實祖於斯人稱天幸者亦聞於前史得失安取是非焉從至如魏武之善用兵亦以新書從事孔明之能勝敵乃云節制之師葛亮斯有凖繩何一時應變之寡術孟德出於胸臆何諸將違律者喪軍豈師古有膠柱之嫌臨機有脫兔之急沿襲不同於前代弛張固在於隨時當舉要而劇談庶聞義而斯服今國家尚勤戎略式厲師貞所以威制羌夷保障生聚而黨項狂冦猶假息於朝晡葷狁殘妖頗肆毒於邊鄙調民轉餉遣戍防秋內費資儲外勤征役未能梟取虜首懸於槀街縳致胡雛獻于清廟兹朝廷旰食之為念謀夫髙枕之未遑子大夫識擒縱之方練攻取之䇿五餌係虜賈誼之言可徴三章議邊朝錯之謀斯在敦詩閲禮何以得文武之全才籍馬賦車何以致兵農之一混約齎深入何以登瀚海而勒燕然保塞折衝何以按榆溪而清薊北伐蠻夷者豈煩中國形勢如何得地利者不如人和勝負安取參以前志舉爾所知講求便宜敷陳指要庶披確論用達善經試草澤栁察䇿二道問王者專山澤之征實惟周制縣官設鹽鐵之禁蓋自漢朝所以牢籠貨財抑奪豪右從來久矣何莫由斯國家奄有寰區外制邊徼用度斯廣經費實繁東南之邦茗荈攸産池海之利鹹鹺是資管榷之法載嚴律令之文具備設憲網而雖密投罪罟者彌多蓋衣食之所由縱水火而必蹈今欲盡弛其禁即九年之計不充習以為常即五刑之用未措子大夫深達治體必切事情幸揣當今之宜别陳經久之略又問國家並建庶官分領衆職守宰之任風化出焉故大邑庇身子産徴於引喻惟良共理漢宣發於歎嗟今土宇混同郡邑紛布版圖羡溢吏員衆多守土之臣多輟於臺閣字人之長咸調於銓衡皆程其器能校其閥閲因清閒之宴必敷納以言虛已疇咨曽旰食而忘倦懸爵𢡟賞俟期月之有成雖慎柬惟勤而頌聲未洽或驅雞之無狀或治庖之不能或貪墨以敗官或嚴殘而剝下愷悌之化斯鬱循良之稱鮮聞至於分遣察廉飾厨傳者率邀善譽專考科第拘殿最者多失巨賢詔公卿各舉所知或稱匪其人恩移於下俾牧守自署其屬即愛不吾叛用必以私益知審官之難矧復長人之寄子大夫博探載籍深究政經當述選賢任能之方且明興化致治之本條對所問揚榷而言必考古以驗今庶可行而不悖景德二年三月試草澤劉牧䇿二道奉聖旨撰問化成之道儒術為先故大學之興存於周禮博士之設始於秦官厯代相沿舊章咸在國家盛膠庠之制崇俊造之科鏤版以廣聖言祭菜以嚴祀典傳經請益必選碩儒講肄胄筵咸稽古訓而公卿之子弟鮮隸籍於成均州里之俊髦率登名於鄉老豈勸誘之未至將沿襲之或殊何以復杏壇槐市之規遵小成大成之制弦歌不輟誕揚洙泗之風生徒寖多克追唐漢之盛願聞嘉話用洽永圖又問古者井田之設兵農混焉居常力耕不離於畎畝有事調發爰執於干戈蓋三代之舊章厯戰國而無改施及秦漢沿襲漸殊京師建南北之軍郡國有材官騎士內增七校外置樓船自是已來不能復古而况五材並用誰能去兵天下雖安未可忘戰今國家勤修武備式遏外虞所以保障黎元震耀威德將何以追司馬六軍之制遵提封百萬之規免飛芻挽粟之勞成家給人足之美寓令於疆畔其術如何講事於搜苗厥㫖安在願聞婉畫以闡大猷試草澤䇿一道景德二年三月二日問四民並設蓋務穡之尤先九序惟歌實豐財而為急國家富有區夏勤恤黎元訓兵以備不虞建官以熙庶績乃至宗廟賓客之費名田奉邑之資嵗計所叢國用尤廣雖復頒行恩詔敦勸農功奉順天時聿修稼政罷不急之務去冗食之兵裁减賜豫之規斥棄竒巧之玩敦本節用斯為至矣而九年之蓄物力未完一榖不登流亡乃出將何以致汚萊盡闢游惰悉歸足衣食而知禮文值凶荒而無菜色又何以致太倉之粟陳陳相因上林之錢往往而是然後家給人足頌聲浹於連甍國富兵强天威震乎殊俗子大夫博通載籍練達政經必有嘉謀悉以條對景德三年九月試賢良方正能直言極諫科䇿一道奉敕撰皇帝若曰我國家奄宅中土勤恤庶邦念前代求賢之勞思昔王好問之裕濬發明詔詳延俊民樂聞讜言用禆至化兹子大夫韞櫝待價藏器俟時射隼有功逆鱗無忌之際也方今邊候徹警戎索載清與民息肩爰戢不祥之器為國生事深戒守方之臣蓋已卧鼓滅烽賣劍買犢下勸農之詔朂游惰以反耕置常平之倉謹豐凶而平糴勸課之道斯至偹豫之術具頒而流庸未盡歸汙萊未盡闢陳陳之粟尚鬱京坻之謡蚩蚩之氓競逐錐刀之末倚市門者鄙於刺繡為馬醫者至於擊鍾使寒耕熱耘之民有粗衣菲食之歎厚生敦本何以盡驅於力田既富而教何以一變而至道若夫慎重名器先儒之格訓辨論官材為邦之令典著位峻於堂陛效用適於輪轅固亦周爰咨諏宴見敷納徴保任於公舉觀試可於吏能黜陟幽明稽有虞之彝制綜核名實遵漢宣之故事其有尤異之課即申以增秩之文若乃非常之才必待以不次之位我有好爵兹用縻賢國無敗官於焉致治而庶尹卿士郡邑牧宰暨於黃綬一命青綸半通雖有司殿最之申嚴外臺刺舉之詳察尚或貪墨以獲戾罷軟而廢職徇公者傷於苛刻賈譽者病於脂韋致有嚚訟升聞煩軺車之案劾具獄來上待丹筆之科條但採於風謡或察廉之失實專取於課第亦茂異之見遺將何以致棫朴之詠興蒲盧之政洽授方任能之道著亮采惠疇之業昭巍巍大朝有官人之盛濟濟多士無彼其之譏子大夫强學多聞稽古博識究厯代之損益明當今之利病所宜窮斯民雅俗之弊極談恥格之方考庶官治亂之由深陳用人之術遲聞嘉話以闡大猷當悉乃心勿有所隱表狀一十首知處州謝到任表臣某言臣昨奉敕差知處州軍州事已於今月三日赴本任訖遠辭螭陛權剖使符百城之任既優五綵之榮斯極臣某中謝臣早自孤平獲逢開泰徒以雕蟲之伎遂塵汗簡之司皇帝陛下夤奉宗祧旁求俊乂謂臣處於羣萃竊畫餅之名知臣恥於進趨挺素絲之節度越倫輩超踐掖垣復誤賜於選掄獲同司於筆削家徒四壁貧方甚於臨卭字賞千金書未懸於秦市特推恩於陋巷俾將命於列藩既克就於國書又驟加於勳籍未出瀛洲之署尚參文石之班蓋以臣早奉庭闈久棲輦轂離邦寖遠懷土滋深烏鳥之情實巢南之是切芻蕘之懇須伏閣以自陳封章才黷於冕旒俞詔已頒於蓬蓽幸一麾之甚便復再疏以請行陛下察以寸心恕其九死許扶擕於老幼令密邇於鄉閭况浙右奧區縉雲善地閭閻蕃庶土壤膏腴聲教所覃俗知禮讓耕桑甚廣民少惰游今歲雖罹旱暵之災尚多溉灌之利人無菜色畝有餘糧屬鄰郡之不登故榖糴之微貴提封之內安堵如常前春已來不至乏絶一境偶無於疲瘵九重望减於焦勞臣謹當恭守詔條恪居官次袴襦報政豈朞月之敢期氷蘖撿身固生平之所履儻渝素守是速靈誅臣又念朝辭日得面聖顔親承睿㫖以俯鄰於桑梓又獲奉於甘㫖推從欲之仁廣聽卑之造特許終於考秩且未議於替移即臣舉族知歸殺身莫報況丘園甚近雞犬相聞鄉里親姻或諧於聚首弟妹婚嫁免至於失時上以慰慈母之心次以了私門之事而臣齒髮方盛駑蹇未衰抱槧懷鉛終預諸儒之末摩頂至踵須酬萬乘之知冒眛上言隕越無措臣無任云云謝賜厯日表臣某言今月日本州進奏院遞到宣頭一道賜臣咸平二年乾元具注厯一卷者夏正肇建堯厯爰頒克授人時不迷帝力臣中謝伏以皇帝陛下端拱穆清茂育羣品德合天地信及豚魚象魏懸書定一王之法制靈臺治厯究三統之指歸濬發宸襟載稽古訓將欲納民軌物致俗胥庭俾雩祀靡愆無水旱之作沴農夫既正免耕稼之失時顧兹遐僻之邦亦荷頒宣之寵七月流火見司厯之無差五星連珠與太初而相應臣謬膺朝寄獲布郡條發函徒切於凌兢測管豈知於疏密謹當䖍遵時令恪舉官常彌堅夙夜之誠上答照臨之惠臣無任云云賀再熟稻表臣某言據本州麗水等縣狀申今年人户所種早稻自秋初刈後為雨水調適元根再發青苗結實成熟共得兩收已具州司别狀聞奏者多稼並熟所謂有年嘉榖再登斯為上瑞臣某中謝臣聞昔者后稷之功既著一稃二米顯其祥成周之道方隆異畝同頴昭其應貢交址者曽聞於再熟取甫田者爰及於十千蓋以𤣥德升聞至誠昭格天地欣合百嘉由是而生風雨弗迷三時以之無害允鍾上聖克協靈符竊以山越之鄉多乏膏腴之産火耕水耨獲地利以甚微食稻與魚習土風而惟舊去歲因罹於小歉今春遂至於薦飢力穡雖勤餱糧殆絶參以五種之利救其二釜之艱俯及秋成僅無菜色皇帝陛下乃眷東顧隂隲下民臨遣使臣循行縣道慮賦輿之不集盡賜田租念飢饉之可哀大發倉粟城邑聚人之地為設淖糜山川血食之神必祈膏澤道路之敓􅔯者貸其枯木之斃溝隍之填委者推以掩骼之仁明詔誕敷和氣斯應如臣所領之郡近接海隅一千里之封陲三萬家之生聚自蠶事載飭厥篚之獲頗多及麥秋俯臨兩岐之謡斯洽菽粟流衍黍稷豐穰絶無螟螣之災率有鍾釡之蓄矧早稻既穫陳根尚存大雨時行土膏脈起芃芃發秀薿薿垂芒同枯楊之再生異靡草之先死結實棲畝斂穧盈車至於晚田又收數倍遺秉滯穗既寡婦之是資千倉萬箱顧老農而何幸臣忝膺郡寄獲覩年豐親逢五穀之祥同賴一人之慶周原膴膴猶詠曽孫之詩堯民熙熙敢迷上帝之力休徴斯在純錫昭然伏望宣付史官書之簡䇿干冒宸扆彌切兢惶賀册尊號表臣某言今月二十四日得進奏院狀報前月七日百官于乾元殿奉冊尊號者嚴祀式陳鴻名肇建含靈悅豫盛禮便蕃臣某中謝臣聞山嶽配天亦擅崇髙之美坤元載物爰彰博厚之稱垂世作程所以強名于四大稽古建號蓋用比德于九皇在衆美之所歸雖上聖而奚讓伏以崇文廣武聖明仁孝皇帝陛下誕膺眷命光宅中區執左契以御民張四維而化俗齊居決事聿彰欽恤之仁旰食臨朝用示躬親之㫖羣生咸遂庶績其凝體唐堯之文思光被四表恢商湯之武烈底定萬方化馳若神髙陽之稟聖德臨下有赫文王之服大明兼漢祖之寬仁挺重華之篤孝總帝皇之能事掩天地之全功惠澤及于昆蟲湛露淪于骨髓六龍出震瞻之者豈可階升百谷朝宗就之者或思蠡酌于是邦君庶尹國老諸生槀街蕃酋比屋黔庶共薦厖鴻之稱仰酬煦嫗之仁叩閶闔之九重集緇𤣥之萬計至于懇倒始奉允俞有司䖍舉于舊章率土願聞于大號乃以仲冬至日合祭圓丘禮行于郊百神以之述職飲至于寢羣后由是在庭端拱穆清祇受典冊祥光休氣充塞于寰瀛歡謡頌聲傳聞于行路足以昭祖宗之謨訓聳四裔之威懷人神之望允諧祝史之辭無愧五讓而受謙光之德已隆九名聿彰覆燾之功彌廣臣側聞國慶限守詔條魏闕存心徒結雲天之戀虞庭率舞莫陪飛走之餘抃蹈之誠實萬常品臣無任歡呼抃蹈激切屏營之至謝加勳表臣某言今月二十五日進奏院遞到官告一通敕牒一道䝉恩加上騎都尉餘如故仍放朝謝者在宥之恩方覃於率土冊勳之典俄及於具僚祇荷寵靈伏增悚惕臣某中謝伏以唐制勳官十有二等克遵班爵之序備存律令之文所以褒賞忠勞甄明品秩不稱其職羊胃之謗乃興或曠厥官鵜翼之譏斯起如臣者謬塵祿位蔑著聲猷束帶立朝已愧諍臣之任一麾出守猥慙循吏之稱屬燔柴薦鬯之辰無除地給薪之效爰因大慶亦被鴻私諫垣未削於姓名勳籍驟遷於等級天威所及蓋咫尺之不違官針有常但顛沛而於是彌勤職守用報寵光仰荷天慈臣無任云云謝賜厯日表臣某言今月十四月本州進奏院遞到宣頭一道賜臣咸平三年乾元具注厯一卷者厯象之設克謹于民時正朔所頒俾知于天道臣某中謝竊以少昊獲鳯鳥之瑞因以建官陶虞有蓂莢之祥由之紀厯所以定分至啓閉之候辨躔次弦望之差作事厚生制民命而斯在歸餘舉正察時變以可知崇文廣武聖明仁孝皇帝陛下欽奉丕圗祇膺眷命聿遵前典不廢舊章疇人之職既修天吏之功靡忒清臺肇建校諸家之否臧大衍克成正千載之訛謬豈期僻陋亦荷頒宣敢不䖍奉王正率循時令土膏才起便候于農祥玉燭既和永躋于壽域粗識閏餘之數免貽瞽循之譏仰戴宸慈臣無任兢惶激切之至謝賜衣表臣某言今月十六日翰林藝學郤俊至伏蒙聖慈賜臣敕書一道紫綺純綿旋襴一領并賜屯駐本城諸軍員僚初冬衣襖者解衣之賜猥及于下臣挾纊之仁更均于列校光生郡邸喜動轅門臣某中謝伏以崇文廣武聖明仁孝皇帝陛下誕膺元符恭臨大寶惠必先于逮下志惟在于愛人鳥獸氄毛甫及嚴凝之候衣裳在笥爰推賜豫之恩在渙汗之所沾雖容光而必照如臣者任叨符竹地僻甌吳奉漢詔之六條方深祗畏分齊官之三服忽荷頒宣纂組極于纎華純綿加于麗密璽書下降竊窺雲漢之文驛騎來臨更重皇華之命但曵婁而增惕實被服以難勝矧于戎行亦膺天寵干城雖久曾無汗馬之勞守土何功獨懼濡鵜之刺仰瞻宸極唯誓糜捐臣與軍校等無任感天荷聖歡呼蹈舞激切屏營之至武夷新集卷十二
