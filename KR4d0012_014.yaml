body:
  text: 武夷新集巻十四宋楊億撰表狀三二十首代駙馬王都尉謝賜宅表臣某言今月某日中使某至奉宣聖㫖賜臣安逺門外永寧坊宅一區者恩寵便蕃心魂戰慄臣某中謝竊以功宣帶礪方聞賜第之榮業紹箕裘乃孚髙門之慶如臣者家承閥閱性劇顓䝉早違怙恃之慈靡及義方之訓每進修而自勵期孝謹之不衰俄被天光獲參戚里顧惟榮忝實越常倫敢謂俯降綸言特頒甲第棟宇式彰於輪奐堂皇更極於髙明渥澤所加方増華於魯館孱微何幸謬席寵於沁園愈懐氷谷之憂曷報乾坤之施臣無任感天荷聖激切屏營之至代僕射李相公待罪表臣某言臣前日幸參法從獲奉宸游侍龍衮以當陽屬羽觴之無算遂成沉醉乃至先歸陪髙宴以未終辱具瞻而斯甚臣某中謝伏念臣齒髪將暮已踰知命之年血氣既衰夙抱負薪之疾念筋骸之如此固杯杓之不任矧乃奉屬車之清塵霑玉斚之餘瀝挹千日之味但覺沉迷瞻八彩之眉自成殞越況任當於衡軸而位冠於簮纓忽貽倒載之羞深負厚顔之媿省循斯極啓處靡遑敢不銘座自規覆觴為戒慕顔回之不飲同蘧瑗之知非庶貳過之或無冀已然之可贖仰祈𤣥造俯鑒下誠代僕射李相公謝降詔慰諭表臣某言臣數日前獲陪鎬宴遽醉堯樽侍坐不任失儀斯甚仰陳奏牘方俟刑書忽䝉詔㫖以慰安稍息心顔之靦厚臣某中謝竊以飲不及亂載籍攸稱人而無儀國風所刺矧居三事之任親陪萬騎之遊瑶池之髙宴方酣湛露之皇恩載洽無温克之徳上奉當陽有倒載之羞見嗤行路玷名器之如此獲罪戻以是宜尚䝉覆幬之仁俯矜醉飽之失諒知非於既往永作戒於將來誓無沉湎之愆以辱崇髙之位悚惕之至啓處不遑臣無任云云代陳州李相公陳情表臣某言臣聞匈奴未賔去病以之辭第先零尚熾充國由是請行臣雖至愚常慕前烈輒兹披露甘俟誅夷臣某中謝竊以無用之臣明君不畜彼其之子載籍攸譏況臣爵為通侯任居方鎮權兼節鉞位峻台槐厚禄萬鍾空負素飱之媿元戎十乗莫伸汗馬之勞方今邊候多虞軍書尚警朝廷未得以髙枕帷幄頗聞於運籌而臣世受國恩身膺閫寄禽息鳥視徒自取於便安烽舉燧燔曽不思於効用豈人言之可畏實鬼瞰以是憂每念及兹毛髪俱聳伏望尊號皇帝陛下曲迴𤣥造洞鑒丹誠許於戎旅之間乃至重難之處賜之驅䇿俾効疲駑焚老上之龍庭誓殱餘孽褁伏波之馬革庶畢乃心憤發由衷兢惶俟命干冐宸嚴云云第三表臣某言臣近者再貢封章備傾忠欵忽奉優詔未賜允俞俯僂無從殞越於下臣某中謝竊以賈生一匹夫耳乃願係於單于卜式彼何人斯猶誓死於南越況臣職居連帥位冠列藩大斾髙牙任雄節制貂冠蟬冕地峻公台端居無汗馬之勞竊禄有懸貆之誚矧惟家世際㑹國朝爰念先臣逮事太祖契風雲之嘉㑹被雨露之殊私乃至延賞後昆冐榮昭代而不能圖勲竹帛濟美箕裘但恃夤縁仰希覆幬負乗致冦必自取於顛擠懐安敗名實有孤於豢養况今斧扆尚煩於旰􅉴邊陲未掃於攙搶帷幄之臣方圖於廟勝介胄之士咸願於身先如臣忠烈之餘況忝崇髙之位苟貪寵禄輙避征行何以報累朝之恩何以塞輿人之誦伏望尊號皇帝陛下恕以再三之瀆鑒兹丹赤之誠俾執干戈以守方靣況臣齒髪雖暮亦可强飯於㢘頗膽氣未衰豈媿横行之樊噲誓約齎而絶漠願喋血以鏖兵執金鼓以長驅殞鋒鏑而無恨憤悱斯極陳述尤煩干冐宸嚴期於得請謝降詔不允所請表臣某言臣近者不自揣循輒傾愚瞽屢陳奏牘上扣天閽罄犬馬之誠葢思報主犯雷霆之怒豈敢顧身方懐惟谷之憂忽降封泥之詔靡加罪戾曲示襃揚撫已無從戴恩彌厚臣某中謝伏念臣論材甚薄冐寵居多領近輔之雄藩據中台之顯位賦禄至厚殆踰千户之封衛社無功空忝三軍之帥徒宴安於富貴實靦厚於心顔屬邊戍之未寧固戎臣之思奮係單于之頸孰不有心搴翖侯之旗人皆賈勇爰述乃誠之懇迫兼陳奕世之夤縁以至徴前朝戚屬之家未嘗避一時軍旅之役被堅執銳必誓於身先冐刃推鋒庶求於死所少塞素餐之謗免貽青史之羞徒罄勤拳終成孟浪瀆尊不已既罹犯上之愆獲罪攸宜合正投荒之典豈謂尊號皇帝陛下俯矜僣越特示優容未寘金科曲頒芝檢八行睿㫖備極於丁寧一介微軀豈勝於殞越仰戴乾坤之造曷酬雨露之私臣無任云云求解職領郡表臣某言臣幸塵近列獲掌命書既無補於休明豈合披於誠慊葢内懐於危迫須不避於誅鋤臣某中謝伏念臣本出寒微且非茂異由先朝而筮仕預祕殿之讎書叨結綬於士林久濫巾於冊府幸值崇文廣武聖明仁孝皇帝陛下紹隆丕祚首霈鴻恩擢踐諫垣驟登閨籍屬刋修於國典亦陪厠於史官既終麟筆之功復遂隼旟之便洎言歸於京闕方接武於班行遽䝉慎柬之私得齒代言之末地居禁掖日奉内朝官曹所謂於清華職業唯専於潤色内顧草茅之賤已懐負乗之慙既積日以彌多愈循涯而自失然念有犯無隠臣誠由是上通居髙聴卑天道於焉下濟臣所以扣帝閽而自述冐蕭斧以無疑葢念臣扶侍慈親提挈賤累旅寓輦轂三十口有餘離去鄉闗四千里而遠只請本官之俸給别無負郭之生涯衣食所資盡出於是乃至庭闈之㫖甘或闕晨夕之饘粥屢空臣母見臣窘急棲遲動静嗟憫欲將諸弟南歸故鄉丐索親姻庶圖存活臣親弟化有妻孥數口寄止潤州一房伶俜都無所託家貧既難於團聚俸薄不可以分霑窮餓流離誠堪軫念臣又有親弟倚等見臣資儲乏絶藜藿靡充且欲客遊違離膝下臣母鍾愛尤甚不忍令漂泊道塗進退徬徨莫知為計臣未嘗不拊心太息危坐端憂泣涕漣如方寸亂矣葢由臣竊代耕之禄莫能為工為商乏適時之才以至不堪不可侏儒之耕田力作且不及人子雲之篆刻雕蟲終非曉事萃兹短拙以至窮困然臣學古入官出身事主含毫弄翰豈甘為腐爛之儒露冕褰帷所願作循良之吏伏望陛下矜臣危蹙之懇察臣激切之心罷去綸掖之資假以藩條之任於蘇湖常潤等處令典一州庶獲養親兼諧聚族魚鹽稍賤聊救於食貧水薤是規終期於報政幸免翳桑之困永衘魏闕之恩瀝血籲天必期得請干犯宸嚴臣無任云云再乞解職表寫畢有銀臺之命因不敢復上臣某言臣近寫危誠備形尺奏輙冐萬死仰叩九重瀝懇雖達於雲天俟命已逾於旬浹徒浼葢髙之聴未䝉惻隠之仁臣某中謝竊以國家澄汰品流登進茂異至於典掌誥命步武掖垣乃推擇之所先葢宦遊之最美禮秩殊厚班著頗崇三殿内朝日趨翔於文陛六飛法從時陪扈於屬車常瞻咫尺之顔專裁寛大之詔此固山東逢掖夙夜禱祠之所求也如臣出於遐陬本無長技得厠從臣之末獲司王者之言此乃羊服虎皮鷃披隼翼固陋之質榮幸踰涯又豈敢厭承明之深嚴願辭侍從之職去長安之全盛求領卑濕之邦葢桂玉之所煎恐溝隍之行及涸鱗在轍將懸肆而有期窮猿奔林諒擇木之何暇既堪憂於四壁亦難事於三緘葢念臣職雖詞臣身乃覉客扶老擕幼去里離邦良賤相從三十餘口衣食所給並出於臣且無負郭之田園固乏滿堂之金玉凡百經費只仰俸緡至若管庫之微亦有走卒以執御幸從大夫之後不可徒步而趨朝又須分錢刀以僦奴市芻粟而飼馬用度非一悉數難周並出於本官俸錢二十五貫中更無他給供甘之養多闕量入之費屢殫饘粥餬口之不充進退觸藩之無計原憲誠知其非病介推豈可以不言竊念臣獲掌命書四更年籥同列之内或䝉添給俸錢乃至次補皇華將命藩邸並霑濡潤迭被恩私唯臣貧悴絶倫照臨靡及臣未嘗不内自循省惕然戰兢葢由臣蟠木之姿偶厠皇王之器濫竽之吹謬叅韶䕶之音才不逮於等儕寵難希於均及然而皇帝陛下已從誤聴置在司言過咎未彰不欲令其襆被含容至大又豈忍於置淵所以令臣竊位妨賢貪榮就列漢臣之餓且欲死難免侏儒之嗤孔徒之病不能興敢懐子路之愠行作若敖之餒鬼徒辱甘泉之從官實由臣無寸長之可稱有五短而為累不能闢土殖榖竭力以事親反乃束帶立朝素飡而辱國致滫瀡之養莫奉於庭闈期功之親將罹於凍餒困窮至此職臣之由臣母將挈婢媪而歸故鄉庶圖存活臣弟先有妻孥而寄外郡並絶供須更有親弟倚等皆欲遊索江淮捨親而去臣之危迫何以自安雖前表之罄情恐至仁之未察再兹剖露不避縷煩伏望陛下霈曲成之私矜倒懸之急尚恕觸鱗之罪未加禦魅之刑察以江湖之間魚米甚賤晨夕之養甘滑可期恢孝治之風推恩逮下體髙明之徳以欲從人特於蘇湖常潤等州假一郡之寄至於宣布皇澤撫養黎氓聖人有言尚東周之可冀循吏何遠豈西漢之難偕三牲儻獲於承顔五月誓期於報政然臣素知㢘恥無所僥求固於官常不敢貪冐只希罷免非望改遷以七人補衮之資荷千里頒條之寄於臣之分所得已多況今多士盈庭君子在位如臣之比寔繁有徒至於潤色鴻猷羽儀瑣闥儻加慎柬何患乏材若臣者苟䝉錫類之仁得遵量力之訓烏鳥反哺但期躑躅於一枝鰌鱓並迯豈足盈虚於九罭披肝瀝血顒俟允俞干犯宸嚴臣無任云云代鴻臚陳少卿謝男知制誥表臣某言臣第三男祕書省著作郎直史館堯咨伏奉制命特授右正言知制誥者恩覃貝闕慶集蓬門荷奨擢以非常但兢榮而失㨿臣某中謝竊以典掌詔令步武掖垣參斑綴於赤墀陪豫遊於清蹕自非髦彦豈副選掄臣男堯咨學謝淹通才非茂異趨庭禀訓慙無詩禮之規束帶効官已玷圖書之任豈謂尊號皇帝陛下俯垂柬拔特超羣倫俾升雞省之近司對演龍綸之雅誥況堯咨冠甲科之選早媿非宜通閨籍已來殊為未久便掌大君之書命輙與先生而並行俯僂雖訓以益恭負乗且虞於致冦實光生於舉族但感極於寸心涕泗不覺以沾濡魂爽更驚於飛越葢念臣孱微緒息叢集寵光長男堯叟忝塵宥密之司翊賛樞機之務雖夙夜之誠益勵而乾坤之造彌深次男堯佐冐寵周行兼榮史閣出分憂寄式涖藩垣而臣亞秩象河方慚厚禄趨朝辯色尚玷清班渥澤薦臻鴻私累洽雖籍時來之幸常憂鬼瞰之災今堯咨又拜命於九重復冐榮於四禁蚊蚋賤質諒何力以負山葵藿微生但傾心而向日聚首唯懐於感咽捐軀誓報於高明百官請聴政第三表臣某等言臣等今者兩陳章奏備瀝懇誠因遺誥之明文請臨軒而聴政猥奉答詔未賜允俞羣情悚惶不敢寧處臣某等中謝竊以寰海至廣事有萬機家國異宜理非一致恭惟皇帝陛下至孝之徳上通神明宅憂已來哀動左右永懐罔極痛深創鉅乃於聴斷未忍躬親而況長樂上仙顧命斯在奉常掌禮典訓具存葢以宵旰務煩君人位重萬方仰戴不可以諒隂百度財成豈宜於曠廢故前代酌中而立制治命鄭重而為言伏望稍抑至懐仰遵遺㫖念宗社之大計稽載籍之舊章俯徇輿情臨决庶政所冀百執各揚於乃職羣臣獲覩於清光慰中外之翹誠副華夷之徯望臣等無任祈天俟命兢惶激切之至代冦相公讓恩命第一表臣某言今月七日内降白麻伏奉制命䝉恩授臣依前尚書兵部侍郎同中書門下平章事集賢殿大學士加食邑五百户食實封貳伯户仍賜推忠協謀佐理功臣餘如故者寵靈自天戰跼無地臣某中謝竊以平章庶政調爕大鈞鎮撫四夷彌綸百度使卿士各任其職隂陽不失其和此宰輔之任也葢位峻公臺禮絶羣后故成周論道之際無其人即闕三公之官炎漢責實之秋乏其才即虚丞相之府況今延鴻啓祚睿哲膺期自非命世之賢曷處持衡之地伏念臣識慙宏遠學媿淹通比肩諸生謬中太常之第自結明主誤承先帝之知擢於等夷置之宥密尋一麾而出守未期歲以來朝復陪三事之班獲議萬機之政屬先皇求理之日實下臣盡瘁之時一心匪石以徒堅衆口爍金而彌甚先朝曲加覆露終示保全止解職於宰司俾分憂於侯閫適偶重熈之運益隆乃眷之人盟津境壓於洪河左馮地雄於秦甸至於岐下亦控隴西莫非作翰之邦並荷長人之寄暨言旋於魏闕方厠跡於周行忽進秩於秋卿式剸煩於天邑浩穰為政曽無利刄之可稱俯仰從公常懼素餐之興謗俄總司於邦計已薦革於歲華徒竭誠明莫禆旰􅉴豈謂特頒恩制擢預宰衡況四海具瞻一人注意謀無前筯曷以承三接之顔智類挈缾豈足増九鼎之重諒諠譁之可畏固踧踖之靡遑湏瀝懇誠乞停寵渥伏望尊號皇帝陛下俯迴宏鑒式徇至公申飭有司追寢前詔儻絲綸之命特輟於已行即名器之崇庶無於虚授情非飾譲言悉由衷仰瀆宸慈期於得請第二表臣某言臣近叨恩制擢踐台司尋貢讓章備陳誠欵忽奉答詔未賜允俞捧讀兢憂罔知所措臣某中謝竊以弼諧之任中外式瞻授受之間古今攸重葢所以平章邦國之政輔相天地之宜作元首之股肱為大川之舟檝舉不失徳乃助懸象之著明用非其人或致處士之横議如臣者學非稽古才媿適時徒以際㑹先朝踐揚華貫佐萬機之務曽無補衮之勞叅四輔之班莫著和羮之効乃至分憂於藩閫未嘗報政於闕庭神臯剸割以非長㑹府經綸而無狀顯官重禄所得已多負乗素飱貽譏斯甚豈足副蒼生之徯望踐黄閣之崇髙用短綆以汲深泉自知不逮擢散材而搆大厦人誰謂宜方今循名責實之秋為官擇人之際搢紳百執猶或慎於柬求廊廟三階豈可輕於進用内省尤熟非據是憂伏望尊號皇帝陛下體𤣥造之無私鑒丹誠之難奪念名器之重非可以假人矜斗筲之微不令於踰量追寢前詔以示至公干犯宸慈期於得請第三表臣某言臣近者再陳尺奏願寢渥恩顒俟帝俞庶逃物議而綸言薦降天聴彌髙捧對周章魂守飛越臣某中謝竊以持衡之地非賢勿居必須契上𤣥之心然可委大鈞之任是以傅説帝賚之弼乃膺爰立之求吉甫嶽降之神式佐中興之運舉協民望伊尹所以格天用非時髦匈奴或至輕漢葢古今之所重垂方䇿以具存矧乃睿哲承祧百度思理宰衡當國四海式瞻詢謀所歸責任尤重況今水旱之後多流離轉徙之民金革未寧有倔强不臣之虜論兵帷幄首咨决勝之籌議政巖廊先務富人之術苟非通霸王之大略負匡濟之宏才何以増三光之明何以慰率土之望如臣者識靡詳於國體名不動於朝倫但懐孤直之心實昧經綸之業猥升鼎席式代天工伏櫪之姿諒難致逺挈缾之量誠合戒盈雖豁達大度之見容顧萋斐羣言之可畏受爵不讓恐貽載籍之嗤自知者明敢冐公朝之寵俯僂靡安於下懇再三須黷於至尊伏望尊號皇帝陛下念台宰之司禮秩甚峻當宵旰之際毗倚非輕察下臣量力之心寢外庭已行之命庶具瞻之地無媿於蒼生亦竊位之譏不玷於青史臣之愚慊罄盡於斯仰叩宸嚴必望俞允代中書密院待罪表臣某等言臣等聞無用之臣明君靡畜不才之木良匠所捐雖天地之心專務於匿瑕含垢而邦國之典所重於黜幽陟明既内省以不遑須上言而自劾臣某等中謝竊以鼎鉉之司是處弼諧之任樞機之地葢叅宥密之謀率土具瞻一人注意庶政並從於闗决當陽每示於諮詢自非藴經邦成務之才負尊主庇民之術運竒兵於堂上外鎮撫於四夷畫成算於幄中遠决勝於千里致穆清垂裳而無事蒸黎擊壤以不知乃可備元首之股肱始免玷公朝之名器如臣等性皆庸昧識本空踈曽乏寸長篾聞片善薦階通顯並出遭逢寵榮葢值於時來崇進非由於徳舉乗軒竊位深懐衛鶴之慙食肉無謀甘被魯人之誚一昨控弦入冦挿羽徴師萬旅戒嚴四鄙入保負扆臨軒而旰食列城摩壘以交鋒爟火延袤於兩河武帳便蕃於三接而臣等當前席之際既不能啓沃而矢謩逮羣居之時又不能僉同而建議徙薪取譬無智者先見之明借筯前籌乏愚夫一得之慮乃至鳴鏑漸侵於甸服翠華將議於時巡櫛沐之勞猶切愛君之志金革之事請嚴責帥之科尊號皇帝陛下運上聖之沉機排羣言之妄作獨建非常之斷用宣大定之功親御六師盡䕶諸將連甍徯后家若解於倒懸案節勞軍人盡同於挾纊果上𤣥之助順致驕子之乞盟遂繼好於交兵永輸誠而保塞玉帛通歡於絶域干戈載戢於中原實九廟之降靈開萬世之美利集兹巨伐並出宸襟若信諸臣幾誤大事乃至二城䧟沒比户驚騷多轉死於溝隍或不免於鋒鏑黄屋深在予之責丹詔形罪已之言搆厲階之若斯亦廟謨而安在臣等誠慙短拙共媿迂踈自知甚明豈敢昧於方寸不能者止況昭著於格言若冐寵於清朝且偷安於顯位其如螢爝之耀既無助於三光腹背之毛亦何資於六翮徒積素餐之謗更貽瞰室之殃伏望陛下推賞罰於至公示勸懲於來者責以彌縫之無狀暴其輔佐之非才誕告萬方申儆百執拘於司敗用正常刑然後𤣥徳升聞可召和平之氣彛倫攸叙更無僥倖之人克臻治定之期永固延鴻之祚豈但臣等幸甚實亦天下幸甚答詔勅某等省所上表待罪事具悉去歲獯戎犯塞河朔用兵自秋則邊壘戒嚴及冬則鐵騎深入羽書日至烽火相望洎朕乗革輅以親征召兵車而赴㑹俄通信使遂結歡盟葢圖四鄙之平寧以致兆民之安泰無爽懐柔之道且成息戰之功復念兩河之間屯軍斯久凋弊滋甚殺傷亦多是以班旋之初時下哀痛之詔姑務省已以表恤人而卿等左右朕躬周旋機務獻納皆能於無隠扈從俱謂於有勞況今異域纔通干戈雖戢吾民初復閭里未完誠宜各罄嘉謀共恢逺略思撫御於荒徼勤惠養於瘡痍副我任賢之心成爾致君之業何乃過為引咎同此上章然瀝懇以甚専在睠懐而方切況記功録善乃是予衷歸過責人殊非朕志勤矚之意所宜體之故兹詔示想宜知悉代中書密院謝降詔表臣某等言臣等昨以戎騎侵騷邊城震駭兵鋒日警煩車駕之省方羽衛天旋紆詔書而罪已葢帷幄前籌之無狀固氷淵内省之不遑共拜封章甘俟刑典忽承芝檢深諭絲言載推善下之仁曲恕已然之咎丁寧備至啓處無從臣某等中謝伏念臣等皆是瑣才濫塵貴仕參鼎司之調爕靡副民瞻預機務之彌綸莫熈帝載一昨控弦犯塞造膝論兵侍宸扆於穆清奉憂勤於旰􅉴備堯岳疇咨之列曽乏謨猷厠周臣同徳之倫空堅誠節乃至引弓深入挿羽交馳俯逼洪河頗驚近甸樽爼之畫媿千里之折衝霜露之行勞六龍而展義方式遏於亂略乃大庇於生民致款塞之乞盟將止戈而不用此葢尊號皇帝陛下契上𤣥之眷命考前代之令猷姑務遠圖昭示大信排盈庭之衆議克彰獨斷之明許絶域之通歡式啓太平之業並繄睿算集此殊庸臣等徒媿備員莫能補職當前席憂邊之際既無决勝之謀及登壇擇帥之初又闕指蹤之効固乏廟堂之遠略曷逃鄉校之深譏亦竊位以胡顔輙上言而請罪合議三章之法以慰諸夏之心而陛下體成湯之至仁尚兹引咎恢漢髙之大度曲示包荒頒紫詔以封泥霈鴻恩於踈網靡斥歸於散地特矜免於常刑戴𤣥造以難勝揣丹衷而失據溟渤之量雖表於納汙駑蹇之姿何能於致遠敢不共加䇿勵同切傾輸寸有所長庶伸於後効退思補過恭佩於前言用畢微生少酬洪覆臣等無任云云代三司劉密學謝表臣某言臣一昨以典掌邦計經度軍儲奉鑾輅以省巡憂職司之廢闕屬王師之振愷幸𤣥造以包荒雖未正於典刑亦不遑於官次輙陳封奏願解事權猥辱詔書靡俞誠請臣某中謝伏念臣早塵官牒莫振時名爰自先朝謬升通籍嘗出司於漕輓亦共治於方州無心計以可稱唯詔條之是守幸偶飛龍之慶復叅流馬之權紅粟轉輸曷致九年之蓄青蒲伏奏時親三接之顔尊號皇帝陛下過聴庸虚特加委任錦帳正名於郎署牙籌貳秩於省闈歲律未周天慈彌渥特改中樞之近職旋兼㑹計之劇司刄非可以投虛力豈任於負重夙夜匪懈雖不敢以告勞名器假人但深虞於致冦俄屬羽書狎至黄屋親征當萬乗之時巡有千金之日費急於星火繁若米鹽雖内罄於丹心終仰繄於洪覆免拘司敗保全之徳已深復涖厥官靦冐之顔斯厚遂瀝由衷之懇乞從解職之文而陛下靡懲尸禄之愆尚恕呌閽之僭特頒優詔俯及下臣示絲綸存恤之言慰芒刺兢憂之抱敢不恭膺聖訓益勵愚誠罄一心以事君更堅報効展四體以率職用補曠遺庶竭顓䝉少酬萬一臣無任云云代中書密院請舉樂第三表臣某等言臣等近以園寢即安已畢公除之制宗祧升祔克修吉祭之儀殆兹踰月之間尚闕在懸之奏遂共徴於典故輙再上於封章猥奉詔書未垂俞允天聴彌髙而是懼輿情若厲以不遑臣某等中謝竊以備樂之作與天地以同和變禮之文實古今之共守在漢即易月之後更無遏密之儀暨唐乃配廟已還便申宴享之樂沿襲於兹而為盛典訓繇是以具存伏況丙殿升遐已終於逺日閟宫合食既祔於神宗公私之間情禮俱畢而尊號皇帝陛下猶切永懐之痛靡遵順變之規至於九成治世之音八佾象功之舞皆所以導羣情於和樂昭盛徳之形容既以諧於人神且用調於律吕而乃寢停雅奏度越禮文雖明詔形未忍之言而厯代有酌中之制矧今雲門大吕將薦於圜丘湛露鈞天合施於廣宴省方巡狩亦陳詩而觀風臨軒㑹朝當作樂以侑食横汾展豫既伸簫鼓之娛破虜勤歸固有愷歌之盛國之大事實在於兹伏望陛下採羣臣之瞽言稽前朝之成式特詔執事申明舊章命協律而考雅音俾廣庭而陳法曲盡善盡美用還正始之風不愆不忘率由方䇿之訓豈獨臣等幸甚實亦天下幸甚謝允舉樂表臣某等言臣等近者累拜封章請陳雅奏伏奉批答特賜允俞臣某等中謝伏以尊號皇帝陛下執契承祧垂裳御宇考質文而稽古體慈儉以化人推翼翼之小心臨下以簡罄蒸蒸之大孝率禮無違爰自長樂登遐紫宸永慕易月之制早過於禫除復土之儀克終於園寢先逺之期已畢升祔之禮既行未陳韶濩之音頗鬱人神之望臣等竊尋方䇿實有典章輙扣髙明罔虞進越誠以鑾輅時巡而展義輿師景從以戒嚴旂常羽衛以森羅文物聲明而震耀鼓吹之作既有助於軍容旅愷之儀亦以獻其戎捷式宴用均於慈惠親民況採於聲詩儻金奏之克諧乃虎賁之増氣葢公朝之大事有厯代之成規是用傾肺腑以上言仰雲天而俟命覬九重之垂聴在三黷以寕辭忽窺明詔之文實慰羣臣之望豈惟酌中之訓允叶於前經固亦盡善之音式昭於盛徳歡抃之至踊躍彌深謝弟倚特賜進士第二等及第表臣某言臣親弟進士倚伏䝉聖慈特賜本科第二等及第者恩出公朝慶深寒族感激之至抃蹈無從臣某中謝伏念臣爰從㓜歲即喪所天無負郭之田園以供糊口有既孤之弟妹俱未成人世家漸墜於衣纓旦暮將淪於溝壑臣是以激昂志節博涉藝文割愛遊方出身事主自神宗之御極忝仙殿之讎書跡遊君子之林月賦上農之禄爰歸故里親奉安輿盡挈孤遺寓居輦轂臣弟適當㓜稚早失義方春誦夏弦再親加於教導羮藜含糗固均給於有無殆踰既冠之年輙齒命鄉之薦春官較藝幸預奏名日昊臨軒躬承明試方懼吹竽之濫敢希中鵠之榮尊號皇帝陛下簡在宸襟形於清問俯念司言之近列特推延賞之深仁擢自羣倫寘於科級仍載頒於睿㫖更超踐於等夷側聴徳音感深骨髓傳聞私室喜動庭闈顧同氣之至親荷自天之殊澤榮過始望事出非常内省微軀上銜厚施非土木之無識豈不知恩顧龜蛇之甚微猶能報徳誓匪躬而自効庶畢命以為期臣無任云云請舉樂第二表臣某等言臣等近者共援典故同拜封章願遵方䇿之文式舉咸韶之奏猥䝉答詔未允下誠搢紳之間啓處無措臣某等中謝竊以禮經制作之意家國異宜載籍沿襲之規古今共守葢前代立訓允叶於酌中故聖人抑情不忘於俯就簡編所紀軌範攸存恭惟尊號皇帝陛下濬哲在躬欽明撫運孝思光格徳教誕敷然而祗率典常疇咨故實是彛是憲不愆不忘伏況丙殿上􅋖雲陵復土公除已久吉祭屢行新榖既升爰載周於天吏閟宫有侐早昭配於神宗中外之間情禮俱畢而乃享宴之際金石未陳莫循舊章深鬱羣望矧惟大樂之作同和於二儀飫賜之恩示慈於百辟六代並舉乃盛徳之是觀三年不為亦雅音之將壊苟自圖於緘黙靡再黷於髙明廢稽古之大猷誠有位之深責伏望陛下俯遵輿誦啓迪前規特詔有司奉行故事聿舉在懸之樂誕揚治世之音崇徳象功光昭於鴻業來儀率舞延集於嘉祥俾人神之克諧致天地之交泰豈惟臣等幸甚實亦天下幸甚武夷新集巻十四
