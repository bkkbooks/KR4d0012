body:
  text: 武夷新集卷六宋楊億撰頌一首承天節頌并序臣聞聖人之生也必契千載之會昌膺三靈之眷命叶河洛之祕紀握天地之元符厯數有歸周秦所以欣合謳謡攸屬唐虞所以丕承蓋景運未融何以鍾於惟睿嘉祥不集何以顯於乃神故炎帝有薑水之徴軒轅有樞星之異少昊有流渚之應顓頊有襲月之感河清社鳴既彰于圖牒日角龍顔復著於儀表然後執璿璣以齊七政垂衣裳而臨萬方端居穆清之中獨運陶鈞之上荷天百祿純嘏之錫無窮比德九皇仁夀之期斯會者也恭惟五代之季實啓聖宋囊括席卷混一區宇三葉之盛實生哲后聰明文思對越穹壤涵育萬彚功成而不宰總制九有神行而無方四隅底寧百度大治羣公卿士望清光而惟勤搢紳諸生頌盛德之靡暇巍巍乎蕩蕩乎無得而名也惟玄冬之良月實祁寒之戒候乃初吉之翌日即載誕之休辰有司率循舊章請建佳號皇上奉若先志祗膺典禮于斯時也平在朔易神惟玄冥涼風生廣莫之郊大吕應伶倫之管氣栗烈以彌爽天泬寥而益髙初陽既躋就之者咸愛增冰方盛履之者不兢時令順而玉燭調嵗功成而寶厯永於是幅員之內提封之外越裳之國重九譯而來賔北方之疆款五原而納貢舟車之所不及風教之所未覃莫不梯險航深浮琛沒羽萬國麇至會禹於塗山諸侯駿奔朝漢之長樂是日也佳氣蔥蔚非煙郁紛微埃不興纎羅靡動殿枕龍首敞帝居于鈞天庭列虎賁森羽衛于鈎盾金奏在虡六代之樂畢陳素錦綢杠九斿之旗並建庭實旅百毳服成羣列于陛戟之前立于宫懸之右叔孫綿蕝備舉九賔之儀后夔簫韶將致百獸之舞既而羣臣踧踖以就列一人肅穆以當陽淵默雷聲溫潤玉色堯階三尺仰之彌髙舜目重瞳望之斯畏上公捧觴而獻夀太師升歌以詠功億萬斯年共祝南山之固殞越于下載沾玉斚之餘有位悉享于衢樽羣生永躋于夀域盛禮斯畢景福無疆下臣忝預周行親履文石從大夫之後陪未央之朝覩鐘鼓玉帛之云喜聲明文物之盛固知金泥石䃭將有云亭之期豈獨綬帶絲囊但舉開元之舊而巳哉若乃賦頌之作臣之職也昔者有駜泮林皆諸侯之事耳猶復列在詩什被于管弦如臣述大君之功德祝聖人之夀考文雖不足于志事乃有殊于古美芹之意雖可獻于君親擊壤之音豈能中于風雅惶恐稽首謹獻頌云惟民樹君惟天生聖實天之子惟民司命神靈在躬岐嶷成性載誕之辰生民之慶乃建佳節其惟承天惟天為大惟帝法焉惟帝合德罔有後先承之伊何終日乾乾帝謨廣被天瑞薦至乾符坤珍紛綸總萃玉帛駿奔飫食飲賜外薄四海敢有二事龜巢于蓮其葉田田蒙莊大椿春秋八千山聲響答河色漪漣如日之旦億萬斯年煌煌老人騰輝南極昭昭辰星垂象于北如松之茂如柏之直萬夀無疆自天永錫華封之祝屬于帝堯中和之頌升于漢朝王澤下濟德音孔昭為之聲詩無愧採樵記十一首處州麗水縣廳壁記麗水古括蒼縣唐大厯末避德宗諱并郡改焉地亘婺女之區俗蓋東甌之舊提封之廣袤僅十萬井生齒之富庶幾八千室自錢氏竊據之際頭會箕斂民不堪命及聖朝混一之後生聚教誨日不暇給縣署湫隘僅庇風雨逼下巳甚陋如之何前此宰邑者皆鞅掌王事沉迷簿領盤錯遊刃之不暇棟宇改作之未遑至道初天子以古者郎官出宰百里申命廷尉評甄侯旦以六百石秩來涖是邑侯孔門之逹者也吏道詳敏而飾以文學天資髙朗而輔以經術清白以率下明察以照姦獄訟滋彰必片言以折賦調倥偬皆先時而辦曽未期月縣政大成天子嘉之凡再降璽書進爵朝大夫總殿中六尚之職不改其任恐奪民賢君增秩以留用西漢故事侯既五月報政休聲著聞終日清談庶務自治從容暇豫周覽縣齋苫蓋不完梁木將壞慨然憤發經之營之度山取材懸金購匠因農務之隙集子來之徒運斤成風揮汗為雨皆曰吾儕小人猶有闔廬以避燥濕寒暑豈我賢宰君築室而不速成乎曽未浹旬層搆云畢恍若神化煥乎惟新凡樓以藏詔書廳以決政事樓之南敞重關可入方軌廳之北闢回廊僅容宴豆通而計之共十有一間麗譙渠渠治象之法在焉堂皇峩峩神明之化出焉侯陟降以之造次於是職修事舉體寧神王使虛室生白髙門容車後來之人坐享其利侯之規模信宏逺矣昔者一日必葺春秋稱叔孫之賢百堵皆作詩人著斯干之詠鄙夫不佞假守方州每行春棠郊攝齋偃室目是輪奐飽其風聲爰勒貞珉以志成事異日甄侯棄去下邑揚于王庭此邦之人誰無遺愛即陵遷邑改斯宇也比靈光而獨存石泐金銷斯文也與峴首以同致後之君子善似續之處州龍泉縣金沙塔院記金仙氏之教有自來矣天毒之國實紀于山經竺乾之師嘗聞於柱史西京名將得休屠天祭之人東漢諸王為蒲塞桑門之饌道之行也源逺乎哉三吳奧區控帶閩粵魚鹽所出生齒實繁昔仲雍之翦髮文身參以殊俗劉濞之即山煮海放于末遊加以勾踐之好兵民性獷悍益之東甌之事鬼土風妖訛自像法西來漸被諸夏此方士庶佞佛尤謹毁形變服競為苾芻之飾傾財破産爭修浮屠之舍貪福畏禍革音遷善水火或蹈徽纒罔懼而怵報應之説堅信向之心姦軌用衰民德歸厚易所云神道設教者其是之謂乎縉雲西鄙之邑曰龍泉實甌冶子淬劒之地土田膏腴居人雜錯山谷環合習俗豪舉版圖所載提封萬井舟楫僅通懸流千仭縣之南有精舍曰金沙林嶺襟束煙霞虧蔽地形四塞靡通鳥道石門中豁逈非人境香火不絶鐘唄相聞聿為道場多歷年所徒衆彌盛堂構益隆求之東隅蓋有隙地邑人李文進施財百萬造塔七層貨泉之費巳殫土木之功未畢桑門延通與其徒鴻顯暨大姓李仁祿共唱其事薄斂于人經斯營斯載朴載斫基扃環回而固護堂陛崛起以穹崇斬材也必取山木之良礱之以密石購匠也必擇雲梯之巧賞之以兼金極剞劂之工加丹雘之飾築室斯廣蓋百堵之有餘為臺甚高非三休而能詣鳥鼠攸去燕雀是依名翬軒而欲飛巨鼇兀以方抃由余謂之使鬼士茁疑其勝人殆嵗星之周天始祗園之訖役凡堂以陳賔主之次室以備宴息之所髙門洞啓回廊翼舒庖厨載嚴井樹攸設舉其成數凡四十間湧塔屹于中庭反宇聳于天半泛朝日以增麗蒙夕靄而如失作鎮兹壤垂厥方來且以嶽陽王感應舍利李長史華嚴合論匱而藏之目之曰華嚴寶塔舉其一而稱焉亦取夫百寶莊嚴之義也夫誠不果者物不應志不篤者事不集故霜隕燕地風擊齊臺誠之謂也精衛填海愚公移山志之謂也若通師者奮空拳創曽構秉心固必異石席之卷轉致功微漸同水索之鑽鋸于是名豪居士捐千金而不疑織婦販夫拔一毛而無惜聚財致用積日纍勞物力告窮形勢總萃非夫挺雞鳴不巳之操用蚍蜉時術之功磨涅靡渝顛沛于是固將九年治水厥功弗成一簣為山中道而止迹其所自夫豈偶然豫乃知夫西方之言有益于化大雄之教不虛其傳矧于海隅崇尚尤篤以通師之善誘以邑人之悅隨譬諸靈臺既克成于不日將比棠樹永見愛於斯民豈止軒丘之獨神孔堂之不壞而巳汝南周啓明者郡之造秀占數是邦致書於豫懇請為記聊敘始末以附諸地志焉處州郡齋凝霜閣記夫談仁義者必就間宴避炎酷者必登髙明故魯史述其三宫詩人詠夫百堵中堂湫隘婦姑由是勃豀大夏穹崇燕雀以之相賀若乃叔孫之葺墻屋陸抗之治廬舍去如始至後無以加賢者用心豈徒然耳兹郡唐季之亂王澤弗流大姓名豪竊據其地腹背受敵兵戈日尋假息朝晡遷保岩險迄今郡署冠西山之顛髙出千岑俯窺萬井徼道迂曲何翅乎七盤峰頂坦夷不過乎數畝廄庫之外參以吏舍向之平田占其半矣堂廡之制因而逼下亭榭之設率以乘危每溫風勃興畏景流爍如臨熾炭若遊沸鼎冰壺屢挹內熱靡蠲羽扇迭揮流汗相屬俄頃之際燋爛可期蓋由夫改築之初面勢素定因重岡之回抱且四垂之斗絶堂塗迫窄不開南榮棟宇轇轕無有北户故鬱蒸之戒候必薰灼之是憂自國朝已來領郡者僅以十數率困簿領未暇經營及余之涖是邦也承數賢之餘庶務修舉曹無巧詆之吏下無失職之民清心處之期月而治適離暵熱殆將委頓因創飛閣于東北隅運甓纍土以成基斬木陶瓦而備用僅及旬浹層構巋然軒窗洞開景象輻輳峰巒掩映雜火雲之嵳峩溝塍糾紛漲時雨以澎濞閭閻森以相錯竹樹翠而成帷百里雖逈不隱於秋毫萬象實繁如在于指掌固可胸中蕩於鄙吝眸子極于泬寥披襟以當雄風岸幘以度永晝慿髙望逺式動能賦之心置酒娛賔便為逃暑之飲夫如是乃體寧慮淡心和氣平莊室彌虛神明所以來舍孔堂不壞絲竹期乎有聞豈但逶迤退食之餘從容案吏而巳閣既成命之曰凝霜將使來者無執熱之煩登者有解愠之適亦猶抱朴子所謂玄冰丸飛雪散用以卻暑兼取夫相勝之義云南康軍建昌縣義居洪氏雷塘書院記三代以還鄉黨皆有庠孰兩漢而下公卿多自教授及五胡猾夏一馬渡江楊粵之區衣冠舉集士風文物雄視中原蓋劒客竒材昔稱荆楚之士寬柔以教今見南方之強用是出相不下于山東明經僅多于鄹魯街談俚語必及詩書總角辨髦即逰學校由學而禮讓著由讓而孝義敦班白相推于道途耆艾靡逰於市井耕者異畔賈不求豐亦猶夫洙泗之濵齗齗如也南康洪氏傑出其間以耕鑿之勤厚致資産以孝悌之德大庇族人奕世聚居期功踰于百口至行內激風聲樹于一方州閭之內人無間言閨門之中衣無常主漸漬玄澤陶甄至和彬彬然有萬石孝謹之風熙熙然躋華胥仁夀之域且於所居之側崇飾學舍一日必葺賔至如歸厨廪益豐弦誦不輟褒衣博帶豈減闕里之徒竹簡韋編將敵祕書之副子弟之秀者咸肄業于兹田蘇與遊曽晳同志列第侔于稷下鼓篋比于虞庠韋賢之一經相傳劉氏之七葉俱盛豈止遊談之矜式羇旅之疇依設驛馬于四郊來逺客于千里而巳至道中天子遣美俗使者按行郡國且以御書百軸下賜其家家老文撫以隱居求志肥遁不仕即遣其弟文舉入謝天闕特賜清間之宴召對赤墀之下勞問數四歎息久之解褐授官以示光寵天子又自署一幅曰義居人以賜之閲閎增氣閭巷改觀雖古之里稱通德族號高陽家有賜書門標六闕者曽未足擬也矧處士君耕于巖石名動京師身在江湖心懸象魏每嵗遣其子弟陳土貢于宰旅上必蕃錫以答其意野芹之獻蓋以薦誠園葵之心特蒙委照自渥恩下及精廬彌肅寶玉在笥芝蘭盈庭去年處士之兄子待用舉進士得乙科同時儕流登是選者以十數初覆一簣蓋由椎輪後來之人貫魚而進以錫羡流光之慶加討論博習之資圭組相輝將珥貂於七葉生徒益盛必著録者萬人然後臻夫極也學館之南有雷塘焉因以為名且志其地先是尋陽陳氏有東佳學堂豫章胡氏有華林書院皆聚墳索以延俊髦咸有名流為之紀述講道論義况力敵以勢均好事樂賢復爭馳而並騖冝乎與二家者鼎峙于江東矣今年助教來齎處士書謁豫願志其事且嘉其服道淳固樹善深篤謹守家法勤接士類髙門積德巳容駟馬之車上帝藏書更同羣玉之府景慕不足牢讓非冝僶俯成文聊以塞請而巳致政李殿丞豫章東湖所居涵虛閣記涵虛閣者致政李公考槃之所也李公挺生民之秀負王佐之才決科廣庭文雅第一從政劇邑吏人不欺以太夫人在喜懼之年有羸老之疾拜書北闕求養南陔天子嘉之恩禮尤異既蘭臺之進秩仍水衡而分俸用致官政歸侍庭闈始卜居厯陽載離寒暑會公之令子今西臺御史以尚書郎通守洪井叔孫必葺豈復懷安元方將車因以東上今年御史秩滿歸闕公且致書于豫曰􅙕東西南北之人也前年來江西登臨山水覽觀風物戀戀而不能去且欲占數為是邦之民買田一廛築室百堵編名户版輸稅公上陶陶然與漢隂丈人携手于羲皇之世矣兹郡之勝實惟東湖今之所居介于湖上却視闤闠前瞻渺瀰棟宇轇轕而世喧自分魚鳥聱取而物態咸見澄波萬頃韜映雲天崇期八逹絡繹冠蓋此亦古人大隱之迹不出市朝儒者一畞之宫僅庇風雨者也且念嘉賔至止必宴豆以伸歡諸生來思乃函文而請益捧觴拜慶既以奉北堂之縱心岸幘燕居亦欲倚南窗而寄傲裁擇爽塏纍土增崇俯瞰漣漪靣勢素定市山木以朴斫命梓匠以經營作為堂皇成之不日形勝盡萃軒簷若飛春之晨雜芳被隄緑波如染可以臨清流而賦詩夏之晝涼颸拂祍炎雲成峰可以登髙明而逃暑潦收水清羣木搖落可以詠秋氣於楚詞嵗暮天寒密雪飛舞可以歌南山于周雅固足以檻心猿而習靜狎海鷗以忘機宴坐觀空入毗耶之不二谷神反聽味玄元之五千豈徒晨昏調膳之餘雍容肆體而巳東臺舍人董公昔典是邦或退食之餘必命駕以至留連觴酌從容笑語憑軒曠望目送飛鴻秉燭徘徊門留駟馬賞心不足好樂無荒實由斯閣之成能迥長者之轍若夫天宇岑寂湖光皎鑑俯見雲鳥毫末靡遁其形旁連邑居囂譁不接于耳逰氛宿霧寥廓洞開逺水長空混茫為一髣佛其梗槩目之曰涵虛優哉遊哉聊以卒嵗願志其事式為美談豫與公有同郡之情有忘年之契親比耆德欽聞緒言是用景行髙山講求方䇿若虛白之室莊周得之逍遙通德之門司農推之鴻博集文選于南荆者層樓尚在草太玄于西蜀者髙臺未傾吳興有韻海之堂秣陵有烏衣之舍載之圖牒芬若椒蘭今李公地望門風仙姿道骨清白義方之訓子文儒經術之傳家踈廣之揮金老萊之曵綵藴是全德無忝先民而在家必聞作事可法巋然兹宇揭于通都聲實飛騰遊居企慕締搆得地風烈在人豫固知夫異日與滕閣孺亭鼎峙于鍾陵為不朽矣承命之辱敘事靡周聊述所聞以抵來請云耳連州開元寺重修三門行廊記夫南荆之分上當翼軫實領于天官長沙之壤析為連山具載乎地志桂水千里詩什之所徴乳穴十九方物之攸産民俗忠厚土田膏沃力穡務本不啙窳以偷生復性遷善多齋戒以奉佛憂深思逺雅有離騷之風徼福乞靈靡事淫昏之鬼殆一變而志道何必齊魯豈九州之異宜見殊楚越者巳開元寺者兹郡之招提也俯臨康莊介于闤闠崇墉嶽峙飛觀神行像素載嚴焚修彌潔允為精舍居然化城而苾芻之徒頗有開士香積之供多出都人梵唄相續于六時依止克安于四衆然締搆之始爰自唐朝厥初窮朴斫之工殫匠石之巧百堵皆作殆土木之勝人大夏聿成幾燕雀之相賀嵗祀寖逺繕完或虧髙門洞呀瓦斯解而屋漏回廊矢棘棟既折而榱崩河南丘君頴適典是邦布政多暇行春之隙稅駕于兹顧慕徘徊精誠奮發乃欲易其隤陊髙其閈閎遂得常住之餘訾且募邑人之獻力經始勿亟庶民子來出言有章同聲響應繇是備物而致用即舊以謀新梓人揮蠅翼而無傷役夫如魚鱗之雜集修簷重負狀名翬之斯飛淨土增嚴見黃金之側布庀徒未幾厥功告成前敞三扉下臨萬井東西二廡爰畢于塈塗崇期八逹亦甃以甎甓丹楣銅沓可以方軌並入砥平繩界可以結駟而馳足以攝族姓之歸依標郡城之壯麗又何必淨名丈室紛委四華帝釋天宫莊嚴七寶而巳烏臺御史邵君曅實生樂國夙奉仁祠由委質策名乃離邦去里致恭於桑梓邁德于親鄰而清識造微懿文稽古故兹郡牧宰彼方人凡作事謀始必命介咨諏底績僝功即置郵赴告豫與君接武臺閣交歡旦暮且述紺園之役見徴翠琰之文垂示將來用圖不朽靡及勞讓聊此直書云耳故河中府開元寺壇長賜紫僧重宣塔記師姓趙氏中條虞鄉人也由河沙劫來殖衆德本未斷後有復生人中積習聞薰童幼頴異宿機冥契割愛捨家十五禮文徹師為沙彌二十一依澄暉師受具戒亦既持乞士鉢披水田衣深念善財遍參知識尤慕慶喜具足多聞振錫逰方刳心求法其始以比丘持律才許五年諸佛度生是為初教且從本師受四分律又以如來出世蓋一事之因緣衆生無邉有萬殊之根器爰自降神兜率示滅鶴林宣説十二部經震動大千世界其間具偏圓半滿之義開權實頓漸之門雖文字性空語言相離然而標指見月乃理事之兼通得魚忘筌始覺照之都泯師是以從歸一和尚傳無量夀經依行滿法師闡因明論盡逹宗旨咸有師承終身受持為人演説蓋四句之偈福利居多一音所宣悟解斯衆又復專持首楞祕密之呪遍閲毗盧方廣之文八郡歸依天宫辦香積之供四衆圍繞空界雨曼殊之花凡讀大藏經一萬餘通誦佛頂真言三十萬過鎬京蒲坂實有化緣前後登甘露法壇宣尸羅淨戒得度者僅千餘人破塵出經多蒙利益傳燈分照豈有窮盡馬祖門下皆一時之利根龍華會中實當來之眷屬人天主伴夫豈偶然秋官二卿上谷冦公早在先朝參預大政重師之行薦于帝庭詔賜紫方袍以旌其德處六和之衆而天子知名介三法之微而王臣外護非藴空漏盡神足智圎為彼岸之舟航作釋天之日月者疇能致是哉師以咸平四年四月庚戌示身有疾殆至彌留盡召其徒授之治命薪盡火滅神往形留相好儼然道俗傾慕報齡七十有九僧臘五十有八甲子奉全身闍維于南郭之外得舍利三十餘粒以其年某月某日遷靈骨于其原建浮圖焉上足弟子賜紫令操入室推賢傳衣善繼思欲奉揚遺懿昭示將來戾止上都以塔記為請豫素服能仁之教尤欽開士之風且與上谷公道契無生心專趣大樂天綺語固願贊于佛乘執戟蟲文豈能宣于真諦聊托梗槩幸免枝遊云耳婺州開元寺新建大藏經樓記昔如來登菩提坐為天人師萬德莊嚴十號具足大千世界以願力而攝受十二部經自悲心而流出所以宣暢了義提拯羣迷開方便門示真實相有條不紊譬以線而貫花得象忘言如標指之見月自鶴林示滅大教方行而龍宫祕藏所傳無幾爰暨像法之運乃流震旦之區大士繼生廣譯五天之語精廬錯峙並緘三藏之文于是大雄之法音雷震于兹土矣勾吳之域介于海隅東陽之墟上直婺女蒙泰伯至德之化俗敦亷讓之風漸初平好道之餘人稟清真之氣有恥且格見善乃遷邑居相望悉奉竺乾之教弦誦之隙必閲貝多之言繇是棄塵勞而為苾芻者實繁有徒闢淨土而崇塔廟者比比而是開元寺者兹郡之大招提也前臨九逵旁接萬井金碧絢彩上擬天宫鐘梵交音居然福地土木壯且麗矣嵗祀寖以逺矣龍象六和之衆禪律交修香燈四事之供檀施總萃而琅函實偈有所缺然乃有本寺僧文靖與本州都知兵馬使曹維旭同發志誠共營勝利爰以淳化中相率詣闕擊登聞鼓求方借版摹印真文奏牘上聞帝俞其請逮至道初維旭等始共輦置楮墨之直聿來京都詔免關市之征授以要劵繕造既畢護持而歸特給上計之回舟俾逹金華之本郡維旭等又相與刻軸以文木織絛以色絲香藝染籖丹漆塗匣崇飾既以偹矣誓願既已圎矣而經臺舊基圯毁滋久軒廡摧撓墁繪踳駮維旭等遂請於郡閣躬詣屬城遍募有情共成衆善鳩工度費即舊謀新建重樓開法藏其上級置廬舍那文殊普賢及十六大阿羅漢之像中級設虎座作八神王箕踞捧持其下象七金山法四大海寶地平布祥雲周繞締搆彤鏤殫匠石之精能像設焚修見天龍之護衛固使黑白之衆有所歸依利鈍之根因而啓發皮紙骨茟學道者靡涉于艱辛寶藏金言開卷者並諧於悟入廣大利益豈勝言哉維旭又嘗于雍熙中募衆緣纍甓為浮圖凡七級直經樓之南十數步訖役之日白光燭天晴空泬寥久之始滅行路瞻覩道俗嗟歎斯亦樹善之冥感殖福之昭報也豫咸平中罷守縉雲道出兹郡維旭者捧持事狀拜于道周求得片文以刻貞石會豫入掌書命不遑官次而勤請彌篤踐言是兾豫固從事于空宗者也隨喜稱讚豈有吝焉削簡含毫兹用無愧云耳時景德二年嵗次乙巳十二月朔日記潞州新勑賜承天禪院記景德元年冬天子巡狩澶淵駐蹕河上始議和戎之利慎柬使乎之才乃詔西京左藏庫使奬州刺史隴西李公繼昌奉將信幣克成盟好復命行在不逾浹旬奏事宸居沃心稱旨時黃屋值流虹之慶帷宫舉稱觴之典執玉萬國塗山無後至之刑舞羽兩階靈臺有偃兵之議純嘏之錫上帝是賚富夀之祝率土攸同公因頓首上言以上黨舊邦卜居纍世有環堵之室乃先人之廬而自參表著于內朝占名數于京邑喬木猶在髙臺未傾願為仁祠以施開士增飾輪奐肅奉焚修庶以衆善之因仰助無疆之算上覽奏嘉歎即命俞之申錫璽書旌以懿號曰承天禪院從其志也夫箕裘善繼前典攸稱桑梓致恭先民所重雖知樂之至不忘所生而似續之賢由于肯搆矧壺關之壤上應昴畢羊頭之厄北當燕趙國俗尚武人氣多豪控山東列郡之衝乃天下徑兵之處悲歌慷慨寖以成風土厚水深居之不疾而公之先正兹焉挺生藴翁歸文武之才茂荀息忠貞之力始仕周室殆于皇朝功濟生民道合明主厯計相之劇任處宣猷之上列乃至正位機密允輔大政當太祖皇帝夙興夜寐經營四方料敵伐謀指蹤千里前席借筯允集大勳持建莭牙出臨巨屏功成身退髙朗令終惟公經德體仁象賢濟美職在清禁爵為通侯門戟鼎銘昭閥閲之盛朱轓佩玉顯車服之貴誓師邊徼威肅巴賨作牧藩垣政成海岱單介使虜通玉帛之歡三接承顔居心膂之任萬乘親倚羣公傾慕蓋所謂人倫之佳士帝右之信臣者也先是公之載誕亦在舊居指樹尚存藏鐶可驗嘗蒸奉祠履霜露而長懷井臼思歸顧枌榆而永感然而髙扉納駟奕葉珥貂爽塏不遷親鄰素擇褒成徙籍蓋出主恩楊僕移關敢罹特議且深信內典勤修白業念旻天之罔極報德無階繄覺海之大雄歸心有素恭承明詔肇開淨土棟宇之制侔七寶之莊嚴苾芻之徒極四事之供養匠石殫巧天龍薦祥金碧炫彩于晨曦鐘梵交音於空界問安之寢聿為道場學禮之庭更張法席足以滋殖德本發揮善利香象負重廣集彌天之流水鳥談空更同極樂之國福祉之盛豈可量哉昔者南朝諸公多施宅而為寺西域長者競捨財以供僧簡策相傳風流未逺貝多所記報應非虛訂公之為斯一致耳曩者太尉先生居顯位受厚祿寵錫蕃庶私帑充牣奉身甚約事佛尤謹生平飯僧七十萬造千佛像修紺殿以嚴寶剎飾琅函以祕金文又以方牘摹印金剛上生等經施于四衆山門禪苑多所繕完什器道具率用營置深逹實相不滯根塵盡此報身當得解脫君子謂李公詒謀錫羡源深流長福履所綏凡情叵測何止積善餘慶啓八世之莫京定須當來下生首三會而受記父作子述不其韙與豫職在右曹心師西竺辱公之請至于再三僶俯揮毫以謹嵗月而已時景德二年嵗次乙已四月八日記建安郡齋三亭記夫好尚非一仁智有山水之殊居處異宜髙廣致隂陽之沴故書稱肯搆詩詠斯干列國之禮賢渠渠夏屋先聖之談道申申燕居矧乃專城按部之崇觀風布政之隙經始不日無土木勝人之譏退食自公有宴飲合歡之所斯固君子之作事良牧之用心者巳建安大邦保界閩粵綿地八百里生齒十萬室賦興維錯民俗豪舉國朝肇建戎閫必作鎮以壯王乃眷縣道亦精擇于健令即良二千石之寄從可知矣渤海髙君由曲臺綿蕝之任領兹郡山澤之征就降璽書委之符竹而君正身以律下清心而治煩釋其磐牙陳之藝極訟既息矣徽纒棄置於圜扉化之行焉弦誦流聞于鄉校豪猾屏氣逋亡悉歸頥指而諸曹承風坐嘯而一郡無事君且念居室先後之訓著于禮經臺榭髙明之説存諸時令蓬壺溟渤形詩人之歌詠觀閣池沼播名卿之序引于是周爰公舍眷求遺址方塘白水皎鑒澄明虛榭危簷摧頺圯毁即命匠石授以楷模曽未旬時汔終力役審曲面勢疏為三亭反宇飛甍瞰兹一水俯北岸曰勤公仍其舊也其西曰旭景其南曰澄鮮皆繚以修廊狀翬飛之制巍然層搆侔鼇負之雄池之東纍土積石為千巖萬壑之態亭之南築堋設次習六鈞七札之事每棠郊聽訟有憩茇之勤鈴閣思政乘鞅掌之暇獄既決矣隱悼伏念以無寃吏且休矣棲遲偃仰而多適君必巾褠自便屣履以登送目泬寥養浩然之氣披襟軒檻當快哉之風固已遣仲舉之鄙吝生蒙莊之虛白至若輶軒一介有于役之勞盛府初筵有從事之樂郊勞餞飲之外爰洽于宴私羽書幕畫之餘率多于暇豫君必殽核維旅履舄交錯裁雕章于寸燭豆泣釡中奏妙曲於繁絃魚躍波際固巳展春秋地主之禮盡賔客杯酒之歡其餘即詠歎發于如仁尸祝宗乎全德去如始至嘉叔孫之能賢巋然獨存期靈光而為比經搆之旨豈徒然哉某占數樂郊名參户版濫官近署迹繫君門少遊下澤之車空深懷土正平爵里之刺不獲望塵恭佩髙風欽聞新政而况圗繪勝槩覼縷尺題金玉其音日月以冀幸叨史氏之職願紀輿人之誦才少思軋亦不敢辭進牘含毫用謹嵗月而巳時景德三年嵗次丙午八月一日記邠州靈應公廟記奉勑撰夫有天下者遍祭于百神載祀典者非止于一族故成周之盛咸秩無文春秋所記並走羣望秦并六國祠官之領實繁漢繼三代有司之傳彌廣是知出雲見怪不必主于山川捍患禦災固悉存于尸祝牲玉有等廟貌斯嚴齋肅吉蠲薦之以馨德聰明正直降之以嘉生然後百工允釐納民于軌物三時不害躋俗于仁夀兹盛德之事也非聖人孰能隆之哉咸秦之區上直鶉首山河四塞幅貟千里雍州爽塏泰畤神明之隩豳土深厚公劉王業所基列地百城提封萬井崇墉濬洫制擬通都北户連甍俗成樂國有神保順公者斯土之靈祗也幽贊無方休徴叵測血食制位巧厯不記其年公衮錫封良史頗逸其事嵗月增逝修奉彌勤神光燭壇野雉皆雊回風翼駕青虬載翔誠既感而必通靈雖久而靡歇郡或致禱爰昭報而格思民苟不虔乃憑怒而伸警繇是愛之若邵伯之樹畏之如共工之臺天或降災克銷愆伏之咎人斯搆厲能弭扎瘥之殃百祥荐臻一境是賴蓋社稷均享同崴􅕲之宗亢倉歌舞致誠比沅湘之祠太一神道設教是之謂乎而必葺以來為日斯久繚垣有復隍之懼崇搆幾棟橈之凶守臣上言俞旨遄降經始以度費因時而僝工取大壯之新規賁集靈之舊址成之不日升聞于天特賜號曰靈應公昭神貺也且有明命屬于下臣聿徴鄙詞以志休烈恭惟馭神以祀者邦國之大事為民祈福者天子之深意有虞望秩璿衡齊政而靡愆姬文懷柔寶龜卜載而彌永祚德儲祉豈誣也哉謹述謏聞慙于漏略時景德三年月日記武夷新集卷六
