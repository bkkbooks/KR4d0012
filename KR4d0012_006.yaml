body:
  text: 武夷新集巻六宋楊億撰頌一首承天節頌并序臣聞聖人之生也必契千載之㑹昌膺三靈之眷命叶河洛之祕紀握天地之元符厯數有歸周秦所以訢合謳謡攸属唐虞所以丕承葢景運未融何以鍾於惟睿嘉祥不集何以顯於乃神故炎帝有姜水之徴軒轅有樞星之異少昊有流渚之應顓頊有襲月之感河清社鳴既彰扵圖牒日角龍顔復著於儀表然後執璿璣以齊七政垂衣裳而臨萬方端居穆清之中獨運陶鈞之上荷天百禄純嘏之錫無窮比德九皇仁夀之期斯㑹者也恭惟五代之季實啓聖宋囊括席巻混一區宇三葉之盛實生哲后聰明文思對越穹壌涵育萬彚功成而不宰總制九有神行而無方四隅底寧百度大治羣公卿士望清光而惟勤搢紳諸生頌盛德之靡暇巍巍乎蕩蕩乎無得而名也惟𤣥冬之良月實祁寒之戒候乃初吉之翌日即載誕之休辰有司率循舊章請建佳號皇上奉若先志祗膺典禮于斯時也平在朔易神惟𤣥𠖇凉風生廣莫之郊大吕應伶倫之管氣栗烈以彌爽天泬寥而益髙初陽既躋就之者咸愛増冰方盛履之者不兢時令順而玉燭調嵗功成而寳厯永於是幅員之内提封之外越裳之國重九譯而来賔北方之疆款五原而納貢舟車之所不及風教之所未覃莫不梯險航深浮琛沒羽萬國麇至㑹禹於塗山諸侯駿奔朝漢之長樂是日也佳氣䓗蔚非烟郁紛微埃不興纎羅靡動殿枕龍首敞帝居扵鈞天庭列虎賁森羽衛扵鈎盾金奏在虡六代之樂畢陳素錦綢杠九斿之旂並建庭實旅百毳服成羣列扵陛㦸之前立扵宫懸之右叔孫綿蕝備舉九賔之儀后䕫簫韶将致百獸之舞既而羣臣踧踖以就列一人肅穆以當陽淵黙雷聲温潤玉色堯階三尺仰之彌髙舜目重瞳望之斯畏上公捧觴而獻夀太師升歌以詠功億萬斯年共祝南山之固殞越于下載沾玉斚之餘有位悉享扵衢樽羣生永躋扵夀域盛禮斯畢景福無疆下臣忝預周行親履文石從大夫之後陪未央之朝覩鐘鼓玉帛之云喜聲明文物之盛固知金泥石䃭将有云亭之期豈獨綬帶絲囊但舉開元之舊而巳哉若乃賦頌之作臣之職也昔者有駜泮林皆諸侯之事耳猶復列在詩什被扵筦弦如臣述大君之功德祝聖人之夀考文雖不足扵志事乃有殊扵古美芹之意雖可獻扵君親擊壤之音豈能中扵風雅惶恐稽首謹獻頌云惟民樹君惟天生聖實天之子惟民司命神靈在躬岐嶷成性載誕之辰生民之慶乃建佳節其惟承天惟天為大惟帝法焉惟帝合德罔有後先承之伊何終日乾乾帝謨廣被天瑞薦至乾符坤珍紛綸總萃玉帛駿奔飫食飲賜外薄四海敢有貳事龜巢于蓮其葉田田蒙莊大椿春秋八千山聲響答河色漪漣如日之旦億萬斯年煌煌老人騰輝南極昭昭辰星垂象于北如松之茂如柏之直萬夀無疆自天永錫華封之祝属于帝堯中和之頌升于漢朝王澤下濟德音孔昭為之聲詩無愧採樵記十一首處州麗水縣㕔壁記麗水古括蒼縣唐大厯末避德宗諱并郡改焉地亘婺女之區俗葢東甌之舊提封之廣袤僅十萬井生齒之富庶幾八千室自錢氏竊據之際頭㑹箕歛民不堪命及聖朝混一之後生聚教誨日不暇給縣署湫隘僅庇風雨偪下巳甚陋如之何前此宰邑者皆鞅掌王事沉迷簿領盤錯游刃之不暇棟宇改作之未遑至道初天子以古者郎官出宰百里申命廷尉評甄侯旦以六百石秩来涖是邑侯孔門之逹者也吏道詳敏而飾以文學天資髙朗而輔以經術清白以率下明察以照奸獄訟滋彰必片言以折賦調倥偬皆先時而辦曽未朞月縣政大成天子嘉之凡再降璽書進爵朝大夫總殿中六尚之職不改其任恐奪民賢君増秩以留用西漢故事侯既五月報政休聲著聞終日清談庶務自治從容暇豫周覽縣齋苫葢不完梁木将壊慨然憤發經之營之度山取材懸金購匠因農務之隙集子来之徒運斤成風揮汗為雨皆曰吾儕小人猶有闔廬以避燥濕寒暑豈我賢宰君築室而不速成乎曽未浹旬層搆云畢怳若神化煥乎惟新凡樓以藏詔書㕔以决政事樓之南敞重闗可入方軌㕔之北闢囬廊僅容宴豆通而計之共十有一間麗譙渠渠治象之法在焉堂皇峩峩神明之化出焉侯陟降以之造次於是職修事舉體寕神王使虚室生白髙門容車後来之人坐享其利侯之規模信宏逺矣昔者一日必葺春秋稱叔孫之賢百堵皆作詩人著斯干之詠鄙夫不佞假守方州毎行春棠郊攝齋偃室目是輪奐飽其風聲爰勒貞珉以志成事異日甄侯棄去下邑揚于王庭此邦之人誰無遺愛即陵遷邑改斯宇也比靈光而獨存石泐金銷斯文也與峴首以同致後之君子善似續之處州龍泉縣金沙塔院記金仙氏之教有自来矣天毒之國實紀于山經竺乾之師嘗聞於柱史西京名将得休屠天祭之人東漢諸王為蒲塞桑門之饌道之行也源逺乎哉三呉奥區控帶閩粤魚鹽所出生齒實繁昔仲雍之翦髪文身參以殊俗劉濞之即山煮海放扵末游加以勾踐之好兵民性獷悍益之東甌之事鬼土風妖訛自像法西来漸被諸夏此方士庻佞佛尤謹毁形變服競為苾蒭之飾傾財破産争修浮屠之舎貪福畏禍革音遷善水火或蹈徽纒罔懼而怵報應之説堅信向之心姦軌用衰民德歸厚易所云神道設教者其是之謂乎縉雲西鄙之邑曰龍泉實甌冶子淬劒之地土田膏腴居人雜錯山谷環合習俗豪舉版圖所載提封萬井舟檝僅通懸流千仭縣之南有精舎曰金沙林嶺襟束烟霞虧蔽地形四塞靡通鳥道石門中豁逈非人境香火不絶鐘唄相聞聿為道場多歴年所徒衆彌盛堂構益隆求之東隅葢有隙地邑人李文進施財百萬造塔七層貨泉之費巳殫土木之功未畢桑門延通與其徒鴻顯暨大姓李仁禄共唱其事薄歛扵人經斯營斯載樸載斵基扃環囬而固護堂陛崛起以穹崇斬材也必取山木之良礱之以宻石購匠也必擇雲梯之巧賞之以兼金極剞劂之工加丹雘之飾築室斯廣葢百堵之有餘為臺甚高非三休而能詣鳥䑕攸去燕雀是依名翬軒而欲飛巨鼇兀以方抃由余謂之使鬼士茁疑其勝人殆嵗星之周天始祗園之訖役凡堂以陳賔主之次室以備宴息之所髙門洞啓囬廊翼舒庖厨載嚴井樹攸設舉其成數凡四十間湧塔屹扵中庭反宇聳扵天半泛朝日以増麗䝉夕靄而如失作鎮兹壤垂厥方来且以岳陽王感應舎利李長史華嚴合論匱而藏之目之曰華嚴寳塔舉其一而稱焉亦取夫百寳荘嚴之義也夫誠不果者物不應志不篤者事不集故霜隕燕地風擊齊臺誠之謂也精衞填海愚公移山志之謂也若通師者奮空拳創曽構秉心固必異石席之巻轉致功微漸同水索之鑽鋸扵是名豪居士捐千金而不疑織婦販夫㧞一毛而無惜聚財致用積日累勞物力告窮形勢總萃非夫挺雞鳴不巳之操用蚍蜉時術之功磨湼靡渝顛沛扵是固将九年治水厥功弗成一簣為山中道而止迹其所自夫豈偶然予乃知夫西方之言有益扵化大雄之教不虚其傳矧扵海隅崇尚尤篤以通師之善誘以邑人之悦隨譬諸靈䑓既克成扵不日将比棠樹永見愛於斯民豈止軒丘之獨神孔堂之不壊而巳汝南周啓明者郡之造秀占數是邦致書於予懇請為記聊叙始末以附諸地志焉處州郡齋凝霜閣記夫談仁義者必就閒宴避炎酷者必登髙明故魯史述其三宫詩人詠夫百堵中堂湫隘婦姑由是勃豀大夏穹崇燕雀以之相賀若乃叔孫之葺墻屋陸抗之治廬舎去如始至後無以加賢者用心豈徒然耳兹郡唐季之亂王澤弗流大姓名豪竊據其地腹背受敵兵戈日尋假息朝晡遷保岩險迄今郡署冠西山之顛髙出千岑俯窺萬井徼道迂曲何翅乎七盤峰頂坦夷不過乎數畝廐庫之外參以吏舎向之平田占其半矣堂廡之制因而偪下亭榭之設率以乗危毎温風勃興畏景流爍如臨熾炭若游沸鼎冰壺屡挹内熱靡蠲羽扇迭揮流汗相属俄頃之際燋爛可期葢由夫改築之初面勢素定因重崗之迴抱且四垂之斗絶堂塗迫窄不開南榮棟宇轇轕無有北户故鬱蒸之戒候必薫灼之是憂自國朝已来領郡者僅以十數率困簿領未暇經營及余之涖是邦也承數賢之餘庶務修舉曹無巧詆之吏下無失職之民清心處之朞月而治適離暵熱殆将委頓因創飛閣于東北隅運甓纍土以成基斬木陶瓦而備用僅及旬浹層構巋然軒牕洞開景象輻輳峰巒揜映雜火雲之嵳峩溝塍糺紛漲時雨以澎濞閭閻森以相錯竹樹翠而成帷百里雖逈不隠於秋毫萬象實繁如在扵指掌固可胸中蕩於鄙恡眸子極扵泬寥披襟以當雄風岸幘以度永晝慿髙望逺式動能賦之心置酒娯賔便為逃暑之飲夫如是乃體寧慮澹心和氣平莊室彌虚神明所以来舎孔堂不壊絲竹期乎有聞豈但逶迤退食之餘從容案吏而巳閣既成命之曰凝霜将使来者無執熱之煩登者有解愠之適亦猶抱朴子所謂𤣥冰丸飛雪散用以卻暑兼取夫相勝之義云南康軍建昌縣義居洪氏雷塘書院記三代以還鄉黨皆有庠塾兩漢而下公卿多自教授及五胡猾夏一馬渡江楊粤之區衣冠舉集士風文物雄視中原葢劒客竒材昔稱荆楚之士寛柔以教今見南方之强用是出相不下扵山東明經僅多扵鄹魯街談俚語必及詩書總角弁髦即逰學校由學而禮讓著由讓而孝義敦班白相推扵道途耆艾靡逰於市井耕者異畔賈不求豐亦猶夫洙泗之濵齗齗如也南康洪氏傑出其間以耕鑿之勤厚致資産以孝悌之德大庇族人奕世聚居朞功踰扵百口至行内激風聲樹扵一方州閭之内人無間言閨門之中衣無常主漸漬𤣥澤陶甄至和彬彬然有萬石孝謹之風熙熙然躋華胥仁夀之域且於所居之側崇飾學舎一日必葺賔至如歸厨廪益豐弦誦不輟襃衣博帶豈减闕里之徒竹簡韋編将敵祕書之副子弟之秀者咸肄業扵兹田蘇與遊曽晳同志列第侔扵稷下鼓篋比扵虞庠韋賢之一經相傳劉氏之七葉俱盛豈止㳺談之矜式羇旅之疇依設驛馬扵四郊来逺客扵千里而巳至道中天子遣美俗使者按行郡國且以御書百軸下賜其家家老文撫以隠居求志肥遯不仕即遣其弟文舉入謝天闕特賜清閒之宴召對赤墀之下勞問數四歎息乆之解褐授官以示光寵天子又自署一幅曰義居人以賜之閱閎増氣閭巷改觀雖古之里稱通德族號高陽家有賜書門標六闕者曽未足擬也矧處士君耕于巖石名動京師身在江湖心懸象魏毎嵗遣其子弟陳土貢扵宰旅上必蕃錫以荅其意野芹之獻葢以薦誠園葵之心特蒙委照自渥恩下及精廬彌肅寳玉在笥芝蘭盈庭去年處士之兄子待用舉進士得乙科同時儕流登是選者以十數初覆一簣葢由椎輪後来之人貫魚而進以錫羡流光之慶加討論博習之資珪組相輝将珥貂於七葉生徒益盛必著録者萬人然後臻夫極也學館之南有雷塘焉因以為名且志其地先是尋陽陳氏有東佳學堂豫章胡氏有華林書院皆聚墳索以延俊髦咸有名流為之紀述講道論義况力敵以勢均好事樂賢復爭馳而並騖冝乎與二家者鼎峙扵江東矣今年助教來齎處士書謁予願志其事且嘉其服道淳固樹善深篤謹守家法勤接士類髙門積德巳容駟馬之車上帝藏書更同羣玉之府景慕不足牢讓非冝僶俛成文聊以塞請而巳致政李殿丞豫章東湖所居涵虚閣記涵虚閣者致政李公考槃之所也李公挺生民之秀負王佐之才决科廣庭文雅第一從政劇邑吏人不欺以太夫人在喜懼之年有羸老之疾拜書北闕求養南陔天子嘉之恩禮尤異既蘭䑓之進秩仍水衡而分俸用致官政歸侍庭闈始卜居厯陽載離寒暑㑹公之令子今西臺御史以尚書郎通守洪井叔孫必葺豈復懐安元方将車因以東上今年御史秩滿歸闕公且致書扵予曰􅙕東西南北之人也前年来江西登臨山水覽觀風物戀戀而不能去且欲占數為是邦之民買田一廛築室百堵編名户版輸稅公上陶陶然與漢隂丈人携手扵羲皇之世矣兹郡之勝實惟東湖今之所居介于湖上却視闤闠前瞻𣺌瀰棟宇轇轕而世喧自分魚鳥聱取而物態咸見澄波萬頃韜映雲天崇期八逹絡繹冠盖此亦古人大隠之跡不出市朝儒者一畞之宫僅庇風雨者也且念嘉賔至止必宴豆以伸歡諸生来思乃函文而請益捧觴拜慶既以奉北堂之縱心岸幘燕居亦欲倚南牕而寄傲裁擇爽塏累土増崇俯瞰漣漪靣勢素定市山木以樸斵命梓匠以經營作為堂皇成之不日形勝盡萃軒檐若飛春之晨雜芳被隄緑波如染可以臨清流而賦詩夏之晝凉颸拂祍炎雲成峰可以登髙明而逃暑潦收水清羣木揺落可以詠秋氣於楚詞嵗暮天寒宻雪飛舞可以歌南山扵周雅固足以檻心猿而習静狎海鷗以忘機宴坐觀空入毗耶之不二谷神反聴味𤣥元之五千豈徒晨昏調膳之餘雍容肆體而巳東䑓舎人董公昔典是邦或退食之餘必命駕以至留連觴酌從容笑語憑軒曠望目送飛鴻秉燭徘徊門留駟馬賞心不足好樂無荒實由斯閣之成能迥長者之轍若夫天宇岑寂湖光皎鑑俯見雲鳥毫末靡遯其形旁連邑居囂譁不接扵耳逰氛宿霧寥廓洞開逺水長空混茫為一髣髴其梗槩目之曰涵虚優哉㳺哉聊以卒嵗願志其事式為美談予與公有同郡之情有忘年之契親比耆德欽聞緒言是用景行髙山講求方䇿若虚白之室莊周得之逍遥通德之門司農推之鴻博集文選扵南荆者層樓尚在草太𤣥扵西蜀者髙臺未傾呉興有韻海之堂秣陵有烏衣之舎載之圖牒芬若椒蘭今李公地望門風仙姿道骨清白義方之訓子文儒經術之傳家踈廣之揮金老萊之曵綵藴是全德無忝先民而在家必聞作事可法巋然兹宇掲扵通都聲實飛騰㳺居企慕締搆得地風烈在人予固知夫異日與滕閣孺亭鼎峙扵鍾陵為不朽矣承命之辱叙事靡周聊述所聞以抵来請云耳連州開元寺重脩三門行廊記夫南荆之分上當翼軫實領扵天官長沙之壤析為連山具載乎地志桂水千里詩什之所徴乳穴十九方物之攸産民俗忠厚土田膏沃力穡務本不啙窳以媮生復性遷善多齋戒以奉佛憂深思逺雅有離騷之風徼福乞靈靡事滛昏之鬼殆一變而志道何必齊魯豈九州之異宜見殊楚越者巳開元寺者兹郡之招提也俯臨康莊介于闤闠崇墉嶽峙飛觀神行像素載嚴焚修彌潔允為精舎居然化城而苾蒭之徒頗有開士香積之供多出都人梵唄相續扵六時依止克安扵四衆然締搆之始爰自唐朝厥初窮樸斵之工殫匠石之巧百堵皆作殆土木之勝人大夏聿成幾燕雀之相賀嵗祀寖逺繕完或虧髙門洞呀瓦斯解而屋漏囬廊矢棘棟既折而榱崩河南丘君頴適典是邦布政多暇行春之隙稅駕于兹顧慕徘徊精誠奮發乃欲易其隤陊髙其閈閎遂得常住之餘訾且募邑人之獻力經始勿亟庶民子来出言有章同聲響應繇是備物而致用即舊以謀新梓人揮蠅翼而無傷役夫如魚鱗之雜集脩檐重負状名翬之斯飛净土増嚴見黄金之側布庀徒未幾厥功告成前敞三扉下臨萬井東西二廡爰畢扵塈塗崇期八逹亦甃以甎甓丹楣銅㳫可以方軌並入砥平繩界可以結駟而馳足以攝族姓之歸依標郡城之壮麗又何必浄名丈室紛委四華帝釋天宫莊嚴七寳而巳烏䑓御史邵君曅實生樂國夙奉仁祠由委質策名乃離邦去里致恭於桑梓邁德扵親隣而清識造微懿文稽古故兹郡牧宰彼方人凡作事謀始必命介諮諏底績僝功即置郵赴告予與君接武臺閣交驩旦暮且述紺園之役見徴翠琰之文垂示将來用圖不朽靡及勞讓聊此直書云耳故河中府開元寺壇長賜紫僧重宣塔記師姓趙氏中條虞鄉人也由河沙刼来殖衆德本未㫁後有復生人中積習聞薰童㓜頴異宿機𠖇契割愛捨家十五禮文徹師為沙彌二十一依澄暉師受具戒亦既持乞士鉢披水田衣深念善財徧叅知識尤慕慶喜具足多聞振錫逰方刳心求法其始以比丘持律纔許五年諸佛度生是為初教且從本師受四分律又以如來出世盖一事之因縁衆生無邉有萬殊之根器爰自降神兠率示滅鶴林宣説十二部經震動大千世界其間具偏圓半滿之義開權實頓漸之門雖文字性空語言相離然而標指見月乃理事之兼通得魚忘筌始覺照之都冺師是以從歸一和尚傳無量夀經依行滿法師闡因明論盡逹宗㫖咸有師承終身受持為人演説葢四句之偈福利居多一音所宣悟解斯衆又復專持首楞祕宻之呪徧閲毗盧方廣之文八郡歸依天宫辦香積之供四衆圍繞空界雨曼殊之花凡讀大藏經一萬餘通誦佛頂真言三十萬過鎬京蒲坂實有化縁前後登甘露法壇宣尸羅浄戒得度者僅千餘人破塵出經多蒙利益傳燈分照豈有窮盡馬祖門下皆一時之利根龍華㑹中實當来之眷屬人天主伴夫豈偶然秋官貳卿上谷冦公早在先朝參預大政重師之行薦于帝庭詔賜紫方袍以旌其德處六和之衆而天子知名介三法之微而王臣外䕶非藴空漏盡神足智圎為彼岸之舟航作釋天之日月者疇能致是哉師以咸平四年四月庚戌示身有疾殆至彌留盡召其徒授之治命薪盡火滅神徃形留相好儼然道俗傾慕報齡七十有九僧臘五十有八甲子奉全身闍維于南郭之外得舎利三十餘粒以其年某月某日遷靈骨扵其原建浮圖焉上足弟子賜紫令操入室推賢傳衣善繼思欲奉揚遺懿昭示将来戾止上都以塔記為請予素服能仁之教尤欽開士之風且與上谷公道契無生心專趣大樂天綺語固願贊扵佛乗執㦸蟲文豈能宣扵真諦聊摭梗槩幸免枝㳺云耳婺州開元寺新建大藏經樓記昔如来登菩提坐為天人師萬德莊嚴十號具足大千世界以願力而攝受十二部經自悲心而流出所以宣暢了義提拯羣迷開方便門示真實相有條不紊譬以綫而貫花得象忘言如標指之見月自鶴林示滅大教方行而龍宫祕藏所傳無幾爰暨像法之運乃流震旦之區大士繼生廣譯五天之語精廬錯峙竝緘三藏之文扵是大雄之法音雷震于兹土矣勾呉之域介于海隅東陽之墟上直婺女䝉泰伯至德之化俗敦亷讓之風漸初平好道之餘人禀清真之氣有恥且格見善乃遷邑居相望悉奉竺乾之教弦誦之隙必閱貝多之言繇是棄塵勞而為苾蒭者實繁有徒闢浄土而崇塔廟者比比而是開元寺者兹郡之大招提也前臨九逵旁接萬井金碧絢彩上擬天宫鐘梵交音居然福地土木壯且麗矣嵗祀寖以逺矣龍象六和之衆禪律交修香燈四事之供檀施總萃而琅函實偈有所缺然乃有本寺僧文靖與本州都知兵馬使曹維旭同發志誠共營勝利爰以淳化中相率詣闕擊登聞鼔求方借版摹印真文奏牘上聞帝俞其請逮至道初維旭等始共輦置楮墨之直聿來京都詔免闗市之征授以要劵繕造既畢䕶持而歸特給上計之逥舟俾逹金華之本郡維旭等又相與刻軸以文木織絛以色絲香芸染籖丹漆塗匣崇飾既以偹矣誓願既已圎矣而經䑓舊基圯毁滋乆軒廡摧撓墁繪踳駮維旭等遂請於郡閤躬詣屬城徧募有情共成衆善鳩工度費即舊謀新建重樓開法藏其上級置廬舎那文殊普賢及十六大阿羅漢之像中級設虎座作八神王箕踞捧持其下象七金山法四大海寳地平布祥雲周繞締搆彤鏤殫匠石之精能像設焚修見天龍之護衞固使黒白之衆有所歸依利鈍之根因而啟發皮紙骨茟學道者靡渉扵艱辛寳藏金言開巻者並諧於悟入廣大利益豈勝言哉維旭又嘗扵雍熈中募衆縁累甓為浮圖凡七級直經樓之南十數歩訖役之日白光燭天晴空泬寥乆之始滅行路瞻覩道俗嗟歎斯亦樹善之𠖇感殖福之昭報也予咸平中罷守縉雲道出兹郡維旭者捧持事状拜于道周求得片文以刻貞石㑹予入掌書命不遑官次而勤請彌篤踐言是兾予固從事扵空宗者也隨喜稱讚豈有恡焉削簡含毫兹用無愧云耳時景德二年嵗次乙巳十二月朔日記潞州新勑賜承天禪院記景德元年冬天子廵狩澶淵駐蹕河上始議和戎之利慎柬使乎之才乃詔西京左藏庫使奨州刺史隴西李公繼昌奉将信幣克成盟好復命行在不逾浹旬奏事宸居沃心稱㫖時黄屋值流虹之慶帷宫舉稱觴之典執玉萬國塗山無後至之刑舞羽兩階靈臺有偃兵之議純嘏之錫上帝是賚富夀之祝率土攸同公因頓首上言以上黨舊邦卜居累世有環堵之室乃先人之廬而自叅表著扵内朝占名數扵京邑喬木猶在髙臺未傾願為仁祠以施開士増飾輪奐肅奉㷊修庶以衆善之因仰助無疆之算上覽奏嘉歎即命俞之申錫璽書旌以懿號曰承天禪院從其志也夫箕裘善繼前典攸稱桑梓致恭先民所重雖知樂之至不忘所生而似續之賢由扵肯搆矧壺闗之壤上應昴畢羊頭之阨北當燕趙國俗尚武人氣多豪控山東列郡之衝乃天下勁兵之處悲歌慷慨寖以成風土厚水深居之不疾而公之先正兹焉挺生藴翁歸文武之才茂荀息忠貞之力始仕周室殆扵皇朝功濟生民道合明主厯計相之劇任處宣猷之上列乃至正位機宻允輔大政當太祖皇帝夙興夜寐經營四方料敵伐謀指蹤千里前席借筯允集大勲持建莭牙出臨巨屏功成身退髙朗令終惟公經德體仁象賢濟美職在清禁爵為通侯門㦸鼎銘昭閥閱之盛朱轓佩玉顯車服之貴誓師邊徼威肅巴賨作牧藩垣政成海岱單介使虜通玉帛之驩三接承顔居心膂之任萬乗親倚羣公傾慕葢所謂人倫之佳士帝右之信臣者也先是公之載誕亦在舊居指樹尚存藏鐶可驗嘗蒸奉祠履霜露而長懐井臼思歸顧枌榆而永感然而髙扉納駟奕葉珥貂爽塏不遷親隣素擇襃成徙籍盖出主㤙楊僕移闗敢罹特議且深信内典勤修白業念旻天之罔極報德無階繄覺海之大雄歸心有素恭承明詔肇開浄土棟宇之制侔七寳之莊嚴苾蒭之徒極四事之供養匠石殫巧天龍薦祥金碧炫彩扵晨曦鐘梵交音於空界問安之寝聿為道場學禮之庭更張法席足以滋殖德本發揮善利香象負重廣集彌天之流水鳥談空更同極樂之國福祉之盛豈可量哉昔者南朝諸公多施宅而為寺西域長者競捨財以供僧簡策相傳風流未逺貝多所記報應非虚訂公之為斯一致耳曩者太尉先生居顯位受厚禄寵錫蕃庶私帑充牣奉身甚約事佛尤謹生平飯僧七十萬造千佛像修紺殿以嚴寳刹飾琅函以祕金文又以方牘摹印金剛上生等經施扵四衆山門禪苑多所繕完什器道具率用營置深逹實相不滯根塵盡此報身當得解脫君子謂李公詒謀錫羡源深流長福履所綏凡情叵測何止積善餘慶啓八世之莫京定須當來下生首三㑹而受記父作子述不其韙與予職在右曹心師西竺辱公之請至于再三僶俛揮毫以謹嵗月而已時景德二年嵗次乙已四月八日記建安郡齋三亭記夫好尚非一仁智有山水之殊居處異宜髙廣致隂陽之沴故書稱肯搆詩詠斯干列國之禮賢渠渠夏屋先聖之談道申申燕居矧乃專城按部之崇觀風布政之隙經始不日無土木勝人之譏退食自公有宴飲合歡之所斯固君子之作事良牧之用心者巳建安大邦保界閩粤綿地八百里生齒十萬室賦興維錯民俗豪舉國朝肇建戎閫必作鎮以壮王乃眷縣道亦精擇扵健令即良二千石之寄從可知矣渤海髙君由曲臺綿蕝之任領兹郡山澤之征就降璽書委之符竹而君正身以律下清心而治煩釋其磐牙陳之藝極訟既息矣徽纒棄置於圜扉化之行焉弦誦流聞扵鄉校豪猾屏氣逋亡悉歸頥指而諸曹承風坐嘯而一郡無事君且念居室先後之訓著扵禮經臺榭髙明之説存諸時令蓬壺溟渤形詩人之歌詠觀閣池沼播名卿之序引扵是周爰公舎眷求遺址方塘白水皎鍳澂明虚榭危檐摧頺圯毁即命匠石授以楷模曽未旬時汔終力役審曲面勢䟽為三亭反宇飛甍瞰兹一水俯北岸曰勤公仍其舊也其西曰旭景其南曰澄鮮皆繚以脩廊状翬飛之制巍然層搆侔鼇負之雄池之東累土積石為千巖萬壑之態亭之南築堋設次習六鈞七札之事毎棠郊聴訟有憇茇之勤鈴閤思政乗鞅掌之暇獄既决矣隐悼伏念以無寃吏且休矣棲遲偃仰而多適君必巾褠自便屣履以登送目泬寥養浩然之氣披襟軒檻當快哉之風固已遣仲舉之鄙恡生䝉莊之虚白至若輶軒一介有于役之勞盛府初筵有從事之樂郊勞餞飲之外爰洽扵宴私羽書幕畫之餘率多扵暇豫君必殽核維旅履舄交錯裁雕章扵寸燭豆泣釡中奏妙曲於繁絃魚躍波際固巳展春秋地主之禮盡賔客杯酒之歡其餘即詠歎發扵如仁尸祝宗乎全德去如始至嘉叔孫之能賢巋然獨存期靈光而為比經搆之㫖豈徒然哉某占數樂郊名叅户版濫官近署跡繫君門少㳺下澤之車空深懐土正平爵里之刺不獲望塵恭佩髙風欽聞新政而况圗繪勝槩覼縷尺題金玉其音日月以冀幸叨史氏之職願紀輿人之誦才少思軋亦不敢辭進牘含毫用謹嵗月而巳時景德三年嵗次丙午八月一日記邠州靈應公廟記奉勑撰夫有天下者徧祭扵百神載祀典者非止扵一族故成周之盛咸秩無文春秋所記並走羣望秦并六國祠官之領實繁漢繼三代有司之傳彌廣是知出雲見怪不必主扵山川捍患禦災固悉存扵尸祝牲玉有等廟貌斯嚴齋肅吉蠲薦之以馨德聰明正直降之以嘉生然後百工允釐納民扵軌物三時不害躋俗扵仁夀兹盛德之事也非聖人孰能隆之哉咸秦之區上直鶉首山河四塞幅貟千里雍州爽塏泰畤神明之隩豳土深厚公劉王業所基列地百城提封萬井崇墉濬洫制擬通都北户連甍俗成樂國有神保順公者斯土之靈祗也幽贊無方休徴叵測血食制位巧厯不記其年公衮錫封良史頗逸其事嵗月増逝修奉彌勤神光燭壇野雉皆雊回風翼駕青虬載翔誠既感而必通靈雖乆而靡歇郡或致禱爰昭報而格思民苟不䖍乃憑怒而伸儆繇是愛之若邵伯之樹畏之如共工之臺天或降災克銷愆伏之咎人斯搆厲能弭扎瘥之殃百祥荐臻一境是頼盖社稷均享同㟪􅕲之宗亢倉歌舞致誠比沅湘之祠太一神道設教是之謂乎而必葺以來為日斯乆繚垣有復隍之懼崇搆幾棟橈之㓙守臣上言俞㫖遄降經始以度費因時而僝工取大壮之新規賁集靈之舊址成之不日升聞于天特賜號曰靈應公昭神貺也且有明命属扵下臣聿徴鄙詞以志休烈恭惟馭神以祀者邦國之大事為民祈福者天子之深意有虞望秩璿衡齊政而靡愆姬文懐柔寳龜卜載而彌永祚德儲祉豈誣也哉謹述謏聞慙扵漏略時景德三年月日記武夷新集巻六
