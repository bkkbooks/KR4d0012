body:
  text: 武夷新集卷七宋楊億撰序十七首溫州聶從事雲堂集序雲堂集者永嘉從事聶君茂元試吏栝蒼日所賦詩也君雍熙三年舉進士䇿名乙科由一命隨牒兹郡屬仍嵗大稔比户小康賦輿先期獄訟滋少盤牙悉解郡閣鮮簿領之勤爟火不驚幕府無書檄之事婉畫勿用善政已成飄飄然其於遊刃固有餘地矣于是占勝選竒尋幽覽古名山福地必命駕以遊美景良辰乃登髙而賦精騖八極智周萬象觸類有得少選成章信所謂造次顛沛必于是者也其或心將化馳意與境會聞簫韶者不知肉味逃虛空者蔑聞人聲追鴻濛而與遊摶扶搖而上擊其探賾也若求玄珠于赤水索金簡于丹臺其得雋也如縱涸鮒於西江騁歸鴻于碣石故再嵗之內所賦凡二百篇東甌山水之清麗縉雲謡俗之朴古佛剎玄祠之標槩訟庭官舍之形勝見於題詠之什矣一郡人物之選一時寮佐之盛林谷髙蹈之士吳楚薄遊之賢備于贈答之作矣名邦風物之美通人吏隱之適齊氓富夀之樂居上神明之化形于唱和之篇矣若乃國風之作騷人之辭風刺之所生憂思之所積猶防決川泄流蕩而忘返絃急柱促掩抑而不平今觀聶君之詩恬愈優柔無有怨謗吟詠情性宣導王澤其所謂越風騷而追二雅若西漢中和樂職之作者乎君素工于詩及載筆從軍又得兹壤前後左右陟降俯仰皆青山白雲茂林修竹嗜欲之物旦暮在前矧又旁睨石門謝公逰厯之所却瞻東陽隱侯賦詠之地精爽未泯風流尚存冝乎聶君之于詩彌所感發豈二子之風期吻合潛有佽助歟而此都之靈粹閟蓄將有散越歟不然何其得之多也去年豫假守是邦今年通理虞曹外郎常公將命賦民鹽于鄰郡既飲至且逹聶君之命以集為貺而序是求雅意甚勤飾讓非禮聊敘梗槩以塞其請若夫咏歌嗟歎之不足識者開卷而盡見也豈僕倦談者所能一二乎送進士陳在中序昔孔子五十而讀易以至韋編三絶然後知天命之終始自衛反魯刪詩定書樂正雅頌各得其所六籍既立百王由是取法焉蓋夫易者世厯三古人更三聖逹性命之際通神明之德探賾索隱鈎深致逺故曰易不可見即乾坤之道幾乎息矣若乃春秋詩書禮樂猶五行之更用事而易為之原古者十有五而志于學既耕且養三年而通一藝三十而五經立也至於學易必俟夫四五十豈非心志未定不可以參隂陽之變涉獵未博不可以覩聖哲之奧至有脣腐齒落塊然面墻其或沿波討源翦焉先覺黜章句異端之説研彖象極深之旨不俟知命之嵗不求一卷之師天人之占鬼神之變消息盈虛之理吉凶悔吝之徴自明而誠若指諸掌非夫稟人倫之上智得天下之至精其孰能與于此乎潁川陳君世家甌閩寢處墳索少好易象洞逹其要嘗慷慨發憤以學者傳授失其宗本去聖逾逺亡羊多岐大懼夫羲文之微言將墜于地乃鋪衍遺意發揮成文作賦六十四篇篇演一卦之義前年從賦南安郡薄逰上都扣門造豫以賦為贄豫一見而甚駭之也深者厲之堅者鑽之髙者跂而望之幽者俯而探之汗漫無際者凌厲以求之窈冥無狀者罔象以索之隱几彌旬恍然有得或談于臺閣僚友或語于場屋流輩聞善如響爭取以觀于是陳君之名一旦籍甚所謂易賦者亦盛行于時既觀藝澤宫不利攸往蓋聿來下國勦無先容新羈之足爭據于要津寒谷之苗不沾于暖律非戰之罪也其勢使然乎退歸舊廬髙卧環堵今年豫典郡甌越命駕爰來乘桴浮海冒風濤之險杖策徒步越嶺嶠之阻將以生平素業伸于巳知若豫之孤陋迂濶何足以當之哉陳君其亟隨鄉書便卜西笑有司方選擢寒雋牢籠英傑以副萬乘虛左側席之意君博綜文史詳練經術詞彩奮發學植堅深取片玉于崑岡之巔彯華纓于文石之陛可以俯拾未足為難矧乃行有餘力深窮繫象天子方復三代之制開庠序聚生徒選經明行修之士列于學官以教胄子如君醇儒當中兹選僕謂君明聖人之道將有以及于生民揚于王庭冝取顯位一博士之任豈足為君辱哉勉哉西逰努力加飯送覲道人歸故詩序浮屠依覲師建安吳興人少落髮為桑門棲雲居山結草茅為廬與猿鳥雜處日中一食凡數年矣鄉人慕之爭携糗糧茗荈鹽酪以詣其所或稽首膜拜精意懇至迎至其居作佛事以祈福師亦不能却之然心殊不喜鄉人以師所居風雨之不庇也營棟宇作像設經始弗亟輪奐惟新師外形骸黜健羡行不纍俗居無求安崇臺廣厦非其所樂也精舍既成俾其徒糞除之轉詣窮僻緝木皮為方丈室採草實以食鄉人聞其徙也從之如初凡三徙居所至成市豈重華之有羶行莊周所謂全德何不言而化不召而至之如此乎師遍閲金仙之書深求祖師之旨一念懸解五藴皆空雖寓迹禪林而棲心道要端居岩石結志區外虛室生白精義入神乃至授玉篇于東華得素書於黃石驂青虬而翳華芝神交于肹蠁餌金膏而咽瓊液功成于俄頃步越峻嶺若履平地年殆知命宛然童顔或天髙月明萬籟俱寂必攝衣杖策深入窮山俯絶壑之傍坐大石之上鷙獸馴擾毒虺屏去咽氣養和踰月廢寢瞑目隱几彌年不食忽與俗接未嘗自異固已飛名仙籙髙蹈玉晨豈但蟬腹龜腸吐納以蠲疾熊經鳥伸導引而為夀哉豫少逰風波之塗早别枌榆之里危未脫于羿彀疾莫造于醫門淳化末請告歸寧師惠然訪我以長生度世之旨誨豫豫正為利祿所啖旅火內迫且辭以未能去年出守縉雲師前期未忘冥感潛契蓋以收視反聽未嘗夢想者二十年及豫南轅之夕師油然欠伸髣佛假寐夢逰縉雲栝蒼之間若有靈仙真人授以金簡玉字之訣蘧蘧形開之後恍然起薄逰之心及豫蒞郡十旬師即振錫而至盤桓數日便為仙都之行採靈首探隱穴旬有八日拂衣言旋豫得再膝席于郡齋瞻師眸子瞭然若志已滿必吉夢是踐而至理玄同方內之人何從請益丹臺緑檢非下士之得窺赤水玄珠豈離婁之能索心期巳畢歸艎靡留棹舉若飛目眙不及異日世緣既盡宦逰亦厭終須挹浮丘之袂追赤松之遊大丹若成當分我半劑得為地仙足矣豈但使雞犬舐鼎乎嗟嘆之餘復永歌而為好詩附迹寄浮屠教心將汗漫逰無眠長逹曙却立動經秋祕訣神仙授靈苖洞壑求誅茅探虎穴投杖涸龍湫丹熟爐應冷禪餘室更幽登山不纍息入夏亦重裘名已標真籍身猶隱沃洲逍遙訪巖穴迢遞别林丘遍覽縉雲境還浮一葉舟三千功欲滿鶴馭恐難留溫州聶從事永嘉集序河東聶君昔從事縉雲日賦詩二百篇豫既序之矣及隨牒永嘉再見閏月所得彌廣凡七百章會秩滿北歸假道敝邑又示豫以新集且徴辭焉豫才非患多學素不足巳嘗黽勉從命狂簡成文運族庖之刀一割猶可驅市人而戰再鼓必衰深病未能豈足以辱而君之請彌篤且豫之讓莫諧固不暇揚榷而言但撮其梗槩而已謹按君生齊魯禮義之國被陶虞文思之化方在髫丱服膺儒玄遍討百家之言深窮六義之要以為詩者妙萬物而為言也賦頌之作皆其緒餘耳于是收視反聽研精覃思起居飲食之際不廢詠歌門庭藩溷之間悉施刀筆鳥獸草木之情狀風雲霜露之變態登山臨水之怨慕遊童下里之歌謡事有萬殊悉財成于心匠體逮三變遂吻合于天倪當其奉鄉老之書以詣貢部也袖詩千篇名動場屋宗伯推國士之遇異于衆人天子嘉制策之文遷為第一自是捧檄吳會改轅海嶠東甌舊壤于越遺俗民庶謹厚既卧理之有餘林嶺蔽虧實賞心之斯會其或良辰美景賔朋宴集之盛名園别墅軒車遊覽之適公堂退食蹈泳無何之鄉王澤及人賡載中和之什寓物必賦援筆而成與夫陳思豆萁之詩止于七步淮南離騷之傳不越食時以敏言之蓋其倫矣然君之于詩也類解牛焉投刃皆虛譬射鵠焉舍矢如破彼唇腐齒落者所貴乎少我取其多彼斤駑肉緩者咸謂之難我以為易獨擅一源之利不見異物而遷扣寂求音應之如響觸物成詠思若有神蓋孔子云少成若天性習慣若自然斯之謂也矧乃酌之不竭鑽之彌堅兩郡之間千里而逺玄祠佛剎罔不標題都人士女悉巳傳誦南山之竹可盡而雅言無窮東郭之㕙雖疲而逸材方騁英詞滿於裔壤藻思泄于尾閭蓋猶夫吳玉金錢往往有之淮隂將兵多多益辦者巳方將捧持素業奏御天子豫固知採其頌聲埤于樂府被之管弦薦于郊丘有日矣至如升金門上玉堂履赤墀之塗登文石之陛亦將在是舉也稽古之力其可誣乎謹序羣公贈行集序豫至道三年十一月受詔修先朝國書越明年八月書成奏御既而以太夫人有桑梓之戀求典近郡因奉甘旨九月詔領縉雲郡事拜命之翌日復留不遣再疏懇激得請而行公卿巨儒臺閣髦士寮宷之際朋從之間相率贈言以寵行邁者凡三十八人藻繡紛錯珠璧炫耀觀咸洛之市天下之貨畢陳入宋魯之邦先王之禮盡在亦以見一時文物之盛豈獨為鄙夫道路之光昔者楚丘列諸侯之末有蘧瑗史狗史鰌公子荆公叔發公子朝分執國政故吳札歎曰衛多君子西京承三代之季有朱買臣吾丘夀王司馬相如主父偃徐樂嚴安枚臯膠蒼終軍嚴䓤竒並在左右故史班稱曰漢之得人巍巍聖朝英俊咸集爵里鱗布頌聲奮發覽之者足以知多士在位周室以寧七子賦詩鄭志斯見何止金聲流于下國華衮被於薄軀而巳哉既銓次成編輒敷述其事蓋取夫卜商作頌以冠二雅之首用無愧焉羣公餞集賢錢侍郎知大名府詩序昔漢宣帝有言曰國家不虞邊境有事左右之臣皆將帥也乃知登勇爵者不必專閫外之政服儒術者足以升大將之壇其所由來舊矣去年冬鑾輿北巡遼馬南牧乃眷全魏之地實介兩河之間駐蹕以壯其軍聲擒俘屢獻于行在既而振旅愷以入求莭制之才疇庸舊臣作鎮兹壤亷頗年髙不能用兵趙孟語偷未可為政于是命大京兆長城公由冬官二卿兼書殿史閣之職出領府事軍中之務一以咨之且謂之曰倚卿為北道主人使朕得髙枕而卧矣寵錫異等祿秩有加十乘啓行百壺出餞虬髭列侍師律載嚴鶴蓋成隂送車無數於時搢紳大夫相與言曰汲黯卧治郡政自肅劉琨坐嘯塞垣以清當使朔野無烽燧之驚生民免杼軸之困偃息談笑立銷兵氛投壺雅歌益治軍簿俾天下之人知敦詩閲禮真將帥之具坐籌決勝敵百萬之師巍巍帝皇知人而善任使也昔者季布治郡天子倚之股肱申伯于藩吉甫形于歌頌盍為詩什以道德美由是學士承旨宋公而下作者凡三十人竒彩彪炳清詞藻縟入孔子之宅金石絲竹以盡聞逰和氏之場圭璧琮璜而皆在與夫七子之賦鄭志羣公之祖二疏蓋不侔矣某外領使符歸在秋暮辟書始下不及王粲之從軍雅言畢陳竊比卜商之作序蕪陋簡略何足以云謹述送致政朱侍郎歸江陵唱和詩序侍郎朱公以舊德名儒榮居禁署引年致政將及禮經宴見從容屢以歸田為請封章激切且有乞骸之言皇上重違桑梓之情式優筋力之禮不欲煩于耆耋于以厚其寵章特拜文昌二卿許歸江陵别墅宰邑以愛子俾晨夕而承顔下詔于長吏令嵗時而致問延見甚久益推前席之恩賜豫實蕃有助揮金之費給公乘以濟行李供祖帳而伸飲餞祁奚老矣猶以政事而咨詢宣父歸與豈憂吾黨之狂簡天子恩禮之敦篤賢者進退之光華行路之人形於歎息薦紳之士以為美談區區二疏非可同年而語也大宗伯太原公嘉逹人之知止美公朝之尚德嗟嘆不足形于咏歌為長句二百二十有四言揄揚其事羣公屬而和者凡十有二人藻繡紛敷琳琅焜耀登于樂府何愧中和樂職之詩布于郢中足掩陽春白雪之唱雅言四逹頌聲載揚俾貞退之有光致風俗之歸厚太原公之意豈徒然哉某猥以非才獲聨髙韻曽乖量力寧足起豫且奉話言俾之序引爝火不息昔巳接于餘光粳粃在前今復慙於首冠承命增惕敘事非工僶俯含毫詞不逮意謹序廣平公唱和集序昔者鄭國名卿賦詩者七子郢中髙唱屬和者數人善歌者必能繼其聲不學者何以言其志故雅頌之隆替本教化之盛衰儻王澤之下流必作者之間出君臣唱和賡載而成文公卿宴集答賦而為禮廢之久矣行之實難非多士之盈庭將斯文之墜地皇宋二葉車書混同端拱穆清詳延俊乂臯夔稷卨日奉吁俞枚馬嚴徐並在左右禮樂追於三代文物邁于兩漢有若翰林主人大宗伯廣平公以才識兼茂治行第一登金門上玉堂發揮帝謨潤色大業自太平興國迄于咸平凡嵗星再周于天矣而望實益峻體貌彌篤入奏武帳天子冠而後見退食溫室家人問而不言挺山甫之將明推安世之慎密作文章盟主實朝廷宗工天其或者殆以公為儒林之木鐸也而視草之暇含毫靡倦形于風什傳于僚友同聲相應發言成章乃至文昌正卿宥密元老蓬丘之長蘭臺之英爭竒逞妍更賦迭詠鋪錦列繡刻羽引商爛然成編觀者皆聳廣平公感交遊之疇昔慮竹素之淪胥休沐之餘孜孜綴緝為之七卷以傳於世頌聲奮發爵里森布著于簡牘垂厥方來當使仲尼刪詩取周南而居首班固著論稱西京之得人蓋風化之所繫焉豈徒緣情綺靡而巳猥令紀述蔑容固辭狂簡孟浪慙于敘事云耳謹序送人知宣州詩序屯田郎某君稽古博逹之士也始以偃商之文學決科公朝終以龔黃之治行陳力官次凡再歷二千石皆以課最揚于王庭今年解安嶽郡章以博士涖曲臺方講求典禮討論故實禆補闕漏修起廢墜而有司舉考績之典在尤異之目天子延見宣室勞問數四以尚書郎職司起草羽儀中臺而户口墾田漢官惟舊故以君領屯田曹宣城郡號為奧區襟帶江左而雙旌六纛唐制甚雄故以君行太守事拜命之日縉紳先生咸以某君詩家者流而宣城乃謝公賦詠之地刻于金石被于管絃鏘然遺音猶在人耳而君勢均于六義之際神交于千載之下吳中人士復聞正始之音楚客離騷且有江山之助亦由冥數良為美談於是蓬丘柏署諫垣史閣金閨之諸彥鴻都之碩儒莫不健羡景慕形於詩什或嘉其地雄萬井慰壺漿來暮之心或歎其道出故鄉有弩矢前驅之盛或稱清白之莭與關西而等夷或序離索之情劇河梁之悽愴至於述江南之佳麗談謝客之風流地勝人賢殊時共貫其歸一揆蔑有異辭矧昔人云亡為日滋久華輈繼軌名氏實蕃焦桐絶絃賡載殊寡而君擅當世之譽為羣公所稱嗣續音徽聳動吳會亦猶京兆善政前有趙張姑蘇能詩後推劉白豈偶然哉君以治劇之能奉求瘼之寄所冝宣布王澤激揚頌聲採謡俗于下民輔明良於治世當俾中和樂職之什登薦郊丘豈但亭臯隴首之篇留連景物而巳集賢右史彭君實君之執友且緘諸公之作咨豫為序如窺武庫駭神鋒之照人幸過屠門聊大嚼以快意輒兹冠首深用厚顔云耳與內弟李休復序隴西李生豫之內弟也才十數嵗能屬文善楷𨽻性端謹介特外直而內溫不讀非聖之書不入非類之室孜孜為學匪懈州里之內名稱藹然咸平二年奉鄉老薦書就試春官氏實在髙第揚于王庭天子以其新進少年欲抑之俾進其業遂用旅退曽不屑懷去年本郡凡貢士三十八人實冠其首西望而笑與計吏偕方摩厲以須虛憍恃氣將乘長風而破巨浪運溟海而徙天池適有功緦之喪不克其志懷寶待價豈慮迷邦杜門燕居亦云知命斯可尚也一日再拜而言曰夫名以定體有自來矣始肄業鄉校名宗元及舉進士更之曰瓊由瓊巳來一不利見再不克就試禮部求所以易之者豫應之曰復之六二休復吉象曰休復之吉以下仁也蓋得位處中協比初九初九有仁德而能附順之所以為親仁善鄰之象復之休也左氏傳曰親仁善鄰國之寶也語曰德不孤必有鄰夫七日來復天地之心也照鄰殆庶顔子之德也處復而休擇鄰以德非君子儒者其孰能從事于斯矣冝更名曰休復字德鄰若乃率性循道自誠而明復之體也邁種務滋聿修無忝德之度也所冝探中庸性命之理無或怵迫親大雅明哲之士與之切劘使衆妙玄同虛室生白鳴謙受益心逸日休勤而行之進吾往也固當立功立事為世偉人豈徒發策決科智效一官而巳古人恥名浮于實幸吾弟勉之哉外兄某序送四十舅翁東逰詩序武寧茂才章公實先大夫之叔舅某之事公猶大父行也始委質江吳為郡文學值金陵版蕩閩隅繹騷貞退丘園不交世務及文軌混一聲教漸暨乃徒步萬里來詣公車上書大言初慕方朔之自薦閉關却掃遽同馮衍之空歸自是屬鄉老之獻能隨計吏而西笑凡纍詣貢部皆敗於垂成蓋燕谷沍寒陽和靡及齊庭濫吹雅鄭相傾終以不伐之姿困于新羈之足今年春官氏益艱其選財三十取一意公必在籍中逮揚于王庭又闕其名氏噫淹速之度有命在天實由數竒且非戰罪復何足町畦于胸臆鬱陶乎心術哉昔平津六十始發䇿決科卒登三事之位孟明三戰乃濟河焚舟終雪再北之恥苟誠志敦篤德義充富雖日月之增逝終冨貴之來逼亦不必充詘殞穫倒行逆施然後為善宦也關東有賢侯汝潁多竒士行當曵裾公府峩冠初筵為元戎之上客亦復升堂拜親傾蓋投分與諸生而締交繇是名動京師聲振場屋拾芥甚易夫何逺哉韞櫝待沽在此舉也臯壤黃落當拜迎于夷門之下車馬行色輒抒意于河梁之篇非足風雅之云聊導離濶之思云耳詩附首夏清和月異鄉羈旅心丹枝未入手華髮不勝簮又出夷門去還過汝水隂何人冨髙義相贈橐中金送集賢李學士員外知歙州序昔漢明帝云郎官上應列宿出宰百里王坦之亦云尚書郎正用第二人何得以此見擬當時雖含香握蘭趨走丹墀未甚重也爰暨唐室稍盛其選由諫官御史次補者為美遷迄于皇朝地望彌峻又有侍講金華之殿待詔玉堂之署典校天祿閣更直紫微垣外之即建行臺刺列郡持使節總百城故臺郎之貴過曩時逺甚集賢學士屯田外郎李君在興國雍熙中以文雄于場屋太宗皇帝凡五臨軒試郡國貢士君以英才傑出䇿名甲科自爾隨牒于淮淝間為諸侯所賔禮奏伎記室檄成而愈風案事鄰州獄決而得雨入佐著作改丞太常掌禮秩宗閲書廣內既而宰邑吳會有絃歌之音校文成均正魯魚之謬英華外發名聲日聞天子知其藏器在身勞謙不伐特出中旨召試禁林翰動若飛文不加點北門諸公抵掌歎伏翌日受詔兼直書殿君蹈泳亨衢翺翔近署誠衡遇物靡有低昂量陂虛受不聞澄撓天球擅響雅鄭洞分水鑒忘情毛髮皆見為士林之圭表亦人倫之蓍蔡每太液波淥汾睢草黃或御酒百壺式陳鎬宴或卿雲五色垂示天章君必沾玉斚之醇醪聨柏梁之髙韻賜花奪錦肯讓景龍時人桂水空梁無取南朝之體此外風規醖藉不雜塵遊驅放玄虛善談名理求之一時未易得也君屏迹勢利遊心虛白踐赤墀而登文石非所宴安拍洪崖而挹浮丘是其雅素且以新安山水之竒秀江左人物之瑰瑋嚴助饜承明之廬勞于侍從阮籍求東平之守樂其風土實奉俞詔歡然愜心夙興戒徒星言行役噫錦帳綾被有中臺之禮秩金匱牙籖有延閣之官次懸龜曵組建隼剖符驛吏駕車而來迎縣令負弩而前引千騎駸駸而挾轂諸曹冉冉而趨府載棨戟以先道露黻冕以行春四十嵗專城而居雖盡美矣二千石與我共理厥惟勉旃行矣火雲吐峰汴流激箭仙舟東下何翅一葉之輕旅鴈北徂勿忘尺題之貺其他即期月報政朝廷賞勞幸預代言之末願草陟明之詔云耳送元道宗秀才序昔夏侯勝有言曰士患經不明經苟明其取朱紫如俯拾地芥耳至乃抱荆山之璞猶聞待價操流波之引未偶知音蓋有淹速于其間夫子之所以罕言也河南元生出東南之美族稟山川之靈氣學術淵奧才思深婉雅善詞賦尤工詩什每扣虛課寂緣情體物必有警䇿傳誦人口左氏之筆微為富豔相如之文長于形似翹翹然秀出于場屋間矣有難弟焉有令子焉皆以俊才著稱素風彌劭天倫敦睦庭訓嚴厲友于推讓士類多之矧復內行修飭至性純孝閲市以資力學負米以潔晨羞至于造請諸公不避寒暑博極羣書罔捨晝夜此又勤即不匱艱而彌貞者已有若大丞相僕射東平公鄧帥長城公皆坐鎮雅俗懸衡吾道嘉生之才美咸賦詩以贈之此亦神物求之不可得也逮夫綸闈書殿三臺內閣英髦雜集風鑑攸出見必倒屣坐多更僕接夷甫之談柄知名理之斯在挹紫芝之眉宇覺鄙吝之都忘當時名儒推奬如此而再試貢部敗于垂成蓋云數竒實非戰罪寄食輦下有索米之嗟薄遊關東無解榻之遇歘起北堂之念遽賦南陔之吟與仲氏而言歸拜慈親而為夀姑欲賣負郭之産扶安輿而來棄入關之繻作焚舟之計決䇿素定戒途有期陸士衡之弟兄暫還吳郡翟方進之母子同入京師行矣為我語姑蘇父兄無或笑馮衍空歸輕蘇秦未遇以目皮相人作兒女子見異時懷丈二組駕駟馬車衣繡而過里閭揮金以報故舊此際如下鄉亭長為德靡終洛陽妻嫂不敢仰視徒厚顔耳明年春蟄户震驚河流湍激當糞除敝廬以俟子之西笑送張泌之毗陵詩序義興陽羡山水甲于江東張子巨源慨然發仁智之心飄然有登臨之興葉舟東下蘭友與俱梁園雪飛汴流日淺榜人宿戒祖席晨張于是京洛貴遊之賢鄉關布素之執河梁惜别並愴離羣澤國贈行咸抽祕思風雅之什爛然盈編又何必雜佩兼金然後充乎巾槖也行矣三吳之地素多賢豪十室之邑必有忠信雖君子在位岩穴豈無于隱淪矧善人為邦閭里巳臻于富庶儻能為我擇爽塏營别墅當使夫陳力不能奉身而退受一㕓而為氓與萬物而共盡此所望于子也庶乎勉旃獻嵗發春遲子西笑佛祖同參集序昔如來于然燈佛所親蒙記莂實無少法可得是號大覺能仁既而後智滋興悲心顯發念四生之沉溺輪回六趣之中為一事之因緣出現五濁之世奈何根器各異機感有殊繇是開三乘權實之門設一時頓漸之教具偏圓半滿之義分悟證伏斷之差演之為十二部經廣之為百千萬頌隨類各解始雖自于一音逹本忘言終乃同于二月故純陀末供之後鶴林示滅之辰以正法眼付大迦葉內傳真印外授信衣作世導師為佛嫡子凡二十七世至逹摩大師哀此土之人昧即心之理分别名相而不巳類入海以算沙攀緣生滅而為因但認賊而作子聿來震旦宴坐少林不事語言不立文字既得人而傳付乃趣寂以返真是為東方之初祖也自爾本系相承旁支别出敷華結果五葉之讖可徴續焰分輝千燈之照彌廣至于出離生死一門證于涅槃誘導愚迷萬行以之差别由二祖而下迄至于今以諸夏之利根叶西土之懸記得道之者實繁有徒其或抵掌盱衡乃了知于風力搖唇鼓舌即悟入于言樞或針芥相投金鍮立辨或經塵將破啐啄同時示現方便以既殊遭但因緣而亦異咸有軌迹著為筌蹄譬諸三藏之文結集于鉢羅之窟七佛所説祕藏于娑蝎之宫苟撰述之無聞使後來而安仰先是諸方大士各立宗徒互顯師承迭存語録圭山患其如是也會合衆説著為禪詮融通諸家圓成一味蓋祖門之能事畢矣歷嵗彌久都序僅存百卷之文不傳于世東吳道原禪師者乃覺場之龍象實人天之眼目慨然以為祖師法裔頗論次之未詳草堂遺編亦嗣續之孔易乃駐錫輦轂依止王臣購求亡逸載離寒暑自飲光尊者訖法眼之嗣因枝振葉尋波討源乃至語句之對酬機緣之契合靡不包舉無所漏脫孜孜纂集成二十卷理有未顯加東里潤色之言詞或不安用春秋筆削之體或但存名號而蔑有事迹者亦猶乎史記之闕文或兼採歌頌附出編聫者頗類夫載籍之廣記大矣哉禪師之用心蓋述而不作者矣嗚呼法界無際衆生無邊凡厥有情莫非同體終日圓覺觸目真如而迷失妙明增長虛妄分别影事牽制于六塵積集苦因流浪于三有善知識愍其如是也不歷事相直指本源但一念不生即三際俱斷十方消殞諸聖現前識珠在衣匪從他得如金出礦豈復重為圓頓之門妙如此矣稽所證之道然後知原師也生如來家真法王子究所詮之理然後明斯集也了第一義真最上乘當使末法之年初心之類去聖逾逺開卷得解一彈指頃齊肩古佛不起于座入般涅槃雖利益之若斯于滅度而無取即知施七寶而滿剎土徒為漏業之資化二乘而等河沙適重敗根之罪師之法施豈思議之所及哉新集既成咨豫為序聊托梗槩冠于篇首云耳諸公寄題建州浦城縣清河張君所居池亭詩序茂才清河君于豫蓋鄉先生丈人行也頃者書軌未同齒血猶壯不掃一室有志四方薄逰九江講學廬阜勵精文史既素業之大成歸省庭闈值戒車之適駕未幾青蓋西上先正從行喬木懷安族人攸庇亢宗裕蠱且肥家之是圖委質䇿名于觀國而何暇雍熙二年仲氏舉進士中乙科淳化三年季弟隨計偕列髙等推讓致美君之志也俄而先府君捐館夀陽犢車歸葬先夫人啓手故里駒隙終喪商於解印而歸叔庭既冠而逝實有天倫之戚無復西笑之心且欲沒齒田園放懷林壑與浮丘把袂為羲皇上人其所居也背山臨水占竒據勝纍世增葺極為輪奐曲池皎鑒修梁橫度虛閣崛起反宇臨空雲山蔽虧魚鳥聱耴賞心肆體斯焉取斯豫淳化四年由書殿得告歸迎版輿時君膝下承顔友于歡宴置酒危榭酣飲終日豫亦斐然成詠題于梁屋及咸平三年罷郡縉雲復造仙墅君且永懷罔極痛深終鮮逝者如此靈光巋然豫是用追感疇昔賡載前唱今年君奉本郡計籍來上中臺蓋因縣次之續食將與故人而胥遇君之愛子實吾家之宅相而豫之外弟也往年隨我肄業上都刻苦讀書三餘之習無廢孝謹成性萬石之德不衰君亦既見止彌加教督會稽栝羽何用不臧于公里門于兹必大君戾止未久歸與興歎且以鄙夫昔留池閣二詠及羣公佳章俾之示朝右之賢庶乎知隱居之志安定大諫趙郡閣老及上邽冨春朝陳諸紫微暨祕閣潘公咸樂善無厭慕義不足競抉祕思發為雅篇千里寄題豈人遐而室邇七閩傳誦蓋玉振以金相誠足為吾黨之美談寧獨光幽人之肥遁豫與君先疇接畛雞犬相聞奕世聨姻絲羅有素早親長者之論偹知髙世之行因敘始末用冠篇首云耳送倚序我之先由永嘉之難避地江外占數于上饒及劉展之冦又遷于閩粵治産殖貨以財雄於建安世為強宗髙上武力唐室之季亂離云瘼禮樂征伐不出本朝無種而起為王侯稱兵而分據州郡故王氏奄有無諸六郡之地盤牙交錯莫非勍敵候望走集悉嚴兵偹故我內外家世皆服縵胡而冠武辨總輿師而提尺籍輜軿鼓吹盛於一方而羣從叔季憑藉世資習尚豪舉競養聲利爭為節俠唯玉山府君勞謙降志刻苦讀書好學之名聞于州里以孝廉射策委質江吳以儒雅從政仕至宰邑無何黃旗運盡琴堂秩滿考槃故里啓手歸全太常府君博涉藝文尤深左氏終鮮兄弟不遑充賦未及中夀遘兹大禍家無擔石之蓄門無強近之親藐視諸孤朝不謀夕我是時以一命為蘭臺正字尚未及志學之嵗遽罹憫凶將就死滅爾曹皆丱角稚齒俱未成人田園汚萊裘葛不具堂構頺替弓冶漸微既泣血終喪即割慈遊宦艱難險阻備嘗之矣既而索米都下薄遊外郡又三嵗以文三十篇獻于公車始得為太常奉禮且有中旨閲書於祕府日享公膳月受俸緡未能亢宗財足糊口而太夫人與汝曹仰給薄産終嵗食貧我又智效一官相去萬里晨夕引領不覺涕之無從也我亦進德礪行修詞聚學又得册府祕書夙夜研習曽未期月頗有文章出于人間為前輩所許又頻詣司馬門獻賦頌天子益知名凡再嵗間一召試內署一應制行在得光祿丞賜進士第復受詔直集賢書院星律載周寵光舉集稽古之力豈誣也哉得祿既豐思養彌切削牘為奏賜告言歸自建安扶迎太夫人并挈汝曹盡室西上僑寓輦轂殆兹嵗星一周于天矣而我以不肖之質中人之才黃屋過聽擢司雅誥敢不摩揣鉛鈍勵精夙夜期有以潤色帝載與三代同風奈何力不逮心位過其量嵗祀逾久官謗囂然不能上封自劾幞被引退乃猶束帶就列俯首取容碌碌於薦紳間亦顔之厚矣今年汝舉進士有司薦名我時侍從穆清親逄旦暮天子又賜汝髙第自丙科而升乙科俄頃之間恩奬蕃縟汝之仲兄及季弟比年來聖人誕生之辰延賞近侍並得解褐試秩蓬丘每朔旦列拜膝下私門嘉慶嵗時伏臘捧觴上夀懷黃佩玉趨走左右固足以慰太夫人之心而伯仲森列門無白丁亦足以為鄉曲之美談交逰之光寵也今汝申天官調補掌簿四明期以來年往代其任且將歸省松檟盤桓里閭俟春夏之交乃涖厥職汝當念為士之道以仁義是務而間宴不可忘為吏之方以法令是師而資材不可強事上貴乎恭而慎於諂臨下尚乎簡而懲其違至於淳素之風清白之訓蓋我之家法耳豈復鄭重而言之哉若乃博約文史切磋道術此又朋友之事也吾何與焉汝之歸吾黨之人有問於我者為言受恩寖深涖官無狀如衛鶴之有祿位若社鼷之載車馬悲愁憂畏不遑寧處幸天子一旦澄汰流品考核名實不能者止奉身而退固願返初服奉版輿從諸鄉先生優遊以卒嵗也武夷新集卷七
