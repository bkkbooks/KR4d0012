body:
  text: 武夷新集卷二十宋楊億撰啓上河陽太師相公啓右某啓伏審榮鎮近藩巳赴禮上伏惟慶慰伏以太師相公靈鍾象緯識茂經綸宣勳力于兩朝决機謀于千里傅巖良弼聿彰啓沃之勤鄼國宗臣克著規隨之效爰擁旄而出鎮亦緩帶以臨戎再秉鴻樞薦升黃閣行臺肇建總北落之雄師斥候載嚴制南侵之黠馬聊運七擒之妙亟傳三捷之音揄塞塵清既髙枕以無事芝泥詔下遽介圭而來朝前席延登捧觴稱慶一人虛佇載加體貌之恩六纛啓行式煥股肱之地表海益光于賜履誓河用示于報功矧裂壤數圻經途四達兹為巨屏實控上游偃息作藩既增重于九鼎詩書為帥固坐鎮于百城永隆夾輔之勳聿享期頥之算某忝承台奬實切䖍祈答京東轉運史館姚起居啓竊以螭陛記言任專筆削隼旟按郡職在澄清所以建使節于外臺彯朝纓于文陛底慎財賦致軍國于富强昭明策書舉春秋之凡例自非藴析豪之精力負掞天之雄才聿當虛佇之辰豈副至公之選起居學士氣衝斗極名震京師學通亡篋之書理勝論都之賦一自決科漢殿通籍周行出頒詔條允洽二天之詠入奉計最亟延三接之恩爰飛步于亨衢久育材于近署次宸章於柏殿典祕記于蘭臺諍臣七人夙推謇諤王畿千里嘗督轉輸京坻載集于見糧綮肯固彰于餘地昨以河出砥柱如竹箭以奔流郡厯東平致金堤之壞决宣房未塞夷儀卜遷瓠子興歌正下淇園之竹原田發詠大懼厯陽之魚暫輟英賢式撫新邑期㑹簿書之急繕完版築之勞祗役惟寅成功甚速水反故道免東海之桑田人服先疇識新豐之雞犬永無虞于昏墊實仰賴于神明既安堵以阜生將解龜而受代載加命數仍委事權當九重注意之初在列郡承風之地海岱之壤俗號富饒齊魯之邦氣多舒緩諒宣寬大之詔用躋仁壽之期至如奉三尺之行書克勤刺舉調千金之粒食無事誅求此又掩心計于研桑笑霸圖于管樂良史之任聊為假道之資富人之封固可翹足而待某幸窺除目方切欣愈遽辱長箋過承謙損願言銘佩無以喻云答史館盛屯田啓竊以四方上計實領于南宫三署為郎逺從于西漢主文書起草者蓋出于妙選掌户口墾田者素號于劇曹自非籍甚聲猷間練故實述平樂之詞賦飄飄遊天地之間挺京兆之容儀堂堂出風塵之外即何以更直建禮趨走赤墀之途典校鴻都筆削素臣之傳欽聞成命允謂當仁員外學士學殖堅深神鋒耀頴擅東南之美馳譽無雙登賢能之書對策第一自翰飛于仕路諒冠映于朝倫職佐地官頗版圖之增羡經中博士亦綿蕝之居多矧復參汗簡之刋修奉和鑾之遊豫陪外庭之髙議次藏室之遺編氣蓋羣英吞雲夢者八九辨摧異學服稷下之千人莫之敢當無出其右汝南品格固首出于月評天祿職司亦久次于官牒爰膺慎柬尤謂美遷麟臺仍草於國書雉省共評于事典上應列宿蓋懸象之著明藏之名山乃立言而不朽職業甚重公論攸歸側聽風聲用清心目顧欣愈之所集辱箋簡之俯臨荷眷奬之殊深豈引喻之能既與集賢楊太博啓竊以待詔承明之庭漢得人而為盛修書麗正之殿唐置使以甚雄故子雲以詞賦擅名燕文以史筆自任汔今官司未改祿秩彌優公宴舉觴禮均四輔禁門通籍地接千廬自非學洞縑緗識參繫象博物幾乎子産屬文似于相如即何以記三篋之書諸儒歎伏獻四巡之頌當寧嘉稱允屬宗英式光俊選太博學士仁兄治行尤異秉心塞淵體大雅以成文蹈中庸而為德朱絃疏越宛有正聲玉水方流自懷至寶由計偕而旅進乃籍甚以馳稱紫庭亟覩于决科黃綬旋聞于隨牒刺姦南部載宣懸棒之威求瘼畨禺益勵酌泉之操適討論于邦典仍幹掌於關征聚貨殖于五都米鹽斯劇考質文于三代綿蕝居多俄慷慨以上書果深嚴而召試平津第一諒博極于天人江夏無雙且恣觀于圖史顧亨途之伊始實輿議之攸歸矧瀛洲列仙之珠庭羣玉上帝之册府昔者金泥石䃭嘗草東封之儀縹帙藝籖重定開元之月今天孫俟翠華之幸屋壁藏科斗之書必將講故事于乾封聿修盛禮訪遺編於汲冢大備闕文罄竭誠明彌縫職業苟非鴻碩曷副疇咨某忝預宗盟並荷堂構二惠敢期于競爽萬石徒喜於不衰側聽寵遷幾至抃舞幸同柏恱誠臭味之靡殊願比葛纍庶本根之攸庇豈期撝抑先賜箋函感惠顧之所臨但佩服而無斁上河陽太師相公啓伏覩內降制書伏審太師相公榮膺寵命伏惟慶慰伏以太師相公道光人傑才耀國楨克彰佐命之勳夙茂經才之績爰自總萬機之宥密擁十乘以藩宣敦郤縠之詩書聿開義府仗孔明之節制載肅戎麾鳳池爰副於具瞻虎落尋清於外侮執圭肆覲奉旒扆於當陽裂壤增封錫山河於右地今者卜郊定位類帝禋宗降明詔以褒功推湛恩而進律開府之貴均禮秩于三公賜履之榮益井田之千室允為異數載答殊庸某夙荷重知方遙巨屏側聞成命竊抃丹𠂻望初筵而莫遂鳬趨瞻大厦而空懷燕賀依戀之至倍萬常情上陳州太尉相公啓伏審光奉制書榮加寵命伏惟慶慰伏以太尉相公天資全德嶽降上靈黃石一編早契神傳之妙傅巖三命式符帝賚之祥爰自蘭錡訓兵齊壇謀帥伏波方略既暗合于孫吳郤縠詩書遂率先於狐趙而鑿門受律堅壁防秋斬級雲中克清氛祲散金廡下大振威名旗常備載於勳庸屏翰益光于倚注式分右地爰踐中台申伯藩宣諒夾輔于周室假干偃息蓋臥治于淮陽今者肆類郊邱推恩方鎮進掌武之秩用冠三公加食菜之封更踰千户表聖朝之尚德見明詔以褒功慰四海之具瞻實九鼎之增重某分庭納顧雖殊荀范之衆人賀厦翹誠莫預申陵之下客欣戀之至倍萬等夷又近者伏䝉台慈特奏建州浦城縣道場觀音禪院僧德威巳勑下賜紫衣者仰荷恩私伏增榮感竊以某旋惟單緒門襲素風清白相承本從關輔亂離云瘼尋徙江吳更因唐季之稱兵遂抵閩禺而占籍堂構巳經于數世松楸皆在於彼方爰從祖禰巳來雅奉竺乾之教聿崇像設式表歸依乃建精廬載延開士捨良田而供給闢淨土以焚修僧德威實主仁祠能邁戒律雖四衆闈繞彌天之辨未聞三界輪回出世之緣尚淺然克禀六和之訓頗通九部之文梵宫式籍于主張相府遂形于陳乞敢謂太尉相公俯矜懇悃特賜允俞奏章逺達于宸嚴命服遂沾於慶澤光生鷲嶺喜動雞園諒衣錦還鄉豈讓買臣之故事在種蓮結社更修惠逺之良因顧于鯫生實受大賜雖窮毫幅難叙感銘與兩浙轉運史館孫起居啓竊以古者設記言之官立司過之史職當汗簡固君舉而必書事及翦桐表王者之無戲爰自分曹兩掖通籍九門陪鹵簿於林光出參法從接公槐于文石入奉內朝最親咫尺之顔實草起居之注自非通邱索典墳之學挺忠肅恭懿之姿即何以束帶彯纓預周行於螭陛懷鉛持槧約魯史於麟毫允屬時英克符師錫起居學士詞源沃日文律融春潁水生賢占荀爽無雙之譽漢庭發䇿得平津第一之科外參竹使之符歸踐石渠之署閲圖書于冊府方討典經幹鹽鐵于縣官遽商功利自爾陟諍臣七人之列足太倉九歲之儲靡施次骨之文而庶邦震肅不假析毫之術而內帑充盈率經義以治財奉詔條而集事爰膺慎簡聿副疇咨亟推進秩之恩更賴當官之業昔張蒼以列侯之重主郡國之計書杜預以常伯之崇領江淮之轉運允資餘地兼總外臺分南董之官曹運研桑之心術即俟上林朽貫復全盛於西京大輅鳴鑾展封崇于東岱便入金鼇之署式揮玉牒之文翹祝之誠實在於此與史館檢討陳祕丞啓伏審光奉聖恩榮兼美職伏惟歡慶竊以良史之任歷代所難自非通倚相邱索之書專羊盻春秋之學博物稽古多識舊章變例發凡深窮微㫖加以書法不隱有骨鯁之風多聞闕疑無胸臆之論三長之才識兼備六家之論議所宗即何以繡斧衮章由一言而褒貶藝籖縹帙垂百世以勸懲適㑹昌辰聿崇大典筆削之任推擇攸先綸綍之行僉諧允屬祕丞學士德侔溫玉道類直繩勵清節以澡身聚多文而潤屋祥摽竹箭早擅價於東南譽冠雲龍實飛聲于京洛爰自懸科命中通籍允升黼藻斯文羽儀列辟南州髙士掩茂躅于置芻漢庭諸公讓博聞於重席乃至薦雄之章狎至召鄒之命亟行猶復未登兩馬之車願奉三年之計既解龜而受代方束帶以立朝果召試于清臺遂榮歸于延閣掌載言于汗簡佇昭明于策書資待問于撞鐘式講求于典禮南董將伸于遺直游夏豈敢以措詞自兹素王繫月之文不從廢墜絳老疑年之對有所咨詢永為吾道之指南克副大君之虛佇幸覩得人之盛但萌竊抃之心遽辱箋封備形謙抑感慙欣荷無以喻名與孫舍人啓竊以三代誓命著于尚書兩漢訓詞號為爾雅然而經祖龍絶學之後頗多闕文處金馬切問之司止令視草故方䇿之言未備亦潤色之業非專爾後慎選臺郎入居禁闥殿壁塗粉始更主于文書省樹棲雞亦通掌于制誥施及唐室實司堯言職業涖于掖垣備存六典判署聯于台鼎是號五花乃至奉武帳之論思平文昌之奏議泛樓船于汾水舉觴中流校羽獵于長揚獻賦行在陟降上帝之右親日月之光華踐履赤墀之塗接䕫龍之武步蓋從臣之佳選固明主之簡心舍人素履時中英詞鼓動敏行具聖人之體博聞推君子之儒爰自委質休辰飛名華貫鴻都汗簡復春秋之舊章螭陛含毫成起居之新注適屬疇咨俊乂啓迪徽猷俄召試于宰司遂榮登于禁掖言成綸綍用裁誕告之文腰佩龜緺更旌稽古之力欽聞成命允叶至公某夙以孱庸濫塵清切妨賢有素補職無聞愧彌切於濫竽榮遽諧于倚玉盈川自省謬居盧駱之前文園後來合處鄒枚之右尚兹始隗安敢望回踧踖唯覺于負芒澄汰誠甘于幞被忽承箋簡過示謙冲仰荷眷私伏增銘悚與祕閣劉校理啓竊以中祕之府實藏王者之書簡策相沿規模咸在是以麒麟之閣西京典於校讎蓬萊之山東漢徵於比象乃至薛夏建議內外始分鄭默勵精朱紫斯别既備三閣之制度且列四部之籖題施及聖朝申明前典直太微之左掖飛觀雲連購先秦之舊編縹囊山積詳延俊乂崇樹官司義府攸歸卿材是育修書仙殿逺侔置使之雄待詔公車用顯得人之盛自非髦彥豈預僉諧某官德茂溫良詞標典麗爰自命鄉觀國筮仕策名縣道臨民適動徒勞之歎銓衡課吏薦登尤異之科屬慎柬之方初俾有司而試可及服勤之云畢果明詔以疇庸遷棘寺之要官掌蘭臺之祕記步武石渠之近署討論金匱之羣言扈蹕甘泉即獻從臣之嘉頌紬書天祿佇期太一之下觀乃眷方隆雄飛莫測與嚴殿丞啓旬日前特䝉殊念垂示華編曲形過聽之私俾獲榮觀之願耽味無斁降佩兼深竊以伏羲之受河圖述作由兹而始仲尼之為木鐸文章可得而聞自兹秉筆之流固亦駕肩而出立言不朽何代無才殿丞刻志縑緗勵精翰墨爰自命鄉論秀早中髙科學古入官不忘素業賾化成之深㫖體潤色之宏規登髙動能賦之心下帷有著書之志乃至作檄楯上聿成插羽之文詠詩坐中特擅燃箕之妙及從大夫之後益彰君子之儒方今開祕閣以集時髦剽甲兵而崇學術巖廊贊德載𢋫元首之歌𤣥扈凝神更第從臣之頌眷惟俊乂即副柬求豈意頑疏許披藻麗文以博我蓋辱于同聲暗而投人恐成於虛擲但諷誦于唇吻永緘祕於巾箱自兹已還未知所措與史館王大著啓竊以太史之職受郡國之計書中祕之司掌古今之載籍爰暨方來之服式隆再命之榮自非時髦豈塞僉議大著學士才名籍甚意行瑰琦挺丘園耿介之姿澤霧雨文章之美爰自薦能鄉老階尺木以方初命中澤宫聽先鳴而咸服旋策賢良于祕殿遂登造秀之首科諸生偃于下風萬乘幾乎前席千里之足果見縶于場苖連城之珍終混成于國器俯及瓜時之代俄頒芝檢之文落筆中書之堂英詞煥發束帶大夫之後成命亟行便髙踐于石渠仍寵加于銀印書法不隱既遺直之是資車服以庸亦稽古之無忝佇演素臣之傳克成靑簡之功入直深嚴只在伊匪與王虞部先輩啓竊以江左取士東堂存策試之名唐室求材南宫設科第之盛得賢之美垂裕無窮允屬欽明克敦文雅臨軒考校前席咨詢張彀以攬英雄錯薪而刈翹楚堯心定于取捨軒鑒照于妍蚩掩曠代之舊規著聖朝之令典顧惟褒博實契遭逢郎中先輩羽畎竒姿空峒徑氣夙負佐王之略不閲非聖之書彪炳成文虎豹異犬羊之鞹扶搖上擊鴻鵠非燕雀所知矧以束帶金閨含香畫省擁彤襜而刺郡曳朱紱以立朝而猶獻志業于公車希彚征于貢部鐘鼓在宫之韻固巳聲聞琮璜成器之珍豈煩試可果頒芝檢髙踐桂科題鴈塔之姓名榮聯玉籍赴杏園之宴集載促星軺極美事于昌辰鼓芳風于文苑寵章舉集顯遇方初敢謂恩私特貽箋翰祭文七首宣陽觀祈雨文咸平二年月日知軍州事楊某謹遣麗水縣尉侯儼以香黍酒紙之奠致禱于宣陽觀葉天師之神卉物具腓驕陽為患倬彼雲漢昭回于天畏景載炎膏澤靡降川源將竭稼穡卒瘏比屋嗷嗷大命近止去歲小歉斯民薦飢貧者不厭于糟糠富室亦空於擔石羮藜啜菽力耕數耘期乎有秋以續其命而朱夏將半溽暑方隆肥􅖆興妖旱魃為虐人亦勞止天其忍諸唯神佐佑化工惠綏兹土廟貌載肅陰隲孔昭乃眷含生詎可無意人者神之主食者民之天民失其天遂至於死神乏其主復將疇依神其鑒兹下誠請于上帝使龍起沮澤蜧躍曾波電鞭一揮雨足散灑溝塍流溢溪谷沸騰藁然善苗如揠而長年榖大稔厲鬼不行家獲倉箱之儲人免塗炭之患當潔祀典以答神休若分野纒災陰陽作沴凡有殃咎宜加守土者之身百姓無辜庶可以免宣陽觀賽雨文近以愆伏之氣沴于陰陽旱暵之災延于稼穡某忝守兹土不敢遑寧雖天災流行厥有冥數而神道正直享于至誠惟天師敷佑一方厯祀浸逺功濟萬彚化馳九幽慘舒天吏之權陟降上帝之右肇建真宇聿為殊庭尸祝具陳若亢倉之居㟪􅕲祭祀不絶猶朱邑之在桐鄉靈貺孔昭斯民攸賴是用備菲薄之奠陳危苦之辭願以一介之軀少贖百姓之命精意懇禱冥感𤣥通山川出雲天地交泰祁祁甘澤濡涸轍而有餘莓莓原田取嘉榖而可冀明神無乏祀之愧農夫慰望歲之心夫如是神之降祥至矣民之受賜深矣當與周弃播種百榖勾龍平易水土功德相若社而稷之雖肹蠁無方髙明不宰然豺獺有祭亦出於自然黍稷非馨豈資於備物爰潔祀典以答神休適因昭報之辰更露䖍祈之懇以畏日流毒多稼向榮水泉枯乾山田磽確民非稻不食稻非雨不滋秋孟已來浸潤恐竭豈昔也如響之斯答而今也為惠之不終一簣之功儻或中輟一溉之益亦必後枯神其鑒兹下誠終乃前烈殞越顛沛罔敢自安洗心瀝肝仰冀冥助中書祭周王文惟靈育質星潢分輝霄極性資敦敏體茂溫文內寢承顔辨彰對日上庠齒胄兆啓洊雷篤慈愛於兩宫襲慶靈於百世在三之訓允契於生知並建之文式光於邦典將佇壽街之對遽促瑶山之期美疹弗瘳英猷永謝悲纒宸扆痛結宫闈神醫靡逢致倉舒之不幸仙期斯迫同子晉之上賔今者先逺戒辰塗芻備物掖庭悽咽行路涕洟某等叨預弼諧實均休戚吹銅叶吉早徒祝於靈長埋玉興嗟今永懷於徽懿聊陳薄酹用薦丹誠明哲如存儻垂歆鑒中書祭安王文惟靈溫文育德明允存誠自天攸縱乘時挺生始勝衣而趨拜乃錫壤以連城銅梁井絡朱方廣陵時惟邦翰迭寄宗英列邸清禁藻梲連甍趨朝文陛佩玉鏘鳴傳百世之本枝蓍龜襲吉對三雍之雅樂簡䇿飛聲爰自蒼震承乾龜䝉胙土分寶玉以展親增脤膰之異數宗子賴以維城王室繄其夾輔每為善以自娛唯聚書而是務掩河間之藝文盛兔園之詞賦桐圭之寵方深駟隙之光靡駐遽歎逝川倐悲先露空碣館之金臺悵淮山之桂樹爰詢逺日乃卜新阡兆逢龜食地得牛眠啓佳城於旭旦瘞美檟於重泉顧銘旌之將引實行路以悽然某等獲事公朝謬塵宰府每接音徽親陪步武痛仙馭之賔天閉夜臺而終古拜送靈輀躬陳薄醑聊執紼以申哀慨臨觴而不御二司使祭安王文代上谷公惟靈若木分輝渾金育質性敦􅥽友體茂溫文爰自賜策漢庭作藩益部乃眷斗牛之分盡荒淮海之邦克樹風聲以屏王室洎膺乾出震運啓重熙分器采章禮加異數茂徽猷於麟趾錫壤地於龜䝉方將傳百世之慶靈奉兩宫之歡宴俄遘夢楹之禍忽嬰藏壑之悲藥靡驗於上池神遽歸於太素梁園霰雪悵枚叟之何依緱嶺烟霞與浮丘而共往今者將臨逺日永即幽扄鹵簿宵陳銘旌前引哀深行路痛結宸關某幸忝國恩式司邦計愴磐維之永謝屬窀穸之有期泣送靈車躬陳薄酹仰期聰直尚克歆嘗代王氏祭故鄭國長公主文惟靈寶婺淪輝銀潢育粹降靈帝胄稟訓公宫居循圖史之規動叶珩璜之節爰自降嬪啓兆下嫁承榮仁洽宗姻禮均娣姒天光燭耀式諧鳴鳯之占戚里歡怡仰賴卿雲之蔭不謂衰門薄祐神道挺災秦樓運迫於登仙魯館哀纒於復魄九轉之丹靡驗百身之贖奚為六親悲極於墜淵九族痛深於崩角今者俯臨先逺奄及攢塗池翣啓行笳簫載路望靈輀而雪涕徒極攀號酌清醑以薦誠尚希臨鑒中書祭鄆王文惟靈分暉霄極育德英藩謙卑不伐慎重寡言爰自分封胙土授册臨軒疏邸第於禁闥奉朝謁於天閽碣館平臺與正人而遊處燕居退食唯善道以思存睿哲承乾文思廣被寄重維城禮優分器自閩粵之名區易咸陽之內地紫微八柄之崇帝傳三槐之貴寵極褒揚恩隆宴喜郊丘助祭夙夜齊莊方嶽陪鑾風霜跋履擅占對於璧池暢聲詩於麟趾皇輿展義京邑居留委茂親之管籥清多壘之戈矛念神州之重任戀重瞳兮涕流俄在膏兮生疹顧勿藥兮靡瘳啓白日之佳城於兹永已瞻小山之桂樹不復重遊痛結宸襟兆開真宅卜逺日於元龜咽哀笳於廣陌遡窀穸以言歸愴音徽之永隔某等叨榮台席接武晨趨想英風於世表望靈輀於路隅永懷明德寅奠清酤期降靈兮肹蠁恭執紼以躊躇齊醮文七首惠明皇后忌日讃佛文伏以神遊已逺方尊如在之靈佛事載嚴用植無邊之福爰及上仙之日聿崇衆善之因伏惟惠明皇后積德流光敦仁錫羡長秋追號允鍾似續之祥清廟薦誠克茂吉蠲之禮今皇帝運鍾下武義篤奉先祇荷宗祧永懷祖妣俯臨諱日誕舉國章特就精藍聿陳净供㑹威德六和之衆瞻慈悲三界之尊庶慿金地之良緣克奉玉清之仙駕惠明皇后早䝉佛記常住天宮受百福之莊嚴證一乘之解脫配食永隆於廟貌卜年更祐於邦家今皇帝伏願位固金輪功周沙界五兵不試盡銷楚鐵之英萬壽無疆益茂莊椿之算然後願列藩荷寵更隆磐石之基當國輸忠永著和羮之效百辟咸傾於誠節萬民共樂於升平凡居覆幬之間同被文明之化代門下相公承天節讚佛文伏以妙覺能仁出現於大千世界深慈救物宣說於十二部經形悲智以悟羣生示辨才而持正法龍宫海藏爰祕於金文東夏南閩式傳於像教所以植衆德之本結淨土之緣趨三寶以歸依發一念而回向六時讃唄克成上善之因四事恭勤用廣有為之福伏願尊號皇帝陛下金輪益固玉葉彌芳體大德以庇民推至仁而御宇深信內典入不二之門安住佛乘享無量之壽永保後天之算長為諸夏之尊然後願㝢縣承平類四禪之清淨朝野多慶承百福之莊嚴止戈載洽於昌期拂石莫量於浩劫凡居法界盡證菩提餘請表白元德皇太后忌日讚佛文伏以堯門積慶適鍾聖母之祥佛國往生更賴法王之力屬忌辰之斯屇痛仙馭以難追伏惟元德皇太后沙麓炳靈塗山育德紀徽猷於彤管美播聲詩伸嚴祀於閟宮禮崇孝饗今皇帝表懷顧復深念劬勞感昊天罔極之恩崇净土有為之果每值上仙之日克修衆善之因瞻十力之慈尊㑹五天之梵衆載嚴佛事式奉神遊元德皇太后伏願聞法靈山棲真內院念超三界髙臨解脫之方智入一乘早證摩耶之果今皇帝伏願金輪永固寶厯彌昌武庫櫜弓見逺夷之率服仙衣拂石同聖壽之延洪然後藩屏磐維固本枝於百世樞衡鼎鼐平懸象於三階羣官盡效於忠貞萬姓咸躋於仁壽代僕射李相公承天節設齊讚佛文竊以六通應供從兜率以降生三藏契經假貝多而流布所以作羣迷之歸救述大事之因緣自夢叶於金人始俗傳於像教香花四事式陳於焚修鐘梵六時聿嚴於齊供爰植無邊之福用成衆善之因伏願尊號皇帝陛下位等金輪功周沙界道齊千佛澤被四生邊陲載戢於五兵府庫常盈於七寶御世比能仁之福統天同大梵之尊八部歸依六戎欵附華封祝聖克隆萬壽之期震旦興王永護一乘之法然後願朝野多慶興禮樂於三雍㝢縣無虞息烟塵於四鄙載洽淳熙之化同躋富庶之鄉凡在含靈並登正覺伏請表白明德皇后中祥讚佛文伏以丙殿上仙四氣俄周於歲律祗園薦福一人方極於孝思是崇出世之良因以奉在天之神馭伏惟明德皇后髙丘襲慶沙麓儲祥作合神宗二紀式隆於陰教居尊長樂萬方同仰於母儀俄運逼於真遊固哀深於宸極今皇帝至仁守位盡禮事親慶方洽於承顔悲忽纒於曷恃家邦異制勉遵易月之規霜露永懷彌切因心之感𤣥寢已終於逺日忌辰爰及於中祥特就精藍䖍修淨供㑹南洲之開士崇西竺之妙緣庶慿大覺之深慈克證上生之聖果明德皇后伏願寶乘悟法花界棲神受佛記於雙林福星圖於百世今皇帝伏願萬靈薦祉千聖垂休壽考無疆克叶山呼之數干戈載戢永扶海晏之祥然後願親賢育德於懿藩輔弼宣猷於宰府羣后竭輸忠之效庶邦堅共治之誠凡居普率之間共洽升平之化太宗皇帝忌日讚佛文伏以軒遊已逺百年方仰於威神堯厯惟新萬乘彌深於孺慕每屬上仙之日益懷罔極之悲是崇衆善之緣式廣因心之孝伏惟太宗神功聖德文武皇帝握樞御極恭已臨民耀神武以混車書體至仁而懷動植焦勞致治早鍾厭代之期錫羡貽謀光啓卜年之祚今皇帝允膺帝籙誕擁天休紫壇隆升配之儀清廟著不祧之典晬容載穆聿嚴如在之靈諱日俯臨更極以時之感爰就布金之地仰瞻被衮之儀四衆翹誠千官就列遵竺乾之教修香積之齊用慿供佛之良因以奉在天之神駕太宗皇帝伏願髙居智地常御寶乘證大梵之尊嚴俯祐三千之界福丕圓於悠久彌昌億萬之年今皇帝伏願八表歸仁百靈薦祉西清聽斷垂裳臻大定之期東岱告成探策表無疆之算然後願黃扉良弼益光咨嶽之謀朱邸茂親克保維城之訓四氣咸均於嶰谷五兵永戢於靈臺凡居普率之間共樂淳熙之化為中書相公作醮文竊以天道𤣥逺每居髙而聽卑神理聰明唯至誠而通感矧處最靈之列仰承洪覆之仁荷戩榖以居多被寵光而彌厚實懷憂於非據輒謝過於巳然伏念某本以諸生早塵貴仕再登廊廟驟正台衡徒竭寸誠無禆大政久辱髙位頗鬱具瞻當循名責實之秋處論道經邦之地萬錢賦祿但愧於素餐百度彌綸更聞於補職有妨賢路深畏官針且慮徼福逾涯貪榮過分冒兹人爵或致身災是用䖍瀝至懷上祈𤣥造伏冀髙穹降鑒列緯儲祥察兹夕惕之心矜以時亨之幸少歆蠲潔俯納精誠垂祐顓䝉俾銷罪沴懇禱之至殞越無從武夷新集卷二十
