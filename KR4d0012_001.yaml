body:
  text: 武夷新集卷一宋楊億撰詩一六十九首奉和御製社日詩仙掌凌空沆瀣秋大田多稼似雲浮天邊霽景芙蓉闕江上殘芳杜若洲東觀羣儒宣宴樂南荆遺俗重嬉遊宸章忽降容瞻覩疑是神龜負九疇奉和御製重陽五七言詩宸居瑞靄重閶闔正來風憀栗驚秋氣豐穰美嵗功曉煙籬菊嫩霄露畹蘭紅重九登髙㑹歡娛處處同民在華胥正樂康髙秋賓雁指衡陽蒹葭漸見凝清露鶗鴂先驚歇衆芳節值登髙真勝㑹年逢大有是殊祥宸心悅豫流新唱星漢垂文示八方奉和聖製南郊禮畢五言六韻詩燔柴就陽位煙燎逹髙穹掃地鉶㽅潔嚴更鼓角雄天心侔兑悅皇澤比春融帝享惟馨德民蘇解愠風周郊四祭重漢畤五祠同靈貺昭𤣥感神光望拜中奉和御製契丹出境將議回鑾五言六韻詩戎輅巡河右天威讋鬼方五營開細栁三令凛飛霜氛祲消千里聲明耀八荒靈旗風助順黃道日呈祥偃革邊關靜回鑾海縣康欣陪從臣末歸蹕奉髙驤奉和御製南郊七言六韻詩潔齊恭已奉蒼旻報本圜壇備物陳酒縮楚茅三獻畢灰飛嶰管一陽新髙空瑞氣長隨輦永夕清霜暗濕巾泰畤迎年嚴漢祀六宗祈福盛虞禋鴻恩渙汗霑窮髮睿藻昭回動紫宸庶彚熙熙蒙帝力徒知擊壤效堯民奉和御製喜降時雪七言四韻詩一夕香街布玉塵檀欒徑節露貞筠兔園置酒皇歡洽柏殿賡歌睿唱新麥秀原田初望嵗花開苑樹忽驚春豐穰薦瑞民心悅髙下還隨帝澤均後苑賞花應制以時字為韻咸平四年三月十八日宫花如錦水連漪翠輦尋芳正是時禁苑定知人未識朱欄除有蝶偷窺艷烘曉日迷天仗香逐輕風落酒巵何幸微臣陪鎬宴蓬壺春漏正遲遲又應制賦射弓詩以弓字為韻六韻水漲方塘緑花開禁籞紅同瞻萬乘主親御六鈞弓曲應騶虞節春回太皥功還須殪大兕何只落驚鴻一箭天山定三邊虎穴空潯陽射蛟者寧與此時同後苑賞花應制以春字為韻成平五年三月雲羅霞綺媚芳辰瓊圃花開爛漫春風遞清香隨鳳輦波涵倒影落龍津仙葩四照烘初日濃艷千苞賜近臣向晚天街戴歸處遊蜂舞蝶自隨人宣召赴龍圖閣觀太宗御書應制五年十月非煙葱蔚蒼龍闕紫府深沉大帝居羣玉中天開䇿府神龜溫洛薦圖書珠宫岑寂經行處金簡熒煌拭目初曾是先朝受恩者因探禹穴涕漣如後苑賞花釣魚應制六年三月十六日奉聖㫖以芳字為韻宜春小苑斗城旁錫宴羣仙奉紫皇漢沼乳魚偏傍釣青陵舞蝶自尋芳波平鼇背浮崑閬日轉金莖艷赭黃滿酌流霞侍臣醉暖風宫蘂雜爐香别賦賞花一首不曾進仙山靈沼五城西曉日花光照彩霓露濯冰蠶鋪瑞錦風吹水麝拆香臍芳葩散採添蜂蜜紅片狂飄雜燕泥曾識壺中舊春色桃源重到路猶迷龍圖閣㑹宴應制景德二年四月草一日册府藏書在紫微退朝稽古助論思中天召宴衢樽滿乙夜觀文列象垂綵鳯翩翻巢綺閣靈龜夭矯冠金碑大風發唱羣臣和元首康哉庶績熙祕閣賜宴送右諫議大夫种放得假歸終南山應制瑣闈聊輟皂囊封賜告歸尋一畝宫關路蒲輪千里逺巖扉蕙帳幾年空百壺天酒凝甘露二雅宸章掩大風舊隱暫還非久住心期獻可沃堯聰初至郡齊書事到處州巳後地去京華逺年逢旱暵餘羣胥同黠馬比戶甚枯魚煦嫗心空切澄清志莫舒棼絲殊未治錯節詎能除聽訟棠隂密行春栁影踈賓筵求婉畫僧舍問真如踰月窺除目經時絶傳車素餐徒自飽投刃豈曾虛盈耳嫌敲撲堆牀猒簿書故園無數舍長日歎歸歟次韻和十六兄先輩見寄秋風苦憶鱠霜鱗暫剖銅符出紫宸一路雪寒多挾纊幾程山險欲摧輪清香撲鼻梅林近秀色凝眸麥壠新閉閣草𤣥終寂寞下車為政尚因循尋僧不厭携笻逺愛客寧辭舉白頻簿領孜孜防黠吏丘園矻矻訪通民魚鹽自與滄溟接雞犬仍將白社鄰官滿㑹須拋印綬武夷歸去作間人次韻和章子美對雪破臘連空粉絮飄離離一畨長山苗旗亭誰氏來沽酒臺笠何人去採樵背日旋依松澗積迎風先傍藥畦消袁安此際偏無賴獨掩間門對一瓢送章頔歸鄉蕪穢休嗟負郭田蹉跎自過鹿鳴筵荆山玉璞空三獻梁苑風塵已十年疏入禁中猶未報賦成都下早曾傳獨携書劒歸閩嶺共泛煙波入楚天獵獵酒旗邀舉白招招漁艇勸烹鮮棊枰鬭勝疑成癖砧杵驚愁幾廢眠驛路數程煩託乘郡齊終日喜談𤣥如何弃我還家去相送津亭一黯然郡齊即事書懷十二韻呈諸官長樂踈鐘自厭聞漢庭誰不惜離羣舟浮一水波瀾濶路入千山杳靄分郡閣先憂迷簿領村田聊得問耕耘疲民深喜猶安堵去年小儉幸免流亡黠吏那知便舞文鹽酒案吏陳元凱受賕為姦舞文變法其事已敗照膽求瑕空察察飲冰為政漫云云𤣥臺已分嘲揚子桑野須防誚使君别派東傾連漲海故園西望隔晴氛黛鋪逺岫秋將晚綺散餘霞日欲曛小檻報春梅爛漫滿空呈瑞雪繽紛題詩到處尋紅葉置酒終朝看白雲符竹偶分慙出守櫜鞬暫佩愧從軍石渠舊署頻牽夢室有芝蘭閣有藝郡齊西亭即事十韻招麗水殿丞武功從事郡齊退食復何為縱目西亭景物竒疊嶂雨餘泉眼出澄潭風靜釣絲垂城臨古戍寒蕪闊路轉荒村野彴危幾處唱歌聞白紵誰家酤酒見青旗蝶隨游妓穿花徑犬吠行人隔槿籬桃李成蹊春盡後魚鹽為市日中時桑麻萬頃晴氛散絲竹千門夕照移吟際嶺雲飛冉冉望中壠麥秀離離煙迷喬木鶯遷早水滿芳塘鷺下遲鶴蓋翩然肯相顧主人終宴豈知疲送張彛憲歸鄉處處春波滿稻畦海棠零落子規啼一麾逺郡方留滯十里長亭又解携後夜灘聲妨客夢初晴雲物入詩題到家為問田園事桃李猶應有舊蹊送韓永錫歸闕永錫業三傳又善小篆縉雲六載掌關征學得陽冰小篆成逋客幾人曾識面髙士頴川陳髙君之執友仙山到處便題名桑郊又是乘軺去鈴閣虛煩解榻迎舊讀春秋究微㫖何須苦說不知兵次韻和致仕李殿丞寅見寄之什因以紀贈李公寓居歷陽近徙於洪井鄉國馳名幾十春鳴臯一旦九天聞翔鸞棲棘曾為吏金鼎調梅未致君百里象雷嫌碌碌公嘗權歷陽縣政片言折獄厭云云公任三衢司理數考詩名已是齊康樂筆力何曾减右軍抗表忽然干鳳扆拂衣殊欲謝人羣都緣梁苑慵為賦且免鍾山被勒文清夜獨吟牛渚月髙秋時望帝鄉雲鯉庭禀訓門逾盛蘭畹傳芳氣益薰盡室逺依洪井側直鈎猶釣楚江濆西山有藥應須餌待看霓旌入紫氛京師故人有以隴西鸚鵡遺豫者因畜養之去年出守縉雲提挈而至性靈甚慧觸類能言公退玩之常若不足忽遇疾而逝因命瘞於小園作詩一章聊以追悼識者無罪豫以貴畜也隴山秋樹舊巢傾逺向江東逐斾旌去國夢魂應繚繞入春喉舌漸分明一聲警露何慙鶴百囀遷喬肯讓鶯終日雕籠心不戀經年丹觜色猶輕思歸悒悒因成疾顧主依依尚有情死葬小園芳草地夜來經雨緑苔生麗水甄殿丞移疾請告數日不逢黃叔度胸中鄙吝一時生如何民瘼偏能療却是詩魔未得平夏景清和妨命駕𤣥臺寂莫阻飛觥欲親髙論無由得須作文殊問疾行威上人五藴巳空諸漏盡冡間行道十年餘吟成南國碧雲句讀遍西方貝葉書清論彌天居士伏髙情出世俗流踈問師心法都無語笑指孤雲在太虛次韻和係郡齊書事之什係今名化竹使貪為郡金門懶上書征途沿木合縉雲有木合嶺若蜀道之棧閣也官舍類樓居郡齊杳在山頂平地甚狹四靣多搆亭榭以翼之密葉藏啼鳥澄潭躍戲魚波光搖島嶼霽色露閻閭圃蕙光風拂山苗淑氣噓開樽空愛客函丈孰宗豫清唳頻思鶴長鳴幾厭驢王武子雅好驢鳴豫素所不喜顔貧一瓢足嵇懶尺題踈薄宦無勞說長謡任所如神明定來舍莊室正虛虛次韻和章頔見寄雞忩十載共論文蘭室依然有舊薰雨雪共拋修竹苑煙霞獨訪武夷君隨珠照乘元無類天驥追風定不羣犬子賦成猶未獻飄飄詞氣已凌雲孫及歸吳興生近遊永嘉家在霅溪傍汀蘋繞舍香草𤣥偏寂寞為客苦恓惶澤國聊傾蓋春闈早擅場陔蘭行可採月桂自應芳稅駕臨滄海回轅指大梁裂裳趨逺道負米及髙堂季子裘雖敝安仁鬢未蒼明年杏園裏輒莫負春光己亥年郡中夏旱遍禱羣望喜有甘澤之應旱魃偏為虐陽烏益以驕何曾柱礎潤惟恐土山焦請禱彌增潔隂靈亦孔昭雲興不待族風細欲鳴條隱轔雷車轉霏微雨足飄層隂低匝野鴻霈近連宵庭樹含佳色村田長善苗蘚痕緣屋壁泉脈吐山椒轍鮒那憂涸園蔬豈待澆官渠逗水急客路裛塵銷掾吏階前賀耕夫壠上謡秋成知有幸嵗欲近𤣥枵寄章徵君水陸都無數舍程魚符龜印苦相縈夢魂長繞龍門坂姓字終懸月旦評鮑室清琴應獨撫融樽渌醑共誰傾春深詩石苔衣駮雨過書齊草帶生鴻寶枕中初得術丹臺籍上巳題名清談宛有南朝體嘉遁全忘北闕情金馬深嚴堪避世滄浪清淺未沾纓諸儒正議明堂事軋軋蒲輪即奉迎次韻和衢州席刑部早秋朱火熒熒向夕流林間一葉忽驚秋風來野渡聞漁笛霧斂晴天見蜃樓艷愛芙蓉開幕府香憐杜若老汀洲使君鬢畔多𤣥髮臨水登山不用愁次韻和席衢州憶洛陽春遊十四韻周漢經營跡未遐山川形勝最堪嘉前瞻闕塞千尋出旁逗伊流一派斜子晉鳳笙調夜月宓妃羅襪映朝霞洛神賦云逺而望之皎若太陽升朝霞何人貰酒青樓曉幾處尋春紫陌賒駿足每從金埓試芳叢多展翠帷遮出逢勝境爭飛蓋歸逼殘陽競走車庭竹惹煙披嫩籜臯蘭裛露長新芽嵩峰崷崒疑摩斗洛水清泠欲見沙萬井閭閻真陸海九重宫闕是天家禁林日暖空啼鳥御苑風微自落花關路行人偏絡繹津橋賈客苦喧譁何當獻賦論遷鼎便欲拋官學種瓜江海三年勞夢想田園二頃有生涯應知父老沾堯化長挈壺漿望翠華聞道卿途中授計司判官罷東陽得告歸泉州寧覲行至建安而有是命幾年華省冠名曹歸棹夤緣入海濤才奉色難馨夕膳便將心計析秋毫政成婺女生祠在地近明光伏奏勞夜直乍諳綾被暖晨趨頻見露盤髙共期晝日承三接莫許秋風長二毛為郡今來最卑屑勸君休更夢懸刀郡齊西亭夜坐凉颸初拂衽皓魄正當軒宿鳥林間定流螢草際翻蒼茫迷野色嘲􅑜辨方言角罷重城掩漁歸别浦喧斷蛩吟壞壁寒杵出遙村樹影成帷密灘聲激箭奔夜長風露冷川逈水煙昏對景都無寐冥心契混元秋晚秋晚彌岑寂天空見泬寥溪流拖白練樹葉翦紅綃露菊英初吐霜鐘韻漸調清光開旭旦爽氣逐驚飈鷹擊秦原逈鴻歸楚水遙星髙漢將出膠折敵兵驕元亮田多廢安仁鬢恐凋功名殊未立對景自無憀送溫州聶從事赴閩從事先自此郡移任永嘉佩鞬來海上七見嵗星移務劇操刀割書成插羽馳詩傳百越遍詔下九霄遲束帶朝閶闔歸艎泛渺瀰舊遊聊稅駕雅飲且軒眉鄭驛歡相接牙絃辱所知病驚瓊樹瘦醉露玉峰竒上馬便西笑何須訴酒巵送章安世赴舉螢燭辛勤十載餘藹然髙價滿州閭一枝未折仙人桂千里又隨鄉老書梁苑雪花成賦後禹門雷鼓化鱗初山城日日望春榜莫遣南來音信踈偶興芳蘭滋九畹蕭蒿亦旁植威鳳翔丹山鴟梟猶接翼雅琴歌南風蛙鳴不容息驪珠媚清川魚目光激射薰蕕豈同器雲壤自懸隔咄咄來逼人薨薨止于棘發跡由屠沽操心希桀跖天形固殘毁吏曹嘗擯斥很羊逺刀機黠馬委銜䇿心同溪壑險惡比丘山積天聽本聰明神道尤正直當用禦魑魅豈令為鬼蜮舂喉魯陽戈鈎頸子雲㦸肉委餓虎蹊尸投窮髮北饑鷹礪吻啄猰貐磨牙食魂氣縶酆都膏血塗荒磧去草絶本根决疽恣針石所居必汚瀦遺種盡刳剔渠魁巳殱殄非類彌怵惕稂莠既芟夷善苗漸滋殖君子益知命視履如平昔小人競革音滅身在漏刻堯民率可封湯網從此釋永躋仁夀期共造華胥域到郡滿嵗自遣迢遞分符竹因循度嵗華地將鯨海接路與鳳城賒觸石雲頻起銜山日易斜潮平聚漁市水落見人家吏隱偏知幸民謡豈敢誇無嫌勾漏僻且得養丹砂己亥年十月十七日大雪六出俄呈瑞三農始告休兔園陳㫖酒金屋御重裘壠麥青猶短臯蘭紫尚稠嚴飈一夕起瑞霰滿空浮林逈瓊花吐峰孤玉笋抽疏鱗鏤屋瓦淨練曳溪流北戶寒威盛南方沴氣收時和人富夀卒嵗好優游郡中即事書懷海隅為郡真卑屑簿領沉迷箠楚喧王事更逾星火急吏曹何啻米鹽煩甘棠聽訟曾無倦丹筆書刑幸不寃境上送迎暫置驛齊中宴喜懶開樽逢人未免腰如磬議政常防耳屬垣鮑臭恐將羣小化蟲疑難與俗流論却思寂莫棲天祿爭得逍遙似漆園外地粗官如竹葦一麾出守豈堪言次韻和潤州劉度支見寄之什卜隱林泉未有期春田耕事欲憑誰一辭左掖鴛鸞侣兩見南州橘柚垂酌醴不妨留客醉飲冰長是畏人知頒條求瘼無他術深恨期年報政遲郡民以嵗稔刑清相率為齊以報善政永嘉聶從事賦詩紀其事因依韻足成一百言以謝之為郡臨甌越雲泉興未乖歡謡乏𥜗袴歸思滿荆柴偶遂豐年望潛將樂土偕流民爭襁負凶黨絶椎埋精力姦多露清心政自諧羣生不疵癘比屋巳綏懷輒詣金人宇同修香積齊漫勞歌邵父方待拍洪崖治行非尤異傳聞及等儕雕章忽垂贈屬和愧淫哇嵗暮有懷逺辭金虎觀來守縉雲城鳴律行將盡枯荄又向榮匏瓜宣父歎江海子牟情求瘼曾無術投虛豈有聲帝鄉成久别天吏苦遄征漫貯青霞想唯愁素髮生澄清慵攬轡蕪穢欲歸耕簿領非吾事丹臺有姓名次韻和酬永嘉聶從事除夜之什三百六旬今夜盡寥寥虛室獨凝神蓮城五鼓欲催曉按圖記郡城號蓮華城梅嶺一枝先報春鄒律漸吹隂谷暖堯蓂看傍土階新海隅留滯年華長坐對寒釭浩歎頻章徵君見和所寄詩再次本韻酬贈武夷山秀建溪清身隱心間事不縈前古是非為己任故鄉人物與誰評勸農春壠巾頻折逢客秋郊蓋暫傾綵服趨翔娛夀母詩頌曰魯侯燕喜令妻夀母絳帷談論誘諸生潁流洗耳殊非逹谷口躬耕亦近名博奕自堪銷永日絲桐兼得助髙情莫嫌霜雪將侵鬢須歎塵埃漸滿纓早晚鳴騶催上道聖君虛左欲相迎中春喜雨土膏初脉起東作向農時隱轔雷車轉霏微雨足垂龍蛇爭奮躍桃李漸離披流潤先從葉餘波更及私謳謡耕父喜滲漉稻畦滋連夜空階滴愁吟水部詩聞北師克捷喜而成詠嵗晏增冰合煙塵起朔陲文昌先命將羽檄便徵師天逈星狼滅宵寒月魄虧前軍臨瀚海後騎縳閼氏薊北飛沙靜河南露版馳遼陽諸父老重覩漢官儀洞溪慶道人歸上都近之歷陽雖久寓縉雲不與郡民接精廬宴坐十經秋瓶鉢近為千里遊又是浮杯過滄海便應飛錫入皇州彌天談論降時彥結社因緣背俗流此去定知諸念息只除魂夢到東甌春郊即事黃鸝百囀宿煙踈近郭行春獨駐車壠上勸耕聊問訊棠隂聽訟且躊躇逺林桑盡蠶成繭野水萍開獺趂魚幾處路旁垂苦李游人不折意何如偶書朱輪逺守未成歡薄宦令人意漸䦨郡閣政清慵按吏鄉園路近欲休官梅花繞檻驚春早布水當簷覺夏寒已是三年不聞問如何歸去把漁竿太常李博士史館孫祕丞相繼奉使浙右博士至郡以孫侯詩三章示豫且以致意因次韻和酬時孫不來迅瀨拖舟上危梯躡屐登山光翠欲滴水氣熱如蒸路轉藤蘿暗天開物象澄丘園足逋客應得薦賢能分憂從漢殿捧詔出蕭墻路入三吳逺舟浮一水長詩題石門側夢徹斗城傍清曉見雲物依依認帝鄉北極分憂矚東甌布惠和曾䝉傾蓋分偶得枉帆過鄭驛非常速融樽復幾何孫侯不假道鄙我信為多麗水甄殿丞手植朱李繁實盈枝折以貺豫感而成詠五年為邑鬢霜侵吏隱由來得趣深不獨絃歌長滿耳兼聞桃李巳成隂晨昏我有南陔戀江海君懷北闕心早晚飛沉俱遂志願將初服敵華簮聞揚州柴給事有弄璋之慶寄詩賀之給事年六十六始有嗣子華堂何夕夢熊羆衛氏如今有一兒三日懸弧應是喜千年結實未為遲預知駟馬門閭盛暗想天麟骨法竒曾忝門牆攝齊者待看孔鯉學聞詩題張濬所居壁濬豫之姻此後自郡歸鄉三張舊族富英髦仙墅重經散鬱陶深喜太丘家法在須知定國里門髙分題每日搖雞距合宴常時把蟹螯獨感戴侯恩未報徘徊不覺涕沾袍留題南源院路入藤蘿十里餘松忩瀟灑竹房虛燕巢新舊金人殿蟲網縱橫貝葉書當晝風雷生洞穴欲齊猿鳥下庭除昔年曾此題詩句猶拂流塵認魯魚留題張彛憲池亭􅉓憲昆仲三人皆好學季弟逝矣瀟灑危亭枕碧池昔年飛蓋此追隨正逢五綵承顔日兼是三荆並秀時夜坐不知銀漢沒春遊長訴玉杯遲如今罷郡重登賞喜見扶風舊白眉别聰道人歸縉雲聰送豫至别墅二年假守栝蒼城郡榻唯師即送迎搗藥幾憐春漏永調琴長待夜蟾生心猿巳伏都無念海鳥相逢自不驚送别秋郊豈成恨白雲青嶂是歸程題張居士壁疊巘參差翠繞門雕梁賀燕自成羣殺雞日夕期嘉客種竹寒暄對此君且向東臯輸黍稷便應北闕降𤣥纁子真漫說耕岩石不奈聲名四逺聞留題黃山院禾黍離離一徑通遊人攬轡即過從趂齊幽鳥聞踈磬出定髙僧見偃松夜靜龕燈凝古殿雨餘巖溜迸前峰昔年曾此題名處素壁欹斜翠蘚重題弟晦所居壁今名僓制宅何其巧連山復帶溪芳樽長有酒嘉樹自成蹊學舍祥鱣墮歌梁賀燕迷調琴明月榭繫馬緑楊堤好畤田園美南華物我齊終當解簮組同此味天倪留别桐城主簿昱後赴闕此早曾兔苑傳詞賦屈在桐鄉勾簿書薄宦交朋嗟絆驥清貧人吏說懸魚二年領郡睽離久一夕當樽鄙吝袪苦恨秋風動行色徘徊無計駐征車行次潁州值雨留駐數日因貽郡守祕閣刁公夢想蒼龍闕盤桓汝水濱郡侯偏愛客秋雨更留人饌盛嘗鱸鱠樽空倒角巾羇愁不能遣唯恐二毛新旅中重陽有懷鄉國嘉節臨重九羇遊託異鄉茰房誰繫臂菊蘂懶浮觴野渡賔鴻急村田晚稻黃悲秋更懷土只恐鬢成霜重陽日憶逺逆旅重陽節窮秋萬里身金英浮酒盞珠泪濕衣巾為客飄蓬逺思家落葉頻只應蝴蝶夢夜夜得相親代答征車苦迢遞節物感愁辛巳入授衣月那經落帽辰金樽難獨酌寶瑟任生塵把菊流雙泪誰知憶逺人武夷新集卷一
