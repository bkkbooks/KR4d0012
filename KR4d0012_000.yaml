body:
  text: 武夷新集别集類二宋提要臣等謹案武夷新集二十卷宋楊億撰億有厯代銓政要略已著録宋史億本傳載所著有括蒼武夷潁隂韓城退居汝陽蓬山冠鼇諸集及內外制刀筆藝文志所著録者惟蓬山集五十四卷武夷新編集二十卷頴隂集二十卷刀筆集二十卷別集十二卷汝陽雜編二十卷鑾坡遺札二十卷較本傳所載已不相符陳氏書録解題謂億所著共一百九十四卷館閣書目猶有一百四十六卷今俱亡佚所存者獨武夷新集及別集而已武夷新集者億景德丙午入翰林明年輯其十年以來詩筆而自序之別集者避讒歸陽翟時作也此本但有武夷新集則别集又亡矣別本或題曰楊大年全集誤也凡詩五卷雜文十五卷大致宗法李商隱而時際升平舂容典贍無唐末五代衰颯之氣田况儒林公議稱億在兩禁變文章之體劉筠錢惟演輩皆從而斆之時號楊劉三人以詩更相屬和極一時之麗惟石介不以為然至作怪記以譏之見所著徂徠集中近時吳之振作宋詩鈔遂置億集不録未免隨聲附和觀蘇軾深以介說為謬至形之於奏牘知文章之不可以一格限矣乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部三武夷新集目録别集類二宋卷一詩格律體一卷二詩格律體二卷三詩格律體三卷四詩格律體四卷五詩格律體五卷六頌記卷七序卷八碑表碣卷九墓志一卷十墓志二卷十一墓志三述行狀卷十二䇿問表狀一卷十三表狀二卷十四表狀三卷十五表狀四卷十六表狀五卷十七表狀六卷十八表狀七書卷十九慰一卷二十慰二祭文齊醮文武夷新集原序豫咸平戊戌嵗九月受詔知括蒼郡逮十有二月戊子朏始逹治所凡再更年籥復朝於京師未半載入西臺掌誥命迄景德三祀龍集丙午仲冬之七日被召入翰林㑹庚戌詔書許百執事以旬休出沐頗燕居多暇因取十年來詩筆條次為二十編目之曰武夷新集蓋山林之士不忘維桑之情雕篆之文竊懷敝帚之愛命題之意良在是也豫亦勵精為學抗心希古期漱先民之芳潤思覿作者之壼奧而志力淺局襟靈底滯大懼夫絶臏於龍文之鼎傷吻於蟻封之埓非不勉也恐致敗焉亦由鳬鶴之質自然胡能損益薑桂之性素定豈可變遷鴻麗之客當見恕矣輒將假詞大手序以冠篇又慮其相先與進掩瑕溢美刻畫無鹽秖足益其陋穿鑿混沌彌以喪其真故不避乎厚顔聊援筆以自述云耳峕丁未嵗十月晦日翰林學士朝散大夫行左司諫知制誥同修國史判史館事柱國虢略縣開國子食邑六百戶賜紫金魚袋楊億序武夷新集原序
