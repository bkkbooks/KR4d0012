body:
  text: 武夷新集卷八宋楊億撰碑二首宋故樞密副使正奉大夫行給事中上柱國廣平縣開國伯食邑八百户食實封二伯户賜紫金魚袋贈尚書吏部侍郎宋公神道碑銘并序昔許穆公卒于師春秋重其死王事贈公衮以褒德岑江陵薨于行天子嘉其盡臣節罷宵警以申恩皇上巡狩兩河駐蹕魏郡惟樞密副使宋公典掌機要務煩傷神得疾膏肓終于道路輟視朝于行闕申追命于泉扄痛深股肱見君臣之同體布在方䇿實今古之相望所以旌忠魂于九原鑠休光於百世者也公諱湜字持正其先廣平人也自微子歸周商丘啓國胙土命氏源深流長處荆蠻者才亞于騷人仕東漢者名參于循吏或樹勳于代邸或馳譽於南朝枝葉扶踈華實蕃衍公之逺祖占籍關中隱德未融重世始大曽王父澤登州牟平令王父贊雍州萬年令皆以時命之數屈于州縣咸有清白之訓遺于子孫烈考溫故晋天福中擢進士第纍遷右補闕文雅之譽流於京師骨鯁之風播在臺閣及公之貴纍贈工部尚書公即其次子也襟韻閒曠風規爽邁凝脂㸃漆宛是神仙中人虛受兼容居然廊廟之器爰自髫齔卓然不羣了無童心靡雜兒戲初入小學比及大成恣閲黃卷聖賢之言蔑聞青襟城闕之刺既而究六經之微㫖通百家之雜說服勤學問日引月長刻意著述朝成暮傳跡在丘樊名振輦轂方隨鄉老之薦適丁先君之憂欒棘傷生幾于滅性苴麻終制始讓干祿太平興國五年春太宗凡三臨軒親選多士公提筆就試思若湧泉煥乎成文曽不加㸃諸生方當于燥吻一人巳喜于同時賈勇先鳴拔乎其萃由是一上登進士甲科解褐將作丞通判梓州𣙜鹽院就拜太子右贊善大夫歸朝改著作郎直史館中謝日賜緋衣銀魚雍熙三年今工部尚書王公化基以諫官佐計相上書北闕自薦其材太宗方求非常之人待以不次之位謂宰相曰李沆宋湜皆佳士也可並試之即日召試制誥于中書明日除右補闕知制誥與二公竝命焉當時朝廷有得賢之議就轉庫部員外郎兼判尚書刑部面賜金紫㑹有妖尼訴廷尉斷獄不平公職當詳讞未嘗發擲坐是左遷均州團練副使公論惜之移汝州數月徴拜禮部員外郎直昭文館復以職方員外郎掌誥命踰年入翰林為學士轉兵部郎中知審刑院銀臺司封駮事皇上嗣位真拜中書舍人修國史並兼內署之職俄丁皇妣扶風縣太君淳于氏憂柴毁骨立杖而後起五十而慕昔人所難七日絶漿僅成死孝才卒哭詔起復視草禁中公泣血抗章願終喪紀優詔敦勉不允其請是年冬改給事中參二機務明年契丹犯邊翠華時邁樞機之任一二咨焉露版羽書實司其緩急伍符尺籍專校于耗登乘保鄣險走集者禀于弛張發號令圖方略者出于規畫乃至議將帥之能否授以指蹤揣蕃人之情狀辨其狙詐折衝樽俎之際制勝帷幄之中料敵若神謀事鮮過任重責大巧勞智憂而公與今襄陽王丞相並掌其職公竭力盡瘁知無不為䝉犯風霜勤勞夙夜陟降帝右咫尺天顔總領萬機便蕃三接焦心極慮外彊中乾十二月癸酉上御武帳召近臣議邉事公方指畫上前俄疾作仆於地若大醉狀不能知人同列競前扶之上命中貴人扶掖以就西序亟令太醫切脉且曰疾不可為也上憂形于色日夕候其安否明年正月乙酉乘輿親至卧內存問公以所疾未愈懇乞先歸面可其奏且以御衾褥為賜仍命中使備肩舁什器帷帳湯藥飲膳送還京師既發又令近臣慰遣于郊外己丑次澶州憩于法寶寺是夕以不起聞享年五十有一上歎息久之詔贈吏部侍郎輟視朝一日命使者護送靈柩歸于上都緣葬所須並從官給公比及彌留且有治命曰上遇我厚必鹵簿葬我生無益于國死豈可煩于人諸弟等表其緒言上深所嘉美詔以錢五十萬絹五百匹米麥百石賜其家以備襄事即以其年十月癸丑歸葬于京兆府長安縣義陽鄉大郭里從先尚書之兆域禮也公娶清河張氏封本郡夫人婉嬺柔嘉幽閒令淑仁洽宗黨教成閨門二子長曰綸以延賞之恩解褐太常寺太祝年甫七嵗次佛奴尚在襁褓三女長女適屯田員外郎楊坦其二皆幼公生孝謹之族負王佐之才幼能屬文談必稽古尚書府君之捐館舍也季父溫舒以左拾遺守華原郡公實從行府中箋奏皆令代作公口占五吏應接不休日發百函親踈有意季父拊背歎息曰真我家國器恨吾兄之不見也至性純孝出人逺甚奉養慈母蒸蒸膝下調滫瀡以供膳衣文綵以承顔左宦方州單車獨往盡留妻妾給侍庭闈杜門端居曽不屑慮及太夫人寒暑遘疾腠理寖深公藥必先嘗目不交睫禱神請代指景悼生雖曽閔之行無以過也長兄泌職方員外郎越王府記室次兄浣皆先公而逝弟湛任大理寺丞推以友愛成乎敦睦棠棣致美塤箎相須天倫之歡士林聳慕耀州冨平簿渙太子中允沆處士澥進士洞殿中丞濤校書郎淡皆公之從父弟也公承髙門之慶為保家之主協比諸弟紏合近親人不間言兒無常父宦成名立率由于公游吉之亢宗張仲之孝友見于是矣公自决科筮仕彯纓登朝至如羊舌肹習于春秋而公分直東觀裁成國史公孫揮善為辭令而公入參右掖發揮王言雋不疑之治獄也多所平反而公當祥刑之任民以不寃山巨源之薦賢也密陳啓事而公操審官之柄下無失職嚴安徐樂並在左右而公步武禁林潤色帝載劉放孫資對掌機密而公徊翔丹地秉執國鈞至于蹇蹇匪躬巖巖羣望外庭集議不曲從而詭隨宣室論思必有犯而無隱此詩人所稱邦之司直又如恂恂善誘拳拳好德博施以濟衆功成不居虛己以待物事至而應此仲尼所云古之遺愛雅性冲淡留心釋老早嵗嘗受道籙晚節頗究禪筌悟兹無生用成逹觀素善持論酌之不竭多識典訓扣之斯應挹量陂者鄙吝之意自泯窺眉宇者名利之念都息接士在貴而思降定交彌久而益恭德邁種而愈勤人服媚而無斁蹊成桃李夫又何言室有芝蘭但聞俱化非大雅明哲豈能及是耶公方以將明之才輔文思之政談弭兵之術議平戎之策使單于之首懸之槀街潦陽之貢陳于宰旅致君堯舜為宋伊周而兩楹遘災二竪為沴天不憗遺人之云亡召公深仁徒結甘棠之愛留侯素志莫遂赤松之遊藐是諸孤庶乎有後常所著述遺札頗多自掌命書尤振時譽纍當大手筆之事皆為士君子所伏集二十卷傳之子孫諸弟等以繐帳猶懸宿草將列憂陵谷之或變慮德音之不昭謀建豐碑以表神道以某嘗學舊史曽接生平得以祖述世家論次閥閲叙太丘之德諒無愧詞非臧孫之言敢期不朽聊托梗槩以為之銘銘曰火德淳耀文明誕敷鳯鳥斯至神龜負圖時惟宋公矯翼雲衢五百之運其在兹乎黃離繼明百度思治旰昃臨朝齊居决事時惟宋公將順其美咸平之政既盡善矣八柱承天七聖翊軒彌綸衮職斟酌化源青蒲伏奏溫樹無言林父忠藎康侯錫蕃三邊屢聳六龍順動借筯前籌屬鞬景從美疢弗瘳吾謀猶用城郢遺言涉洹占夢梁木斯壞太素收神易簀而沒委順全真精爽何託上騎星辰如可贖兮人百其身行路咨嗟冕旒悽惻股肱或虧其痛何極尸諫猶切忠魂彌激臨死之言不忘社稷卜葬咸陽蓍蔡弗違封樹云畢閟兹音徽自古有死吾將疇依逝者可作非公曷歸丘壟陵夷光隂迅駛傳信方來孰非文字乃刊貞珉式表幽隧懷公之人于斯墮泪重修亳州洞霄宫碑銘并序奉勑撰臣聞昔者大道之行異人間出洪惟柱史實暢真宗叙道德之二篇述慈儉之三寶玩志衆妙理洞於帝先垂訓方來尊居於教父故尹喜望氣爰識真人史遷編年首推黃老或謂之隱君子著書五千文或以為太史儋享夀二百嵗立言垂于不朽乘化入于無間惟苦縣厲鄉即降神之地土風雜乎南楚郡境介於陳留蓋尸而祝之㟪􅕲作庚桑之社思且愛矣陜郊存召伯之棠後人緬慕𤣥風周爰舊壤聿因靈迹肇建嚴祠歷代封崇樵蘇之禁彌肅昔賢讚述金石之刻具存又往者聖質誕祥元符冥合乘白鹿而下爰自九天感流星之精生于左腋指李樹以為姓由聃耳而立名禀粹斗魁發祥井脉僉以為塗山祀夏式修啓母之祠后稷配天乃建姜嫄之廟恭惟聖母實育至人陵谷未移光靈如在又因遺址别啓殊庭目之為李母祠蓋有年矣雖潔粢致享不領天子之祠官而間館棲神具載職方之地志歲月寖逺遺構僅存期運環周祥符顯發施及唐室系自仙源乾封中以錫羡流光肇開鴻緒似續蕃衍襲慶本支且念太極之先冠二儀而首出盛德之後垂百世以彌昌追從長樂之名用顯始基之迹繇是追封聖母為先天太后又以列真之宇神光燭于官壇集靈之虗紫氣干乎霄極琳房絳闕窈窱重深孔蓋翠旍裴回戾止蓋方輿之福地乃虛皇之密都由是改命祠宇為洞霄宫香火無廢于熏修棟宇益增于輪奐南望吾子飛觀凌雲左帶靈溪清流漱石行人胥畏頗類仙臺逰者忘歸更疑秦洞至乃𤣥貺昭格冥感彰聞或旭景朝躋非煙絢綵或柔條夕徑甘露垂滋或千仭鳯翔覽德輝而下集或九井龍見乘雲氣以上騰往昔海縣塵飛雈蒲蟻聚流矢集屋束藴乘墉即必黑氣塞川愁霖貫序凶黨不能肆毒闔境率以寧居當時降璽書以旌揚垂方策而標紀求諸故府蓋圖牒之未刊巋然靈光實神明之所庇皇朝接千歲之統按九州之圖包舉海隅並走羣望講求祀典咸秩無文誕揚清淨之風式契𤣥元之㫖深詔譙郡崇奉靈場繕究靡虧焚修彌潔崇文廣武聖明仁孝皇帝之在宥天下也恭默思道齊栗事神紹祖宗之耿光集乾坤之景命端拱南面唯軫念于蒼生間宴西清乃娛情于𤣥牝順風之拜幾慕于崆峒赤水之珍靡徴于􅀈詬驅民夀域日用而不知决事齊居天行而彌健乃至探求三五之載籍致恭上下之神祗黍稷犧牲悉用先王之禮壇場圭幣無取方士之言正違治煩修弊起廢陳信策告蔑聞祕祝之官備物薦嘗奚餒若敖之鬼乃至山川作鎮于地出雲雨以嘉生卿士有益于人垂竹帛而悠久莫不咨詢典故彌縫闕瀝豐潔苾芬而致用聰明正直之是依用能陟降泰畤與三靈交歡端委明堂俾諸神受祀帝錫純嘏百祿是膺洛出圖書九疇式叙盛德大業光表格天固非名言之所能及也乃眷亳社時惟穀陽仁里未遷清都斯在曩以神虬躍于沮澤隂魄離于罕車雩禜偶愆水潦荐降雲不待族雨及我私甫田或害于粢盛樊圃幾勤于浸灌是宫也雖面勢爽塏取規大壯在山楶藻梲豫焉勝人非麥麴鞠窮何以禦濕屋瓦斯漏梁木其摧本郡以聞當陽太息即日降明詔遣近臣案行故墟周視層搆度費制用庀徒僝工之子于垣百堵皆作靈臺經始不日而成雲鍤募農隙之民風斤得藝成之匠朱扉洞呀于廣陌紺殿崛起于中天榱桷交持見隂虬之騰倚觚稜四注狀名翬之翰飛繪素彰施模睟容而克肖吉蠲享獻表明德之惟馨空歌洞章蕭寥乎旦暮飊輪歘駕出入於虛無固以昭戬榖于聖神夸壯麗于方國契宸心於妙有躋氓俗于無何行將追七十二君告成功于日觀享萬八千歲比聖歷于天皇𤣥同至真永錫難老如斯而巳矣秋八月新宫成主者上言願志能事大君有命允屬下臣臣學古非優聞道素淺草寬大之詔無東里潤色之才談惚恍之宗增吾黨狂簡之愧躑躅燥吻謹為之銘其辭曰至哉𤣥元權輿太極象帝之先昧者奚覿矯矯伯陽自天生德其道猶龍人靡能測厥初誕祥時惟厲鄉領垂縞髮室照神光蹈十把五舌舑而長井泉湧脉星精耀芒集靈之址𤣥祠崛起檜亦手植樹曽親指聖母遺阡右環渦水福地旁連清都對峙瓜瓞其昌錫羡于唐寶冊追諡雲篆龍章金闕易號丹臺絳房明靈如存祀典不忘帝臨赤縣乘正御辨致恭神祗大庇黎獻德馨流聞沼毛登薦鬼有所歸民亦不倦帝居紫宸味道全真格天在宥易俗還淳隂陽大順關石和鈞亮采時叙輝光日新乃眷東顧欽崇教父定之方中增修祠宇間館相望飛軿攸駐日蒲星回池平樹古申命中人王言如綸鳩工底法即舊謀新三時之隙百日之勤恍若神化以棲靈真瞰鮮原兮靡迤面皇州兮密邇氣蓊蔚兮上騰波奫淪兮東委唯列仙之殊庭干青霄兮特起竦金閣兮崔嵬薦蘭蒸兮裴回緘紫籙兮難見祕靈符兮不開伊九天之神母御瓊輪兮下來祝聖人兮富夀延寶厯兮京垓又何必迎年之館兮通天之臺表一首故信州玉山令府君神道表玉山府君以太平興國三年六月三十日啓手足于長樂里之第其年十二月八日歸葬于南原凡二十三年矣金石未刻陵谷將變嗣孫億大懼夫祖德之墜于地考于譜牒詢于耆艾追述先美以表幽壠云府君諱文逸字慕賢華隂洪農人也昔周之伯僑始啓封邑胙土命氏實曰楊侯瓜瓞蟬聨大昌厥緒在西漢時重侯纍相施及魏晋世為公卿永嘉之亂播遷江表始占籍于上饒郡因為郡人焉安土重遷凡十餘世唐上元中劉展稱亂吳㑹弗寧府君之六代祖始挈其族人避地于建安之吳興斬木誅茅築室治産以財力雄于州里以義方訓于子孫曽王父式蹈德詠仁隱居求志王父郜屬唐季俶擾干戈日尋奕世聚居羣從百口非用武斷不能亢宗于是募鄉民之拳勇者數百人受署于本郡為義軍指揮使堅壁要害以備不虞一邑賴之終以無患烈考弼遭時未乂結髮從軍受署義軍討擊副使府君即副使之次子也始在童丱遨遊膠庠博習親師服膺素業家世從戎旅之事以豪舉聞于郡中而府君恥事輕肥雅好學問被服造次必于儒者識者以為秦堇父之生丕兹也時王氏偏霸閩隅府君世父太常君實為邑令以猶子之愛推延賞之典才十餘歲解褐試祕書省校書郎未幾丁副使君之憂泣血執喪殆于滅性純孝之德鄉黨稱焉及王氏乖離吳人致討建安失守歸于金陵改右千牛衛胄曹參軍知建州倉事克遂循陔之歡靡辭掌庾之賤就加本衛騎曹參軍先夫人寢疾彌留府君即解所職調品藥餌供視膳羞目不交睫衣不解帶如是者凡厯三時而卒以不起府君勺飲不入嘔血數升柴毁支離僅成死孝服除調補撫州南豐簿視事踰月化行若神先是邑人常以端午為競渡之戲具舟數十艘聚羣不逞之徒以較勝負必先載瓦石因以相擊每歲死傷者數十百人府君前知其然至期大索笞其為首者數輩訖事無變獄訟衰少縣政益清秩滿擬常州武進丞辭不之任改大理評事信州玉山令邑有鎮兵兼總軍政府君寬以御下明以照姦流亡悉歸版圖增羡先甲發令卒乘畏威泮林革音寇盜屏跡境內大治政聲流聞就加大理司直示陟明也未幾王師渡江臺城蔽壘調發徴斂繁于秋荼府君夤奉簡書事不愆素曽未數月得代而歸老幼攀轅易服宵遁當是時也國命將墜人謀已改府君杜門稱疾不交世務靜以觀變默而俟時俄而黃旗運終青蓋西上詔㫖敦迫州司臨門方促星火之期忽嬰霜露之疾不克上道因以家居惡石無徴梁木斯壞享年六十有五未躋于夀厯試百里之宰未盡其才有折衝制勝之略值艱虞而不得伸有化民成俗之具逄承平而不及用齎志沒地遺恨終天行道之人所共歎息府君娶武寧章氏駕部郎中嵩之女也生先君諱某象賢惟肖禀訓無違宦學四方名聲籍甚及府君歸老别墅先君終鮮弟兄蒸蒸就飬不離左右被褐懷玉韜光戢曜以至下荼蓼之苦荷清白之謀世故紛綸家徒窘絶未遑射策奄兹淪逝後府君九年而終咸平二年十一月天子有事南郊其孤億任諫官有司以丙戌詔書追贈先君為大理評事寵被泉壤慶延里閈行路歎息父老榮之四女長適隴西李瓊次適清河張仲言後府君七年而逝次適河間俞簡成次適清河張彛憲率皆大族莫非令人婦德嬪風表儀宗黨府君之任玉山也其孫億始生億將生之夕府君前得吉夢謂必興吾門躬自撫養特所鍾愛才免襁褓教以詩書及府君之捐館舍億五歲矣方在孩抱未違慈顔逮十有一歲太宗皇帝遂聞其名徴詣闕下試以詞賦官于祕書自是入蓬丘直仙殿升近署置周行為天子從官成國家大典非錫羡餘慶燕翼貽謀天啓畢萬之大名世祚于公之隂德不然者蕞爾億何以及兹億自舉族還都再見閏月歎墓木之巳拱憂堂構之將頺前年獻封公車求領郡政皇上固留不遣億懇請而行甌粵之區封畛相錯伏念昔者府君之歸窀穸也銘志闕如歲月寖深耆舊猶在遂用採托以備萬一謹按府君天姿謹厚寬中多恕行有枝葉心無町畦慷慨經綸博通治體信著朋友仁洽閨門勝冠之年殆事祖母被疾沈痼經時伏枕府君束帶奉侍夙夜匪懈嘗惡浣洗無所不為府君母弟五人率以豪俠自任鮮車怒馬輕裘緩帶出入閭里持吏短長暴虎憑河使酒難近私匿亡命結客報仇人胥畏之莫敢忤視府君戒督備至夏楚是用諸弟惕息剛悍少衰皆以天年死于牖下議者許府君之善教也涉獵史傳詳明典故鋭意風雅動成篇章及試吏方州嘗奏伎記室巧為書檄曲暢事情兵戈之餘遺槀散落素善草𨽻自可名家天縱多能洞曉鍾律新聲度曲精義入神圖緯數術罔不研核棊陸蒲塞出于餘力若乃張仲之孝友安世之慎密史魚之直伯夷之清寧俞之忠石奮之謹劉文饒之恕秦巴西之仁庾亮之風流山濤之識度凡是衆美無一闕焉時方構屯位不充量蓋仲尼云如有用我者其為東周乎漢文謂李廣惜不當高祖世萬户侯豈足道哉命之通塞道之行否固有冥數矣夫惟賢者能論撰其先祖之美而明著之于後世者也無美而稱之是誣有善而弗知不明知而弗傳不仁三者君子之所恥也恭惟府君之德業章章如是國史弗載鼎銘未刊春礿秋嘗彌用怵惕冬裘夏葛靡敢遑寧嗚呼不見成人范喬之悲罔極有慙于長太丘之德未衰爰勒貞珉以永終古肹蠁非逺謦咳如聞嗣孫之勤尚或臨鑒云耳碣二首故隴西彭君墓碣銘并序碑碣之制著于令甲咸以官品而有等威至于孝義著聞隱淪不仕亦許刋石表行以示後人斯國朝之彛典也隴西彭君諱悅字仲荀豫同郡人其先屬𤣥王之勤商與豕韋而更霸保姓受氏德厚流光乃至鏗為大夫以耋老而著稱宣為三公由經術而進用錫羡蕃衍垂裕後昆枝葉扶踈譜牒散落至君之七代祖始占籍建安因以土著奕世似續孝謹不衰有蘇秦二頃之田得猗頓五㹀之術治産殖貨資擬王公大王父英屬王氏建邦亟登勇爵實貞師律式遏外虞受署御史中丞本鎮防遏使王父晏為之副二以壯戎麾烈考大規值金陵用師閩隅瓦解遂忘懷物表脫跡世紛樂一丘之棲遲詠幽人之長往及天地開泰車書混同華黍盈疇素髮垂領鼓腹含哺為太平之民君特逹不羇旁通多可跌宕文史慷慨經綸立義不侵好為然諾之信捐生赴難靡以在亡為辭睦族以仁事親以禮勤接士類賔至如歸教行閨門衣無常主脫驂周急斯乃細行折劵市義固其素蓄汝南之俗咸出子將之評潁川之人懼為陳君所短一境從化或行者之讓塗千里請交多升堂而拜母窺義府者不見岸谷飲德馨者有如椒蘭仲尼所謂君子儒者此之謂矣始以肄業之故自鄉里杖䇿遊尋陽之廬山勵精為學才朞歲之內以詞賦擅名同時輩流亦所推尚未遑鄉老之薦屬有樓船之師歸省庭闈甘心畎畝年甫壯室尚丘園而考槃爵非公乘與令丞而亢禮頗為州縣之敦迫遂與計吏而偕西褁足戒途推鋒戰藝凡兩就于貢部皆不利于春官敗于垂成終以旅退豈時命之未㑹將地勢之使然耶拂衣言歸斂迹肥遁以為自足于己何必陳力于周行獨善其身安事儻來之外物由是調甘滑滫瀡之味以潔膳羞督畋漁耕鑿之業以豐生産法周禮而闢庠序以教子弟慕鄭莊之置驛馬以待賔客無營無欲優哉游哉如是者歲星一周于天矣遽丁烈考之憂君天性純孝居喪過禮柴毁骨立觸地無容果以欒棘之傷生不逮苴麻之終制去年夏以先君窀穸之事市葬器于上饒之鉛山跋履山川䝉犯霧露得疾逆旅肩舁而歸反席未安瞑目長往年四十九即以其年五月十二日從先君之喪歸葬于新豐鄉王殿源靈際山祔于兆域之側禮也夫人武寧章氏故汀州歸化令士廉之女也雅有婦德冝其室家前君而亡墳未宿草嗣子歆承詩禮之訓挺岐嶷之姿未及勝冠之年巳負肯堂之志趣向逺大意行瑰琦所謂謝庭之芝蘭當為周廟之瑚璉驥子絶足未易可量唯君蹈德體仁秉彛居簡量陂萬頃莫測其涯宫牆數仭孰窺其奧言行相顧磨涅靡渝誠明內融應接無滯而不登一命不沾寸祿蓋日車亭午或覆盆之有遺脂網橫流亦吞舟之斯漏然方朔殊少于自薦而淡臺頗失于不言空遘盛時莫躋仕路兹士友之所共歎惜也然施于有政是亦為政又何必社稷人民始為行道不患無位患所以立又何必軒冕爵位乃曰成名嗚呼彭君亦可以為逹矣豫與君有桑梓之舊連瓜葛之姻顧惟忘年之交實辱同聲之分嘗念淳化中自書殿歸寧榜小舟游武夷山道出君之舍下君率族人携酒肴俟我于江干班荆藉草引滿舉白半酣耳熱迭舞相屬且為十日之飲飽聞同心之言自兹分飛三見閏月歲不我與逝者如斯其孤泣血奉書乞文表墓感故人之疇昔嘉孝子之勤拳莫漬酒以伸衷空含毫而叙美銘曰移孝為忠乃可從政自家刑國亦以觀行猗歟彭君含華不競嗃嗃閨門詵詵子姓睦族親仁讓夷急病進以干祿退而知命萬石孝謹出于天性太丘家風冝書甲令良玉藴璞岩谷增輝矰弋徒設冥鴻已飛隱居求志色養無違鄉黨胥化閨門已肥王戎死孝銜哀不飢公明短折異代同歸泉臺永閟草露空晞刻兹圭石以志音徽劉氏太夫人天水縣太君趙氏墓碣銘并序咸平中詔以祕書丞直集賢院劉君隲同修起居注實執素臣之筆入踐赤墀之塗侍從穆清親逄旦暮出扈詔蹕入宿周廬為儒之榮舉無與比時君奉太夫人就養于京師夕膳晨羞既馨而潔出告反面式燕以寧諸孫在旁冡婦佐餕詵詵有後啓于公之髙門蒸蒸承顔奉魯侯之夀母搢紳欽羡人倫聳慕屬天子兩郊吉土推恩百執湯沐之典時庸顯親詔封夫人成紀縣太君又徙天水恭惟疏邑之典用旌斷几之訓徴名數于石窖報劬勞于棘心人子之道斯為至矣而夫人從子之貴去國長懷當一喜一懼之年動維桑與梓之念君由是奉公車之奏牘求㑹稽之郡章天子俞之即命領衡陽郡事前席宣室從容話言賜金內府光寵行邁且以君出入交㦸多歷年所筆削汗簡克謹官業又自曲臺博士遷尚書外郎以坐曹應宿之重領案部行春之寄衣色五綵雜蒨綬以相鮮車朱兩轓先版輿而奉引帳飲别墅上夀髙堂合戚屬以叙燕私道舊故而為笑樂揮金告竭家忘其貧常膳載加喜形于色嗚呼不幸夫人以景德二年正月己未終于郡廨之正寢享年八十有六即以其年丁丑歸葬于潭州長沙縣長沙鄉祔于太博府君之塋禮也夫人其先京兆人家世儒素父拯終澧州慈利令妣榮陽鄭氏故連州刺史蕘庭之女夫人既笄歸于劉氏實澧州録事參軍纍贈太常博士諱延宇字贊明也博士君肯構其家以儒為業讀易得伏羲之㫖詠詩有騷人之風振跡丘園試吏州縣實有仁惠在于閭閻凡厯五官終以無過夫人輔佐君子宜其室家及茹痛未亡靡它誓志諸孤藐若四壁蕭然夫人躬機杼以給伏臘男且就學擇鄰居以示訓女將適人結襟褵以申戒鞠育勤苦越十五年而工部從賦鄉書䇿名仕籍稽古幹事為時聞人蓋劉氏之族繄夫人而立也夫人雅性奉佛深通內典女工之暇唯誦金言寡居巳來殆廢膏沐治家以正教子以嚴御下以仁奉身以儉用能閨風閫範式是六姻夀考康寧享兹五福迹其雅素豈徒然哉一女適魯國曽弼舉進士終殿中丞工部三子曰直方舉進士任大理寺丞潭州通判曰直溫直清並業進士二女長適㑹稽夏渙舉進士得大理評事知鄂嘉魚縣次適譙國夏侯藏用亦進士內外姻戚莫匪文儒一門之中素風特盛積善之後餘慶叵量工部君履霜露以涕洟奉几筵而欒棘五十而慕出于至性三年之制善守禮經且以封樹克終歲月增逝大懼徽懿暗而不彰逺咨遊舊文以為託書郵絡繹玉音荐委褒陶母之德誠愧春秋之徒表京兆之阡式謹樵蘇之禁銘曰嬿婉之德宗姻是式表南國兮嗃嗃閨門繩繩子孫昌後昆兮脂田換縣蘭陔潔膳夀觴薦兮萊衣斑斑冡婦執笲慶承顔兮融峰峻極湘波碧色啓封域兮報德昊天勒銘新阡垂億年兮武夷新集卷八
