body:
  text: 武夷新集别集類二宋提要臣等謹案武夷新集二十巻宋楊億撰億有厯代銓政要略已著錄宋史億本傳載所著有括蒼武夷潁隂韓城退居汝陽蓬山冠鼇諸集及内外制刀筆藝文志所著錄者惟蓬山集五十四巻武夷新編集二十巻頴隂集二十巻刀筆集二十巻別集十二巻汝陽雜編二十巻鑾坡遺札二十巻較本傳所載已不相符陳氏書錄解題謂億所著共一百九十四巻館閣書目猶有一百四十六巻今俱亡佚所存者獨武夷新集及別集而已武夷新集者億景徳丙午入翰林明年輯其十年以來詩筆而自序之別集者避讒歸陽翟時作也此本但有武夷新集則别集又亡矣別本或題曰楊大年全集誤也凡詩五巻雜文十五巻大致宗法李商隠而時際昇平舂容典贍無唐末五代衰颯之氣田况儒林公議稱億在兩禁變文章之體劉筠錢惟演輩皆從而斆之時號楊劉三人以詩更相屬和極一時之麗惟石介不以為然至作怪記以譏之見所著徂徠集中近時呉之振作宋詩鈔遂置億集不錄未免隨聲附和觀蘇軾深以介説為謬至形之於奏牘知文章之不可以一格限矣乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部三武夷新集目錄别集類二宋巻一詩格律體一巻二詩格律體二巻三詩格律體三巻四詩格律體四巻五詩格律體五巻六頌記巻七序巻八碑表碣巻九墓誌一巻十墓誌二巻十一墓誌三述行狀巻十二䇿問表狀一巻十三表狀二巻十四表狀三巻十五表狀四巻十六表狀五巻十七表狀六巻十八表狀七書巻十九慰一巻二十慰二祭文齋醮文武夷新集原序予咸平戊戌嵗九月受詔知括蒼郡逮十有二月戊子朏始逹治所凡再更年籥復朝於京師未半載入西臺掌誥命迄景徳三祀龍集丙午仲冬之七日被召入翰林㑹庚戌詔書許百執事以旬休出沐頗燕居多暇因取十年來詩筆條次為二十編目之曰武夷新集盖山林之士不忘維桑之情雕篆之文竊懐敝帚之愛命題之意良在是也予亦勵精為學抗心希古期漱先民之芳潤思覿作者之壼奥而志力淺局襟靈底滯大懼夫絶臏於龍文之鼎傷吻於蟻封之埓非不勉也恐致敗焉亦由鳬鶴之質自然胡能損益薑桂之性素定豈可變遷鴻麗之客當見恕矣輙將假詞大手序以冠篇又慮其相先與進掩瑕溢美刻畫無鹽秖足益其陋穿鑿混沌彌以䘮其真故不避乎厚顔聊援筆以自述云耳峕丁未嵗十月晦日翰林學士朝散大夫行左司諫知制誥同修國史判史館事柱國虢略縣開國子食邑六百戸賜紫金魚袋楊億序武夷新集原序
