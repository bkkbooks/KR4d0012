body:
  text: 武夷新集卷十九宋楊億撰啟二十五首上陳州李相公啟比者肅奉簡書言旋京邑經涂攸出授舘未遑忽迂丞相之車俯及旅人之次置之右席接以温顔趨衛幕之嚴初令長揖設曹樽之味猶許獨醒乃至芻禾百車籩豆九品一日再駕式顧於郵亭終夕九迴不遑於肺腑加以預西園之宴陪東閣之賓奉簮履以為榮羨車魚而徒切禮唯異數恩實非常褒稱極華衮之殊顧矚比陽春之煦玉斚斟酌靡許固辭台座熒煌尋容下拜得厠原甞之上客復見陰郭之小侯且陪秉燭之歡仍恕吐茵之失挹江海之量寧測沖深聞爼豆之談自驚淺陋奬憐彌極短拙尤多燕昭築臺雖從郭隗而始陳蕃解榻誠非徐孺莫當以此揣循若為勝克幸盤桓於信宿得企仰於雲天屬發軔之靡遑嗟戀軒而何及既貺之雜佩又出次長亭元戎十乘以啟行清酒百壺而帳飲都人改觀行路增輝矧乃慮逆旅之餒而别輟萬錢之饌念中逵之勞止特假千里之駒使飽德之無厭且致逺而不泥何漢相之至重顧魯儒之太深吐握之勤實光於令德鳴吠之賤豈忘於大恩循載籍以遐思撫方寸而内激述王粲從軍之詠良或未諧慕馮諼市義之心終期有報感戴之至伏切下情云云又近奉柔毫逺塵台聽敢冀巖廊之重特貽尺素之文華衮被躬自知其幸夜光在握誠足稱珍捧讀已還兢榮無措竊以漢薛宣之故事未嘗移書晉何曾之持衡不答小紙蓋丞相之尊重與庶位以懸殊名既不同禮亦異數如某者材質駑下門閥寒微謬參多士之林得食上農之禄雕蟲篆刻恥子雲之壯夫抱槧懷鈆非董狐之良史質于清議宛在下流自知甚明内省尤熟豈謂相公推好賢之雅㫖敦與進之虛懷採畵餅之名厚築金之禮憐潘岳之拙宦深嘆數竒許子夏之言詩曲加護短置于客右借以月評垂耳之駒驟增十倍之價拖腸之䑕如餌九轉之丹窮途有依鎩翮重奮比至京國傳聞搢紳假之餘光無不改觀矧又金簡玉字别示于温存圭竇蓽門頓生于氣􅆋恩極邱山之重心非木石之頑瞻儉幕之芙蓉雖遥盛府望傅巖之舟檝終濟迷津眷言蓬艾之微必期頂踵之報謝太僕錢少卿啟少卿進咸平聖政録及詩自將軍改官右某啟數日前少卿特枉軒車俯臨蓬蓽仍以編綴曲示顓䝉顔巷蕭條既迂長者之轍趙囊牢落忽得隨侯之珠緘縢載披毛髪俱聳竊以述作之妙謂之聖明賦頌之興本乎風化其有沿襲或異歩驟不同虞卿窮愁乃就著書之業揚雄寂寞始奮草𤣥之名靈均放詞初因于憔悴蘭成述賦實主于悲哀未有世傳帯礪之盟身居環列之尹敞北闕之甲第屋瓦生烟乗大宛之名駒汗血流赭列鼎而食執玉以朝名亞春陵勢奪張霍而乃賤青紫如拾芥比富貴於浮雲優㳺文史之塲躬親布素之行折莭待士多擁篲以先驅焦思窮經或下帷而終日以至學成麟角才掞天庭思若湧泉文類摛錦漢宮誦賦萬乘喜於同時梁苑陪遊羣公推於右席門登龍而比峻談揮塵以彌清諸生慕義以益勤名卿願交而斯衆芳猷載洽雅志將伸固已簡自天𠂻騰于物論紀一人之言動何讓策書貢二雅之聲詩有禆樂府召試鼇山之署式揺雞距之毫不加㸃以成章未旋踵而拜命亞卿班列既參惟月之崇太僕職司仍預奉車之寵昔漢光武之偃革諸將競鄉學之心唐憲宗之厭兵近臣有改名之請以珪璋特達之質當干戈載戢之秋捨蘭錡之師就儒冠之餙教閲詩禮昔為謀帥之資慷慨經綸今挺致君之志羽儀通籍輝映薦紳敢謂下顧蝸廬特留鳳藻享海鳥以九奏誠非所宜投井鼃以兼金都不之惜退自循省靡敢遑寜豈圯橋授書憐其可教將延陵聽樂許以知音唯蹈詠以忘疲庶傳玩之無斁願言厚意何以克勝其盛製輒留繕冩代僧求薦啟右某啓某聞操刀必割君子慮其失時括囊不言先儒譏其有隱敢傾方寸上扣髙明蓋恃特達之知不虞進越之罪伏念某早親空諦尚昧真筌誦岐伯之方書勤拳斯乆辯農皇之藥品區别尤難名非三折之良術寡十全之妙所幸者每趨門仭席揖儀形以桑梓之情曲垂顧盼在苾蒭之列實覺輝光蓋香火之宿縁非頂踵之能報豈合輒披懇素仰瀆尊嚴誠際㑹之有因亦藴藏之無及伏覩聖節俯近兊澤將流在計相之大臣乃空門之外䕶並奏緇徒之名字得沾象闕之恩華以某法苑微流醫門末伎結二林之社豈敢攀縁瞻數仭之墻深思提挈願賜律師之號仍希廣濟之名俾塵跡之增華亦鄉關之改觀敢不窮青囊之祕訣以奉指蹤誦貝葉之真文用資壽考懇激之至無以喻陳又代謝薦啟右某啟某近䝉侍郎台念特奏表聞伏奉勑恩授前件師號者絲綸之命雖薦降於九天緇褐之蹤若頓超於十地祗荷恩奬伏切兢榮伏念某奈苑微流曹溪末派偶抛塵累竊味真詮誦岐伯之方書莫探秘術開生公之講席徒慕遺馨幸以久寓神臯屢登峻闥維桑序舊最承一顧之私惡石獻能曾寡十全之効荷眷憐而實厚省孱冗以難勝所希且躋韻海之堂尚陟龍門之坂賓階請見或當休沐之辰藥劑服勤永奉指蹤之用豈謂莭臨于載誕便諧名逹于四聰特加溢美之稱實滿平生之願朋儕改觀價十倍以頓增頂踵酬恩身一毛而為喻此外精䖍香火祝頌雲天願慿衆善之因克遂至誠之懇台司書考與郭令以攸同仙籍延齡將老彭而為比所冀苾蒭之末永參桃李之餘託跡有歸捐軀何惜上陳州李相公啟右某啓比者相公執玉來朝捧觴上壽彤庭就列為百辟之儀刑宣室疇咨見一人之體貎漢殿禮成于薦璧淮揚民望于迴轅子牟戀闕以雖勤申伯于藩而是賴十乘攸往見元戎之啟行九里非賖固京師而䝉福騎竹赴兒童之約依蓮慰賓客之心某特受奬稱逈殊倫等供東門之祖帳宜綴簮裳望南浦之仙舟合辭麾棨屬以編纂莫遂懇誠羨文學之託後車空馳精爽同燕雀之棲大厦彌戀恩知又右某啟昨者相公榮自藩垣入朝宸極晝日三接載延乃眷之恩泰階六符式顯具瞻之貴東閤幸伸于趨拜中堂過沐于延容聽談柄以忘疲侍坐隅而甚久慙非子夏敢預于言詩竊媿穆生何勝于置醴矧又相如之四壁兩辱千秋之小車時屈丞相之尊親顧旅人之次一瓢牢落顔回之巷可哀三日氛氲荀令之香不散實交遊之光寵固里巷之輝華夫何下僚當此殊奬非木石之無識摩頂踵以不忘伏自莭過流虹禮成薦璧在鎬錫宴畢上公九獻之儀分陜言歸還天子二老之任旌斾將離于闕下壺漿巳擁于道旁南陽細民再得于父母河東近郡深倚于股肱恭惟仙舟尋達雄閫戎政甚肅同卧治之有餘品物向榮諒行春之非逺限以匏𤓰之繫莫叅簮履之微空瞻桂樹于小山深羨雞鳴之下客攀戀之至倍萬愚􅇆又右某啟某伏念引籍金閨修書石室仰台階之符采宛在層霄感國士之恩知豈忘丹慊恨一官之所繫瞻數仭以為勞徒慿咫尺之書逺黷巖廊之聽敢期折簡俯及下僚屈伊鼎之崇髙顧魯儒之寒賤鄙條侯之倨貴曲示謙光憐顔子之固窮倍加存卹内省不材之質何酬特達之私春物向繁幕府多暇淮陽臥治况善政之已成征虜雅歌諒素風之斯在恭惟宴集之外福禄具膺王商儀形永居漢相叚干偃息長作魏藩載光夾輔之勲長享具瞻之貴禱頌之至倍萬常情代人與淮南王轉運啟竊以山澤之利多出于東南漕引所經率由于淮海綿地萬里通貫五都實國計之是資乃邦本之攸繫苟非明達豈副選掄恭惟郎中識茂經綸學窮緗素决科虎殿由射策以馳名引籍鴛行遽揚旌而出使較縣官鹽鐵之利均郡國闗市之征析毫恥務乎纎微運算自成于餘羨奉千金之費物力靡殫精九嵗之儲倉廪皆實故得益隆眷注更委事權佐計相以如初商功利而尤宻運蜀漢之紅粟即見方船聚吳㑹之金錢便應朽貫出於餘地久屬全才昔漢倚闗東之奥區漕輓相繼唐置江西之留務財幣畢臻古今之形勢率同邦家之用度斯出心計素熟佇論駟馬之功賞典聿行須荷富人之拜實惟公議豈竭愚誠與祕閣錢少卿啟右某啟伏審光奉聖恩榮升祕府恭惟慶慰竊以上帝藏書是開冊府近臣侍詔爰設直廬所以裒集秘文講求墜典復石渠之故事繼炎漢之得人若非竒才豈膺是選少卿學士家傳帯礪身襲龜緺忠謹樹勲吳芮早書於甲令積善餘慶畢萬獨享於魏封而自更宿周廬入升環衞貞師北落不倚將軍之尊襲爵東吳靡恃王孫之貴但絶編而嗜學常閉户而著書萬里立功頗輕定逺三都述賦髙揖太冲一人深喜於同時九寺俄遷於少列以才望之充積果恩寵之便蕃太僕奉車方欽於貴盛祕書内閣旋直於深嚴用旌稽古之功尤洽當仁之論眷惟職業素所藴崇校石室之遺編佇分四部侍柏梁之髙宴即賦七言然陪清蹕之遊更獻從臣之頌梁園㫖酒居客右以無疑謝砌蒼苔代王言而在即適增欣抃遽辱緘題仰承謙退之私何勝勤厚之意感激慙愧不任下懷謝史館馬兵部啟右某啟伏審光奉聖恩榮升仙館恭惟慶慰伏以述作之任褒貶尤先歴代所難遺編可復闕里之七十子獨邱明之授經春秋之二百年唯董狐為良史矧設官之斯在固非賢而勿居側聽殊遷實由慎柬兵部學士學精𤣥史識茂經綸射策决科早擅場于多士彯纓就列久陪議于外庭出分郡守之圭符入佐縣官之塩鐡民謡載洽式露冕以行春國用益饒恥耕毫而言利屬巴岷之致討方臺閣以選賢爰整使車逺調兵食木牛流馬千金之費無虧玉壘銅梁三㨗之音繼至梟巢已盡騶騎爰來青蒲屡奏于便宜錦帳榮遷于秩序仍授載言之任克彰遺直之風延閣討論雖假獲麟之筆坤維漕輓猶煩乘馹之行豈增秩以勸能實藉才而集事佇及𤓰之受代方汗簡以成書某早仰芳猷幸陪清列適遂親仁之懇未伸致賀之儀敢冀恩私特遺緘尺願言内省非所克當謝除左司諫知制誥啟右某啟伏奉制命䝉恩特授前件官知制誥仍改賜章服者代言之任實演于絲綸賜服之崇莫過于銀艾仍進東臺之秩便叅右掖之榮苟非名流不在兹選祗荷成命若無所容伏念某才不兼人學非博物關西清白徒襲于素風天禄校讎偶塵于美仕久居諫署莫貢皁囊預草國書謬刋青簡尋一麾而領郡凡再歲以歸朝宿于交㦸之中唯思幞被班在赤墀之下深媿彯纓蓋自知之甚明亦不能而將止􅃷鬻者千數豈敢詣于公車諫諍者七人未嘗攀于殿檻官守之方既失食浮之議已喧敢冀明恩併加殊寵補衮增秩任在于彌縫視草求才職思于潤色及奉延英之對更頒命服之榮鳳閣徊翔已玷巢阿之地鵜梁忝竊曷逃濡咮之譏矧惟星垣上法天象熒煌之座出處近于三台清切之司動静遵乎四禁紫宸揮翰垂作典謨紅藥裁詩形于騷雅為仕進之極美顧鄙陋以寧堪伏揣噐能深惟職業尺一之詔書填委但懼稽留六曹之奏議紛紜將何平决但省躬而增惕念奮跡之有因此蓋某官欽奉昌圖勤求片善採虛名而畵餅奬薄伎于雕蟲揮麈尾之談曲垂題品借羊角之勢使得搏扶敢不摩厲以須僶俛從事庶逭假人之謗用酬知已之私過此巳還未知所措與史館晁司諌啟伏審光奉聖恩榮加寵命伏惟慶慰竊以周有司諫之職所以名官唐設大夫之階因而命服處諍臣七人之任超散官五品之榮仍兼史閣之資實聳士林之觀司諫學士瑰琦邁俗純粹積中負王佐之偉才擅人倫之嘉譽至誠遇物固璞玉以渾金餘力為文必摛錦而布繡自决科于丹陛便随牒於四方主父欲厭于宦遊賈誼始聞于召對職司直筆削青簡以惟勤班奉内朝服皁衣而已久果上書于闕下旋對策于禁中三道既成推平津于第一萬乘斯覽喜相如之同時遂詔有司亟遷好爵華衮之職俾効于彌縫名山之書再加于論次既臨軒而延見仍賜服以褒崇朱紱被躬式將旌德嘉魚發詠用慶得賢固將大樹風聲克揚職業三進及霤一言興邦更彰謇諤之名便厯訏謨之任豈但文石之上為鴛鷺之羽儀蘭臺之中正魯魚之譌謬顧惟祝望實異等倫與祕閣黄少卿啟右某啟伏蒙尊慈以某忝奉天恩擢司帝誥特遺雅風之什過形溢美之褒捧閲已還榮抃交集竊念芻蕘末跡章句諸生秉筆屬文不過篆刻彯纓筮仕謬列校讎蘭臺既接于羣英文陛復叅于近列北闕之下本嘗貢于皁囊東觀之中但恣窺于縹帙徒荷掄材之惠尚迷進德之方莫談天禄之𤣥空索長安之米今者忽膺柬㧞驟荷甄陞進秩本司代言右掖銀青三品之綬已媿曵婁絲綸五色之書將何演暢矧宦遊之最美而地望之尤清上應紫垣法星辰於大象旁連黃闥接歩武于台司方輿誦而是虞忽雅言而為貺松茂柏恱蓋臭味之靡殊玉振金相但佩服之無斁矧推稱之太過實藻麗以相宣有二雅之遺風乃一時之絶唱隨侯明月既類暗投郢客陽春其如寡和但口吻而成誦仍筐笥以深藏然以薄才自此增價雌黃已定永依月旦之評華衮為榮更比春秋之字願言感佩曷可敷宣與梁舎人啟右某啟伏自拜恩巳伸面賀恭惟舎人壺氷峻彩巖桂英標禀秀氣于岷峨振雄名于京洛學惟覩奥入聖域而已優辯可離堅占議圍而無敵品格素髙于月旦詞華早掞于天庭爰自先朝便升清貫内佐計相外剖使符體寛大以布詔條用文雅而餙吏事坐棠聽訟克播于歡謡視草求才果膺于急召爰九重而肆覲見萬乘以垂知宣室延登問鬼神于前席禁林試可給筆札於尚方一時之紙價頓髙翌日之絲言薦降南宫臥錦既改七兵之曹西掖封泥便裁五色之詔將啟迪於帝載實焜燿於儒林平奏議於省中佇申明於唐制頒號令於天下固誕布於堯言三代之風不日而復某聲塵無取名輩相遼偶諧附驥之誠亦在續貂之末幸依先覺必免至于面墻怯見大巫已自甘於閣筆然得親於蘭室須强厲於鉛刀顧函丈之有期忽尺題而為貺仰荷勞謙之㫖愈增反仄之懷内省庸虛何以勝克謝諸學士啟某啟伏䝉尊慈以某近被渥恩獲塵禁掖猥以嘉什見奬薄材側聆變雅之音益認相先之分躭翫無斁愧赧彌增竊以省闥是分名數尤重中書右掖專掌於王言太微西垣取法於天象樹棲雞而閣巢鳳地望頗清堦翻藥而砌依苔頌聲猶在苟非才標國器名動京師何以草尺一之詔書當三府之奏記如某者學無師法行匪瑰琦顛沛未省於違仁迂闊終非於曉事徒荷兩朝之頋獲叅多士之林宦路乗軒有同野鶴諫垣緘口更類寒蟬自觧郡符尚塵書殿彯纓謁帝猶接先生之並行返服歸田欲賦幽人之長往不謂出於非次忽被殊遷擢居清切之司得裁寛大之詔進秩東省既絶曹於七臣請對西清仍賜服於三品顧官箴而彌懼忽風什以見貽曲借聲光備形藻繪盛餙嫫母豈足揜於陋容輕擲隨侯曽不惜於至寳絶唱固難于屬和厚意深切于佩銘唯將雅言徧示知者金相玉振已傳誦於搢紳墨妙筆精更深藏于篋笥珍重之至倍異等倫與薛舎人啟右某啟伏自光奉天恩已伸拜賀伏以舎人汾陰令族稷下名流摛詞掞天聚學成海千文磊砢材實任于棟梁十德瑰琦器自標于瑚璉早踐揚于近署久薰灼于大名羣公懷居右之慙萬乘恨相得之晩調兩河之兵食遂輟輶軒裁五色之詔書爰陞瑣闥華星列位既上應于哀烏文石分班且日趨于翔鳳固已給北宮之雙筆判西掖之五花思若湧泉吏將脫腕盤石尚在念祖德之不忘青紙逺頒見王言之誕布固湯誥禹謨之可復豈元和長慶之足云某品格非髙資望素淺慕義不已徒顧于執鞭受寵若驚敢希于結綬附騏驥之尾或千里之可期草鳳凰之書憂一詞而不措北面永伸于師事東家豈悋于誨人庶承善誘之恩少逭曠官之責特䝉殊念曲示表牋仰戴重知無任下懇謝賢良登科查正言啟某啟伏覩拜恩巳伸面賀竊以漢崇儒術始策問于賢良唐設制科多柬求于將相既公卿而表薦亦郡國之計偕延見于白虎之廷召試于紫宸之殿設以三道必人事而直言賓于四門咸茂才而異等由是仲舒鼂錯明精祲相盪之源居易微之中才識兼茂之選故西京號為得士貞元謂之尚文烈于聖朝聿修墜典萬乗端冕坐于武帳之中羣臣彯纓侍于文石之上設幄幕之九張給簡牘之三千賜盛饌于大官示温顔于前席束帛加璧顧未為優築館以金曾何足算而某官欽承清問奮發雄才翰動若飛文不加㸃吾丘之智略輻輳自謂少雙平津之條對精詳果居第一天子屢形於歎息諸公咸願于服膺足光仄席之求旋降出綸之命仍于翌日復對兩階天威不違猶恨相得之晩異人間出必立非常之功方偃伏于下風忽捧承于華檢仰窺謙退非所克當代温大儀謝史館盛太博啟數日前特沐眷私曲貽編集窺捧之際降歎尤深竊以雅頌之興實由乎王澤風騷之妙别稟于天機苟非命世之流豈在言詩之列太博逸才泉涌麗藻星繁識窮象帝之先學覩孔堂之奥一自奮飛閨籍冠映儒林獻頌宸居固有凌雲之氣援毫史閣巳成繫日之書餘力霈然英詞煥發窮萬殊之奥賾究四始之本源探驪龍以得珠截文犀而取角不假江山之助而才過楚人非由夢寐之祥而思清謝客何連編之斯獲但成誦以忘疲便欲冩于屏風題于團扇同箴銘之例勒在盤盂比書札之珍置之懷袖表詠歌之不足庶佩服以無厭齊國聞韶雖巳臻乎忘味荆山抱璞亦終類于暗投感厚意之近臨豈多談之能盡答舒州孫推官啟某啟數日前伏䝉尊慈以􅈞山詩筆兩編曲垂惠貺躭翫之際歎服彌深竊以王粲從軍嘗聞流詠蒙莊試吏亦復著書頗或名家兼彰傳誦其如文多齊氣深貽舒緩之譏道異丘門用成恢詭之說非優入於聖域尚垂厥于方來推官員外命世之才為時而出膺五百之運豈媿史遷冠三千之徒獨稱顔子矧于同氣俱負大名一枝連得于桂林兩驥並馳於金埒雄詞冠古將掞天庭後進望風如登龍坂為斯文之盟主擅當代之師門自屈佐于初筵亦久沉于下位矧羣舒之劇郡控九江之奥區皖伯古城舊主咎繇之祀􅈞峰勝地曾經漢武之遊真仙所慿司命有集靈之宇禪林特盛祖師開說法之堂朱邑桐鄉之遺祠麴令望江之舊治著于方志並在郡封標舉猶存風流未逺自昔登髙能賦始為大夫因事陳辭爰稱作者故涔陽極浦騷人所以寄懷太邱豐碑伯喈稱其無媿竊尋髙致實慕前修或奮發雅言建裁麗唱或磨礱翠琰載刻好辭叩寂課虛若𤣥珠之斯獲飛聲騰實同華衮之為榮其餘珪璧相輝咸韶並奏乍窺武庫徒懼于鋒鋩初渉天池豈知其涯涘頗同投暗但冀服膺顧惟倦談靡能盡意其盛製輒留繕冩與史館陳大丞啟竊以國家柬求時彦論次國書用階炎漢之得人克就陶唐之大典頗重斯選實難其才蓋筆削是資褒貶攸出七十子之内雖卜商而不敢措詞數千載之間唯馬遷而斯為實録布在方策皎若丹青苟非洽聞豈能善繼太丞學士學探聖域道冠儒林鍾間氣于岷峨襲遥源于汝潁策名天府早登鄉老之書束帶周行久從大夫之後中都佐治殆絶飲羊南海頒條嘗聞祭鱷克紹昔賢之美聿彰循吏之稱式覩徵還爰從試可覽長卿之詞賦既喜同時任南史以策書允資遺直固將申明微㫖綴緝闕文石室明堂正圖籍之散亂甘泉太液奉輦輅之宴嬉載叅法從之榮更懋成書之業自聆美拜方愜丹𠂻敢辱牋題過形詞㫖答集賢丁孫二寺丞啟竊以漢庭下詔是設賢良之科唐室聚書乃開麗正之殿非懷才傑出命世挺生識際天人學該𤣥史將何以敷陳三道塞清問於當陽區别九流究微言于墜簡此為慎選允屬當仁學士巖電竒姿天球逸韻翔而後集同威鳳之得時聲必成文類洪鍾之待扣一昨聖君虛佇明詔誕敷舉爾所知公卿開慰薦之路輔予不逮制策有勞謙之言供筆札于尚方臨軒墀而旰食文不加㸃益仰患多之才喜於同時猶恨相見之晚允契得賢之美果膺加等之恩佐惟月之卿曹升集仙之書府碌碌如玉固待價而巳沽菁菁者莪但育才而俟用某内惟慶幸獲覩騫騰白虎深嚴已窺條對紫微清切仍草除書亦契夤縁唯增企慕敢期眷念特示牋題仰披藻縟之詞彌切欽降之懇答集賢李屯田啟伏以郎曹之設地望頗崇議三臺之政刑分六聨之事任更直建禮伏奏明光含香握蘭趨走於丹墀之下錦帳綾被偃仰於畫省之中選侍史以䕶衣賜大筆而起草應星纒於𤣥象振羽儀於周行自非挺田鳳之風標負黃香之問望賦成平樂枚臯擅於多才對罷雲臺鄧攸推其博識在於慎柬豈稱僉諧郎中學士名冠士林學探聖域梁園奏技曾參賦雪之流衞幕從軍幾擅愈風之妙自入奉於朝請仍典校於圖書屬膠庠大闡於素風屋壁傍求於墜簡正石經之訛舛鏤金版以流傳咨五行俱下之能辯三豕渡河之謬鉛黃斯畢克彰稽古之功綸綍載行式懋成書之業既望郎而進秩復仙殿以兼榮雖省闥以分曹且禁垣而通直佐八座以利擿時入文昌之宫接諸儒而討論未離羣玉之府實為清顯允稱翺翔載惟逺大之程固應翹企可俟謝門下李相公啟伏䝉台慈特示及蘓州重𤣥寺彌陀院新大藏經碑草本者盥手捧持洗心諷誦醍醐灌頂頓覺清凉簫韶在懸自忘滋味豈嗟嘆之所及固鑚仰以彌堅恭惟相公以無礙辯才住第一義諦千方遊戲聊現宰官之身萬行圓成自是法王之子蓋以靈山付囑實託大臣震旦流傳雅資外䕶受佛真印為世導師運悲智以濟羣生體忠貞而翊明主心如金石功等塵沙一念不生諸相皆離推求靡得若環之無端應接忘疲猶鐘之待扣且以十二分之教五千軸之文始乃一事之因縁終由五性之差别捨文字而非法深念浄名之言㑹權實以歸宗思闡大雄之㫖因苾芻之勤請值廊廟之餘閒退食宴居虛室生白乘興灑翰湧思如泉煥乎文章所以聳動頽俗厯然境智所以誘掖迷途掲慧炬於昬衢指寳藏于貧宅祗園四衆誠所歸依秦市千金固難增損式䕶持于末法用佐佑于能仁又何必内史翻經廣譯五天之語長者著論深談九㑹之因諒簡妙之攸資非擬議之能及某謬窺教典殊懵端倪每咨事于閤中幸拜塵于牀下或因更僕之頃必聆出世之談既覺悟于輪迴方咨嗟于孤露入彌勒之閣頓獲圓通升闕里之堂敢希殆庶而相公憐其可教許以知言雄文纔絶於麟毫副本遽傳于蝸舎非子期之善聽豈辯流水之音雖野人之至愚亦識負暄之快然學道須資于勇猛至理豈尚于撝謙况䝉印可之私益勵勤行之志踴躍無巳得聞半偈之指歸主伴是期願見一生之補處慶幸之至倍萬常情代人謝鄧州錢太傅啟竊以敦詩閱禮晉求元戎之才察俗觀風唐重亷車之任自非翁歸之文武兼備吾邱之智略少雙夙簡萬乘之心曷奉十連之寄太傅識推王佐道出生知鍾間氣于一時踐亨途于早歲掌命書于内署言成典謨總機務于中樞道光啟沃俄切北堂之榮養懇辭温室之近班鉛黃再就于圖書桴鼓尋清于京轂兩河作鎮祗談笑以安邊三輔乘軺得便宜而從事前席之恩彌厚出綸之命遂行雖南陽地雄巳列通侯之籍而東山望在未慰蒼生之心佇立竒功以駭羣聽用表法宮之命將如下九天便歸台席以致君式躋二帝顧惟善頌實在于兹武夷新集卷十九
