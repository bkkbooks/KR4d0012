body:
  text: 武夷新集卷十七宋楊億撰表狀六二十五首代僕射李相公承天節進經疏狀右臣伏以河清九曲爰屬於休辰節紀千秋式遵於故事富壽之祝臣子攸同况臣本乏器能出於幸㑹望苑早參於賔䕶台司旋預於弼諧享厚禄之萬鍾奉禁庭之三接在具瞻之地無補於衮章荷洪覆之恩免傾於鼎餗徒懷殞越莫報生成幸逢載誕之祥願益無疆之算竊以大雄之教實為衆善之因輙就紺園式陳香供命五天之開士誦三藏之𤣥言六時之梵唄精嚴八部之龍神䕶衞奉焚修於西竺用集勝縁仰峻極於南山克資介祉拂石永延於浩刼傾葵庶竭於下誠代人次對奏狀右臣次當轉對理合上言輙有見聞不敢緘黙臣竊以太祖皇帝建隆年中曾降明詔聿修墜典咸秩無文以前王之功及生民遺廟之存於地志蕪廢者新其營搆頽陊者俾之繕完乃至封樹以增崇固亦樵蘓而申禁使吉蠲之薦肅奉於常儀昭格之靈允懷於主德暨五嶽四瀆視三公諸侯興雲雨以利人奠坤元而載物並增嚴於棟宇用祗事於神祇當時樹立豐碑以紀成績赴告青史式煥大猷歷今古以遐觀真帝王之能事也臣前知河陽領祠濟瀆舊制長吏每月朔薦獻必示躬親尋以為煩秖令春秋享奠祭不欲數雅合禮經神實依人式資崇奉臣竊見朝廷所修廟宇剏葺斯久寒暑載離或梁木摧頽或屋瓦滲漏漸成隳壞有爽精䖍州郡雖欲舉行動須申報俟符牒之往復必歲月之推遷臣欲乞特降勅㫖應前代帝王及嶽瀆祠廟自今後本處長吏二時奉祠即令檢校或有疎損便許葺修仍破省錢不須申覆如此則國之大事在祀典以惟寅神享克誠亦陰騭之昭報干犯旒扆云云代司空相公謝撫問狀右臣昨日晩李沆等到臣私第奉傳聖㫖以臣所患令安心將治中書無事者處弼諧之任曾乏於謀猷乖攝養之方自生於疾疚蓬蓽適居於假告冕旒仍示於記憐特令當國之臣曲諭如綸之㫖慰安彌極跼蹐靡遑蓋念臣本出諸生素無逺略幸以遭逢景運際㑹先朝但持孤直之心獲玷具瞻之地跛鼈安能於致逺短綆非可以汲深衮章莫効於彌縫鼎實每虞於傾覆爰從策免復預疇咨雖竭肺肝曷禆塵露終荷保全之惠繆升師長之崇皇帝陛下恭已奉先虛懷求舊式汙揆路再冠台司比三入於承明殊非光寵享萬錢於黃閤尤負靦慙宵衣豈減於憂勤尸祿唯甘於嘲誚果貽瞰室遂致臥漳瞻八彩之眉暫違堯陛賜十全之藥便降秦醫命星使以宣傳若天顔之咫尺荷照臨之所及誠殞越以難勝敢謂特遣輔臣同過陋巷備形問訊益示温存教以安心俾逹農皇之飬命諭之無事蓋慮孔明之傷神竊佩訓詞仰銜睿眷頓袪沈痼丹九轉以何功誓報生成身一毛而為喻感恩之至泄涕無從代侍講邢侍郎陳乞狀右臣伏有懇誠貯於肝膈蓋屬禋燔之慶方覃渙汗之恩冐昧上陳怔忪自失竊念臣有亡兄某早承義訓少習文儒肄業膠庠服勤簡素頗有詞藻見推輩流俯鄰壯室之年未及命鄉之薦忽嬰疾疹遽至淪亡臣亡妻某氏是臣二親在堂為臣聘娶親執箕帚逮事舅姑躬調滑甘奉養晨夕而臣未升朝籍臣妻已揜泉塗靡及湯沐之封徒切糟糠之感今者郊丘布澤幽顯懷仁臣不勝同氣之親痛深終鮮勉思齊體之義情極悼亡罔避鈇鉞之誅輙干旒冕之聼伏望皇帝陛下俯矜懇悃特霈寵章俾臣兄沾贈典之徽光生吉第而臣妻蒙追封之命恩洽漏泉倘𤣥造之曲成乃微願之永畢誓傾勤瘁以補遭逢代宰相謝春社日賜御筵狀右臣今日中使某至中書奉宣聖㫖賜臣等御筵者候靈星而置祠將興農作擇元日而命社爰舉國章和羮方愧於素飡推食遽䝉於飫賜此蓋皇帝陛下率遵時令寅奉天時道協建中仁深逮下屬陽春之嘉節申宴樂於近司飛觴俾極於醺酣折爼更均於慈惠歡呼飽德唯驚鼷腹之屬厭跼蹐畏威但仰龍顔之咫尺共荷雲天之施益堅金石之誠臣等云云代宰相謝賜御製社日詩狀右臣今日中使某至中書奉宣聖㫖賜臣等御製社日詩若干首令依韻和來者命社之辰聿當於春仲變風之什獲覩於天章方䝉式宴之私忽奉言詩之賜此蓋皇帝陛下思探繫表道合帝先宣雅曲於南薰阜財觧愠緫乾文於東壁懸象著明屬品物之載陽矧穆清之多暇爰䊸睿思成是永歌居然治世之音至矣聖人之作雲漢但光於凡目巴歈曷繼於正聲徒忘味於齊庭更驚魂於葉縣諒嗟嘆之不足實慶幸以同深臣等云云代司空相公寒食日謝賜御筵狀右臣今日中使至奉宣聖㫖就臣私第賜御筵者荆楚歲時早傳於令節太原風俗爰舉於舊章方休澣於私門忽頒宣於公宴此蓋皇帝陛下嘉天時之大順念春物之載陽適因禁火之辰特示需雲之澤供帳既光於顔巷分甘仍出於堯樽蓽門迴長者之車鼷腹飫大官之膳樂以侑食固肉味之都忘酒乃合歡且羽觴之無算感德唯期於醉飽省躬更誓於糜捐代司空相公乞免賻贈狀右臣今日中使某至私第奉宣聖㫖以臣第幾男某夭殤特賜某物者晉相萬錢方致懸貆之誚童烏九歲俄纒䑛犢之悲年未及於成人禍良由於瞰室敢謂恩加贈禭禮越彛倫况下殤之服紀素輕而宰司之俸入殊厚堲周之費固不至於慮居􅐠布之儀乃深為於躐等雖天慈之所及實公議以是憂豈惟增謗於素餐更慮害盈於陰騭伏望皇帝陛下俯矜忝冐曲示保全察兹跼地之誠恕以扣閽之僣特令停寢用息怔忪干犯宸嚴期於得請代宰相謝賜新印道德經狀右臣等昨日伏䝉聖慈各賜臣等新印道德經并釋文各一部者伯陽立言首天地而稱四大馬遷約史先黄老而後六經是開衆妙之門足助無為之化恭惟皇帝陛下功侔亭育德合希夷清明在躬蓋凝神於姑射慈儉為寳爰躋俗於華胥稽古訓以惟精訪遺編而大備乃復欽崇妙道紬繹微言以為柱下史之書允為教父河上公之注未洞𤣥關式因唐室之討論早在虞庠而流布歲時寖逺頗多魚魯之譌方策惟新蓋出絲綸之㫖巳成功於刋刻忽命使以頒宣臣等徒慶逢時俱慙昧道心希漢相但清浄以為師學謝蜀嚴豈指歸之能測唯荷記憐之造彌堅報効之誠進洞霄宫碑狀右臣昨奉勅令臣撰亳州洞霄宮碑文進呈者聞命魂驚抽毫思軋牽罄駑拙綿厯旬時竊以𤣥元誕育之區光靈未冺睿哲欽崇之㫖修奉惟寅爰畢塈塗將刋琬琰合咨大手用志新宫而臣猥奉僉諧獲當撰述乏色絲之妙曷示方來叅衡石之餘空塵聖覽内循鄙陋尤負靦慙其碑銘今巳撰成謹隨狀上進干冐宸嚴陳乞奏狀不曾上右臣竊以穹旻覆物所貴於聼卑臣子事君固許其無隱敢傾肺腑上黷冕旒伏念臣本出單平素非茂族先皇憐其好學寘在清華陛下採以虛名驟加甄擢預諫諍七人之列掌絲綸五色之言身紆三品之服章日奉九重之朝謁實為儒之健羨誠受恩之寖深敢不策勵疲駑服勤官次終虧稱職之譽空累知臣之明每循省以若驚在報効而無所豈合更傾私懇上凂公朝蓋以臣世異膏粱跡本覊旅負郭素無於别業北堂方侍於慈顔自委質効官代耕得祿朞功相聚莫匪至親衣食所資悉皆仰給雖職司之甚重在俸入以極微至於吉凶慶弔之資僕馬薪芻之費凡百用度皆出其中諒饘鬻糊口之不充豈甘㫖養親之能及早者以迫於旅火曾扣帝閽述屡空之可憂冀倒懸之或觧而羲輪晃朗未照於覆盆河鮒焦熬愈悲於涸轍蓋念處掖垣清切之地受帝王特逹之知出入於金門玉堂陟降於赤墀文陛苟尺帛寸粟稍有資儲夕膳晨羞不虧奉養且無求於豐泰况粗守於亷隅又豈願以區區之誠上煩君父籍籍之口騰誚搢紳既擠壑之是虞亦觸鱗而無避伏望皇帝陛下道存惻隱仁極表微憫其聚族於京師只請本官之俸料或館閣之内俾兼著撰之職司或甸服之間特授藩方之憂寄庶稍沾於加給聊有救於固窮其於燕谷迴春西江激水頓蘓暖律驟躍洪瀾並出殊私非敢有望代駙馬王都尉乞書史狀右臣輙寫愚誠上塵聖聽退循踰僣甘俟誅夷竊念臣門襲素風家承緒業服膺為學爰自於青衿刻志窮經誓通於緗帙本冀干名場屋濟美箕裘遽席寵於沁園更冒榮於環衞彯纓就列敢矜戴鶡之雄挾策讀書尚負亡羊之愧臣伏見國子學印本九經書并釋文史記前後漢書三國志等蓋聖人之垂教或良史之立言咸經校讎早備刋刻臣面墻有素閱市無聞徒堅學古之心欲望賜書之寵上件書等伏乞聖慈各賜一本所冀韋編屡絶獲探典籍之言木鐸載揚無辱文明之化臣之鄙願實在於斯代僕射李相公謝歲節賜御筵狀右臣今日中使至臣私第奉宣聖㫖賜御筵者端月標辰方畢稱觴之禮需雲式宴俄推折爼之私分甘蓋自於大庖供帳更榮於陋巷此蓋皇帝陛下嘉元正之首祚屬開泰之膺期念休澣之文著乎甲令欲慈惠之澤及彼近司爰就敝廬俾為盛集金絲合奏殽核具陳腹滿社鼷共負屬猒之媿心傾園藿曷酬臨照之㤙代人轉對論太學狀右臣位忝朝行次當輪對合陳愚瞽上黷宸嚴退省僣踰彌增戰慄竊以敎化之本學校為先故國家開設膠庠敦崇儒術立成均博士之職遵祭菜鼓篋之規大集生徒俾加講習所以扶翼至教激揚素風然臣竊見博士之各專一經員闕而未備國子之並設六學職廢而不脩臣又見唐太宗貞觀中增築學舎至千二百間國學太學四門及書算律學生凡三千二百六十員及至軍衞亦給博士授以經業乃至三韓吐蕃髙昌諸蕃國並遣子弟請入國學增至八千餘人文德之盛超絶前古今朝廷安靜聲明震灼而太學制度尚或未備况三代之制王公已下子弟之秀者爰自總角即肄國庠仕進不由於他途講學必行於考校故每歲兩館生冠郡國之首齒胄之典興化是資今學舎雖存殊為湫隘生徒至寡僅至陵夷貢部以鄉舉為先諸生以兩館為耻塞原拔本莫甚於兹臣欲乞精選五經博士咸備其員大啟國庠增設學舎少給厨廪賜以本錢然後明勑公卿大夫凡子弟纔及弁髦即皆隷籍夏弦春誦咸舉舊章小成大成率如前典貢部取士必以兩館居先周行厯官皆由博士為重然後並修諸學式協前規使禮讓興行風俗淳厚追蹤三五坐致太平端拱無為翹足可俟代中書請聽政狀右臣等伏以先后升遐宸𠂻哀慕痛深創鉅擗摽傷摧殆兹彌旬焭然在疚雖三日聽政備遺誥之丁寧四表呌閽罄羣情之懇到而詔㫖敦諭形於未忍朝野惶駭罔知所圗竊以機務至繁不可以暫曠治命至重不可以輒違况自先后聖體弗康載離寒暑皇帝陛下衣不解帯藥先必嘗躬禱神祇徧走羣望親候安否日至寢門或常膳之載加然乃御食雖中夕而屡起靡敢寧居動靜承顔勤勞不匱天子之孝載籍所無及兹上僊追懐罔極充窮永感諒闇不言臣等獲造倚廬面陳至懇願以宗社為念少抑哀懷望遵顧命之文俯臨庶政而易月之制聖情誓守於几筵宅憂巳來天顔殆至於欒棘臣等兢惶屏息不敢仰視伏望陛下循祖宗之舊典克保彛章禀母后之遺言勿違慈㫖節哀順變式協前經垂拱嚮明躬决庶務以天下而為大計俾羣臣而覩清光如此即長樂如在之靈實歆孝德有司各揚之職不紊官常所繫非輕期於得請代王寺丞為弟乞應舉狀右臣輙寫私誠仰干聖聽退量僣越甘俟誅夷伏念臣門襲素風家承緖業自先臣之淪逝乃賤族以替凌臣之二兄並參朝列俯鄰一紀俱揜泉扄唯臣與弟鄉貢進士貽序勉紹箕裘恐隳堂構永懷陟岵但深罔極之哀相顧在原同勵自强之志微臣幸縁世胄獲踐官常臣弟刻苦藝文服勤簡素誓求一第用慰九原咸平四年冬叨京府之薦能預澤宫之試藝雖從退黜靡敢怨尤益堅學古之心庶遂起家之望今歲巳頒詔㫖大啟貢闈南郭吹竽豈容濫吹東堂折桂咸激壯圗而臣私室延災長主薨背方纒哀於戚里難旅進於名場然而情迫由𠂻理須犯上蓋以臣弟齒髪巳踰於壯室姓名尚在於白丁以舊相之遺孤與編氓而等列辛勤硯席殆過於十年嗣續衣纓未沾於一命况稀逢於鄉舉憂漸墜於門風伏望尊號皇帝陛下念微臣閥閱之微衰憫臣弟身名之蹭蹬不令公輔之後夷於平民俾預賢能之書升于天府苟得齒四方之貢士䝉再試於春官妍蚩雖卜於至公存歿實銜於大造代許州李相公陳乞狀右臣伏有懇私須干聖聽退循僣易甘俟誅夷蓋念臣兩日前獲奉宸遊親陪宴射侍天顔於咫尺厠鼎席之崇髙在鎬飛觴但驚於無算飲河滿腹自媿於不任而重瞳曲賜於撫存方寸彌增於感激適對顒顒之當宁頗成喋喋之多辭雖覆幬之見容亦諠譁之是懼且念臣斗筲之器素狹犬馬之齒巳髙霑玉斚之餘既難勝於天漿接公槐之列徒負愧於朝倫况今享勞有期將均於慈惠台衡之任實冠於搢紳或舉白之如初必峩冠而致誚空自成於貳過益有玷於具瞻伏望皇帝陛下曲賜保全深垂矜察俾不令於引滿庶免至於失儀顧瀝懇以由𠂻亦懷憂而失據仰希慈造特允下誠代中書乞免和御詩狀右臣今日中使至伏蒙聖慈賜臣等御製契丹出塞將議迴鑾五言六韻詩一首令和來者萬乘時巡六驘宵遯款塞願修於舊好息民姑務於逺圖烽塵巳静於龍荒鑾輅將旋於象闕式啟和戎之利佇臻偃伯之期皇帝陛下深念生民靡辭於櫛沐聿脩神武期息於干戈念驕子之乞盟俾行人而答聘果通歡於異域將旋軫於上都爰形風雅之言用導憂勤之㫖頌聲載洽克彰正始之音𤣥象式瞻但賁昭囘之彩臣等繆塵台席獲奉宸篇巳欣凡目之榮觀更俾庸音而繼和竊循懵學空効冥捜雖強綴蟲文豈有成章之美而共慙鳬脛䖍祈䕶短之仁敢望恩憐曲垂矜免兩制謝賜御詩狀右臣今日入内内侍髙班趙誠信至奉傳聖㫖賜臣等契丹出境將議迴鑾五言六韻詩一首令依韻和來者天驕犯塞鑾輅時巡繼好息民式啟和戎之利迴轅返斾將聞振旅之期慰生民傒后之心叶載籍止戈之義皇帝陛下躬親櫛沐䝉犯風霜巡細柳之營貔貅賈勇賦大風之什雲漢垂文克宣治世之音實顯聖人之作臣等謬忝司言之任慙無䕶蹕之勞辱示宸章俾窺睿藻璧月珠星之彩既獲於仰瞻陽春白雪之篇仍容於屬和拭目之榮雖積燥吻之慮彌深徒共抉於荒蕪誠預慙於鄙淺感懼之至殞越無從臣等云云代集賢冦相公謝就宅賜宴狀右臣今日中使至奉宣聖㫖就臣私第賜御筵者清蹕班旋方洽弭兵之化私門休澣適欽逮下之仁如綸忽奉於宣傳折爼特頒於宴飲此蓋皇帝陛下道侔洪覆澤被含生以百姓而為心御六龍而展義爰及迴鑾之慶將臻偃伯之期俯念從臣曲頒勞酒王人供帳御膳分甘荷推食之恩但共懷於慈惠顧飲河之量實同媿於屬厭仰戴髙明豈任殞越云云代叅政王侍郎陳乞狀右臣偶嬰微疹特簡皇慈降中使以撫存命大醫而診視内慙鄙陋無補休明榮衞愆和自寡攝生之要穆清軫慮曲迴乃眷之仁仰荷照臨彌增殞越况昊穹洪覆過私一介之軀而藥石蠲痾顯著十全之効只於晷刻便冀痊平然臣竊有懇誠難從緘黙實不遑於肺腑須上瀆於冕旒蓋以臣自拙將調致兹疾瘵然朝謁之無廢亦飲食之靡妨風毒所成已積日彌年而如此平復如故諒匪朝伊夕以難期今者天奬殊常聖恩優厚每遣近臣而臨問特輟中尚以療治顧腠理之甚微煩星軺而屢駕勞君親之軫惻在啟處以怔忪其所差到内使醫人欲乞不令逐日看候或有求取之藥餌俾令修合以供須亦漸冀於蠲除庶不成於沈痼苟俞所請實戴殊私代宰相春社日賜御筵狀右臣今日中使至奉宣聖㫖就中書賜御筵者吉日惟戊克遵命社之文退食自公忽挹當衢之味此蓋皇帝陛下念方隅之底定嘉品物之載陽屬勾龍之祀典唯寅且田畯之農祥始正條風啟序膏雨應期𤣥貺薦臻豐年可冀爰順發生之候特均慈惠之私式霈湛恩俾為盛集酌金罍而引滿同懷既醉之心享玉饌以屬厭更負素飡之愧仰被涵濡之澤彌堅報効之誠臣等云云南郊奏舅狀右臣輙有懇私上煩君父蓋屬嚴禋之慶仰祈錫類之仁既内迫於肺肝固難逃於鼎鑊臣有親舅張僅年四十歲是臣母親弟素通書記兼習刑名縁藝業不至於專門且齒髪已登於強仕進難干於塲屋歸仍乏於田園臣外祖頃仕偽邦累宰劇邑所得俸入盡買圖書頃彰清白之名蔑有膏腴之産下世纔離於寒暑尺椽莫庇於子孫故臣舅自來只在臣處均衣共食厯歲踰年臣去冬幸因載誕之辰曾瀝由𠂻之懇屬以釐革外姓莫遂私心今者玉帛祀天雷雨作解兊澤咸均於動植皇明俯燭於幽微臣是敢重冩危誠再祈𤣥造伏望皇帝陛下矜其悃愊恕以僣踰憫臣爰自孩提臣母巳嗟孀獨自幼齡而鞠育微臣曷報於劬勞顧外族之替凌臣母每多於傷感敢冀陛下念臣之遭逢有素察臣舅之蹭蹬無圖特霈異恩獲霑卑秩俾臣於晨昏就養有慰於慈親即臣非土木無知終報於明主跼蹐俟命啟處不遑納南郊所加恩命乞迴授親舅狀右臣輒披肺腑上干君親蓋縁危迫之誠難避誅夷之典臣有親舅張僅年四十歲是臣母親弟外祖頃在江左嘗事偽邦宰邑字人周旋數任頗著循良之政見譽當時誓敦清白之規以遺後嗣凡得俸入盡買圖書並無田園可庇親族下臣纔踰於期歲臣舅巳歎於流離微臣自忝官榮臣舅遂相依倚均衣共食厯歲踰年雖逢下武之期且乏專門之藝昭代無從而進取流光漸歎於蹉跎前年因祝壽之休辰適推恩於近列臣曾陳章奏仰扣髙明雖迫切於私心方釐革於外姓去嵗嚴禋云畢慶澤遂行臣亦首露血誠上塵天聽庶於臣舅獲被鴻私二年並竭於丹􅇆一命未諧於始願竊以人倫情義唯外族而最優母黨姻親於舅氏而為重况臣爰當稚齒臣母巳是寡居撫養之仁劬勞備至顧外門之衰謝且臣舅之覊孤痛傷之懷晨昏在念臣是敢更冒萬死再凟九重欲乞納臣昨者南郊所加朝散大夫及爵邑户封與臣舅換一卑秩冀霑寵渥用慰慈顔伏望皇帝陛下念臣幸以惷愚特䝉甄奬獲預代言之任别無出位之思蓋迫庭闈之情須犯冕旒之聽兼臣有三人親弟並巳長成凡再遇於覃恩未敢干於當宁實縁臣舅單孑無依敢冀俯察由􅇆特迴殊造許令臣陳納所加恩命迴示臣舅一卑品末僚自葉流根儻荷涵濡之澤摩頂至踵誓堅報効之誠承天節奏親弟化狀右臣任忝司言節逢誕聖屬推恩之云始輙瀝懇以上陳内省僣踰實甘誅殛臣有親弟化與臣爰從幼稚即歎覊孤共出寒微親加訓朂頗服勤於素業亦俯近於壯年適鍾下武之期竊有起家之望以臣獲掌書命忝備掖垣屬虹渚之降祥庶鴒原而徼寵伏望皇帝陛下察以由𠂻之懇憫兹同氣之親雲天特霈於異恩州縣俾參於微秩冀獲代耕之禄用為舉族之榮在於孱庸敢忘報効武夷新集卷十七
