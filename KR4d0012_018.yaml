body:
  text: 武夷新集卷十八宋楊億撰表狀十九首再乞外任狀右臣近者瀝懇拜章祈天俟命願諧典郡庶獲養親逮今旬月之間未奉允俞之旨內懷危切實不遑寧須再述于愚𠂻期必回於聖聽伏念臣早緣薄技謬玷近班迎侍安輿聚居帝里既代耕而有祿固盡室以相依棲輦轂以食貧已六遷于歲律厠掖垣而承乏又五及于王春桂玉是憂旨甘多闕矧又久叨塵于清列莫演暢于皇猷以愚直之姿素昧毁方之理在孤平之迹常懷履薄之危皇帝陛下曲示含容特加保庇且令備位未忍黜幽臣固非土木之無知豈忘君親之大造雖然覆載之量姑務于包荒其如方策之言亦旌乎知退苟上煩于澄汰亦何表于廉隅况今外公議以是慙內私誠而尤迫臣母久違故土深念於鄉閭臣弟寄食妻家莫均于饘粥臣亦叨榮纍歲無補休明聚族神州久嗟僑寓朝廷就列上惕于官針晨夕問安中煎于旅火伏值陛下道光孝治恩厚曲成望推錫類之仁俯察由𠂻之懇于江浙之封部擇僻小之方州假以使符遂其私便慰臣母懷歸之念免臣弟漂泊之嗟有職田祿粟之資備夕膳晨羞之費臣敢不盡心為治竭力從公分旰食之憂勤宣寬大之條詔期于盡瘁少報萬分承天節奏親弟俅狀右臣職司視草慙無東里之才節值流虹方罄南山之祝輒祈恩于宸極冀延賞于私門內省僣踰啓處無措伏念臣有親弟習進士俅爰從幼稚即歎羈孤訓靡及于過庭貧不遑于學稼自微臣之食祿奉慈母以供甘提挈以至于上都鞠飬殆踰于冠嵗辛勤弦誦粗知學古之方似續衣纓竊有起家之望今者慶逢鳴社澤被周行不勝同氣之情須黷至尊之聽伏望皇帝陛下俯察在原之懇稍覃作解之仁推一命之恩俾霑榮于黃綬齒四民之列免負愧于白衣深慈既被于天倫薄質惟堅于臣節祈天俟命顒俟允俞代集賢寇相公謝賜晉書狀右臣今日中使至奉宣聖旨賜臣印本晉書一部計六十九册者兩晉遺編具列祕書之目九重稽古新成鏤板之功夫何寡聞仰膺蕃錫伏惟皇帝陛下纘戎御極執契臨人負將聖之多能尚觀文而闡化以史筆之所記有龜鑒以具存魯魚特命於校讎方牘更加于摹印俾前言之不墜亦副本之廣傳臣謬預持衡實慙昧道輒上干於宸扆果垂錫於策書學古無功固已嗟于扞格傳家知幸但永誓于緘藏恭承臨照之私益勵傾輸之節代中書賀宣示合穗麥狀右臣今日伏蒙聖慈宣示奉先禪院後面麥地內生出合穗麥者上玄降祐多稼呈祥克彰純嘏之休式契豐穰之兆臣等竊以載籍所重實在於民天瑞典攸徴莫先於年穀矧惟首種之利最為艱食之資厯三時而有成已彰大順秀兩岐而發詠允叶元符伏惟皇帝陛下慈儉居尊憂勤御下先天發令運神化于無方旰日視朝體健行之不息引萬方而在已以百姓而為心故得洪覆眷懷殊祥薦委和陰陽之玉燭靡愆離畢之占盼原隰之龍鱗式覩如雲之稼而况景風適至宿麥將登更彰合穗之竒用薦有年之瑞升歌九室足播于樂章記事三長永光于史筆臣等叨居輔弼無補聰明幸矚休禎徒深慶抃謝宣召赴龍圖閣宴會及觀御製御書狀右臣今月某日伏蒙聖慈召赴龍圖閣觀太宗之御製御書及聖製碑贊并四庫圖書仍賜御詩兼預宴會者上帝藏書肇開册府聖人有作爰勒金碑許拭目以榮觀實捫心而知幸伏惟皇帝陛下順考古道啓迪人文執左契以御庶邦運太鈞而播羣品車書無外咸歸輿地之圖弓矢載櫜式開仁壽之域而乃講求前訓潤色大猷擬石渠天祿之舊規聿新層搆搜汲冢羽陵之墜簡並集羣言敦奉先思孝之心顯繼志守文之盛恭以先朝之述作為後世之楷模萃手澤于縑緗窮筆精于翰墨祕宸編于延閣用垂示于方來奮睿藻於貞珉式翰揚于盛美金石頌德實曠古之無階雲漢成章亦羣生之共覩眷惟近列首獲仰瞻側管窺天寧測蓋髙之量聞韶忘味徒萌竊抃之心矧又賜玉斚之醢醪示柏梁之絶唱飲河之腹既嘆于屬厭下里之音靡容於緘默並陳巴拙上黷皇明雖蒙善下之仁終抱黷尊之愧內循孱簿曲荷恩私閲東序之圖書奉文思而知幸陪西清之宴豫沐慈惠以難勝唯共誓于糜捐庶少酬于臨照謝批答狀右臣近者恭陪鎬飲仰覿乾文實揣已以知榮輒拜章而敘感猥蒙批答備極恩私捧讀周旋慶抃交集伏惟皇帝陛下道髙列辟功濟中區體神武以懷柔法天明而覆幬撫羣生之重畜朽索居懷考厯代之元龜青編在御肇新宏搆總萃前言先朝之奮藻摛華並藏麟閣聖主之披文相質髙揭龜趺因萬務之餘間召諸臣而宴喜金簡玉字既容下士之竊窺白雪陽春更許巴人而屬和仰奉觀文之德薦承飫賜之仁共慶遭逢徒深踊躍爰陳奏牘虔述寸誠敢謂陛下濬發睿謨俯頒優詔曲形敦諭倍極恩慈演絲為綸聞聖言而知感摩頂至踵勵臣節以彌堅誓畢微生少酬玄造臣無任云云代中書謝賜聖製乾坤寶典序狀右臣今日中使至伏蒙聖慈賜臣等御製乾坤寶典序各一本者星使俯臨宸章下賜莫窺玄逺徒極歡呼竊以頒厯授時前王之令典觀文察變大易之格言故璇璣齊政於有虞銅渾設象于東漢珠連璧合定疏密於諸家夏造商因分指歸於三統是以陰陽之學著於九流羲和之官列于百執厯代而下何莫由兹然而象緯之文頗多脫簡星厯之史罕或研精金匱石室之中既紛綸而無紀宣夜渾天之術亦涉獵以非工允屬欽明疇咨古訓聿修茂典光集大猷伏惟皇帝陛下道邁帝先智周物表自天攸縱將聖多能執古御今視八方于指掌窮神知變韜萬化于襟靈而乃懼司厯之失官慮疇人之廢業盡搜亡逸大補闕遺分别部居刋正訛謬典乾坤而吻合肇建嘉名法雲漢以成章更行睿藻誕揚能事式冠首篇臣等數日前被召穆清獲親册府幸覩聖人之述作實為後世之楷模輒祈副本以頒宣庶遂洗心而披繹敢謂俯從人欲曲允下情卿雲發祥已竊窺于凡目玉牒不祕更傳寶于私門內惟懵昧之姿得味淵沖之旨瞻天莫測遊聖無階仰法穹旻見勛華之稽古奉傳簡策有南董之當官伏望宣付史臣播于直筆豈獨臣等幸甚實亦天下幸甚謝賜批答狀右臣近者恭承天奬獲覩聖文共拜封章上塵睿覽猥承批答曲諭宸襟捧讀再三兢榮失措伏惟皇帝陛下文思撫運勤儉化人錫純嘏于昊穹散皇明于普率撫柔諸夏煦嫗羣生一戎而不復用兵三變而遂至於道然而探玄物表索隱天倪衡石自程雅得觀書之趣崆洞順拜未忘好問之心賾萬象于毫釐括九流于指掌眷惟律厯垂示吉凶慮南正之失官或疇人之離次博求墜簡採托羣言定黃鍾纍黍之差正晉豕渡河之謬聿新制作傳信方來仍枉神毫序其能事兩曜合璧察時變以無疑五色成文覩天章而在上夫何懵昧並預頒宣聽廣樂於彤庭彌增惝恍得玄珠于赤水但冀緘藏輒希付于石渠庶永傳于汗簡恭承明詔深諭至懷靡徇下情曲形睿旨仰乾坤之謙德無得而名諒河洛之祕文有時而出在聖神之垂範豈愚瞽之能知唯荷戴于鴻私永鐫銘于丹腑謝中使傳宣撫問狀右臣昨日中使至臣安下處奉傳聖旨以臣所患特加撫問者王人薦降天語載臨側聞綸綍之言頓愈膏肓之疹省循備至感懼交并伏念臣本自諸生獲逄休運非丘園耿介之秀無公卿籍甚之名弄翰為文不過篆刻濯纓筮仕最處羈孤皇帝陛下過聽庸虛薦加寵擢俾升禁掖式掌訓詞居清切之司冒榮斯甚草寬大之詔稱職無聞積日彌多妨賢為愧今者攝生寡要遘疾自貽度越旬時曠廢官守嘗趨期會幾踣于軒墀再奉德音特頒于假告式加調理漸冀痊平敢謂濬發宸慈特矜賤迹九霄之上命星使以俯臨四壁之中回天光而下燭荷記憐之殊造感存恤之深仁寸心但誓于捐軀危涕不知其濡睫勿藥斯喜幸漳浦之有瘳戴天彌髙覺泰山之非重顧餘生之未泯必盡瘁以為期代中書乞免和御製南郊詩狀右臣今日中使至伏蒙聖慈賜臣等御製南郊七言六韻詩一首令依韻和來者因長日以陳儀方修毖祀體大風而發唱爰著雅章俄賜及于近司實光生于凡目伏惟皇帝陛下先天合德下武膺期以明察而事二儀用慈儉而撫諸夏外薄四海罔不懷柔日覽萬幾未嘗暇逸致羣生之茂遂果玄德之升聞乾符坤珍薦臻于純嘏雁山雞塞永息于襖氛遺黎得覩于承平率土方躋于仁壽百姓莫知于帝力一人思報于天功乃因周正之辰恭修漢時之祭辨冕端委率禮彌恭圭幣牲牢無文咸秩故得三日先甲密雪清塵六師纂嚴光風拂袵肸蠁昭答福祿來同克符永錫之祥用洽無疆之祉而陛下恭膺景貺濬發睿文窮六義之淵微導三神之眷祐聖人有作幸獲于仰瞻下里何知更令于屬和共循荒陋但極憂兢雖效冥搜終成纍句陽烏委照爝火豈敢以呈輝軒鑑髙懸嫫母或期於掩惡必希矜免庶息怔忪代中書謝寒食賜御筵狀右臣今日中使至奉傳聖旨就臣私第賜御筵者火禁肇修方遵于時令宴私云洽曲被于天慈衡門供帳以生光鼎食素餐而是懼此蓋皇帝陛下嚮明求理逮下均恩爰當出沐之辰曲霈分甘之惠大官先置曷勝推食之仁小人屬厭但極飲河之量荷照臨之所及實循省以增榮謝駕幸編修所狀右臣昨日伏蒙聖駕臨幸編修所者竹簡汗青方勤於官次金輿旋軫俄燭于天光表宸極之眷懷聳士林之觀聽臣等竊尋往諜載考舊聞稱制石渠甘露遂成於故事修書仙殿開元肇錫于嘉名為儒墨之殊榮乃帝皇之巨美恭惟皇帝陛下端居清宴博考前言日昃勞謙疇咨好問賁帛旁求于髦彥榮河上薦于圖書乙夜觀文每自程于衡石秋風發詠實光被于管弦而乃允迪睿謀聿修祕典發凡變例同宣聖之授經欽明文思見陶唐之稽古臣等並慙檮昧虔稟指蹤抱槧懷鉛服勤於夙夜持蠡側管窺測于髙深抉小智于胸襟冀成書于旦暮敢謂陛下特迂羽葆垂顧鴻都親閲縑緗深形問訊數刻尚回於玄覽羣臣徒仰於清光慙無善對之才莫奉好文之德矧又臨軒前席並示於延登厥篚兼金更均于寵錫荷綸恩之渥縟增藝圃之光輝敢不內省庸虛共思罄竭拜君之錫彌懷虛授之慙為儒之榮曷報非常之遇次對狀右臣職忝掖垣次當言事合伸鄙見上凂宸聰臣竊以求材審官方今之急務振淹擢雋稽古之令猷故擇善而稱選衆而舉者三代之彛章下詔郡國懸科有司者兩漢之茂典不仁斯逺得士乃昌垂于䇿書誕彰格訓恭惟國家承五代之季開萬世之基三葉重光九疇式敘至于並建衆職無曠庶官搜揚仄微登進茂異崇澤宫之選復試可于廣庭設制科之目親延見于便坐時下尺一俾公卿而論薦申命外計分縣道以察廉乃至植諫鼓以來直言置公車而遵舊典開自薦之路擢不羈之才萬幾之繁疇咨聽納一介之善抆拭進用蓋于天下賢士大夫無所負矣然或前代之經制載籍之舊聞未之申明有所闕漏此亦可惜焉臣竊見今吏部流內銓凡幕府州縣之職盡得考其殿最引對軒陛黜陟之命稟于宸旨資品之格循乎定規兹所謂官修其方事無矯舉者矣而書判之設亦足辨材而國朝已來未嘗責實逮太平興國之初始定等第優劣申以陟降之命強學待問之臣頗獲于褒升竊祿無狀之人亦加于懲艾汔今遵守成憲下無間言其于慎重官人澄汰繆濫畫一之法既盡美矣若乃搜羅羣萃登擢髦俊旁求之義尚或闕如臣竊見天下吏員幾于數千罷秩去官出入選調其人固已多矣先儒稱三人有師前王恥一夫不獲而詵詵濟濟豈無懷材藏用角立頴脫之人但恨取之之術有所未盡且唐制吏部有博學宏詞書判拔萃平判入等三科蓋求之于常調中非為草澤設也伏望皇帝陛下特詔册府講求舊章申飭天官奉行故事刈其翹楚被以寵靈下既無于滯才人亦聳于學古如此即思皇多士近比成周之隆允釐百工逺追有虞之盛干犯宸扆伏俟採收臣無任云云封駮銓司主事王太沖狀門下封駮司右今月三日中書發過劄子流內銓主事前撫州宜黃縣主簿王太沖特授大理評事依前充流內銓主事者竊以朝廷稽方策之文修班爵之制所以辨品流之清濁峻堂陛之等威克敦稽古之風俾絶濫官之謗蓋有國之令典致治之大猷也謹按六典大理評事十二人掌出使推案凡本寺斷獄皆連署焉自唐室已來並預三司之案鞫而近年之制或貼三館之職名苟非士流不齒兹選况秩參卿寺官有常員竊尋厯代之規罕兼流外之任忽頒新命恐紊彛章儻以王太沖經術登科無嫌于除授在于銓衡祗役固合于解停庶官守之有倫實國體之可惜臣等忝司封駮合具上言伏望宸慈特迂聖斷代中書請依詔頒行畫龍祈雨法狀臣等伏以先天合德易象攸稱勤雨憂民策書所紀恭惟皇帝陛下光膺駿命奄宅中區視百姓以如傷慮三時之有害博訪弭災之術期臻阜俗之方或稍屬於亢陽即遍走于羣祀恭修禳禬薦獲感通觸石興雲俄千里而雨集力田望歲果百谷以秋成信雩禜之有徵由穹玄之降祐式頒明詔誕告庶邦永消愆伏之虞同躋仁壽之域臣等叨居輔弼仰奉憂勤燮調之效無聞將順之誠彌切願奉宣于睿旨庶大庇于羣黎伏請付有司雕印頒行天下代中書謝秋社日賜御筵狀右臣今日中使至奉傳聖旨以社節特就中書賜御筵者西成屆候幸當命社之辰北闕宣恩式霈需雲之象示宴私於著位布慈惠於當陽此蓋皇帝陛下嘉品物之豐登因令文之休浣堯厨推食穆醴分甘有司供帳以載嚴近侍彯纓而咸集既飽以德但愧於屬厭退省其私更慚于尸素荷照臨之所及諒報效以何階進夔王周王志文狀右臣先奉敕撰故夔王周王志文者竊以奉大君之明詔紀賢王之令猷爰刻貞珉以志幽壤自非鴻筆曷振清芬如臣者謬典王言久塵官次發揮寡譽尸曠懷慙豈謂宸慈更令撰述祇膺嚴命伏用兢惶輒巳罄竭謏聞奉揚遺懿屬詞之妙既異于色絲褒德之稱敢同于華衮徒躑躅以燥吻實忸怩而厚顔蕪穢頗多悚惕兹甚其志文二首謹繕寫隨狀上進云云進邠州靈應公廟記狀右臣奉敕撰邠州靈應公廟記聞奏者恭膺睿旨虔述靈休無史遷敘事之才乏士衡患多之思怔忪捧詔僶俯成文參乙夜之觀空塵聖鑒載職方之志曷示將來內省空疏不遑啓處其記文謹繕寫隨狀上進云云代宰相謝賜重陽日瓊林苑宴狀右臣伏蒙聖慈特就瓊林苑賜宴者無射司辰登髙屆候萬斯箱之慶方屬有年三令節之遊備存故事敢冀需雲之澤曲推湛露之私此蓋皇帝陛下大德庇民至仁育物當車書之無外因朝野之多娛謹頒令以授時爰示慈於式宴矧惟仙苑近在商郊靈沼始波動周雅躍魚之詠髙臺在望掩南朝戲馬之名爰偶嘉辰是陳良會大官先置極萐莆之珍羞飛蓋相追邁龍山之遊集矧復霑玉斚之餘瀝泛金菊之繁英紳組相輝笙絲迭奏聽鈞天之廣樂恍疑夢寐之中預玄圃之勝遊逈在風塵之外徒感恩而盡醉慚報德以無階書六首答史館查正言書某再拜正言學士足下頃者前襄陽張令至辱示手筆備形慰誨耽玩無斁鄙吝都遣客塵洞分神明來舍涼若醍醐之灌頂快如曜靈之炙背荷知識之啓迪為昏愚之歸救幸甚幸甚然障覆重復義趣深逺或所猶豫固容咨決竊味雅旨有簮組非纍身之説蒙有滯焉蓋念無始輪回積劫孤露偶薰習于種子獲遭值於仁賢幸於此生得悟本性而前塵外境如棼絲亂繩本覺妙心殆秋毫野馬舉為牽制動即淪胥先德亦云道力尫微必處靜而能昭宗門所謂悟解超頓須漸修而乃成儻或以初殖之德牙淪無邉之愛網沈浮陰入之界趨走聲利之場自以了達苦空脫去事理謂生死而無怖謂富貴而儻來此適足以長無明支成增上慢若夫現三十二應化千百億身居士王臣隨方設教猿猴鹿馬與物利生此須功行圓成福智滿足登地證果乃及于斯自餘涉川救人未免俱溺哺糟處世何能獨醒載尋善誘之言蓋有造微之旨豈非慮鄙夫尚迷真諦猶戀榮名便令捨去恐致迷悶然固陋之志亦小異焉儻夀量頗延緣纍自薄當俟夫四五十須背俗息見反本循元修天台之止觀專曹溪之無念庶于此報必證菩提俟兜率下生龍華後會為之主伴請轉法輪對越人天親受佛記雖二乘而弗學豈三界以能安慺慺之心實在於此足下衆德普會八部歸依暫現宰官之身常修菩薩之行濟度羣品引翼有情作十園林具四誓願傳受心印直指不疑演説色空辨才無礙儻矜其可教望惠之好音所期奉以周旋不敢失墜或理參邪見旨失真宗未至膏肓可施針石亦希提奬無便棄捐幸甚幸甚秋氣變衰王事鞅掌強食慎疾副兹瞻顒答李寺丞書某再拜昨晚辱示真蹤備形雅旨屬以專介逮於嚴扃率爾奉酬缺然未足及再加紬繹賾其會歸如聆玉音若抽繭緒酌之不竭鑽之彌堅何詞辨之縱橫文采之巨麗俊發若此其誰敢當然士君子之立身大丈夫之處世當以道義為勝負豈以位貌為等差故仲尼不過陪臣子雲僅至執戟賈誼止傅于梁國梅福才尉于南昌皆名震方來道冠天壤寧與夫司馬善宦四至九卿曲逆陰謀啓封萬室條侯倨貴盧杞姦邪享列鼎之榮據三事之位同日而語耶矧君侯富有春秋老于文學承閥閲之後若單平之家生綺紈之中挺布素之行凡所著述必得作者之風至于遊從莫非一時之雋心無城府言成陽秋以孝謹著於閨門以寬厚伏於儕輩臨事剛決而能斷結交悠久而不忘譬諸椒蘭人所服媚由夫桃李下自成蹊實為卿材居然國器而未引金門之籍未踐赤墀之塗藏器甚深括囊靡露困于卑位形於話言愚以為君侯德美既彰富貴何逺亦猶黃琮蒼璧必以禮天神地祗明月夜光終須置掌握懷袖所宜居易以俟待價而沽乃為乾坤之珍符皇王之寶玩苟自躍於冶求為鏌鎁來獻於庭願剖荆璞或未見辨反謂不祥此交遊之情鄭重之至也君侯明達聰悟專柔直方修飾廉隅佩服名教三揖而進願保格言一擲成盧何為得雋更味環中之旨勿貽動者之譏况才識並優英華外發析圭緤組誠天理之必然霧隱泥蟠蓋時命之未會耳幸惟曠度見採狂言式懋永圖克保全德不勝喋喋之至答并州王太保書并州太保麾下近於集賢石君表臣處得手筆一封耽玩再三不能暫捨文彩煥發五色以相宣理道貫通有條而不紊薰風拂衽自然析酲簫韶在懸殊覺忘味何厚賜之所及見久要之不忘甚善甚善竊伏自念江表布衣材出人下非山東閥閲之後無負郭膏腴之産徒荷世業遂參儒流齠齓之年傳召詣闕弱冠之歲通籍於朝擔簦躡屫既周於四方抱槧懷鉛亦幾乎十載何嘗不咨諏先覺博求同人直諒多聞必取乎三益談窮勢賄克慎乎五交凛凛然唯懼當世之賢豪見拒而不容也數年前石氏西齋邂逅相遇盱衡抵掌坐客盡傾枕麴藉糟羽觴無算亦既卜夜至於繼燭剖心析肝蕩無城府講道論義芬若椒蘭傾蓋如此故謂乏矣未幾邊郡思乂足下既驅十乘而啓行國書成功下走亦一麾而出守地里遼逺誠馬牛之不及官守縈繫同匏瓜之見拘無復裁咫尺之書述固陋之懇去年僕祗召西走來朝帝庭足下方鎮并門式遏戎略引領北望𬗟懷故人恨不得解籍金閨從軍紫塞依蓮泛水陪幕府之賓從投壺雅歌奉郡齋之遊宴今年肇自書殿入升綸闈以雕蟲篆刻之才當典謨訓誥之任五羖之鞟不能成虎豹之文一割之刀固無剸犀兕之利方夙夜愧惕懼忝君命為知巳羞而足下聞之欣然以書為貺松茂柏悅情雖後凋玉振金相詞多溢美且徵縉雲贈行之什頗有姑尤善祝之言雖然戲謔若合符契竊以古之交道嘗聞之矣蓋以聞善相告爵祿相先急病讓夷謀事補闕以引以翼或推或挽故蕭何舉代曹參趨裝以請行王陽登用貢禹彈冠而願仕伐木求友頌聲載揚逺方得朋名教為樂益以見足下之意當僕之領郡也必欲發揮虛名稔熟輿聽故羣公供帳發而成詩及僕之竊寵也又欲銷弭浮謗充塞前言故千里附書明徵其事使鄙夫無暴得之愧聖朝免虗授之譏仁者用心其利博矣足以明殺雞炊黍范張區區於小信縞帶紵衣僑札拳拳于微物以今况古夫何隘哉邊塵不驚戎閫自肅干木髙臥足以作藩夷甫清談未妨為政唯節宣吐納順時加愛副九重推轂之寄成萬里封侯之業斯慺慺之誠所望于明哲也某頓首答錢易書某白辱示戒殺生文披繹數四不能釋手非宿殖德本深達實相于十方佛種諸善根處五濁世逺離黑業信力堅固心華發明其孰能形於文詞垂于勸戒如是之勤切懇至也某不佞竊從事于空宗為日雖淺聞道素篤常服首楞之典獲佩法王之訓乃知世間輪回殺貪為本胎化濕卵強弱相吞生死循環互相啖食始由一念之迷惑遂致萬化之紛綸相變體殊識均形異而乃取其血肉以滋牙齒臠割炮燔刳剔刲斫是使人羊迭變各自報讎火刀殊塗並淪苦趣我佛所以為一事因緣而出世設十二分教以化人誘掖羣迷首舉兹事乃著五戒以殺戒而為先乃摽三毒本貪毒之所攝故玉毫光明而顯相金口鄭重以形言深念含靈直指正路以為食肉而證法果實墮邪魔好殺而出塵勞無有是處借如智慧自足禪定現前不過為大力鬼神夜義羅剎一報既畢衆苦所叢墮無間阿臭厯僧祇大劫是以比丘結夏恐踐微蟲菩薩在塗不踏生草此世尊之清淨明誨衆生之寃債本源奉之周旋豈可失墜乃至無麛無卵小正之遺文飲水飯疏宣尼之素志春秋所記肉食未能逺謀易象之言殺牛不如禴祭飱必方丈史䇿罪其奢豪庭有懸貆詩人譏其尸素咸有明訓載於青編且夫仁人之用心常善以救物就死地而觳觳豈忍于牛羊稟生氣以肖翹必愛乎螻蟻而乃屠于刀鋸之際充乎杯爼之間競水陸之珍羞奉口腹之嗜好至有南朝牧守所居而飛走輒殫西晉宰衡一日而金錢盈萬蓋厚於味而薄于行夷吾之劇談嗜欲深而天機淺漆園之髙論豈可忽因果報應之説逐醉飽睡眠之徒何以為大丈夫何以為法王子故足下因几筵號慕之隙禫祥吉祭之辰念劬勞之恩終天莫報顧追薦之福惟佛是依對香火以危誠託文字以宣意八部龍天而侍衛一切聖賢以護持奮筆不停移晷而就金聲玉振霞駮雲披淨名談空蓋助如來而行化摩耶證果爰詣兜率以往生此又豈與刻木丁蘭瞻形隕泣圍碁阮籍嘔血自殘但能取於毁傷莫有資於解脫同日而語寧易得哉且奉示言欲刋方板俾傳布逺邇激勵昏蒙此所謂分一燈為百千燈發一言而千里應之者也讃歎踊躍不知所裁聊述所聞用以為謝不宣答陳在中書某白辱所著蒙言釋象六篇披繹之際初不能曉既而考釋卦之由賾取象之自有條不紊乃端若貫珠自難而易亦漸如攻木頗以見作者之旨也豈不以山泉之象著於大易以險而止蓋取諸蒙二象並設所以建六爻之位六爻肇分所以明一卦之意初六混沌未判目之為混源九二剛中得位于焉而照物六三有求明之義六四得養正之理六五陰默上九文明推而廣之區以别矣且自三五以降訖于周政教之汙隆討禦之得失創守之方略治亂之本原莫不周旋紬繹包括總統引而伸之如繭之抽緒提而舉之若網之在綱窮理盡性鈎深索隱磊磊落落自成一家之言矣昔京房作易占焦贛作易林厯代宗之然不過卜筮之説子雲述太玄建立方州部家雖云凖易其如參以星厯頗近術數若今之所作但取一卦之意磅礴數千載之間托其成敗是非可為蓍蔡者著于篇傑然名家貽于後覺蓋與夫先民之用心不同矣方將獻于公車升聞于天充衡石之餘備乙夜之覽夏侯勝有云士患經不明經苟明其取朱紫如拾地芥耳君之是舉豈僕所能識哉其本輒留庶用探究聊述所聞豈足多謝發願文上舍人沙門願安弟子某甲謹沐首齋心信曰十方常住一切諸佛真淨妙法無生聖人惟願以真實眼真實智真實平等不捨誓願洞賜哀憐切念某與法界衆生從無始曠大劫來未識佛時未遇法時未會僧時于其中間至于今日趨塵背覺迷失本心閉解脫門涉輪回道蝟張見網蜂喧妄鄽懸嗜欲之帆鼓無明之浪杯我慢酒醉苦惱鄉不憑歸向之誠是滯果因之迹如斯過咎齊佛所知唯佛所見若輕若重等與法界衆生有兹罪者同共懴悔願罪銷滅願罪銷滅以某甲所集凡有善根隨時回向願與法界衆生回向真如實際菩提實際衆生及微塵剎海諸佛土中承諸佛本誓願力大威猛力勝護念力盡未來際直至無上菩提為一切依正莊嚴具為一切自他解脫門一切三昧門一切陀羅尼門一切安立衆生門一一稱虛空等法界皆有我身起勇猛心捨身命財興大佛事作大利益攝化有情願諸有情見我身聞我名皆發菩提心與我同共回向無上菩提心不退轉願某與法界衆生未契心者開佛知見悟本自心一念發明諸境純淨去來坐立見覺聞知咸以如實智相應不相違背從今已去盡未來際憶菩提心令菩提心相續不斷所作利益常得現前供飬諸佛利樂衆生衆生成佛盡然後成正覺虛空有盡我願無窮法界有邊願心無極盡入行願海中一時成佛摩訶般若波羅密武夷新集卷十八
