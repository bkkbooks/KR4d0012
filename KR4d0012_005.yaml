body:
  text: 武夷新集卷五宋楊億撰詩五一百八首送章頔寺丞之巴陵涔陽從事有嘉聲外計封章薦姓名再命便為千室宰于飛又出九重城腰懸銅墨才猶屈吟對江山思轉清楚客十年偏遂意秋風滿筯紫蓴羔外弟張湜西遊六年隨我客梁園西上孤飛徹九門抱璞有瑕唯歎命泣岐無託更銷魂秦關百二聊乘興漢牘三千待叫閽赤日炎風兩京道文章滿腹與誰論章羣下第東歸卓斚修詞有古風計偕西上劇飄蓬梁園失意三春月閩嶺思歸一畝宫且喜還家儀舌在莫嗟為客趙囊空九天下詔崇儒術好絶韋編待至公賀資政學士王侍郎瀝懇青規一動帝心秋曹月殿寵光深論思東序清閒宴偃息西崑翰墨林私第藏書皆有副公庭種竹待成隂卧龍禁闥應非久救旱還須起作霖表弟廷評章得象知信州玉山縣懷玉烟霞接武夷我思祖德涕霑衣縣齊製錦留遺愛庭樹藏鐶長舊圍開寶末大父宰是邑豫生于縣齊彭澤公田今已廢遼東邑子半應非津亭送别空搔首籍在金門未得歸梁大諫自鳯翔乞留臺寄詩言志次韻酬之聨飛仙掖舊心朋子雲云朋而不心面朋也笑我池籠出未能文陛彯纓空自愧香山蠟屐與誰登託身羿彀憂危甚引領黃陂鄙吝增二室風煙莫全占㑹須携手躡雲層䂖殿丞通判濮州龍虎遊從分不疏忽聞新命佐魚符經旬苦雨淹行斾幾曲洪河貫郡圖浮蟻酒濃頻舉白折膠風徑好彎􅋃賢侯東道歡相得期月民謡待袴𥜗元奉宗宰績溪遊梁度幾春時譽藹天倫家寄汀蘋久名題桂籍新溪鱗清可數澤雉到應馴黟歙非難治民風自古淳李工部江南轉運含香五字客尚齒十年兄舊奏梁園賦新題漢柱名出驅星使傳入佐地官征獻可方前笏分憂又抗旌富饒今澤國佳麗古臺城錯節投刀釋頺綱攬轡清沃心期密啓銜尾待香粳處處江山秀行春莫計程楊日華宰錢塘洛社負才名吾宗占寧馨聞詩趨鯉室襲慶墮鱣庭力學窺堂奧孤飛徹杳冥一枝攀緑桂百里應華星漢網何曽密吳歈正好聽油囊滿醇酎千日莫期醒栁紳歸縉雲豫曽典是郡紳依宫師相國十餘年東甌别業寄秋雲平昔題橋墨尚存故郡曽登太守榻上都頻掃相君門揮毫月殿香盈䄂錫宴星津酒滿樽歸去吏民如問我五年書命紫薇垣表弟李宗元知桂州陽朔縣桂林陽朔溪山秀莫歎迢迢五嶺南百里字人須敏政千金酌水更懲貪鳴榔下瀨潮程逺曵彩升堂夀宴酣逺地民淳無牒訴縣齊終日好清談髙起居知廣州作藩南越古稱雄五管皆歸節制中腰佩金龜三品綬船開畫鷁一帆風橘官手版趨塵逺梅使星車附信通暫阻螭頭夾香案清宵應夢未央宫丁集賢通判餘杭遼東羽客富仙材仙殿飛觴接上台便道歸寧白蘋渚經時賜對柏梁臺里中驅弩先行路膝下斑衣慶夀杯明詔許令過别墅不憂郡閣簡書催吳航赴宜興簿家住武夷峰眉間道氣濃風塵久為客雷火近成龍試吏江城僻寧親嶺路重一㕓期沒齒樂土定相容豫素有陽羡退居之志㑹當占數於樂郊也十六兄赴韶州從事魏帝臺邉拂戰塵初平山畔綵衣新又攀髙栁隋隄暮却寄寒梅庾嶺春韶石閒尋張樂地曹溪首訪悟空人男兒平昔四方志莫厭區區走隻輪章頻寄南昌孺亭洪井古南昌曽是梅仙試吏鄉一邑絃歌榮製錦幾程雞犬接維桑年深為客貂裘敝秋晚還家菊徑荒平昔題橋今遂志且斟夀酒獻髙堂李廷評昭迪使淝上畫舸西風五兩斜淮淝將命去程賖衣纓黃閣相君後門巷青春學士家驛路新袍欺草色公筵大白醉榴花謝庭蘭玉多才思休浣裁詩對客誇書懷寄劉五風波名路壯心殘三徑荒凉未得還病起東陽衣帶緩近卧病月餘愁多騎省鬢毛斑豫行年三十有二五年書命塵西閣千古移文愧北山獨憶瓊枝苦霜霰清樽嵗晏强􅋳顔趙殿丞知河南縣鼎邑閭閻有古風清談為治自從容官聯殿省通朝籍路過津橋入縣封栁䕃天街時案轡雲生少室好搘笻龍門舊有題名處石壁蒼苔駮幾重祕閣王校理知栁州南越尉他國羅池子厚神桂林驅傳逺藝閣解嘲頻行槖黃金滿歸程皂蓋新一麾愁度嶺五綵喜寧親薏苡偏防疾蒲蘆善化人蓬山直廬在几硯日生塵送僧歸越中林宴坐赤髭繁水月禪心出世間說法音同海潮震隨緣身比嶽雲閒曹溪嫡嗣多參見碧落仙卿遍往還歸去舊房秋色晚澗松枝偃雨苔斑吳延年宰武義精神滿腹富青春燒尾曽看上禹門獻賦多年梁苑客謫仙重世武夷孫武夷君呼鄉人為曽孫一同印綬光初命幾驛桑麻接故園澤國歸程秋欲盡丹楓黃菊動吟魂吳待問之蒙城簿西來赴調合關繻黃綬風塵厭九衢祖席且同開口笑公庭未免折腰趨長安車馬偏欺客魯國衣冠肯戲儒共憶故園歸計晚舊逰烟樹隔重湖黃少卿惠緑雲湯新甫竒材百尺標秋空髙幹拂鵬霄仙經藥品誇難老人世霜天貴後凋千古貞魂愁化實九原荒壠恨為樵誰研露葉和雲液幾宿春酲一啜消靈隱長老歸舊山浮杯心與海鷗親駐錫王城忽過春麟殿九旬談妙法曹溪一滴渡迷津狂翻竹箭波隨棹側布黃金地絶塵白黑歡迎猿鳥喜紺園風定雨花新皇甫太博知蘇州長洲連嵗得賢君十萬人家煦若春激箭波狂浮畫舸散絲雨細逐朱輪郡齊詩石鋪輕蘚公宴歌喉落暗塵未得休官作逋客河梁歸思滿鱸蓴懷寄樞密王左丞髙陪七聖從軒逰帷幄深嚴日運籌口裡雌黃歸品藻盤中薤白想風流珠宫地密妨趨謁銅鉢聲沉斷唱酬獨喜修書依絳帳時登闕里受春秋從叔郎中知潭州藩閫分憂重關山去路賖含香滯郎署乘馹倦天涯土貢千頭橘神祠萬里沙金碑紀風物寶瑟怨年華粉籜斑文簟雲腴紫笋芽民田兩岐麥郡圃四時花别恨休攀栁歸期待及瓜鱣庭有遺訓清白自傳家黃刑部之陜西轉運百二秦川四塞寬甘泉烽火報平安泥書雙筆遷郎署粒食千金仰縣官江海半生拋别墅關山何日解征鞍定將鞭算資心計流馬功成國史刊史館張學士知婺州鸞掖分符又出麾津亭目送片帆飛暫隨越鳥棲烟樹重許吳儂見錦衣君前牧新定屬邑行春熊軾穩公堂卜夜蟹螯肥隱侯帶眼看成緩雙闕恩深更憶歸答李光丞來詩述車駕臨幸修書院之事豹尾森森拂畫簷久留雕輦閲牙籖字分三豕慙該博饌費雙雞愧屬厭濫跡搢紳同北枳草儀封禪待南鶼相門蘭玉裁新句只恐京城紙價添寄并州張給事山河表裏絶狼烟幕府朝朝醉玳筵合樂中軍雄鼓吹傳杯四座豔花鈿行春好駐桑郊騎卜夜誰談雪竇禪梁苑并門杳千里離懷愁對月嬋娟寄劉秀州連典吳中諸郡騎置迢迢阻玉音左魚江海遂初心朱絃道直消浮謗春草才多動苦吟震澤析酲干樹橘華亭驚夢九臯禽郡樓晴日東西望幾處甘棠接翠隂無為軍王從事奏牘曽蒙乙夜觀擅場文價在金鑾貂裘嵗久京塵暗鷁路風髙旅翮殘取酒黃金都巳盡食魚長鋏更須彈時清水國無書檄誰見揮毫一據鞍密直任學士知益州玉壘求賢牧金門輟近臣龍荒使傳逺雞省命書新殿柱題名久刀州入夢頻懸魚喧舊政前牧東川叱馭繼芳塵珠履平原客壺漿左蜀人北堂牽逺念南詔撫殊鄰宴榭峨眉雪歌筵濯錦春樂章傳辨士卜肆訪逋民幕府觴無算池塘思有神知誰預交辟空羡吐車茵休沐述懷寄祕閣錢少卿風號雷笑雨平階紈素微凉暗入懷晝枕乍成園吏夢晨蔬聊學太常齊名慙引籍通丹地心愧移文刻翠崖大隱金門猶自適日親方朔聽詼諧晏殊奉禮歸寧垂髫婉孌便能文驥子蘭筋逈不羣南國生芻人比玉梁園修竹賦凌雲堵墻看試三公府反哺知千萬乘君賜告歸寧來别我亭臯木葉正紛紛送禪牀與樞密王左丞北祖安禪唯看净毗邪升座更談空須知密勿萬機外常在瑜伽三昧中受詔修書述懷感事三十韻太極垂裳日中原偃革初樓船秋發詠衡石夜程書好問虛前席徴賢走傳車蓬萊侔漢制煨燼訪秦餘紬繹資金匱規模出玉除紛綸開四部祕邃接千廬飫賜雙雞膳親廽六尺輿華芝下閶闔白羽擁儲胥望氣成龍虎披文辨魯魚清光無咫尺𤣥覽亦躊躇羣彥揮鉛筆微生濫石渠嵇康真懶慢謝客本空踈講學情田埆談經腹笥虛月評依許劭文體慕相如雅飲歡娛洽清言鄙吝祛彌旬容出沐終日喜羣居撫巳慙鳴玉歸田憶荷鋤池籠養魚鳥章服褁猿狙圜府愁尸祿天閽愧􅗓裾虛名同鄭璞散質類莊樗國士誰知我鄰家或侮豫放懷齊指馬屏息度羲舒寡婦冝憂緯三公亦灌蔬危心惟觳觫直道忍蘧蒢往聖容巢許先儒美寧蘧晨趨歎勞止夕惕念歸與秦痔踈杯酒顔瓢賴斗儲如諧曲肱卧猶可直鈎漁矯矯龜銜印翩翩隼畫旟一麾終遂志阮籍去騎驢分得朝野多歡娛魚字韻臯壤驚秋氣倉箱有嵗儲梁園從臣頌謝墅富人車休沐新頒詔珍符不絶書天心遊蠖濩民樂在華胥擊壤歡謡洽凝脂密網除行將封岱嶽持槖奉金輿胡馬嘶北風動地隂風徑連雲白草齊聞琴空仰秣踐雪憶歸蹄金埒心寧戀鹽車困欲嘶過關拖匹練渡水惜鄣泥五路鸞旗緩千金碣館迷羇魂重懷土不寐到晨雞金馬茂異紛綸集漢庭求賢詔在竹書青共趨金馬門前路誰識東方是嵗星冬夜香街鼓絶暝煙深簷近孤釭射宿禽露井銀牀霜氣冷瑣窗珠網月華侵初沉逺籟聞疏漏旋拂流塵撫素琴坐久星河漸侵沒蕭蕭朔吹度平林集賢李金部知潁州汝隂名郡擁朱輪洛宅霜威尚襲人門籍舊通仙禁近書囊才補殿帷新金華入侍知非晚石柱題名又幾春莫戀桑郊停五馬蓬丘几硯自生塵海印大師歸永嘉仁煦都城供應幾經秋海國歸心不少留雨雪片帆過北固煙霞丈室寄東甌千燈續焰知無盡一錫隨緣信自由更到石門題雅句碧雲從此掩湯休挽歌故樞密宋給事挽歌三首宸逰方扈從移疾廢樞機步輦親臨問肩舁遽告歸忽聞號左轂旋見泣中闈城郢遺言切忠魂定有依六龍初展義七聖盡陪逰塞外狼烟起軍中羽檄稠漢帷方借筯莊壑忽沉舟不奈良臣死秦醫亦漫求永辭溫室地長别諫書帷玉恨埋黃壤星愁析紫微薤歌偏怨咽衮斂更光輝可惜岑文本遼陽不共歸故蘄州王刑部閣老挽歌五首東觀未絶筆西垣俄解龜罷裁青紙詔重入白雲司流落成三黜聫翩換一麾黃岡與滁上應立去思碑雞省曽三入鼇峰近十旬命書批鳯尾諫疏逆龍鱗按部朱轓逺悲秋素髮新茂陵終不起遺札滿埃塵近署罹官謗清淮綰郡章平生不佞佛晚嵗尚為郎得疾因卑濕為文足感傷才䝉宣室召奄忽歎云亡楚客離騷怨子牟江海心積憂偏損夀多病未妨吟野鳥俄窺舍甘棠巳結隂郡中應罷市遺愛在人深奏槀應盈篋藏書復幾車門人誰漬酒天子想投瓜旅櫬關山闊銘旌道路賖趨庭有令子清白自傳家故比部李郎中挽歌四首隴右華宗貴朝端懿範存哀烏光列宿駟馬慶髙門謁帝承明署娛賔金谷園人生忽至此天道亦難論睦族衣無主傳家鼎有銘沙堤連里巷玉樹接階庭北海樽常滿西山藥不靈肯堂歸棣萼含笑入泉扄鴈序分臺閣春卿有職司雲屏三殿宴綿蕝一王儀風韻靈和栁襟懷叔度陂善人無復見執紼淚空垂美疢漳濵卧營魂東岱歸故人空漬酒侍史罷薰衣畫像留家廟銘旌出帝畿浮生除夀考享福似君稀明德皇太后挽歌詞五首奉敕撰母儀垂二紀坤順翊𤣥功望斷蒼梧野尊歸長樂宫金塗烘曉日椒壁起香風奄忽違塵世攀號泣舜瞳軒星光太極隂教正中闈外戚黃金穴深宫大練衣雀臺愁霧隔駒隙暗塵飛貝闕三山路飄颻仙馭歸德契河洲什心依黃老書濯龍規誡在飛羽豫逰踈復土文園接凝塵丙殿虛蒸蒸天子孝泣血望塗車世載河山誓門無恩澤侯公桑空繭館仙藥阻蓬丘愍冊藏幽壤哀笳咽素秋後宫彤管在千古紀徽猷閫範留椒闥神逰返玉清魚燈照𤣥寢騎吹咽重城運迫升仙日人傷喪妣情宫中舊長御行哭盡吞聲又五首奉敕撰太姒徽音盛長秋命數崇黃圖分丙殿𤣥象應軒宫記注無窮美聲詩內助功雲陽復土後陵柏自悲風甲族傳仙李遺言在濯龍後宫皆率職外戚早辭封彤管流隂教金根盛國容真逰一何遽罷望九疑峰軒遊雲杳杳舜孝日蒸蒸椒壁還生沴銅臺亦罷登親桑寧復見嘗藥遂無徴拱木𤣥堂閔凄凉烟霧凝外家金穴貴曩日玉衣祥萬夀瑶觴舉三朝復道長小侯親爼豆女史煥縑緗遽厭人間世乘雲歸帝鄉外族長安盛尊名永樂崇初陵凄草露舊殿閴椒風鞏樹迷凶仗周原掩夀宫聖君悲望處泪雨泣重瞳樂章太常樂章三十首奉聖旨撰咸平五年皇帝南郊前一日朝饗太廟奏理安曲迎神肅肅清廟昭事祖禰粢盛苾芬四海來祭皇靈格思令容有睟降福孔偕以克永世皇帝行奏隆安之曲祼鬯漙將賔尸在位𤣥德升聞孝思光被公卿庶政傅御師氏至諴感神福祿來暨皇帝奠幣奏瑞文之曲淳精育物瑞木成文元氣陶冶非煙郁紛𤣥貺昭格至和所薰登歌祼獻肹蠁如聞迎俎奏豐安之曲麗碑割牲以炮以烹博碩肥腯薦羞神明祖考來格享于克誠如聞謦咳式燕以寧皇帝酌獻第一室奏大善之舞曲肅肅藝祖肇基洪源權輿光大燕翼貽孫載祀惟永慶流後昆威靈在天顧我司存酌獻第二室奏大寧之舞曲文思聖祖長發其祥錫羡蕃衍德厚流光眷命自天卜世聿昌肅祗孝享降福無疆酌獻第三室奏大順之舞曲明明我祖積德纍仁居晦匿曜邁種惟勤帝圖天錫輝光日新寢廟繹繹昭事同寅酌獻第四室奏大慶之舞曲洸洸我祖時惟鷹揚潛德弗耀發源靈長肆類配天永思不忘來顧來享百福是將酌獻第五室奏大定之舞曲赫赫太祖受命于天赤符啓運威加八埏神武戡難功無間然翼翼丕承億萬斯年酌獻第六室奏大盛之舞曲穆穆太宗與天合德昧旦丕顯乾乾翼翼敷祐下民時帝之力永懷聖神孝思罔極皇帝飲福酒奏禧安之曲嘉栗㫖酒博腯牲牷神鍳孔昭享兹吉蠲夙夜毖祀孝以奉先永錫純嘏功格于天退文舞出奏正安之曲左手執籥右手秉翟進旅退旅萬舞有翼迎武舞入奏武功之曲巳象文治乃觀武成總干山立七德以貞亞獻終獻送神並奏理安之曲神之來兮風肅然神之去兮升九天排凌兢兮還恍惚羽旄紛兮蕭薌燔南郊降神奏髙安之曲爰卜吉土在國之陽肆類于帝錫羡無疆備物致享嘉生阜昌純嘏昭答長發其祥皇帝行奏隆安之曲禮備樂成乾健天行帝容有穆佩玉鏘鳴皇帝奠玉幣奏隆安之曲定位毖祀告于神明嘉玉量幣享于克誠迎俎奏豐安之曲有牲斯純有爼斯陳柔嘉登薦昭事惟寅初獻奏禧安之曲大報于帝𤣥德升聞醴齊良潔粢盛苾芬皇帝飲福酒奏禧安之曲祀帝圓丘九州獻力禮行于郊百神受職靈祗格思享我明德天鍳孔彰𤣥祉昭錫皇帝回仗乾元殿奏采茨之曲禮成于郊迎日之至時乘六龍天旋象魏端門九重虎賁萬騎四夷來王羣后輯瑞皇帝御殿迎升御座奏隆安之曲金奏在懸羣后在位天威煌煌嚮明負扆𤣥覽穆清辨冕端委盛德日新禮容有煒引羣官作正安之曲萬邦來同九賔在位奉璋薦紳陟降庭止文思安安威儀棣棣臣哉鄰哉介爾蕃祉皇帝正冬御殿文舞第一八佾具陳萬邦有奕既以象功又以觀德進旅退旅執籥秉翟𤣥化懷柔逺人來格第二閶闔天開羣后在位設業設虡庭燎晰晰斧扆當陽虎賁夾陛舞之蹈之四隩來暨武舞第一武功既成綴兆有翼以節八音以象七德俁俁蹲蹲朱干玉戚發揚蹈厲其儀不忒第二偃伯靈臺功成作樂以昭德容以清戎索萬邦㑹同羣慝簫勺盡善盡美侔彼韶簫皇帝南郊回御樓將索扇奏隆安之曲應門有翼羽衛斯陳山龍衮冕律度聲身峩峩奉璋肅肅九賔清明在躬志氣如神皇帝御樓奏隆安之曲圜丘類上帝六變降天神禋燔禮云畢使衛肅以陳天顔瞻咫尺王澤熙陽春玉帛臻禹㑹動植霑堯仁皇帝御樓畢奏隆安之曲肆類云畢淳熙漙將雷雨麗澤雲物效祥禮容濟濟天威煌煌大賚四海富夀無彊又七首續奉勑撰景德三年白帝迎神髙安曲西皓騰精天地始肅盛德在金百嘉阜育彍弩射牲築場登穀明靈格思旄罕紛屬奉幣嘉安曲博碩肥腯以炮以烹嘉栗旨酒有瀰斯盈殽蓛維旅肅肅蒸蒸吉蠲偹物享于克誠送神理安曲飈輪戾止光燭靈壇金奏繹如白露漙漙朝日迎神陽德之母羲御寅賔得天久照首兹三辰正辭備物肅肅振振淪精降鑒克享明禋奉幣醴齊良潔有牲斯純大采𤣥冕乃昭其文王宫定位粢盛苾芬民事以叙𤣥德升聞送神懸象著明照臨下土降福穰穰德施周普飲福酒廣安曲簠簋既陳吉蠲登薦洗心防邪肅祗祭典陟降惟寅籩豆有踐百祿咸宜淳耀丕顯正冬御殿上夀樂章八首皇帝舉夀酒宫懸奏和安之曲天威煌煌山龍采章庭實旅百上公奉觴拱揖羣后端委垂裳永錫難老萬夀無疆皇帝舉第二爵酒登歌奏祥麟之曲帝圖㑹昌仁獸效祥雙觡共抵示武不傷四靈為畜𤣥枵耀芒公族信厚元元阜康賜羣臣第一盞酒宫懸奏正安之曲思皇多士靖恭著位鳴玉飛緌鏘鏘濟濟宴有折爼以示慈惠罔敢不祗福祿來暨皇帝舉第三爵酒登歌奏丹鳯之曲矯矯長離振羽來儀和音中律藻翰揚輝珍符沓至品物攸冝至德𤣥感受天之祺賜羣臣第二盞酒宫懸作正安之曲金奏在懸有酒斯㫖顒顒卬卬嚮明負扆湛湛露斯式宴以喜佩玉蕊兮罔不由禮皇帝舉第四爵酒登歌奏河清之曲德水湯湯發源靈長皎鑒澄徹千年效祥積厚流濕資生阜昌朝宗潤下善利無疆賜羣臣第三盞酒宫懸作正安之曲酒以成禮樂以侑食露湛朝陽星環紫極淑慎爾容既飽以德進退周旋威儀抑抑禮畢降坐宫懸奏隆安之曲被衮當陽穆穆皇皇擊石拊石頌聲洋洋和樂優洽終然允臧禮成而退荷天百祥武夷新集卷五
