body:
  text: 武夷新集卷十一宋楊億撰墓志三三首宋故椎忠協謀佐理功臣金紫光祿大夫行尚書吏部侍郎同中書門下平章事監修國史上柱國太原郡開國公食邑二千户食實封四百户贈太傅中書令諡曰文簡畢公墓志銘景德二年十月乙酉上御崇政殿丞相太原公早朝方候對於殿廬中與同列議所以條奏之事侃侃自若俄頃風眩暴作不能入謁上亟令太醫切脈餌以良藥遣中貴人絡繹致問良久疾甚殆不知人事上不俟駕躬自臨視肩舁歸第即日以不起聞上又親至其居臨哭之慟賜白金三百斤詔廢朝五日册贈太傅中書令君臣之際斯為至矣哀榮之數無以加矣公諱士安字舜舉其先文王之昭功參於並建魏萬之後兆啓於大名錫羡流光世德彌劭衣冠閥閲史䇿相沿蓋為海內之名宗無愧山東之著姓公之逺祖占籍於代郡之鴈門以財力雄邊敦尚氣節以義方訓子藴積慶靈至公之曽王父宗昱以州里推賢孝廉中選仕至雲州雲中令王父球位罔充量仕不越鄉終本州别駕烈考又林以廊廟之姿屈于州縣以清白之訓遺于子孫終澶州觀城令逮公之光輔大政若將登庸緝熙庶工平章百揆天子嘉同德之美尊奬于宰司舉追命之典褒崇於先正乃詔有司贈公大王父為太子太保曽祖母吳氏追封鄧國太夫人王父太子太傅祖母史氏韓國太夫人烈考太子太師妣樂氏代國太夫人繼母祝氏鄧國太夫人盛德之後垂裕乎百世自天之澤光被于九原蕃衍之祥斯不誣矣公器宇宏廓風規爽邁爰自稚齒逮於成人介然不羣卓爾有立橫經鄉校拳拳服膺視膳庭闈蒸蒸就養公始在襁褓即失所生既罹憫凶鞠於祖母先太師繼室以劉氏祝氏厯事之率禮無違因心不匱純孝之德士類攸稱勝冠之年纒憂曷怙几筵號慕欒棘盡哀既而閲先君手澤之遺文披奕世家藏之羣籍念立身揚名之訓思切磋博習之規而澶淵近畿逢掖蓋寡交逰所及孤陋是虞且聞鄭之圃田雅多君子因奉祝夫人徙居焉乃得今楊徴君璞工部韓侍郎丕及故光祿劉少卿錫博約浸潤遂通百家之言直諒多聞是為三益之友嵗祀永久至業大成從賦春官時名籍甚乾德中禮部員外郎知制誥王公祜以名德掌貢部乃擢公上第焉邠帥楊廷璋備璧馬之聘延置幕府贊樽爼之畫允為嘉賔伸於巳知盡心所事俯及二毛之嵗始霑一命之榮除濟州軍事推官時所親李公謙浦適牧是郡管𣙜之利俾公專掌歲致餘羡民用胥悅太祖聞其名徴赴闕面授兖州觀察推官太平興國初遷大理寺丞兼掌河運方船之粟轉漕攸資九年之儲廪庾斯實屬吳越王修來朝之禮獻益地之圖海隅蒼生初被皇化慎柬良吏撫綏逺民即以公知臨海郡事就遷太子左贊善大夫江東諸州鄱陽為大地征甚厚戶籍尤富非有濟時周物之用撥煩治劇之才臨于是邦鮮不敗事公自台徙饒踰年報政職務修舉吏民便之改殿中丞歸朝為監察御史受詔知乾州公以母夫人在喜懼之年有羸老之疾咸秦之地驛置尤賖扶侍之官登頓良苦因上言求督汝墳公田以奉甘旨官間務簡遂其所好家貧俸薄不以嬰懷屬太宗皇帝崇建戚藩夾輔王室精擇僚佐翊贊親賢即以公為左拾遺冀王府記室參軍侍從平臺從容朱邸成碣館好賢之美贊東平樂善之風至于曵裾王門仙姿冠玉抽毫客右藻思凌雲獨步一時敻出羣萃藉田畢就轉考功員外郎未幾以本官知制誥藩王以借留為請天子不之許也再嵗召入翰林為學士公上言禰廟二名有所嫌避明詔敦諭不容辭職天子嘉得賢之美議者蔚知禮之稱又受詔與蘇易簡同知貢舉是嵗郡國貢士以二萬數奏名亦數千人至公無私羣議歸美會郊祀拜主客郎中學士如故俄授右諫議大夫知潁州屬淫雨降災嘉榖不稔公乞開公廪以振乏絶望賜田租以惠疲瘵帝俞其請民實受賜會今上尹正京府寵綏神州驛召公為開封府判官未幾肇啓儲闈並設官屬申命公兼太子右庶子遷給事中領職如故屬大明繼照蒼震丕承拜工部侍郎充樞密直學士兼知開封府事邦畿之間實方國之都會輦轂之下蓋獄市之兼容簿書期會之煩豪右侵并之弊公擊斷無滯浩穰以清俄抗封章求解劇任即拜禮部侍郎再入翰林為學士前席虛佇清宴延登動靜咨詢周旋獻納且以禁林書詔之填委周廬宿直之勤勞屢面至尊辭以目疾除兵部侍郎知上黨郡事水深土厚足以養痾尚德興亷於焉靜理神明之化期月有聞秩滿徴還以本官充翰林侍讀學士數月兼祕書監金華侍講允謂深嚴祕府刋書是資鴻博論思慎密體溫室之不言學問淹通藴河東之默識為儒林之領袖實朝右之羽儀然而民望攸歸公議斯逼果躋鼎席同秉國鈞景德元年七月以公為吏部侍郎參知政事踰月以本官平章事監修國史與今中書上谷公並命焉是月冬天驕冦邉鑾輿薄伐公以美疢之故不果扈從旦夕治療幸其有瘳追及澶淵見於行在是時皇上講和戎之利繼好以息民修弭兵之盟天旋而飲至公運籌漢幄早啓興邦之言偃節靈臺親逢下武之運同心一德叶贊於欽明夙興夜寐彌綸於職業無何腠理生疾賜告家居中人國醫冠蓋相望公以為三事之任四海具瞻鎮撫外夷將明萬務陟降帝右非可以貪榮寅亮天工非可以曠職遂陳手疏願解樞軸上特降優詔不允其請申命近臣俾之諭旨丁寧備至靡容遜讓公感極以泣疾亦稍平入覲穆清面陳至懇上敦奬尤異毗倚彌深而公常膳載加自公匪懈有犯無隱方宣補衮之勤外強中乾忽起逝川之歎梁木斯壞何哲人之云亡同體忽虧實元后之深痛嗚呼享年六十有八上特為制服發哀羣臣奉慰追録嗣子及於諸孫乃至給使之微咸蒙甄奬之澤又特命皇城使愛州刺史衛公紹欽監護葬事太常考行諡曰文簡發引之日有司具鹵簿鼓吹大鴻臚持節護喪即以今年正月辛酉歸葬于鄭州管城縣馬亭鄉盧村之南原從先太師之塋禮也公積階至金紫䇿勳上柱國三進爵為公加真食之封益功臣之號人爵之盛曷以加焉娶東陽駱氏纍封陳國夫人出於華宗作合君子享是偕老冝其永年二子長曰世長太子中舍裕蠱馳稱道光於濟美次曰慶長大理寺丞聞詩稟訓志聳於象賢三女長適故刑部員外郎李象次適進士張扶先公而逝次適江州德化簿劉宗誨職方郎中蒙叟之子也二孫從善從古俱任將作監主簿雖在羇丱之年並敦孝謹之行有後之慶豈誣也哉公通介有常謙卑不伐接下和易未嘗輕於匹夫與人久要以是稱為長者居處儉約不爽於素風中外踐更克守于清節善談名理聽者忘疲多識典故酌之不竭屢掌書命潤色之美居多亟預疇咨獻替之勤斯至洎入參大政荐陟中樞年耆益明人望唯允展四體以率職曽無越思奉三接以矢謨於焉盡瘁居位之日尚淺致君之略未伸遽兹歸全蓋有遺恨性嗜墳史手不釋卷晚年寫書百卷字皆方寸躬自讎對以偹觀覽常所著述遺札頗多諸孤等孜孜編綴為三十卷垂世不朽其在兹乎某早奉音徽屢陪談宴矧又紫垣掌誥聨顔范之官曹黃閣拜塵熟丙魏之風采且令嗣之勤請迫玄寢之有期願志幽扄豈敢牢讓銘曰畢氏之先肇基洪源大名啓胄後裔實蕃公之乃祖始居鴈門吏於州縣不違丘樊顯允太師貽謀濟美有志四方考終百里公之既孤不學斯恥徙居圃田鄭多君子杖䇿從賦登名太常隨牒應聘嘉言孔彰乃督河漕乃佩郡章歲滿增秩置彼周行乃佐戚藩乃司雅誥醖藉風規周旋輔導雍容內庭渙汗大號諫官長人善政云報翼翼京邑巍巍東朝珥筆垂紳是為元僚宥密樞衡深嚴禁署侍從論思再至迭處上黨之治民惟去思宣室之對帝乃疇咨入踐岩廊冠于宰司民具爾瞻百工允釐永年未登二豎興沴人之云亡天不憗遺恩極臨喪禮優贈禭帝念良臣永懷遺懿野蒼茫兮風颼颼馬蕭蕭兮旐悠悠背都城兮遵廣陌遡新阡兮歸故丘俯咸洛之大道兮介溱洧之通流嗚呼賢相之墓兮在此隴樹拱兮春復秋大宋贈侍中追封夔王墓志銘奉敕撰昔者周建戚藩重之以執膰之數漢封宗室申之以歃血之盟所以隆敦敘之恩崇紏合之義其有炳靈帝胄擢秀天枝屬寶厯之肇興顧徽音之早謝友于致美極太上之孔懷典章錫命播策書于悠久親親之德厚莫重焉王諱光贊順祖惠元皇帝惠明皇后桑氏曽王父母也翼祖簡恭皇帝簡穆皇后劉氏王父母也宣祖昭武皇帝昭憲皇后杜氏考妣也太祖英武聖文神德皇帝太宗神功聖德文武皇帝王之兄也曩者木德下衰三靈改卜赤符啓運百姓與能厯數有歸謳歌允屬太祖皇帝握榮河之祕紀應耀魄之元符受諸夏之樂推為生民之司牧帝出于震龍飛在天奄宅中區允升大寶卜世三十與成周而比隆執玉萬國無防風之後至于是右賢左戚崇德報功咨詢稽古之言講求固本之術裂茅土以利建著丹書鐡契之文分寶玉以展親增維城磐石之固若乃嗟棣華之早隕慨桐葉之前聞軫同氣之深情舉漏泉之茂典于是建隆三年詔皇第五弟贈侍中追封夔王仍賜今名厚飾終而峻追命也黃門監之品秩貂冠蟬緌諸侯王之名數金璽盩綬泥書出於右掖蜜印賁于九原蓋白水中興演也胙全齊之壤黃武建國策也啓長沙之封所以光照大猷發揮遺懿憲章前代肇天命于維新光寵公族致民德以歸厚不顯淳耀莫之與京今上紹休繼明奉先追逺念本枝之盛永惟叔父之親顧佳城之制當用真王之禮啓新阡於畢陌祔玄寢於橋山相善地於牛眠得吉卜於龜食窀穸之事所以即安鹵簿之儀悉從備物中人庀徒而蕆役鴻臚持節以護喪先逺戒期哀榮舉集即以景德三年十月二十八日歸葬於河南府鞏縣南訾鄉鄧封村順也夫志陵谷之變者必傳信之辭形金石之刻者乃不朽之事下臣奉詔猥當紀述伏紙流汗愧不能文銘曰皇矣帝胄發源靈長錫羡蕃衍德厚流光嗚呼不淑喪我賢王炎靈勃興高穹睿命玄壤封崇緑綈裒贈修睦興仁簡編輝映帝曰叔父永懷茂親嵗月增逝輝光日新改卜真宅于洛之濵風蕭條兮木葉脫野蒼茫兮班劍列燕隧啓兮靜而安薤歌發兮凄以咽國有史兮揚德音壙有銘兮志徽烈垂萬祀兮千齡飛英聲兮昭晰大宋故光祿大夫檢校太保左衛上將軍兼御史大夫上拄國信國公食邑一千户食實封二百户追封周王諡悼獻墓志銘奉敕撰昔者騂旄之誓示天下以懷柔麟趾之詩明公族之信厚陶唐之聖華封陳三者之祝太姒之賢大雅垂百斯之頌其有分暉帝胄育德皇闈至性出于自然積慶由乎錫羡而乃參駕鶴之侣同子晉之上賔標稱象之能歎蒼舒之早世惻宸襟于丹極藹休裕于青編嗚呼哀哉見之於周王矣王諱玄祐字慶長今上之第二子也以至道元年十一月二十四日生于東宫昊穹眷懷承華多慶石墻銀榜表天地長男之祥甲觀畫堂處世嫡皇孫之貴而王稟溫恭之德挺岐嶷之姿亦既免懷未嘗好弄雖在稚齒宛如成人雅尚文史尤嗜筆札辨夀街之牘精識造微對長安之日神機絶俗八嵗制授光祿大夫檢校太保左衛上將軍兼御史大夫上柱國信國公食邑一千户食實封二百户元子比士雖禮經之舊章半楚以封實太上之謙德維城之美克茂於本枝齒胄之儀未遑于外傅俄遘隂陽之沴遽成膏肓之疹日躋厥德兾三善之彌彰天奪之年何九齡之弗祐以咸平六年四月二十三日薨于宫中年始九嵗釁生鶴禁悲纒椒掖震宫虛位感極天慈都人罷市痛深行路特詔廢朝五日追封周王有司奏諡曰悼獻蓋夏王鍾愛玄宗繇是以賜名臨淮早亡世祖不遑於進爵方䇿所紀布于前聞哀榮之數斯為極致先以其年五月十有三日權窆于開封府開封縣汴陽鄉之禪惠僧舍即以景德三年十月二十八日偹鹵簿鼓吹陪葬于永熙陵遵吉卜而安壤樹也自初窆及歸葬並詔供偹庫副使入內內侍副都知張景宗監護焉惟王玉振金相竹苞松茂荷兹百祿體自九重而明允篤誠英敏聰悟起居祖習了無童心被服造次必於儒者奉兩宫之歡愛左右咸宜躬三朝之候問夙夜匪懈及勝衣趨拜胙土啓封並建戚藩立愛以固邦本外總宿衛經武以重親賢德望彌宣徽猷益盛仁孝愛士將從四人之遊博習親師式佇三雍之對無何庭蘭方茂奄至驚秋隙駟靡停莫聞留景吳客致問知玉體之不康太史觀文駭前星之失色斯蓋天人之合應靈真之降祥暫表瑞於皇家復收神于太素望思不巳軫漢后之深慈封樹克終從橋山之真宅嗚呼佳城一閉夜臺千古拱木合抱悵嵗月之推移深谷為陵庶文字之傳信臣恭膺明詔獲當撰述在昔苴茅錫社常奉行於命書今兹卜兆開阡又勒銘於玄寢濡毫感愴誠無愧辭銘曰皇圖三葉兮邦家會昌錫祚蕃衍兮源發靈長猗蘭積慶兮黃離降祥帝錫純嘏兮挺生賢王在傅不勤兮英姿聿彰為善最樂兮嘉言載揚天既難忱兮命亦靡常秀而不實兮今也即亡愁雲繁兮嵗將暮清霜凝兮天向曙森騎吹兮前引儼芻靈兮先路祔宅兆兮文園愴風煙兮鞏樹唯青簡兮翠珉垂令名兮終古述一首殤子述豫授室之明年出領縉雲郡下車十月而生一子既三月執其左手咳而名之曰雲堂雲堂生七月豫被召歸闕前一月太夫人舉族先歸建安吳興之别墅比璽書至豫亦間道歸拜墳墓雲堂頗能識其父迎門而笑躍而就豫抱焉家居僅五旬慮稽留詔書遂單車即路凡再見朏魄而至京師氣憀栗以變衰嵗崢嶸而將晚明年春迎版輿自三吳泛九江浮淮泝汴就養于輦轂而雲堂始踸踔能行旦暮嬉戲於太夫人之膝下爰笑爰語甚足慰祖母之心涉秋召病命醫視之先是瘍生于頰善療者必令外決使毒氣不留藏中醫市井徒也利其有瘳亟飲以藥不數日而愈未浹旬病腹痛便利又呼醫視之醫急以藥止又數日下血復召醫但謾言將愈利于受直訖五日有加而無瘳即召他醫醫言疾深矣殆不可為也既而疳氣上攻口中齦齶皆創落兩齒手足掉舉目眩轉而死噫生于己亥十月之巳未死於辛丑八月之乙丑凡六百六十七日其賦命也何天促之如是哉因念萬物之內最靈者人父子之道斯惟天性過猶不及適情之所鍾有而歸無亦理之可遣然髙堂奪抱孫之慶衰門纒遺體之悲蓋釁積自躬而禍延于嗣夫子所謂苖而不秀者是之謂乎若其月角對聳山庭衍斥眉目踈秀方口大頥必興吾門終能成器其在襁褓挺然不羣初生才滿月方呱呱而泣家人取書册展向之即熟視其文字喜且笑若能識焉未嘗遺矢溺于席褥上雖夜寒亦展轉而起家有奴産子者亦數嵗頗無賴雖羣萃中了不怖懾東西跳梁歌吟無度每逺見是子必惶懼號泣若無所容家人潛抱令近之必大呼殞絶不知其所以然也初疾愈東室中北壁有畫佛像每過其門必引身入焉視其畫而笑若相對語者乃喜甚儻家人拒之必號哭偃踣如是日三四十往以至于疾甚性不好弄不嗜味不妄言笑太夫人常言吾閲孩孺多矣未有此兒之卓異也豈吾宗之薄祐無復大其門閭耶而病夫之不夭將遂擠于溝壑耶因念嘗讀金仙子之書了知大雄氏之旨識六塵之妄相見諸行之無常聚沫非可撮摩浮雲倐然變滅輪回起于愛必斷必除煩惱歸於空何執何著一切虛幻萬化紛綸又安能觸類增悲緬懷舐犢之愛積毁成疾自貽喪明之戚哉豫出于儒門沈迷俗諦猶或慕聖人之逹節希上士之忘情誠知其無可奈何聊以自道耳服名教者得無罪我乎行狀二首故翰林侍讀學士正奉大夫尚書兵部侍郎兼祕書監上柱國江陵郡開國侯食邑一千三百户食實封三百户賜紫金魚袋贈兵部尚書楊公行狀曽祖式不仕祖郜父澄纍贈禮部侍郎建州浦城縣乾封鄉長樂里楊徽之字仲猷年八十公之先華隂人永嘉之亂流寓江表占籍上饒郡凡十餘世唐上元中劉展叛渙吳會騷然公之六代祖遂舉族避地於建安之吳興因為著姓自髙曽以來用財力雄于州里唐季俶擾乃祖鳩合義旅幾乎千人保境亢宗一邑是賴受署義軍指揮使烈考博通文史為鄉黨所稱王氏之據有閩隅也物色異人寤寐豪傑首畫竒䇿請見牙門忠懿王竒之即日解褐置之幕府未幾賜五品服拜本縣令絃歌之化流于桑梓蕃衍之祥鍾于燕翼公即其次子也始在童丱卓然不羣結髮從師刻苦為學羣從兄弟率以豪俠相尚馳騁狗馬被服輕暖使酒難近結客報仇而公杜門端居偃仰圖籍躬親布素之行深為宗黨所服邑人江文蔚善賦江為能詩公皆延于客館之中伸以師事之禮曽未期嵗與之齊名潯陽廬山學舍甚盛四方髦俊輻輳其間公既終二親之喪即與從父弟參躡屩擔簦不逺千里亦既至止名聲藹然先生巨儒咸共歎伏凡再罹寒暑其業大成參適有懷土之心公即遣歸省視墳墓時李氏建國奄有淮淝贄幣不通邊關甚急公不居一國有志四方思樹勳于中原恥懷安于故土杖策徑去潛伏間行聿來上都憩于逆旅適及秋賦假籍河南首冠薦書時譽愈出時翰林學士竇公儀樞密直學士王公朴皆負公望為一代龍門公遍投以文竇公倒屣相迎王公置書為謝待以竒士名動一時明年禮部侍郎劉公溫叟實掌文衡擢于殊等同時登第者凡十有六人周世宗申命近臣再加考覆唯公及李覃何曮趙鄰幾得預其選是年秋授祕書省校書郎集賢校理遷著作郎升朝為右拾遺皇朝革命以周室舊臣不宜在侍從之列出監唐州方城商稅太祖多遣近臣亷訪謡俗使者即公之故舊公因言應天順人海內寧一所宜崇儒術以厚民風使還具白其語太祖怒以其訕上左遷鳯翔天興令未幾又移嘉州峨嵋令公文學之外長於吟詠厯宰二邑周旋數載凡遊賞宴集良辰美景必有雕章麗句傳誦人口或刊於琬琰或被于管弦岐隴巴蜀之間蓋金相而玉振矣開寶初復為著作佐郎散民鹽掌倉榖者四五年僶俯從事曽無愠色未幾知全州屬太宗御極拜左拾遺歸朝遷右補闕及受代歸闕見於內朝太宗顧左右曰朕在藩邸嘗聞其能詩因盡索公生平所著公搜於篋笥凡得數百篇悉以奏御且獻詩稱謝其斷章曰十年流落今何幸叨遇皇王問姓名太宗覽之甚喜和以賜之自是黃屋間宴翠華逰豫宸章煥發天言下布宣示近臣之外必以别本賜公瓊藴瑶編充盈篋笥未幾拜侍御史厯庫部員外郎賜金紫受詔與諸公編文苑英華一千卷皆前賢之詞賦詩筆分别部類㨂求菁英先朝以公專精風騷特命編詩為二百卷公孜孜採掇矻矻服勤非風雅之言未嘗取也遷刑部兵部二郎中同知京朝官考課端拱初拜左諫議大夫明年知許州公久奉外朝不樂吏役許昌地接京輔當四通五逹之郊郵傳交馳冠蓋相望公勵精為治盡公無私餞勞之勤日不暇給才二嵗受代西歸太宗召升殿慰勞數四即以本官判史館事中謝日上顧侍臣曰楊某儒雅之士置于館殿正得其宜矣數日加史館修撰仍判館事會張洎以翰林學士判史館即以公判集賢院時劉昌言掌機務張洎在翰林昌言固恩寵洎希進用有以公常評議二人者語于昌言昌言又以語洎因共誣公以飛語中傷近臣聞于上上惡之不復問狀即以公檢校右散騎常侍充山南東道節度行軍司馬未行改鎮安軍行軍司馬數月以今上出領京邑慎擇府僚驛召公拜左諫議大夫與今兵部侍郎畢公士安同授開封府判官明年肇建承華分置衆職以公兼太子左庶子判官如故進位給事中上即位拜工部侍郎充樞密直學士咸平初轉禮部侍郎學士如故俄以衰疾求解近職拜兵部侍郎兼祕書監數月上優奬耆德圖任舊人且欲親近老成講論經義遂詔置翰林侍讀侍講學士以公為翰林侍讀學士祕書監如故與户部侍郎夏侯公嶠國子祭酒邢公昺工部郎中吕公文仲並命焉公侍講金華分直麟閣執經待問前席疇咨上從容言天下事甚衆借筯之畫莫非沃心更僕之談或至移晷然奏稿多削溫樹不言其慎密也如此俄以足疾請告太醫診視中使勞問上自取名藥封以賜之適會郊禋不及扈從上特命加錫如侍祠之例鑾輿北幸力疾辭於苑中涕泗沾襟備述忠懇上謂之曰卿勉進醫藥當不日相見及駐蹕大名特降手詔存問公每上表疏皆自為之三年正月二十二日車駕還都上特遣中貴人慰諭即日疾遂革二十三日以不起聞上軫悼者久之詔贈兵部尚書降內司賔至其第以錢五十萬絹五百匹賜其家仍命中使監護喪事緣葬所須並從官給以其子壻太常丞宋臯直集賢院外孫宋綬為太常寺太祝才十嵗姪孫偃集皆同學究出身奬舊臣而示優典也公先娶王氏生宋氏女後娶王氏封太原郡君公天性純懿無有矯飾履行端謹未嘗放佚以儉約自律奉養甚薄以名教為務顛沛不違接士以謙卑檢身以清白好談名理多識典故自唐朝巳來士族人物風流雅俗悉能記之亹亹可聽素好吟詠遂臻其極每對客論詩終日不倦此所以垂名亦幾乎成癖也崇奉釋典酷信因果每五鼓即起盥漱誦金剛經如是者三十年未嘗暫廢所誦亦十數萬過矣公無男子亦不養子姓為嗣琴書素業並以付外孫焉公自結髮筮仕彯纓登朝中外荐更夷險一致精力極思能成其名勞形嗇神用躋乎夀夫子所謂善人吾不得而見之矣又云未見好學者也公之謂與其餘十年在官徐防無過一裘不易晏子能貧周旋纍朝名節保於終始遭遇明主存歿極於哀榮亦人倫之羽儀士類之標凖也紀述之際有直筆在焉聊敘遺芬以咨史氏謹狀故太中大夫行給事中上柱國臨汾郡開國侯食邑一千二百户賜紫金魚袋柴公行狀曽祖丕任廬州别駕祖胤贈太子右贊善大夫父自牧任尚書兵部員外郎纍贈禮部侍郎曹州濟隂縣沛郡鄉崇儒里柴成務字寶臣年七十一公之先平陽人由髙曽巳來占籍濟隂因而土著遂為著姓先大夫以文行首出一上登進士科厯佐使府終於郎署公爰在童幼發言成章總角之年出就外傅橫經學問逈如宿習秉筆屬文動偕作者甫及冠歲志業大成尚復藏器待伸養勇俟鬭誓得當世儒學宗匠為門下生乾德中禮部員外郎知制誥王公祜受詔典禮部公即踊躍從賦王公覽其文而竒之擢冠多士朝論翕然有得人之美解褐峽州軍事推官秩滿為曹單觀察府中從事所知論薦改大理寺丞監潭州茶場管榷之利頗致增羡幹蠱之譽揚于王庭擢授太常丞峽路轉運副使賜五品服遷監察御史知果州轉殿中知蘇州滿歲移充兩浙轉運使改户部員外郎直史館賜服金紫除本曹郎中充三司戶部判官太宗皇帝講求化源疇咨典故且以列卿之職實惟古官各有攸司所掌甚重爰自唐室以臺閣相高汔至于今目為散地由郎署而授者例同左遷濬發德音丕變頺俗乃選尚書諸曹正郎有才望者凡十人次補諸寺少卿監仍著令自今非曽厯少列不得擬給舍諫議公首預兹選拜光祿少卿辰韓之墟稱藩海外屬有恩詔慎求使材命公為髙麗國信使公雍容儒雅博聞強記衣冠之國文物盛焉舉措話言是法是效皇華之美至今稱之復命為京東水陸轉運使召入拜司封郎中知制誥遷左諫議大夫出知河中府得脫户八百家附於版籍今上踐祚拜給事中知梓州歸朝受詔同修太宗實録十月而畢勞賜策勳寵數優渥未幾以本官知揚州入判尚書刑部小吏干犯怒而笞之詣闕訴寃朝官問狀公以為抶一胥而被劾何面目復據堂決事耶即上章解職以本官奉朝請至是考終於正寢遺奏以六歲孤兒為言上憫之特授太常寺奉禮郎命賦以祿俾終喪紀公始娶趙氏故宗正少卿齊之女也後娶張氏今夫人李氏封贊皇縣君故水部員外郎岧之女也實有令德洽于宗姻公三娶良家晚有兒息行年六十有六始得今奉禮焉公好學多能博物稽古始在貢部為時聞人奮藻屬詞流輩推服或有所述作必傳寫都下終以才望入司訓誥發揮帝命頗為稱職而襟懷夷坦無有城府音容和粹煦如陽春善與人交久彌篤也好治家事勤不匱也善談名理口無擇言廣聚墳史手不釋卷雅性奉道遍閲金簡玉笈之文平生多病深窮惡石青囊之術恬淡以養性蔓衍以窮年其風規醖藉閥閲深厚亦足以為儒林丈人矣記事之職良史在焉謹書世家以告册府謹狀武夷新集卷十一
