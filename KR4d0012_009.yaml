body:
  text: 武夷新集巻九宋楊億撰墓誌一四首故宋陜州芮城令清河張君墓誌銘君諱仲仁字子信其先清河人後徙建安之呉興遂為著姓當王氏之據有閩越也曽祖從晟為州里豪右材兼文武仕至蒲城制置副使工部尚書祖贇以賞延之典署建州長史烈考仁邈檢校左散騎常侍君即常侍之次子也與伯氏同生居上為弟風格甚類趣向多同里巷相疑家人莫辯毎異其服飾以自别焉君爰自童䝉服膺儒素韻宇冲粹智畧縱横李氏之平建安也常侍辭疾家居累徴不起君策杖行在叩閽上書朝論竒之即授太常寺奉禮郎改秘書省校書郎調補本州松溪尉江表平入朝厯衞州衞縣主簿青州千乗尉逹州巴渠簿兼令尉事遷陜州芮城令以疾去官旅寓京師尋訪醫藥積日彌乆美疢愈滋肩舁而歸遂成沈痼清漳卧病既十年而未瘳東岱歛魂俄三號而不返以咸平三年六月十八日卒于仁風里之私第享年六十二其年某月日歸葬于裏衝源順也君娶武寕章氏生子三人長為舟舉進士次垂象早亡次為式女一人適進士章覃自君之被疾也為舟等夙夜扶侍躬親左右靡神不禱靡藥不嘗蒸蒸服勤目為至孝予從祖兵部即君之元舅君之先夫人實予之尊姑予之與君猶丈人行也平生游處顧託乗以猶新舊館過從嗟脱驂之無益謹銘翠琰以志佳城銘曰天之德兮世濟美仕兩朝兮宰百里政之善兮疢何美禱之乆兮藥勿喜返九幽兮隣萬鬼人之生兮胡至此宋故主客員外郎直集賢院髙平范公墓誌銘咸平五年二月戊寅集賢學士主客員外郎髙平范公暴中風眩終于上都甘泉坊之私第上以賢相之後形于歎息戚里之懿優其賵賻兩宫遣使以赴弔四隣聞䘮而輟㫪交遊慟哭于寝門行旅咨嗟于閭巷非椒蘭之德服媚于人梁棟之材中道而天者疇能痛惜如是哉公諱貽孫字餘慶濟南厯城人其先厯虞夏商周實享世禄春秋戰國繼出名卿或以博士顯東京或以詞人稱南國或以文雄史䇿或以信著友朋蕃衍流光非可殫舉及公之大父守愚占數京輔隨牒方州為鄭州防禦判官命屈當時慶鍾後嗣累贈太子太師王父故魯國公諱質以伊管事業輔翊三朝以燕許手筆稱量天下由司徒侍中罷為太子太傅魯國公而聞望益大恩禮彌渥将為蒼生而再起遽歎哲人之云亡然自五代以來百年之内號良弼者不聞它人累贈至尚書令烈考諱旻以公卿子著籍甚之稱在貴逰間有台輔之望文章組繡于鞶􅍤心計剖析于毫釐任給事中三司副使公累謫宦事備國書由公上言追復官爵累贈至工部尚書公以岐嶷之姿荷清白之訓思以學優入仕恥由父任為郎不雜塵逰專精墳史果以鄉里之薦亟預賢能之書天子臨軒擢居乙等同年生率次補州郡從事掾属丞尉天子以公奕世載德肯構象賢欲其起家不循常調解褐授大理評事雍熈中林胡犯邊王師致討飛輓之役公實董之祗畏簡書大足兵食凱旋遷光禄寺丞數月改秘書省著作佐郎面賜五品服公以羣玉上帝之冊府蓬萊道家之藏室賢俊咸集喜田蘇之與遊圖史實繁多黄香之未見于是削章退食獻賦離宫即日命公待制文館數月以本官直集賢院自是紬書石室侍宴瑶池歌黄鵠于建章必陪賡載泛樓船於汾水即奉豫逰以冠玉之英標屡聞題柱以燃萁之敏思幾至奪袍其風度閑詳才調清婉士流推慕時論歸之登朝為殿中丞遷太常博士上即位入省為外郎皆領書殿之職公克纂緒業祗荷門閥寝丘遺産非有膏腴晏子舊居未更爽塏而能孝以睦族儉以飭躬即安先人之廬不違王父之命雅好禮法尤重名節奉烝嘗之祀馨德逹于神明事朞功之親歡心洽于宗黨性嗜羣籍家蔵萬巻或手自繕冩或親加校讐緗素畢陳敵秘書之副本籖題具列同呉氏之西齋好事之名流布京轂毎風庭月榭蕭辰蘭夕必命儔嘯侣銜杯漱醪凡備三益之友莫匪一時之雋漢庭太史或奏于聚星齊國客卿無嫌於卜夜此亦冲襟髙韻敻越常倫尚德好賢有足多者嗚呼不幸今也其亡享年四十三斯天也巳矣夫人髙邑縣君李氏實淮陽丞相之妹洪惟伯姊母儀萬邦作合先朝居尊長樂而夫人䖏貴思降在富能貧周旋禮經輔佐君子得中饋之道彰内助之賢舉案齊眉方期于偕老帷堂晝哭遽痛于未亡一子克勤年十一歳天子憫之特授太常寺奉禮郎月給俸緡俾終服紀固有竒骨荷兹髙門雖在童䝉已知孺慕有後之慶斯言不誣一女尚幼夫人以䘮無慮居禮當即逺毁家襄事竭力送終伊洛之間松檟斯在日月其吉龜筮無違即以其年十一月戊申扶䕶歸葬于河南府洛陽縣某鄉某里祔于先塋側也嗚呼刼燼灰飛沉碑谷變非刻金石曷志桑田以某投分生平託之銘篆巨源尚在庻嵇紹之不孤伯喈有言述太丘而無媿銘曰范氏之先出扵陶唐積德儲祉奕葉流光赫赫魯公蟬緌貂璫隂德有後乃生夕郎扵惟集仙肯構肯堂穆然容輝煥乎文章行歸于周動罔不臧嗚呼難忱今也即亡洛水濵兮邙山址波東傾兮樹西靡從先公兮夜臺啓新阡兮蒿里傳三世兮一身閟九泉兮萬祀琢貞石兮志佳城人之生兮胡至此宋故推誠保德翊戴功臣鄧州管内觀察使金紫光禄大夫檢校司空兼御史大夫上柱國長城郡開國公食邑二千四百户食實封四百户贈户部尚書錢公墓誌銘咸平六年秋七月詔鄧州觀察使并代等州經略使長城公歸京師疾故也上開宣室御武帳延登前席勞問數四以公美疢初復未任朝謁賜告就第俾之頥養汔九月勿藥有喜入謁未央宫自是五鼓登車晨趨無廢三杯退食常膳載加朝野之人室家相慶喜良臣之獲祐而斯文之未䘮也十月戊寅宿戒知友㑹竺乾之宇為桑門之饌與開士輩談苦空讃真諦俄起更衣偃然就枕若假寐焉少頃視之乃風眩暴作如大醉状肩舁歸第是夕以不起聞享年四十有四上臨軒震悼遣使弔問法賻之數有加常等窀穸之事悉從官給翌日詔贈戸部尚書天子以公母夫人在喜懼之年有羸老之疾不克終堂之養實深擠壑之痛特命中貴人面賜白金三十斤禮極哀榮恩霑存歿君臣之際斯為至矣公諱若水字淡成河南新安人盖凌烟功臣巢國公九隴之後世胄閥閱譜諜存焉贈太子太保蕚追封瑯邪郡太夫人王氏曽祖妣也贈太子太傅柔追封清河郡太夫人丁氏祖妣也尚書司門員外郎贈太子太師文敏烈考也徃者公叅掌萬機追榮三代始贈孤卿再躋極品至于延鄉之命乃慰令伯之心盖由夫錫羡貽謀重世始大臧孫于焉有後太丘以之無慙者也公始在孩稚頴悟不羣爰自青衿即齒鄉校開巻成誦發言有章纔十歳能属文逮志學之年已博渉六藝方領矩歩比肩諸生而符采超邁襟懐散朗山庭月角盖有公侯之相瓊樹瑶林自是風塵外物華山陳搏一見公以為有仙風道骨名在丹䑓紫府中柏閣僧宗裔者有人倫之鍳獨識公于儕軰且云斯人者異日登金門上玉堂升赤霄捧白日矣太平興國七年詔郡國貢士河南太守以公首薦于賢能之書時纔弱冠㑹有期功之䘮不克隨計再上登甲科解褐同州觀察推官專以經術縁飾吏事至有鄰郡之民滯訟未决不逺千里来求片言時先太師掌内帑于西都倉卒捐館公見星而往指景悼生泣血倚廬柴毁骨立左馮之人相與列状太守且云失賢從事民将疇依升聞于天特俾權奪公墨縗而贊幕畫心䘮以畢禮經郡政倚成甿頌尤塞今三司使夏官侍郎上谷公時任樞宻學士領選部方與天子論思帷幄之中進退天下之士而品藻人物講求茂異孜孜慰薦唯恐不及當是時公及太原王扶頴川陳充同郡錢熈皆為外諸侯賔属即抗章以聞咸傳召歸闕天子命丞相府召試以公文最髙超拜秘書丞直史館中謝日面賜緋衣銀魚自扶而下只除殿中丞不得與公比明年拜右正言知制誥與今給事中柴公成務吕公祐之諫議馮公起叅知政事王公旦同制並命焉淳化三年郡國貢士凡二萬人貢舉巳来莫斯為盛天子詔公同掌文柄數月又命案行平凉五原等郡公乗驛至塞下盡得其利病歸奏扵青規中畫地聚米如指諸掌天子嘉歎且諭以登用之意公辭以身被逄掖業在黄巻得司誥命為詞臣足矣天子乃召公入翰林為學士自屯田員外郎遷職方仍賜三品服審官辯論人材周太宰之任銀䑓出納王命漢尚書之職又詔公兼總二司焉至道元年春正月命公為右諫議大夫同知樞宻院事進階朝散賜勲柱國樞衡之任機務在焉自唐朝以來皆二廣兼領逮朱梁之後與三事抗衡至若赤白之囊曉傳邊奏輶軒之使夕發兵符承宻㫖于禁中授成筭于閫外丞相有所不聞也天子以公忠肅明允温恭篤慎付以是任一二咨之未幾太宗上仙聖皇紹統擢拜金紫光禄大夫尚書工部侍郎進封長城郡侯䇿勲上柱國餘如故上以公顧命大臣股肱良弼虚懐延納垂拱仰成公亦夙夜在公憔悴事國小大之務思竭其力而致其身謨猷之言必沃乎心而逆乎耳穆清體貌曽靡違顔私庭休沐不遑調膳一日乗清閒之宴面陳至誠直以聖朝之日長髙堂之齒暮願得綵衣膝下以奉其歡心上敦諭再三不俞其請公兩奉奏牘確乎不㧞上将欲崇進其秩公頓首固辭即以本官罷機務充集賢院學士判院事俄受詔修永熈國書公即引給事中柴公成務侍御史南陽宗度秘閣校理濮陽呉淑及億亦在選中曽未朞年書成奏御既終乙夜之覽爰備名山之藏上又以太祖皇帝十七年中經營四方削平海内規模宏逺功德茂盛當時史臣殊為簡略又命公舉爾所知再加論次公辭不獲免乃奏故刑部郎中知制誥王公禹偁今翰林學士梁公顥知制誥李公宗諤趙公安仁纔及周星俄已絶筆彌縫闕漏號為詳備兩朝大典出于公手百代而下垂為信書俄掌吏部三銓兼秋曹案讞㑹鳴鏑入宼大輅親征公扈從鈎陳駐蹕全魏或爟火傳警羽檄交馳天驕舉南牧之師雲䑓有未决之議上必遣親近咨其計䇿給以筆札受其條對六驘宵遯萬乗天旋命公權開封府事鄴都缺帥北顧是憂命公知天雄軍府兼兵馬部署言事者以上郡之地控扼黨項冝修復城隍大聚兵榖朝廷惑之發卒萬人贏糧深入因舉夫版築之役而謀夫盈庭利害蜂起上未能决適公自魏乗驛會師于離石以幄幕九張兵車百乗藩决野宿凡五日造廢壘焉公據鞍少選當機立㫁輙罷其役飛章以聞宸襟洞開疑謀冰釋因詣闕而白其状上嘉納慰勞適属親試貢士命近臣考甲乙科第俾公預焉東堂校文時推精識西清賜對帝善其言數日又命公撫廵陜西縁邊諸郡且以便宜從事凡七旬復命上謂公曰天官書上将次将位在文昌宫漢宣亦云邉境有事左右之臣皆将帥也文武是憲内外迭䖏亦何常之有公不能諭上㫖翌日有穫下之拜上以太原西北勁兵䖏控帶雁門雲中匈奴之所走集思得賢帥付以師律即命公兼并幽等州經略等使判并州事盡護諸将倚為長城又下詔案行邊塞周視亭障并土嚴凝窮冬尤劇擐甲胄者或至墮指襲狐貉者僅如懐冰公夙駕載馳䝉犯霜霰且多飲醇酒以禦寒氣因傷肺得疾頗施鍼砭忽瘍潰于脛流血石餘四體薾然僅存微喘上遣中使太醫冠盖相望又别賜手札丁寕欵宻初䝉藥石之効未任軍旅之事適㑹府州有所經度公将力疾而往上亟令止之雖漳濵有瘳而衞幕多故伐謀制勝固可以坐籌破敵鏖兵亦難于卧䕶乃降優詔俾之来朝方将驗上池之十全延明庭之三接出驅六纛授鈇鉞以專征入序九功登岩廊而論道為國方召播美扵聲詩致君堯舜躋俗扵仁夀如何奄忽乃至云亡里巷輟舂搢紳揮涕管公明不及嫁娶遺恨終天張元伯頓隔死生緒言在耳嗚呼即以其年十二月壬申歸葬于河南府新安縣暖泉鄉祔于先塋禮也公歴階至金紫䇿勲上柱國視秩水土兼職風憲三進爵為郡公真食至四百户功臣之號凡三加焉禄位官封亦云盛矣一子延年秘書省正字始七歳雖在稚齒了無童心擗踊哀摧啜泣孺慕出于天性殆過成人藐是遺孤庻乎有後公母范陽盧氏累封濮陽郡太夫人夫人滎陽鄭氏故殿中丞䖏升之女封北海郡夫人皆以公貴也兄若訥若虚早亡若愚今任大理評事通判台州公扵昆弟中為最幼虢州虢略簿若冲從父弟也大理評事維周前河南永城簿智周兄之子也皆由公而成立焉公眉宇秀㧞丰神標映體二鄰幾識探繋象下學上逹文成雅誥推已恕物殆過放麑之仁虚受兼容乃有涵牛之量善談名理聴之者更僕忘疲多識典故扣之者撞鐘輙應品題人物汝南之子将坐鎮雅俗東晋之安石挹其儀表者若披雲霧與之游從者如薫椒蘭盖所謂鑽之彌堅仰之彌髙澄之不清撓之不濁者也公在先朝時為北門學士與故刑部侍郎張公洎同日送上天子喜金鼇之得賢詠嘉魚而申美特詔宣演國樂魚龍雜戯近臣咸預式宴盡歡時方隅未寕邊候屢警在扵内署實司宻命毎天子臨便坐决章奏軍書手詔急扵星火斧扆之側授簡立成曲盡事機不加㸃竄秉筆者推之掌審官之柄也如良工度材輪轅咸適其用雖小人懐土胡越不違其情罷謫䝉扵安全淑慝以之區别居中樞之地也罄竭謨猷参决機㑹守正持重曽不将迎憂邉思職屢䝉嘉奨屬舋起益部盗據坤維絓湯網者居多皆吕刑之不宥頼公全活實繁有徒且以慎宻自持彌綸無迹詭詞而出雖温樹以不言隂德豈誣在里門而終大嘗以為百年之計莫如樹人三代之昌皆由得士姑務引翼以答恩遇祁司馬之舉善外不避讎鄭當時之薦賢言之有味又以難進易退儒者之行既得患失鄙夫所為乃辭禄樞府退就書殿士林歌頌堆案盈几馳競頓息風俗歸厚既而述唐虞之二典極班馬之三長西狩終篇南箕起謗或以不署宰衡是為專美或以倒置昭穆扵焉瀆宗公討尋故實援引詔令廷諍數四䇿書乃定羣邪側目正人増氣領選部也山公啓事多所薦陳掌秋曹也不疑平反號為寛大權蒞京轂也獄囚數百一旦决之桴鼓稀鳴鈎距靡設雖曰浩穰殆臻清浄出撫魏郡其政亦同乃有元戎貴侯髙牙大斾提七校之師中人内侍銀璫左貂從九天而降公巵酒大胾率以交驩郊勞飲餞曽無違禮奉緡靡給私帑屢空坦然放懐不以屑慮及罷上郡之役而晋民息肩握大鹵之兵而胡騶屏跡乃至易簀而沒家無餘財行路之間人皆流涕非誠信素著譬李廣之不言仁惠見思同子産之遺愛者安能及是哉公有德有言多材多藝精覈數術善評書畵雅好班固漢書常日讀一巻周急好施勞謙善下多所折劵未嘗治産収養孤㓜侔郈成分宅之仁恊比親戚掩游吉亢宗之説勤接士類皆虛徃而實歸善與人交必相先而莫逆薦引後進有知人之明購求墜簡侔秘書之副毎燕居私第角巾東道叩虛課寂味兹𤣥闗近年深信佛乗雅習禪觀隐几終日陶然自得歸全之明日上遣近侍求兩朝䇿書遺草若冲等搜扵巾箱盡以進御且述素志願得薄葬免扵勞民上亦允其請茂陵遺札幸天子之見求京兆新阡固鄉人之不犯族子光禄寺丞易卓犖稽古時之聞人集公生平文章為二十巻某辱公之顧為日斯乆道同氣合心照神交親奉齋終幸無怛化知音逝矣空絶伯牙之絃冡樹蒼然誰表延陵之墓含酸隕涕且為之銘銘曰明堂肇基衆材具施如何棟梁中道而隳元首睠懐同體是宜吁嗟股肱一旦而虧腹背何益鎩兹六翮碔砆奚為䘮我垂棘人失司南國亡遺直空餘話言布在方策嗟太山兮其頺悲玉樹兮将埋悵浮生兮朝露閟英魂兮夜臺伊南州之髙士兮徒漬酒以申哀背鮮原兮臨紫陌啓新阡兮從舊域嚴封樹兮禁樵蘇志泉扃兮刻金石諒西土之耆老兮盍樹碑以表德宋故翰林侍讀學士朝奉大夫右諫議大夫騎都尉賜紫金魚袋滎陽潘公墓誌銘咸平初天子端委穆清順考古道思近耆德樂聞話言扵是徴漢代金華之舊聞考唐室翰林之故事特置侍講學士之職時予從祖七兵尚書故户部夏侯貳卿今侍郎河間邢公中丞吕公竝預兹選後三歳今丞相畢公自上黨驛召既至即以命之又再歳自郎署擢河南潘公為諫議大夫授以兹任八年之間六人而巳公亦既拜命人無間言時屬天驕犯邊軍烽日警天子将躬秉武節展義兩河而公以肅乂之姿處切近之地旰朝備問言多沃心中涓諭㫖退必削稾及輿駕薄伐勤勞扈從晝驂乗扵襄野夕宿衛于鈎陳從羽獵扵儲胥陪玉食扵雲幄䝉犯霜霰因而遘疾猶親奉宸㫖致祭洪河沈璧浮牲精意懇到及復命行在移幸澶淵晨趨暮召夙夜匪懈中乾愈甚束帶不任王人國醫存省相繼嘉言宻奏啓沃未忘美疢漸滋皇慈彌渥特奉明詔先還上都肩舁啓行郵亭先置星言夙駕有加無瘳及旅愷班旋膏肓沈痼精爽将竭方寸不亂月正元日殆扵彌留猶召故人執手為别且占遺奏不令託孤歎逝者之如斯痛主恩之未報言訖瞑目至夕奄然皇上軫悼良臣賵禭加等以其子太廟齋郎汝士為大理評事正字汝礪為太常奉禮咸賦以禄俾之終䘮又詔有司給方舟載其柩歸葬豫章從遺志也恩禮之厚無以為比公諱慎修字成德其先滎陽中牟人唐末避亂遷扵閩粤治産作業遂為著姓當王氏之偏霸也曽祖武源以丘園之秀預弓旌之招受署福州古田令祖崇裔種德務滋懐才不試世難方棘肥遯終身烈考承祐屬雲雷之遘屯負公台之偉量嘗事呉為蘄州法曹掾郡守以非法致死罪抗議不奪投手版而歸王延政據建安且欲倚以為相時䦧墻結釁尋戈繼日引經義而廷諍因禁錮而家居江南平建州若得劇孟之一敵國也累服大僚專掌劇務辭榮致政得刑部尚書歸隠洪州之西山優游沒齒妣清河張氏以從夫之貴封本郡君而公之顯祖贈太常少卿祖妣河間邢氏封本縣太君皆由尚書之故也公少負俊才習聞義訓觀書學劔包文武以兼資㸃漆凝脂越風塵而特秀纔十餘嵗隨先尚書歸金陵得秘書省正字嵗滿遷校書郎未幾入省為水部員外郎賜五品服纔冠歳矣俄遷膳部先府君懸車告老公求便官就養得知洪州豐城縣嵗餘以憂解職卒哭起復舊官改上元令以刑部員外郎知雜賜服金紫執法甚平持憲尤肅江右耆舊至今稱之除水部郎中兼起居舎人判待制院領郡國之上書評諸曹之奏議盖一時之劇任也開寳末蚩尤之旗亘天龍驤之師渡水公将危邦之命以市宴為名使交兵之間履不測之險既陳土貢扵宰旅且留别館扵都亭時後主先命同氣之親来謝不朝之罪羈縻未遣休戚攸同王師所加㨗音繼至金湯失守顧宗國之将亡玉帛旅庭齒外臣而致賀邸吏懼其後至所司督其不供公介然抗議以為不可毎内朝稱慶但拜章待罪太祖重其知禮嘉其有辭特遣貴臣親諭上㫖改命供帳増給餼牽及青盖来朝朱扉賜第太祖以公質性忠厚特授太子右贊善大夫俾事故君是為上介思喬木於故國尚見世臣曵長裾于王門兼掌記室太宗嗣位以恩例累進階勲後主考終由府罷復預朝請歴太常博士虞部倉部考功三員外郎郎中出通判夀州知湖州梓州凡十年在外故鄧帥太傅李公典領中秘書方求碩儒以充近署遂引公入直秘閣出入交㦸偃息周廬刊正遺編盖手不釋巻祗膺清問必膝之前席善談名理言為陽秋勤接士類心無城府江東人物率執贄而宗予漢庭公卿多致恭而尚齒允所謂南州之髙士儒林之丈人也然自博極羣書優游一紀素髪垂領僅類郎潛凝塵滿席不嬰世務婚嫁未畢屢求典於方州年德俱髙果入參扵近侍将記言扵惇史遽歸全扵厚夜嗚呼享年六十九公前娶汝南周氏今夫人東海徐氏封本縣君即故中書侍郎上饒郡公景遜之女也建康大姓連姻戚里柔儀惠問冝家睦族俄遘未亡之戚實深偕老之痛率其二子奉公之䘮歸于洪州祔先尚書之塋從治命也公四子長𤣥亮端拱中舉進士補大名朝城尉次𤣥成皆早亡五女長適福州寕德令邵良弼次適蘇州常熟令岑頔先公而逝次適興元府觀察推官龔紀次適大理寺丞張安期故叅政刑部侍郎洎之子也一尚㓜而許嫁待年而未行公風度詳閑襟懐夷曠旁通多可虚受兼容雅善棊奕僅臻絶品先皇帝萬幾之暇常以方罫自娯公屡䝉三接之召親奉一枰之戯退而作棊説以獻天子異之盖多藝多材姬公自許執御執射仲尼之言雖餘力之使然亦天機之獨妙叅掌記注猶及金匱之闕文屢奉宴逰嘗續柏梁之髙韻生平著撰叠委筐箱諸郎等方在哀迷未遑論次長卿遺札冀武皇之見求叔夜孤児幸山公之尚在永懐舊德髣髴緒言揮涕濡毫以志陵谷銘曰全呉之地纉唐之祀公臣舊邦罔有貳事開寳之季王師摩壘公使交兵兹亦盡瘁一心事君典訓攸聞公之奉上茂貞純兮十年不調先民是悼公之為郎殆華皓兮西清北門宴見諮詢簮筆持槖奉至尊兮靈旗大輅徂征赫怒巾車脂轄陪天歩兮公巳白首始遘元后冨貴之来逼蒲栁兮公踐玉堂入侍聖皇寒暑之疹在膏肓兮時不與兮道攸逺志将亨兮命彌蹇旅櫬歸兮春草長銘旌飄兮白日晩瞻冡樹兮成行悲逝川兮不返永齎志兮首丘長垂名兮汗簡武夷新集巻九
